<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>你也來搞OC吧！</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{
  --ink:#2b2440;
  --bg:#f6f1fb;
  --paper:#ffffff;
  --accent:#ff5d8f;
  --accent2:#6c4ce0;
  --mint:#35d0a5;
  --sun:#ffd84d;
  --soft:#efe7fa;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  background-image:radial-gradient(rgba(108,76,224,.10) 1.6px, transparent 1.6px);
  background-size:26px 26px;
  color:var(--ink);
  font-family:"Noto Sans TC","PingFang TC","Yuanti TC","Microsoft JhengHei",sans-serif;
  line-height:1.6;
}
.app{max-width:1080px;margin:0 auto;padding:0 16px 80px;}
.topbar{
  position:sticky;top:0;z-index:50;
  background:rgba(246,241,251,.92);backdrop-filter:blur(6px);
  padding:14px 0 10px;margin-bottom:8px;
  border-bottom:2px dashed rgba(43,36,64,.25);
}
.topbar-inner{display:flex;flex-wrap:wrap;align-items:center;gap:12px;}
.logo{
  display:inline-flex;align-items:center;gap:8px;
  font-weight:900;font-size:22px;letter-spacing:1px;
  background:var(--paper);border:2.5px solid var(--ink);border-radius:14px;
  padding:6px 14px;box-shadow:4px 4px 0 var(--ink);
  transform:rotate(-1.5deg);
}
.logo .oc-badge{
  background:var(--accent);color:#fff;border:2px solid var(--ink);
  border-radius:10px;padding:0 8px;font-size:18px;transform:rotate(3deg);
  display:inline-block;
}
.searchbox{
  flex:1;min-width:220px;display:flex;align-items:center;gap:8px;
  background:var(--paper);border:2px solid var(--ink);border-radius:999px;
  padding:6px 14px;box-shadow:3px 3px 0 rgba(43,36,64,.25);
}
.searchbox input{border:none;outline:none;flex:1;font-size:15px;background:transparent;font-family:inherit;color:var(--ink);}
.tabs{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0 18px;}
.tab{
  border:2px solid var(--ink);background:var(--paper);color:var(--ink);
  border-radius:12px 12px 4px 12px;padding:8px 16px;font-size:15px;font-weight:700;
  cursor:pointer;box-shadow:3px 3px 0 rgba(43,36,64,.35);font-family:inherit;
  transition:transform .08s ease;
}
.tab:hover{transform:translateY(-2px);}
.tab.active{background:var(--accent2);color:#fff;box-shadow:3px 3px 0 var(--ink);}
.card{
  position:relative;background:var(--paper);
  border:2px solid var(--ink);border-radius:16px;
  box-shadow:5px 5px 0 rgba(43,36,64,.9);
  padding:20px 18px 16px;margin-bottom:20px;
}
.card.tape::before{
  content:"";position:absolute;top:-12px;left:28px;width:96px;height:24px;
  background:rgba(255,216,77,.75);border:1.5px solid rgba(43,36,64,.35);
  transform:rotate(-3deg);border-radius:3px;
}
.card.tape.tape-pink::before{background:rgba(255,93,143,.55);left:auto;right:36px;transform:rotate(2.5deg);}
.card.tape.tape-mint::before{background:rgba(53,208,165,.55);}
.card h2{margin:0 0 4px;font-size:20px;letter-spacing:1px;}
.card h3{margin:14px 0 6px;font-size:16px;}
.card .sub{font-size:13px;color:rgba(43,36,64,.65);margin-bottom:12px;}
.section-title{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.section-title .dot{width:12px;height:12px;border-radius:50%;background:var(--accent);border:2px solid var(--ink);display:inline-block;}
.grid2{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px 14px;}
.field{display:flex;flex-direction:column;gap:3px;margin-bottom:8px;}
.field label{font-size:13px;font-weight:800;letter-spacing:.5px;}
.field .hint{font-size:11px;color:rgba(43,36,64,.55);}
input[type=text],textarea,select{
  border:2px solid var(--ink);border-radius:10px;padding:7px 10px;
  font-size:14px;font-family:inherit;color:var(--ink);background:#fff;
  outline:none;width:100%;
}
input[type=text]:focus,textarea:focus,select:focus{border-color:var(--accent2);box-shadow:0 0 0 3px rgba(108,76,224,.18);}
textarea{resize:vertical;min-height:72px;}
.btn{
  border:2px solid var(--ink);border-radius:999px;padding:7px 16px;
  font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;
  background:#fff;color:var(--ink);box-shadow:3px 3px 0 var(--ink);
  transition:transform .08s ease, box-shadow .08s ease;
}
.btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--ink);}
.btn.primary{background:var(--accent);color:#fff;}
.btn.violet{background:var(--accent2);color:#fff;}
.btn.mint{background:var(--mint);color:var(--ink);}
.btn.sun{background:var(--sun);color:var(--ink);}
.btn.ghost{background:transparent;box-shadow:none;border-style:dashed;}
.btn.small{padding:3px 12px;font-size:12.5px;}
.btn.danger{background:#fff;color:#c62143;border-color:#c62143;box-shadow:3px 3px 0 #c62143;}
.row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
.chip{
  display:inline-flex;align-items:center;gap:6px;
  border:2px solid var(--ink);border-radius:999px;padding:3px 12px;
  font-size:13px;font-weight:700;background:var(--soft);cursor:pointer;user-select:none;
}
.chip.on{background:var(--accent2);color:#fff;}
.badge{
  display:inline-block;border:1.5px solid var(--ink);border-radius:8px;
  padding:1px 8px;font-size:12px;font-weight:800;background:var(--sun);
}
.item-card{
  border:2px solid rgba(43,36,64,.8);border-radius:12px;
  padding:12px;margin-bottom:12px;background:#fff;
}
.char-list{display:flex;flex-direction:column;gap:8px;}
.char-list-item{
  display:flex;align-items:center;gap:10px;
  border:2px solid var(--ink);border-radius:12px;padding:8px 12px;
  cursor:pointer;background:#fff;box-shadow:3px 3px 0 rgba(43,36,64,.25);
}
.char-list-item.active{box-shadow:3px 3px 0 var(--ink);outline:2px solid var(--accent2);}
.avatar{
  width:34px;height:34px;border-radius:50%;border:2px solid var(--ink);
  display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;
  background:var(--accent2);flex:none;font-size:15px;
}
.split{display:grid;grid-template-columns:250px 1fr;gap:16px;align-items:start;}
@media(max-width:760px){.split{grid-template-columns:1fr;}}
.au-tabs{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0;}
.au-tab{
  border:2px solid var(--ink);border-radius:10px 10px 0 0;padding:4px 12px;
  font-size:13px;font-weight:700;cursor:pointer;background:var(--soft);font-family:inherit;
}
.au-tab.active{background:var(--accent);color:#fff;}
.timeline{border-left:3px solid var(--accent2);margin:10px 0 4px 10px;padding-left:18px;}
.timeline-item{position:relative;margin-bottom:14px;}
.timeline-item::before{
  content:"";position:absolute;left:-26px;top:6px;width:12px;height:12px;
  border-radius:50%;background:var(--accent);border:2.5px solid var(--ink);
}
.timeline-item .t-time{font-size:12px;font-weight:900;color:var(--accent2);}
.timeline-item .t-title{font-weight:800;}
.timeline-item .t-desc{font-size:13px;color:rgba(43,36,64,.75);white-space:pre-wrap;}
.search-hit{border:2px dashed var(--accent2);border-radius:12px;padding:10px 12px;margin-bottom:10px;cursor:pointer;background:#fff;}
.search-hit:hover{background:var(--soft);}
.search-hit .where{font-size:12px;font-weight:900;color:var(--accent);}
mark{background:var(--sun);border-radius:3px;padding:0 2px;}
.preview-doc{
  border:2px solid var(--ink);border-radius:12px;background:#fff;
  max-height:480px;overflow:auto;padding:20px 24px;font-size:14px;
}
.preview-doc h1{font-size:22px;border-bottom:3px double var(--ink);padding-bottom:6px;}
.preview-doc h2{font-size:18px;color:var(--accent2);margin-top:22px;}
.preview-doc h3{font-size:16px;margin-top:16px;}
.preview-doc h4{font-size:14px;margin-top:12px;color:var(--accent);}
.preview-doc table{border-collapse:collapse;width:100%;font-size:13px;}
.preview-doc td,.preview-doc th{border:1px solid rgba(43,36,64,.5);padding:4px 8px;text-align:left;}
.canvas-stage{background:#fff;border:2px solid var(--ink);border-radius:12px;padding:16px;overflow:auto;}
.footnote{font-size:12px;color:rgba(43,36,64,.55);margin-top:6px;}
.empty{
  border:2px dashed rgba(43,36,64,.4);border-radius:12px;padding:20px;
  text-align:center;color:rgba(43,36,64,.6);font-size:14px;background:rgba(255,255,255,.6);
}
#print-area{display:none;}
@media print{
  body{background:#fff;}
  #root{display:none;}
  #print-area{display:block;font-size:13px;color:#000;}
}
.spot-link{font-size:12px;font-weight:800;color:var(--mint);text-decoration:underline;word-break:break-all;}
.rel-block{border:2px solid rgba(43,36,64,.5);border-radius:10px;padding:10px;margin-top:8px;background:var(--soft);}
.save-tag{font-size:11px;color:rgba(43,36,64,.5);}
</style>
</head>
<body>
<div id="root"></div>
<div id="print-area"></div>
<script type="text/babel">
const {useState,useEffect,useMemo,useRef} = React;

/* ---------- 工具 ---------- */
const uid = () => Math.random().toString(36).slice(2,10) + Date.now().toString(36).slice(-3);
const esc = s => String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const nl  = s => esc(s).replace(/\n/g,"<br/>");
const isHex = s => /^#([0-9a-fA-F]{3}|[0-9a-fA-F]{6})$/.test(String(s||"").trim());
const tint = (hex,alpha) => {
  if(!isHex(hex)) return "transparent";
  let h = hex.trim().slice(1);
  if(h.length===3) h = h.split("").map(c=>c+c).join("");
  const r=parseInt(h.slice(0,2),16), g=parseInt(h.slice(2,4),16), b=parseInt(h.slice(4,6),16);
  return `rgba(${r},${g},${b},${alpha})`;
};
function saveBlob(blob,name){
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob); a.download=name;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{URL.revokeObjectURL(a.href); a.remove();},800);
}
function naturalCompare(a,b){
  return String(a||"").localeCompare(String(b||""),"zh-Hant",{numeric:true,sensitivity:"base"});
}
function spotifyEmbedUrl(url){
  const m=String(url||"").match(/open\.spotify\.com\/(?:intl-[\w-]+\/)?(track|album|playlist|episode)\/([A-Za-z0-9]+)/);
  return m ? ("https://open.spotify.com/embed/"+m[1]+"/"+m[2]) : null;
}
function readAvatarFile(file,cb){
  const reader=new FileReader();
  reader.onload=()=>{
    const img=new Image();
    img.onload=()=>{
      const max=256;
      const scale=Math.min(1,max/Math.max(img.width,img.height));
      const w=Math.round(img.width*scale), h=Math.round(img.height*scale);
      const canvas=document.createElement("canvas");
      canvas.width=w; canvas.height=h;
      canvas.getContext("2d").drawImage(img,0,0,w,h);
      cb(canvas.toDataURL("image/jpeg",0.86));
    };
    img.src=String(reader.result);
  };
  reader.readAsDataURL(file);
}

/* ---------- 星座 ---------- */
function parseBirthday(s){
  if(!s) return null;
  const m = String(s).match(/(\d{1,2})\s*[月\/\-\.]\s*(\d{1,2})/);
  if(!m) return null;
  const mm=+m[1], dd=+m[2];
  if(mm<1||mm>12||dd<1||dd>31) return null;
  return {m:mm,d:dd};
}
const SIGN_NAMES=["摩羯座","水瓶座","雙魚座","牡羊座","金牛座","雙子座","巨蟹座","獅子座","處女座","天秤座","天蠍座","射手座","摩羯座"];
const SIGN_LAST=[19,18,20,19,20,21,22,22,22,23,22,21];
function getZodiac(birthday){
  const p=parseBirthday(birthday);
  if(!p) return "";
  return p.d<=SIGN_LAST[p.m-1] ? SIGN_NAMES[p.m-1] : SIGN_NAMES[p.m];
}

/* ---------- 欄位定義 ---------- */
const FIELD_DEFS=[
  {key:"name",label:"姓名"},
  {key:"age",label:"外貌年齡"},
  {key:"birthday",label:"生日",hint:"不需年份，例：3月14日 或 3/14"},
  {key:"height",label:"身高",hint:"例：172cm"},
  {key:"weight",label:"體重"},
  {key:"cv",label:"CV"},
  {key:"color",label:"代表色",hint:"輸入色號後自動調整條目底色",type:"color"},
  {key:"mbti",label:"MBTI"},
  {key:"song",label:"印象曲",hint:"可貼上Spotify歌曲連結",type:"song"},
  {key:"appearance",label:"外觀描述",type:"textarea"},
  {key:"description",label:"角色描述",type:"textarea"},
  {key:"coreTheme",label:"核心命題",type:"textarea"},
  {key:"notes",label:"備註",type:"textarea"},
  {key:"analysis",label:"角色分析",type:"textarea"},
];
function fieldOrderOf(v){
  const base=FIELD_DEFS.map(d=>d.key);
  const customs=(v.customFields||[]).map(f=>"cf:"+f.id);
  const valid=new Set([...base,...customs]);
  const stored=(v.fieldOrder||[]).filter(k=>valid.has(k));
  const missing=[...base,...customs].filter(k=>!stored.includes(k));
  return [...stored,...missing];
}
const emptyCharFields = () => ({
  name:"",age:"",birthday:"",height:"",weight:"",cv:"",color:"",mbti:"",song:"",avatar:"",
  appearance:"",description:"",coreTheme:"",notes:"",analysis:"",
  customFields:[],fieldOrder:[],
  foreignNames:[{id:uid(),lang:"英文",value:""},{id:uid(),lang:"日文",value:""},{id:uid(),lang:"韓文",value:""}],
  relationships:[],
});
const newCharacter = (name) => ({ id:uid(), ...emptyCharFields(), name:name||"", auProfiles:[], events:[], inspirations:[] });
const newWorld = (name) => ({ id:uid(), name:name||"", description:"", events:[], groups:[] });
const newMainWorld = (name) => ({ ...newWorld(name), aus:[] });
const initialDb = { worlds:[newMainWorld("")], characters:[], questionnaires:[], tierList:defaultTierList(), quadrant:defaultQuadrant() };
function charColorOf(c,i){ return isHex(c&&c.color)?c.color:"#9e9e9e"; }
function newQuestionnaire(name){
  return { id:uid(), name:name||"", topic:"", charIds:[], created:new Date().toLocaleDateString("zh-TW"),
           markStyle:"hl", markColor:"#ffd84d", includeInPdf:false, questions:[] };
}
function newQuestion(type){
  const base={id:uid(),type,text:"",answers:{}};
  if(type==="scale") return {...base,min:1,max:10,leftLabel:"",rightLabel:"",orient:"h"};
  if(type==="choice") return {...base,options:["選項一","選項二"],display:"list",markStyle:"",markColor:""};
  return {...base,axes:["軸一","軸二","軸三","軸四","軸五"],min:0,max:10};
}
function findAuById(worlds,id){
  for(const mw of worlds){ const a=(mw.aus||[]).find(x=>x.id===id); if(a) return {au:a,mw}; }
  return null;
}
function profileAuName(worlds,p){
  if(p && p.auWorldId){ const f=findAuById(worlds,p.auWorldId); if(f) return f.au.name||"未命名AU"; }
  return (p&&p.auName)||"未命名AU";
}
function defaultTierList(){
  return { title:"我的角色Tier表",
    tiers:[{id:"t-s",label:"S",color:"#ff7f7f"},{id:"t-a",label:"A",color:"#ffbf7f"},{id:"t-b",label:"B",color:"#ffdf7f"},{id:"t-c",label:"C",color:"#bfef7f"},{id:"t-d",label:"D",color:"#7fbfff"}],
    assign:{} };
}
function defaultQuadrant(){
  return { title:"角色象限圖", xLeft:"內向", xRight:"外向", yTop:"理性", yBottom:"感性", pos:{}, canvasW:560, canvasH:420 };
}
function migrateDb(j){
  if(!j) return null;
  const extras=x=>({questionnaires:x.questionnaires||[], tierList:x.tierList||defaultTierList(), quadrant:x.quadrant||defaultQuadrant()});
  if(Array.isArray(j.worlds)) return { worlds:j.worlds.map(w=>({aus:[],...w})), characters:j.characters||[], ...extras(j) };
  if(j.mainWorld) return { worlds:[{...j.mainWorld, aus:j.aus||[]}], characters:j.characters||[], ...extras(j) };
  return null;
}

/* ---------- 匯入解析 ---------- */
const IMPORT_ALIASES={
  name:["姓名","名字","名稱","角色名","角色名稱"],
  age:["外貌年齡","年齡","年紀"],
  birthday:["生日","誕生日"],
  height:["身高"],
  weight:["體重"],
  cv:["cv","聲優","配音","配音員"],
  color:["代表色","主題色","顏色","色號"],
  mbti:["mbti","人格類型"],
  song:["印象曲","主題曲","角色曲","歌曲"],
  appearance:["外觀描述","外貌描述","外觀","外貌","外表"],
  description:["角色描述","介紹","簡介","描述","角色介紹","設定"],
  coreTheme:["核心命題","核心","主題"],
  notes:["備註","註記"],
  analysis:["角色分析","分析","考察"],
};
const WORLD_ALIASES={
  name:["世界觀名稱","世界名稱","名稱","標題","作品名"],
  description:["世界觀描述","世界觀","描述","簡介","設定","背景"],
};
function matchKey(label,aliases){
  const l=label.trim().toLowerCase();
  for(const key in aliases){
    if(aliases[key].some(a=>l===a.toLowerCase())) return key;
  }
  return null;
}
function smartParse(text){
  const lines=String(text||"").split(/\r?\n/);
  const charFields={}, worldFields={};
  let lastTarget=null, extra=[];
  for(const raw of lines){
    const line=raw.trim();
    if(!line) { lastTarget=null; continue; }
    const m=line.match(/^[-•・\*]?\s*(.{1,12}?)\s*[：:]\s*(.*)$/);
    if(m){
      const ck=matchKey(m[1],IMPORT_ALIASES);
      const wk=matchKey(m[1],WORLD_ALIASES);
      if(ck){ charFields[ck]=(charFields[ck]?charFields[ck]+"\n":"")+m[2]; lastTarget=["c",ck]; continue; }
      if(wk){ worldFields[wk]=(worldFields[wk]?worldFields[wk]+"\n":"")+m[2]; lastTarget=["w",wk]; continue; }
    }
    if(lastTarget){
      const [t,k]=lastTarget;
      if(t==="c") charFields[k]=(charFields[k]?charFields[k]+"\n":"")+line;
      else worldFields[k]=(worldFields[k]?worldFields[k]+"\n":"")+line;
    } else { extra.push(line); }
  }
  const hasChar=Object.keys(charFields).length>0;
  const hasWorldWord=/世界觀|worldbuilding/i.test(text);
  let guess="character";
  if(!charFields.name && (hasWorldWord || (!hasChar && Object.keys(worldFields).length>0))) guess="world";
  if(extra.length){
    if(guess==="character") charFields.description=(charFields.description?charFields.description+"\n":"")+extra.join("\n");
    else worldFields.description=(worldFields.description?worldFields.description+"\n":"")+extra.join("\n");
  }
  return {charFields,worldFields,guess};
}

/* ---------- 共用小元件 ---------- */
function Collapse({title,children,defaultOpen}){
  const [open,setOpen]=useState(defaultOpen!==false);
  return (
    <div style={{border:"2px dashed rgba(43,36,64,.4)",borderRadius:12,padding:open?"10px 12px 12px":"6px 12px",marginBottom:10,background:"rgba(255,255,255,.65)"}}>
      <div className="row" style={{cursor:"pointer",justifyContent:"space-between",flexWrap:"nowrap",userSelect:"none"}} onClick={()=>setOpen(v=>!v)}>
        <span style={{fontWeight:900,fontSize:14.5}}>{open?"▾":"▸"} {title}</span>
        <span className="hint" style={{flex:"none"}}>{open?"收合":"展開"}</span>
      </div>
      {open && <div style={{marginTop:8}}>{children}</div>}
    </div>
  );
}
function AvatarCircle({name,color,avatar,size}){
  const sz=size||34;
  const base={width:sz,height:sz,borderRadius:"50%",border:"2px solid var(--ink)",flex:"none"};
  if(avatar) return <img src={avatar} alt="" style={{...base,objectFit:"cover",background:"#fff"}}/>;
  return (
    <span className="avatar" style={{...base,background:isHex(color)?color:"#9e9e9e",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,color:"#fff",fontSize:sz*0.44}}>
      {(name||"？").slice(0,1)}
    </span>
  );
}
function AvatarUpload({value,name,color,onChange}){
  const fileRef=useRef(null);
  return (
    <div className="row">
      <AvatarCircle name={name} color={color} avatar={value} size={64}/>
      <button className="btn small sun" onClick={()=>fileRef.current.click()}>🖼 上傳頭像</button>
      {value && <button className="btn small danger" onClick={()=>onChange("")}>移除頭像</button>}
      <input type="file" ref={fileRef} accept="image/*" style={{display:"none"}}
        onChange={e=>{const f=e.target.files[0]; if(f) readAvatarFile(f,onChange); e.target.value="";}}/>

    return (
      <div className="field" style={embed?{gridColumn:"1 / -1"}:null}>

          ? <div>

                style={{borderRadius:12,border:"2px solid var(--ink)",marginTop:4,background:"#fff"}} title="Spotify預覽"></iframe>
              <a className="spot-link" href={value} target="_blank" rel="noreferrer">♪ 若預覽無法載入，點此在Spotify開啟</a>
            </div>

    );

      <label>{def.label}{def.key==="birthday" && zodiac && <span className="badge" style={{marginLeft:8}}>★ {zodiac}</span>}</label>
      <input type="text" value={value||""} onChange={e=>onChange(e.target.value)} placeholder={"請輸入"+def.label+"…"}/>
      {def.hint && <span className="hint">{def.hint}</span>}
    </div>
  );
}

function FieldGrid({values,setField,mutateOwner}){
  const zodiac=getZodiac(values.birthday);
  const [sortMode,setSortMode]=useState(false);
  const dragIdx=useRef(-1);
  const order=fieldOrderOf(values);
  const labelOfKey=k=>{
    if(k.startsWith("cf:")){
      const f=(values.customFields||[]).find(x=>"cf:"+x.id===k);
      return f?(f.label||"自訂欄位"):"自訂欄位";
    }
    const d=FIELD_DEFS.find(x=>x.key===k);
    return d?d.label:k;
  };
  const reorder=(from,to)=>{
    if(from<0||from===to) return;
    const a=[...order]; const [m]=a.splice(from,1); a.splice(to,0,m);
    mutateOwner&&mutateOwner(o=>{o.fieldOrder=a;});
  };
  return (
    <div className="grid2">
      <div className="field" style={{gridColumn:"1 / -1"}}>
        <label>頭像</label>
        <AvatarUpload value={values.avatar} name={values.name} color={values.color}
                      onChange={v=>setField("avatar",v)}/>
      </div>
      {mutateOwner &&
        <div className="row" style={{gridColumn:"1 / -1"}}>
          <button className={"btn small"+(sortMode?" violet":"")} onClick={()=>setSortMode(v=>!v)}>
            {sortMode?"✔ 完成排序":"↕ 調整欄位順序"}
          </button>
          <button className="btn small sun" onClick={()=>mutateOwner(o=>{
            if(!o.customFields) o.customFields=[];
            o.customFields.push({id:uid(),label:"自訂欄位",value:""});
          })}>＋新增自訂欄位</button>
          {sortMode && <span className="hint">拖曳下方欄位名稱即可調整順序（含自訂欄位）。</span>}
        </div>}
      {sortMode
        ? <div className="row" style={{gridColumn:"1 / -1"}}>
            {order.map((k,i)=>(
              <span key={k} className="chip" draggable style={{cursor:"grab"}}
                    onDragStart={()=>{dragIdx.current=i;}}
                    onDragOver={e=>e.preventDefault()}
                    onDrop={()=>{const f=dragIdx.current; dragIdx.current=-1; reorder(f,i);}}>
                ⋮⋮ {labelOfKey(k)}
              </span>
            ))}
          </div>
        : order.map(k=>{
            if(k.startsWith("cf:")){
              const cf=(values.customFields||[]).find(x=>"cf:"+x.id===k);
              if(!cf) return null;
              return (
                <div className="field" key={k} style={{gridColumn:"1 / -1"}}>
                  <div className="row" style={{marginBottom:2}}>
                    <input type="text" value={cf.label} placeholder="自訂欄位名稱" style={{maxWidth:200,fontWeight:800}}
                      onChange={e=>mutateOwner(o=>{const f=(o.customFields||[]).find(x=>x.id===cf.id); if(f) f.label=e.target.value;})}/>
                    <button className="btn small danger" onClick={()=>mutateOwner(o=>{
                      o.customFields=(o.customFields||[]).filter(x=>x.id!==cf.id);
                    })}>刪除欄位</button>
                  </div>
                  <textarea value={cf.value} placeholder={"請輸入"+(cf.label||"自訂欄位")+"…"}
                    onChange={e=>mutateOwner(o=>{const f=(o.customFields||[]).find(x=>x.id===cf.id); if(f) f.value=e.target.value;})}/>
                </div>
              );
            }
            const def=FIELD_DEFS.find(d=>d.key===k);
            if(!def) return null;
            return (
              <React.Fragment key={def.key}>
                <Field def={def} value={values[def.key]} zodiac={zodiac}
                       onChange={v=>setField(def.key,v)}/>
                {def.key==="birthday" &&
                  <div className="field">
                    <label>星座（依生日自動偵測）</label>
                    <div>{zodiac ? <span className="badge">{zodiac}</span> : <span className="hint">填寫生日後自動顯示，例：3月14日 → 雙魚座</span>}</div>
                  </div>}
              </React.Fragment>
            );
          })}
    </div>
  );
}

      {events.map((ev,i)=>(

                   onChange={e=>update(w=>{w.events[i].time=e.target.value;})}/>
            <input type="text" value={ev.title} placeholder="事件標題" style={{flex:1,minWidth:140}}
                   onChange={e=>update(w=>{w.events[i].title=e.target.value;})}/>
            <button className="btn small danger" onClick={()=>update(w=>{w.events.splice(i,1);})}>刪除</button>
          </div>
          <textarea value={ev.description} placeholder="事件描述…" style={{minHeight:48}}
                    onChange={e=>update(w=>{w.events[i].description=e.target.value;})}/>

      ))}

        if(!w.events) w.events=[];
        w.events.push({id:uid(),time:"",title:"",description:"",checked:true});
      })}>＋新增事件</button>
      {showTimeline && (
        sorted.length
        ? <div className="timeline">

              <div className="timeline-item" key={ev.id}>

      )}

            </Collapse>
            <Collapse title="🤝 人際關係">
              <RelationshipEditor owner={char} allChars={allChars} selfId={char.id}
                                  update={fn=>update(c=>{fn(c);})}/>

              <EventList world={char} update={fn=>update(c=>{if(!c.events)c.events=[];fn(c);})}/>

                      onChange={e=>update(c=>{

    </div>
  );
}

/* ---------- 匯出文件HTML ---------- */
const DEFAULT_EXPORT_OPTS=()=>({
  fields:Object.fromEntries(FIELD_DEFS.map(d=>[d.key,true])),
  avatar:true,custom:true,foreign:true,relations:true,events:true,auProfiles:true,aus:true,quests:true,inspirations:true
});
function charName(allChars,id){const c=allChars.find(x=>x.id===id);return c?(c.name||"未命名角色"):"（已刪除的角色）";}
function fieldRow(label,val){ return val ? `<p style="margin:2px 0"><b>${esc(label)}：</b>${nl(val)}</p>` : ""; }
function worldHtml(w,allChars,level){
  const h = level===2?"h2":(level===3?"h3":"h4");
  let s = `<${h}>${esc(w.name||"（未命名世界觀）")}</${h}>`;
  if(w.description) s += `<p>${nl(w.description)}</p>`;
  const evs=[...(w.events||[])].sort((a,b)=>naturalCompare(a.time,b.time));
  if(evs.length){
    s += `<h4>事件列表</h4><table><tr><th>時間</th><th>事件</th><th>描述</th><th>時間軸</th></tr>`;
    evs.forEach(e=>{ s+=`<tr><td>${esc(e.time)}</td><td>${esc(e.title)}</td><td>${nl(e.description)}</td><td>${e.checked?"✔":""}</td></tr>`; });
    s += `</table>`;
  }
  if((w.groups||[]).length){
    s += `<h4>角色關係組合</h4>`;
    w.groups.forEach(g=>{
      s += `<p style="margin:4px 0"><b>${esc(g.name||"未命名組合")}</b>（${g.memberIds.map(id=>esc(charName(allChars,id))).join("、")||"尚未選擇角色"}）</p>`;
      if(g.description) s += `<p style="margin:2px 0 8px">${nl(g.description)}</p>`;
    });
  }
  return s;
}
function profileHtml(p,allChars,opts){
  opts=opts||DEFAULT_EXPORT_OPTS();
  let s="";
  if(opts.avatar && p.avatar) s+=`<p style="margin:4px 0"><img src="${p.avatar}" alt="頭像" width="90" style="border-radius:12px;border:2px solid #333"/></p>`;
  fieldOrderOf(p).forEach(k=>{
    if(k.startsWith("cf:")){
      if(!opts.custom) return;
      const f=(p.customFields||[]).find(x=>"cf:"+x.id===k);
      if(f) s+=fieldRow(f.label||"自訂欄位",f.value);
    }else{
      if(!opts.fields[k]) return;
      const d=FIELD_DEFS.find(x=>x.key===k);
      if(d) s+=fieldRow(d.label,p[d.key]);
    }
  });
  const z=opts.fields.birthday?getZodiac(p.birthday):"";
  if(z) s+=fieldRow("星座",z);
  const fns=opts.foreign?(p.foreignNames||[]).filter(f=>f.value):[];
  if(fns.length) s+=`<p style="margin:2px 0"><b>外文名：</b>${fns.map(f=>esc((f.lang||"？")+"／"+f.value)).join("；")}</p>`;
  const rels=opts.relations?(p.relationships||[]).filter(r=>allChars.some(c=>c.id===r.targetId)):[];
  if(rels.length){
    s+=`<p style="margin:6px 0 2px"><b>人際關係：</b></p>`;
    rels.forEach(r=>{
      s+=`<p style="margin:2px 0 2px 14px">◆ 與「${esc(charName(allChars,r.targetId))}」：${esc(r.relation||"")}</p>`;
      if(r.story) s+=`<p style="margin:0 0 2px 28px">故事：${nl(r.story)}</p>`;
      if(r.notes) s+=`<p style="margin:0 0 2px 28px">補充：${nl(r.notes)}</p>`;
    });
  }
  return s;
}
function buildExportHtml(db,opts){
  opts=opts||DEFAULT_EXPORT_OPTS();
  const allChars=db.characters;
  const CN=["壹","貳","參","肆","伍","陸","柒","捌","玖","拾"];
  const cn=i=>CN[i]||String(i+1);
  let s=`<h1>你也來搞OC吧！　設定資料集</h1>`;
  db.worlds.forEach((mw,i)=>{
    s+=`<h2>${cn(i)}、主要世界觀</h2>`+worldHtml(mw,allChars,3);
    if(opts.aus) (mw.aus||[]).forEach(au=>{
      s+=`<p style="margin:12px 0 0"><b>▼ 次要世界觀（AU）</b></p>`+worldHtml(au,allChars,4);
    });
  });
  s+=`<h2>${cn(db.worlds.length)}、角色</h2>`;
  if(!allChars.length) s+=`<p>（尚未建立角色）</p>`;
  allChars.forEach(c=>{ s+=charSectionHtml(db,c,opts); });
  return s;
}
function charSectionHtml(db,c,opts){
  opts=opts||DEFAULT_EXPORT_OPTS();
  const allChars=db.characters;
  const bar=isHex(c.color)?`border-left:10px solid ${c.color};padding-left:10px;`:"";
  let s=`<h3 style="${bar}">${esc(c.name||"未命名角色")}</h3>`;
  s+=profileHtml(c,allChars,opts);
  const pevs=opts.events?[...(c.events||[])].sort((a,b)=>naturalCompare(a.time,b.time)):[];
  if(pevs.length){
    s+=`<h4>個人事件</h4><table><tr><th>時間</th><th>事件</th><th>描述</th></tr>`;
    pevs.forEach(e=>{ s+=`<tr><td>${esc(e.time)}</td><td>${esc(e.title)}</td><td>${nl(e.description)}</td></tr>`; });
    s+=`</table>`;
  }
  if(opts.inspirations){
    const ins=(c.inspirations||[]).filter(x=>x.export!==false);
    if(ins.length){
      s+=`<h4>靈感庫</h4>`;
      ins.forEach(x=>{ s+=`<p style="margin:4px 0"><b>［${esc(x.type)}］${esc(x.title||"")}</b></p><p style="margin:2px 0 8px">${nl(x.content)}</p>`; });
    }
  }
  if(opts.quests) (db.questionnaires||[]).filter(q=>q.includeInPdf&&q.charIds.includes(c.id)).forEach(q=>{ s+=questionnaireHtml(db,q); });
  if(opts.auProfiles) (c.auProfiles||[]).forEach(p=>{
    s+=`<h4>AU分頁：${esc(profileAuName(db.worlds,p))}</h4>`+profileHtml(p,allChars,opts);
  });
  return s;
}
function questionnaireHtml(db,q){
  const chars=db.characters.filter(c=>q.charIds.includes(c.id));
  let s=`<h4>問卷：${esc(q.name||"未命名問卷")}${q.topic?("（"+esc(q.topic)+"）"):""}</h4>`;
  if(chars.length>1) s+=`<p style="margin:2px 0"><b>關聯角色：</b>${chars.map(c=>esc(c.name||"未命名")).join("、")}</p>`;
  q.questions.forEach((qu,qi)=>{
    s+=`<p style="margin:8px 0 2px"><b>Q${qi+1}．${esc(qu.text||"（未命名題目）")}</b>`;
    if(qu.type==="scale") s+=`（${esc(qu.leftLabel||qu.min)} ↔ ${esc(qu.rightLabel||qu.max)}）`;
    s+=`</p>`;
    if(qu.type==="scale"){
      s+=`<table><tr><th>角色</th><th>數值</th><th>量表</th></tr>`;
      chars.forEach(c=>{
        const a=qu.answers[c.id];
        if(a&&a.value!=null){
          const t=Math.round((a.value-qu.min)/((qu.max-qu.min)||1)*10);
          s+=`<tr><td>${esc(c.name||"未命名")}</td><td>${a.value}／${qu.max}</td><td>${"▰".repeat(t)}${"▱".repeat(10-t)}</td></tr>`;
        }
      });
      s+=`</table>`;
    }else if(qu.type==="choice"){
      (qu.options||[]).forEach((opt,oi)=>{
        const who=chars.filter(c=>{const a=qu.answers[c.id];return a&&(a.sel||[]).includes(oi);});
        s+=`<p style="margin:1px 0 1px 14px">${who.length?"☑":"☐"} ${esc(opt)}${who.length?("　←"+who.map(c=>esc(c.name||"未命名")).join("、")):""}</p>`;
      });
    }else if(qu.type==="radar"){
      s+=`<table><tr><th>軸向</th>${chars.map(c=>`<th>${esc(c.name||"未命名")}</th>`).join("")}</tr>`;
      (qu.axes||[]).forEach((ax,ai)=>{
        s+=`<tr><td>${esc(ax)}</td>${chars.map(c=>{const a=qu.answers[c.id];return `<td>${a&&a.vals&&a.vals[ai]!=null?a.vals[ai]:"—"}</td>`;}).join("")}</tr>`;
      });
      s+=`</table>`;
    }
  });
  return s;
}
function buildSingleHtml(db,key,opts){
  opts=opts||DEFAULT_EXPORT_OPTS();
  const allChars=db.characters;
  if(key.startsWith("c:")){
    const c=allChars.find(x=>x.id===key.slice(2)); if(!c) return "";
    return `<h1>角色檔案：${esc(c.name||"未命名角色")}</h1>`+charSectionHtml(db,c,opts);
  }
  if(key.startsWith("w:")){
    const mw=db.worlds.find(x=>x.id===key.slice(2)); if(!mw) return "";
    let s=`<h1>世界觀檔案：${esc(mw.name||"未命名世界觀")}</h1>`+worldHtml(mw,allChars,3);
    if(opts.aus) (mw.aus||[]).forEach(au=>{ s+=`<p style="margin:12px 0 0"><b>▼ 次要世界觀（AU）</b></p>`+worldHtml(au,allChars,4); });
    return s;
  }
  if(key.startsWith("a:")){
    const f=findAuById(db.worlds,key.slice(2)); if(!f) return "";
    return `<h1>AU世界觀檔案：${esc(f.au.name||"未命名AU")}</h1><p><b>隸屬主要世界觀：</b>${esc(f.mw.name||"未命名")}</p>`+worldHtml(f.au,allChars,3);
  }
  return "";
}
function downloadWord(html,filename){
  const doc=`<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word"><head><meta charset="utf-8"><title>OC設定集</title><style>body{font-family:"Microsoft JhengHei","PMingLiU",sans-serif;font-size:12pt;}table{border-collapse:collapse;}td,th{border:1px solid #555;padding:3pt 6pt;}h1{border-bottom:2px solid #333;}</style></head><body>${html}</body></html>`;
  saveBlob(new Blob(["\ufeff",doc],{type:"application/msword;charset=utf-8"}),filename||"OC設定集.doc");
}

  const setAllFields=v=>setOpts(o=>({...o,fields:Object.fromEntries(FIELD_DEFS.map(d=>[d.key,v]))}));
  const html=useMemo(()=>buildExportHtml(db,opts),[db,opts]);
  const [single,setSingle]=useState("");

      <Collapse title="🧰 匯出內容設定（適用於完整匯出與單獨匯出）" defaultOpen={false}>
        <div className="footnote" style={{marginBottom:6}}>取消勾選的欄位與區塊不會出現在Word／PDF中，預覽會即時更新。</div>
        <div className="row" style={{marginBottom:6}}>
          <span style={{fontWeight:800,fontSize:13}}>角色設定欄位：</span>

          <button className="btn small ghost" onClick={()=>setAllFields(false)}>全不選</button>
        </div>
        <div className="row" style={{marginBottom:8}}>
          {FIELD_DEFS.map(d=>(
            <span key={d.key} className={"chip"+(opts.fields[d.key]?" on":"")} style={{fontSize:12,padding:"2px 10px"}}
                  onClick={()=>togF(d.key)}>{opts.fields[d.key]?"✓ ":""}{d.label}</span>
          ))}
        </div>
        <div className="row">
          <span style={{fontWeight:800,fontSize:13}}>其他區塊：</span>
          {[["avatar","頭像"],["custom","自訂欄位"],["foreign","外文名"],["relations","人際關係"],["events","個人事件"],["inspirations","靈感庫"],["auProfiles","角色AU分頁設定"],["aus","次要世界觀（AU）"],["quests","角色問卷"]].map(([k,label])=>(
            <span key={k} className={"chip"+(opts[k]?" on":"")} style={{fontSize:12,padding:"2px 10px"}}

        </select>
        {singleSel && <React.Fragment>
          <button className="btn small primary" onClick={()=>downloadWord(singleHtml,singleFile+".doc")}>⬇ Word</button>
          <button className="btn small violet" onClick={doSinglePdf}>⬇ PDF</button>
        </React.Fragment>}
      </div>
      {singleSel &&
        <div className="preview-doc" style={{maxHeight:260,marginBottom:14}} dangerouslySetInnerHTML={{__html:singleHtml}}/>}
      <h3 className="section-title"><span className="dot"></span>匯出前預覽（完整資料集）</h3>
      <div className="preview-doc" dangerouslySetInnerHTML={{__html:html}}/>
    </div>
  );
}
/* ---------- 匯入Tab ---------- */
function ImportTab({db,mutate}){
  const [text,setText]=useState("");
  const [target,setTarget]=useState("auto");
  const [auParent,setAuParent]=useState("");
  const [parsed,setParsed]=useState(null);
  const [msg,setMsg]=useState("");
  const fileRef=useRef(null);
  const doParse=(t)=>{ const p=smartParse(t); setParsed(p); setMsg(""); };
  const onFile=e=>{
    const f=e.target.files[0]; if(!f) return;
    const reader=new FileReader();
    reader.onload=()=>{
      const content=String(reader.result||"");
      if(f.name.endsWith(".json")){
        try{
          const mg=migrateDb(JSON.parse(content));
          if(mg){
            if(confirm("偵測到完整備份檔，要覆蓋目前所有資料進行還原嗎？")){
              mutate(d=>{d.worlds=mg.worlds;d.characters=mg.characters;d.questionnaires=mg.questionnaires;d.tierList=mg.tierList;d.quadrant=mg.quadrant;});
              setMsg("✔ 已從JSON備份還原全部資料！");
            }
            return;
          }
        }catch(err){}
      }
      setText(content); doParse(content);
    };
    reader.readAsText(f,"utf-8");
    e.target.value="";
  };
  const confirmImport=()=>{
    if(!parsed) return;
    const kind = target==="auto" ? parsed.guess : target;
    if(kind==="character"){
      mutate(d=>{
        const c=newCharacter("");
        Object.keys(parsed.charFields).forEach(k=>{ c[k]=parsed.charFields[k]; });
        if(!c.name && parsed.worldFields.name) c.name=parsed.worldFields.name;
        d.characters.push(c);
      });
      setMsg("✔ 已建立新角色條目，快到「角色」板塊看看！");
    }else{
      const f=parsed.worldFields, cf=parsed.charFields;
      const name=f.name||cf.name||"";
      const desc=[f.description,cf.description].filter(Boolean).join("\n");
      if(kind==="mainWorld"){
        mutate(d=>{ const w=newMainWorld(name); w.description=desc; d.worlds.push(w); });

        </div>
      )}
      <textarea style={{minHeight:160}} value={text} onChange={e=>setText(e.target.value)}
        placeholder={"貼上文字，例如：\n姓名：白羽\n生日：3月14日\n身高：172cm\nCV：某某\n角色描述：……"}/>
      <div className="row" style={{marginTop:8}}>

      </div>
      {msg && <div className="badge" style={{marginTop:10}}>{msg}</div>}
      {parsed && (
        <div className="item-card" style={{marginTop:12}}>
          <b>偵測結果（判斷為：{target==="auto"?kindLabel[parsed.guess==="world"?"world":"character"]:kindLabel[target]}）</b>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:13,marginTop:6}}>
            <tbody>
            {Object.keys(parsed.charFields).map(k=>{

              return <tr key={"c"+k}><td style={{border:"1px solid #999",padding:"3px 8px",fontWeight:800,width:110}}>{def?def.label:k}</td><td style={{border:"1px solid #999",padding:"3px 8px",whiteSpace:"pre-wrap"}}>{parsed.charFields[k]}</td></tr>;
            })}

      )}
    </div>
  );
}

/* ---------- 圖表下載（含比例選擇） ---------- */
let EXPORT_RATIO="auto";
function RatioSelect(){
  const [v,setV]=useState(EXPORT_RATIO);
  return (
    <select value={v} style={{width:"auto"}} title="匯出PNG的畫布比例（不足處以白色補滿）"
      onChange={e=>{EXPORT_RATIO=e.target.value;setV(e.target.value);}}>
      <option value="auto">匯出比例：原始</option>
      <option value="1:1">1:1（方形）</option>
      <option value="4:3">4:3（橫式）</option>
      <option value="3:4">3:4（直式）</option>
      <option value="16:9">16:9（寬螢幕）</option>
      <option value="9:16">9:16（限動／手機）</option>
    </select>
  );
}
function padToRatio(c){
  if(EXPORT_RATIO==="auto") return c;
  const parts=EXPORT_RATIO.split(":").map(Number);
  const t=parts[0]/parts[1];
  let W=c.width,H=c.height;
  if(W/H<t) W=Math.round(H*t); else H=Math.round(W/t);
  const out=document.createElement("canvas");
  out.width=W; out.height=H;
  const ctx=out.getContext("2d");
  ctx.fillStyle="#ffffff"; ctx.fillRect(0,0,W,H);
  ctx.drawImage(c,Math.round((W-c.width)/2),Math.round((H-c.height)/2));
  return out;
}
function downloadNode(ref,name){
  if(!ref.current || !window.html2canvas) return;
  window.html2canvas(ref.current,{backgroundColor:"#ffffff",scale:2}).then(c=>padToRatio(c).toBlob(b=>saveBlob(b,name)));
}
function downloadCardPng(ref,name,songLabel){
  if(!ref.current || !window.html2canvas) return;
  window.html2canvas(ref.current,{backgroundColor:"#ffffff",scale:2,onclone:doc=>{
    doc.querySelectorAll("iframe.card-embed").forEach(f=>{
      const d=doc.createElement("div");
      d.style.cssText="border:2px solid #2b2440;border-radius:12px;padding:12px;margin-top:8px;font-size:12.5px;font-weight:800;background:#f3ecff;text-align:center;";
      d.textContent=songLabel||"♪ 印象曲（Spotify）";
      f.parentNode.replaceChild(d,f);
    });
  }}).then(c=>padToRatio(c).toBlob(b=>saveBlob(b,name)));
}
function downloadSvg(ref,name,w,h){
  const svg=ref.current; if(!svg) return;
  const xml=new XMLSerializer().serializeToString(svg);
  const img=new Image();
  img.onload=()=>{
    let W=w,H=h;
    if(EXPORT_RATIO!=="auto"){
      const parts=EXPORT_RATIO.split(":").map(Number);
      const t=parts[0]/parts[1];
      if(W/H<t) W=Math.round(H*t); else H=Math.round(W/t);
    }
    const canvas=document.createElement("canvas");
    canvas.width=W*2; canvas.height=H*2;
    const ctx=canvas.getContext("2d");
    ctx.fillStyle="#ffffff"; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.scale(2,2); ctx.drawImage(img,(W-w)/2,(H-h)/2,w,h);
    canvas.toBlob(b=>saveBlob(b,name));
  };
  img.src="data:image/svg+xml;charset=utf-8,"+encodeURIComponent(xml);
}

/* ---------- 圖表：劇情時間軸 ---------- */
function TimelineChart({db}){
  const sources=[];
  db.worlds.forEach(mw=>{
    sources.push({id:mw.id,name:"主要世界觀："+(mw.name||"未命名"),world:mw});
    (mw.aus||[]).forEach(a=>sources.push({id:a.id,name:"└ AU："+(a.name||"未命名"),world:a}));
  });
  db.characters.forEach(c=>{
    if((c.events||[]).length) sources.push({id:"pc-"+c.id,name:"角色："+(c.name||"未命名角色")+"（個人事件）",world:c,personal:true});
  });
  const [src,setSrc]=useState(sources[0]?sources[0].id:"");
  const ref=useRef(null);
  const found=sources.find(x=>x.id===src)||sources[0];
  if(!found) return <div className="empty">還沒有世界觀資料。</div>;
  const world=found.world;
  const evs=[...(world.events||[])].filter(e=>e.checked).sort((a,b)=>naturalCompare(a.time,b.time));
  return (
    <div>
      <div className="row" style={{marginBottom:10}}>
        <select value={found.id} onChange={e=>setSrc(e.target.value)} style={{maxWidth:340}}>
          {sources.map(x=><option key={x.id} value={x.id}>{x.name}</option>)}
        </select>
        <button className="btn small mint" onClick={()=>downloadNode(ref,"劇情時間軸.png")}>⬇ 下載PNG</button>

        <div style={{fontWeight:900,fontSize:18,marginBottom:10}}>『{world.name||(found.personal?"未命名角色":"未命名世界觀")}』{found.personal?"個人時間軸":"劇情時間軸"}</div>
        {evs.length
          ? <div className="timeline">{evs.map(ev=>(
              <div className="timeline-item" key={ev.id}>
                <div className="t-time">{ev.time||"（未填時間）"}</div>

      </div>
    </div>
  );
}

/* ---------- 圖表：角色關係圖 ---------- */
function RelationChart({db}){
  const options=[{id:"all",name:"全部角色（主設定）",world:null,kind:"all"}];
  db.worlds.forEach(mw=>{
    options.push({id:mw.id,name:"主要世界觀："+(mw.name||"未命名"),world:mw,kind:"main"});
    (mw.aus||[]).forEach(a=>options.push({id:a.id,name:"└ AU："+(a.name||"未命名"),world:a,kind:"au"}));
  });
  const [src,setSrc]=useState("all");
  const ref=useRef(null);
  const sel=options.find(o=>o.id===src)||options[0];
  const auMode=sel.kind==="au";
  const profileOf=c=>auMode?(c.auProfiles||[]).find(pp=>pp.auWorldId===sel.world.id):null;

  let chars=db.characters;
  if(sel.world){
    const ids=new Set();
    (sel.world.groups||[]).forEach(g=>(g.memberIds||[]).forEach(id=>ids.add(id)));
    if(auMode) db.characters.forEach(c=>{ if(profileOf(c)) ids.add(c.id); });
    chars=db.characters.filter(c=>ids.has(c.id));
  }

  const disp={};
  chars.forEach(c=>{
    const pr=auMode?(profileOf(c)||c):c;
    disp[c.id]={
      name:pr.name||c.name||"未命名角色",
      color:isHex(pr.color)?pr.color:(isHex(c.color)?c.color:"#9e9e9e"),
      avatar:pr.avatar||c.avatar||""
    };
  });

  const W=760,H=520;
  const picker=(
    <div className="row" style={{marginBottom:10}}>
      <select value={sel.id} onChange={e=>setSrc(e.target.value)} style={{maxWidth:340}}>
        {options.map(o=><option key={o.id} value={o.id}>{o.name}</option>)}
      </select>
      <button className="btn small mint" onClick={()=>downloadSvg(ref,"角色關係圖.png",W,H)}>⬇ 下載PNG</button>
    </div>
  );
  if(chars.length<2) return (
    <div>
      {picker}
      <div className="empty">{sel.world
        ? (auMode
          ? "此AU世界觀納入關係圖的角色不足兩位。AU成員取自：該AU「角色關係組合」勾選的角色，以及AU分頁綁定此世界觀的角色。請先到角色板塊為角色建立對應此AU的分頁，或到AU世界觀建立角色組合。"
          : "此世界觀納入關係圖的角色不足兩位。世界觀模式的成員取自該世界觀的「角色關係組合」，請先到世界觀板塊建立組合並勾選角色。")
        : "需要至少兩位角色（且在「人際關係」中互相勾選）才能生成關係圖。"}</div>
    </div>
  );
  const cx=W/2, cy=H/2, R=Math.min(W,H)/2-90;
  const pos={};
  chars.forEach((c,i)=>{
    const ang=-Math.PI/2 + i*2*Math.PI/chars.length;
    pos[c.id]={x:cx+R*Math.cos(ang), y:cy+R*Math.sin(ang)};
  });
  const groupPools = sel.world ? [sel.world] : (()=>{
    const arr=[]; db.worlds.forEach(mw=>{ arr.push(mw); (mw.aus||[]).forEach(a=>arr.push(a)); }); return arr;
  })();
  const edgeGroupName=(a,b)=>{
    for(const w of groupPools){
      for(const g of (w.groups||[])){
        if((g.memberIds||[]).includes(a)&&(g.memberIds||[]).includes(b)) return g.name||"";
      }
    }
    return "";
  };
  const edges=[];
  chars.forEach(c=>{
    const owner = auMode ? profileOf(c) : c;
    if(!owner) return;
    (owner.relationships||[]).forEach(r=>{
      if(pos[r.targetId]) edges.push({
        from:c.id,to:r.targetId,label:r.relation||"",
        group:edgeGroupName(c.id,r.targetId),
        color:r.lineColor||"#6c4ce0",
        style:r.lineStyle||"dashed",
        arrow:r.arrow||"none"
      });
    });
  });
  const dashOf=st=>st==="solid"?"none":(st==="dotted"?"2 6":"6 4");
  const hasEdges=edges.length>0;
  return (
    <div>
      {picker}
      <div className="footnote" style={{marginBottom:8}}>
        連線標籤顯示為【角色關係組合名稱】＋人際關係詞條；線條顏色、樣式與箭頭可於「關係線樣式」中設定。
        {auMode
          ? "目前為AU模式：連線取自各角色『對應此AU的分頁』中填寫的人際關係，與主設定的關係互相獨立。"
          : "選擇世界觀時，成員取自該世界觀的「角色關係組合」；連線取自角色主設定的人際關係。"}
      </div>
      {!hasEdges &&
        <div className="footnote" style={{marginBottom:8,color:"var(--accent)"}}>
          {auMode
            ? "⚠ 目前沒有任何連線：請到角色的該AU分頁中，於「人際關係」勾選角色並填寫關係。"
            : "⚠ 目前沒有任何連線：請到角色主設定的「人際關係」勾選角色並填寫關係。"}
        </div>}
      <div className="canvas-stage" style={{overflowX:"auto"}}>
        <svg ref={ref} width={W} height={H} viewBox={`0 0 ${W} ${H}`} xmlns="http://www.w3.org/2000/svg"
             style={{fontFamily:'"Noto Sans TC","Microsoft JhengHei",sans-serif'}}>
          <rect x="0" y="0" width={W} height={H} fill="#ffffff"/>
          <text x={W/2} y="34" textAnchor="middle" fontSize="20" fontWeight="900" fill="#2b2440">
            角色關係圖{sel.world?("──"+(sel.world.name||"未命名世界觀")+(auMode?"（AU）":"")):""}
          </text>
          <defs>
            {edges.map((e,i)=>(
              <marker key={i} id={"arw-"+i} viewBox="0 0 10 10" refX="8" refY="5"
                      markerWidth="7" markerHeight="7" orient="auto-start-reverse">
                <path d="M0,0 L10,5 L0,10 z" fill={e.color}/>
              </marker>
            ))}
          </defs>
          {edges.map((e,i)=>{
            const a=pos[e.from], b=pos[e.to];
            const dx=b.x-a.x, dy=b.y-a.y, len=Math.hypot(dx,dy)||1;
            const ux=dx/len, uy=dy/len;
            const x1=a.x+ux*32, y1=a.y+uy*32, x2=b.x-ux*32, y2=b.y-uy*32;
            const t=0.4;
            const lx=x1+(x2-x1)*t, ly=y1+(y2-y1)*t;
            const label=(e.group?"【"+e.group+"】":"")+e.label;
            const bw=label.length*12+14;
            return (
              <g key={"e"+i}>
                <line x1={x1} y1={y1} x2={x2} y2={y2} stroke={e.color} strokeWidth="2.5"
                      strokeDasharray={dashOf(e.style)==="none"?undefined:dashOf(e.style)} opacity="0.85"
                      markerEnd={e.arrow!=="none"?("url(#arw-"+i+")"):undefined}
                      markerStart={e.arrow==="both"?("url(#arw-"+i+")"):undefined}/>
                {label && <g>
                  <rect x={lx-bw/2} y={ly-11} width={bw} height="20" rx="9"
                        fill="#fff" stroke={e.color} strokeWidth="1.5"/>
                  <text x={lx} y={ly+4} textAnchor="middle" fontSize="11.5" fontWeight="700" fill="#2b2440">{label}</text>
                </g>}
              </g>
            );
          })}
          {chars.map(c=>{
            const p=pos[c.id];
            const d=disp[c.id];
            return (
              <g key={c.id}>
                {d.avatar
                  ? <g>
                      <clipPath id={"clip-"+c.id}><circle cx={p.x} cy={p.y} r="26"/></clipPath>
                      <image href={d.avatar} x={p.x-26} y={p.y-26} width="52" height="52"
                             preserveAspectRatio="xMidYMid slice" clipPath={"url(#clip-"+c.id+")"}/>
                      <circle cx={p.x} cy={p.y} r="26" fill="none" stroke="#2b2440" strokeWidth="3"/>
                    </g>
                  : <g>
                      <circle cx={p.x} cy={p.y} r="26" fill={d.color} stroke="#2b2440" strokeWidth="3"/>
                      <text x={p.x} y={p.y+6} textAnchor="middle" fontSize="15" fontWeight="900" fill="#fff">{d.name.slice(0,1)}</text>
                    </g>}
                <text x={p.x} y={p.y+46} textAnchor="middle" fontSize="13" fontWeight="800" fill="#2b2440">{d.name}</text>
              </g>
            );
          })}
        </svg>
      </div>
    </div>
  );
}

/* ---------- 圖表：身高對照表 ---------- */
function HeightChart({db}){
  const ref=useRef(null);
  const list=db.characters
    .map(c=>({name:c.name||"未命名",h:parseFloat(String(c.height||"").replace(/[^\d.]/g,"")),color:isHex(c.color)?c.color:"#9e9e9e"}))
    .filter(c=>c.h>0);
  if(!list.length) return <div className="empty">請先在角色的「身高」欄填入數值（例：172cm）。</div>;
  const maxH=Math.max(...list.map(c=>c.h));
  const top=Math.ceil((maxH+12)/20)*20;
  const W=Math.max(560,110*list.length+90), H=460;
  const baseY=H-52, chartH=H-120;
  const yOf=v=>baseY-(v/top)*chartH;
  const grid=[]; for(let v=0;v<=top;v+=20) grid.push(v);
  return (
    <div>
      <div className="row" style={{marginBottom:10}}>
        <button className="btn small mint" onClick={()=>downloadSvg(ref,"身高對照表.png",W,H)}>⬇ 下載PNG</button>
      </div>
      <div className="canvas-stage" style={{overflowX:"auto"}}>
        <svg ref={ref} width={W} height={H} viewBox={`0 0 ${W} ${H}`} xmlns="http://www.w3.org/2000/svg"
             style={{fontFamily:'"Noto Sans TC","Microsoft JhengHei",sans-serif'}}>
          <rect x="0" y="0" width={W} height={H} fill="#ffffff"/>
          <text x={W/2} y="32" textAnchor="middle" fontSize="20" fontWeight="900" fill="#2b2440">角色身高對照表</text>
          {grid.map(v=>(
            <g key={v}>
              <line x1="60" y1={yOf(v)} x2={W-20} y2={yOf(v)} stroke={v%100===0?"#b9a7ea":"#e6ddf7"} strokeWidth={v%100===0?2:1}/>
              <text x="52" y={yOf(v)+4} textAnchor="end" fontSize="11" fill="#6c4ce0" fontWeight="700">{v}</text>
            </g>
          ))}
          {list.map((c,i)=>{
            const x=100+i*110;
            const topY=yOf(c.h);
            const r=Math.min(20,(baseY-topY)*0.16+8);
            return (
              <g key={i}>
                <circle cx={x} cy={topY+r} r={r} fill={c.color} stroke="#2b2440" strokeWidth="2.5"/>
                <rect x={x-r*0.85} y={topY+r*2+2} width={r*1.7} height={Math.max(4,baseY-(topY+r*2+2))}
                      rx={r*0.7} fill={c.color} stroke="#2b2440" strokeWidth="2.5" opacity="0.9"/>
                <text x={x} y={topY-8} textAnchor="middle" fontSize="12.5" fontWeight="900" fill="#2b2440">{c.h}cm</text>
                <text x={x} y={baseY+20} textAnchor="middle" fontSize="13" fontWeight="800" fill="#2b2440">{c.name}</text>
              </g>
            );
          })}
          <line x1="60" y1={baseY} x2={W-20} y2={baseY} stroke="#2b2440" strokeWidth="3"/>
        </svg>
      </div>
    </div>
  );
}

/* ---------- 圖表：陣營九宮格 ---------- */
const ALIGNMENTS=[["LG","守序善良"],["NG","中立善良"],["CG","混亂善良"],["LN","守序中立"],["TN","絕對中立"],["CN","混亂中立"],["LE","守序邪惡"],["NE","中立邪惡"],["CE","混亂邪惡"]];
function AlignmentChart({db,mutate}){
  const ref=useRef(null);
  const [selId,setSelId]=useState("");
  const dragId=useRef("");
  const chars=db.characters;
  if(!chars.length) return <div className="empty">還沒有角色，先到「角色」板塊建立吧！</div>;
  const assign=(cid,key)=>{ mutate(d=>{const c=d.characters.find(x=>x.id===cid); if(c) c.alignment=key;}); setSelId(""); };
  const pool=chars.filter(c=>!c.alignment);
  const AvatarChip=({c,small})=>(
    <span title={c.name||"未命名角色"}
      className="row" style={{gap:4,border:"2px solid var(--ink)",borderRadius:999,padding:"2px 8px 2px 3px",
        background:selId===c.id?"var(--sun)":"#fff",cursor:"pointer",flexWrap:"nowrap"}}
      draggable
      onDragStart={()=>{dragId.current=c.id;}}
      onClick={e=>{e.stopPropagation(); if(c.alignment) assign(c.id,""); else setSelId(selId===c.id?"":c.id);}}>
      <AvatarCircle name={c.name} color={c.color} avatar={c.avatar} size={small?20:24}/>
      <span style={{fontWeight:800,fontSize:small?11:12.5}}>{c.name||"未命名"}</span>
    </span>
  );
  return (
    <div>
      <div className="row" style={{marginBottom:8}}>
        <button className="btn small mint" onClick={()=>downloadNode(ref,"陣營九宮格.png")}>⬇ 下載PNG</button>
        <span className="footnote">把頭像「拖曳」進格子，或「點選頭像→點選格子」放置；點格內頭像可移回待分配區。分配結果會自動儲存。</span>
      </div>
      <div className="item-card">
        <b style={{fontSize:13}}>待分配：</b>
        <div className="row" style={{marginTop:6}}>
          {pool.length?pool.map(c=><AvatarChip key={c.id} c={c}/>):<span className="hint">全員已就定位！</span>}
        </div>
      </div>
      <div className="canvas-stage" ref={ref} style={{minWidth:560}}>
        <div style={{fontWeight:900,fontSize:18,textAlign:"center",marginBottom:12}}>🎭 陣營九宮格</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
          {ALIGNMENTS.map(([key,label])=>{
            const members=chars.filter(c=>c.alignment===key);
            const good=label.includes("善良"), evil=label.includes("邪惡");
            return (
              <div key={key}
                   onDragOver={e=>e.preventDefault()}
                   onDrop={()=>{ if(dragId.current){ assign(dragId.current,key); dragId.current=""; } }}
                   onClick={()=>{ if(selId) assign(selId,key); }}
                   style={{border:"2.5px solid #2b2440",borderRadius:12,minHeight:96,background:good?"#eafaf0":(evil?"#fdeaee":"#f4f1fb"),cursor:selId?"copy":"default",overflow:"hidden"}}>
                <div style={{borderBottom:"2px solid #2b2440",fontWeight:900,fontSize:12.5,padding:"2px 8px",background:"rgba(255,255,255,.7)"}}>{label}</div>
                <div className="row" style={{padding:"6px 8px",gap:5}}>
                  {members.map(c=><AvatarChip key={c.id} c={c} small/>)}
                </div>
              </div>
            );
          })}
        </div>
        <div style={{textAlign:"right",fontSize:11,fontWeight:800,color:"rgba(43,36,64,.5)",marginTop:8}}>─ 你也來搞OC吧！ ─</div>
      </div>
    </div>
  );
}

/* ---------- 圖表：角色年表對照圖 ---------- */
function MultiTimelineChart({db}){
  const [sel,setSel]=useState([]);
  const ref=useRef(null);
  const withEv=db.characters.filter(c=>(c.events||[]).length);
  if(!withEv.length) return <div className="empty">還沒有任何角色填寫「個人事件」。先到「角色」板塊，在角色主設定底部的「個人事件」新增年表吧！</div>;
  const toggle=id=>setSel(prev=>prev.includes(id)?prev.filter(x=>x!==id):[...prev,id]);
  const picked=withEv.filter(c=>sel.includes(c.id));
  const merged=picked.flatMap(c=>(c.events||[]).filter(e=>e.checked).map(e=>({c,e})))
    .sort((a,b)=>naturalCompare(a.e.time,b.e.time));
  return (
    <div>
      <div className="row" style={{marginBottom:10}}>
        <span style={{fontWeight:800,fontSize:14}}>勾選角色：</span>
        {withEv.map(c=>(
          <span key={c.id} className={"chip"+(sel.includes(c.id)?" on":"")} onClick={()=>toggle(c.id)}>
            {sel.includes(c.id)?"✓ ":""}{c.name||"未命名角色"}
          </span>
        ))}
        {picked.length>0 && <button className="btn small mint" onClick={()=>downloadNode(ref,"角色年表對照圖.png")}>⬇ 下載PNG</button>}
      </div>
      {picked.length===0
        ? <div className="empty">勾選一位以上的角色，把他們的個人事件放上同一條時間軸。</div>
        : merged.length===0
          ? <div className="empty">所選角色沒有「已勾選加入時間軸」的個人事件。</div>
          : <div className="canvas-stage" ref={ref}>
              <div style={{fontWeight:900,fontSize:18,textAlign:"center",marginBottom:10}}>🧵 角色年表對照圖</div>
              <div className="row" style={{justifyContent:"center",marginBottom:8}}>
                {picked.map(c=>(
                  <span key={c.id} style={{display:"inline-flex",alignItems:"center",gap:5,fontSize:12,fontWeight:800}}>
                    <span style={{width:10,height:10,borderRadius:"50%",background:isHex(c.color)?c.color:"#9e9e9e",border:"1.5px solid #2b2440"}}></span>
                    {c.name||"未命名"}
                  </span>
                ))}
              </div>
              <div className="timeline">
                {merged.map(({c,e},i)=>(
                  <div className="timeline-item" key={i}>
                    <div className="row" style={{gap:6}}>
                      <span style={{background:isHex(c.color)?c.color:"#9e9e9e",color:"#fff",fontWeight:900,fontSize:11,padding:"0 8px",borderRadius:8,border:"1.5px solid #2b2440"}}>{c.name||"未命名"}</span>
                      <span className="t-time">{e.time||"（未填時間）"}</span>
                    </div>
                    <div className="t-title">{e.title||"（未命名事件）"}</div>
                    {e.description && <div className="t-desc">{e.description}</div>}
                  </div>
                ))}
              </div>
              <div style={{textAlign:"right",fontSize:11,fontWeight:800,color:"rgba(43,36,64,.5)"}}>─ 你也來搞OC吧！ ─</div>
            </div>}
    </div>
  );
}

/* ---------- 圖表：象限圖（可調畫布尺寸） ---------- */
function QuadrantChart({db,mutate}){
  const ref=useRef(null);
  const boxRef=useRef(null);
  const dragId=useRef("");
  const [livePos,setLivePos]=useState(null);
  const chars=db.characters;
  const qd=db.quadrant||defaultQuadrant();
  const mq=fn=>mutate(d=>{ if(!d.quadrant) d.quadrant=defaultQuadrant(); fn(d.quadrant); });
  if(!chars.length) return <div className="empty">還沒有角色，先到「角色」板塊建立吧！</div>;
  const cw=qd.canvasW||560, chh=qd.canvasH||420;
  const placed=chars.filter(c=>qd.pos[c.id]);
  const pool=chars.filter(c=>!qd.pos[c.id]);
  const relOf=e=>{
    const r=boxRef.current.getBoundingClientRect();
    const x=Math.min(0.97,Math.max(0.03,(e.clientX-r.left)/r.width));
    const y=Math.min(0.96,Math.max(0.04,(e.clientY-r.top)/r.height));
    return {x,y};
  };
  const onMove=e=>{
    if(!dragId.current) return;
    e.preventDefault();
    setLivePos({cid:dragId.current,...relOf(e)});
  };
  const onUp=e=>{
    if(!dragId.current) return;
    const {x,y}=relOf(e);
    const cid=dragId.current;
    dragId.current="";
    setLivePos(null);
    mq(q=>{ q.pos[cid]={x,y}; });
  };
  const posOf=cid=>{
    if(livePos&&livePos.cid===cid) return livePos;
    return qd.pos[cid];
  };
  const axisInput=(val,setter,w)=>(
    <input type="text" value={val} style={{width:w||90,fontWeight:800,textAlign:"center"}} onChange={setter}/>
  );
  return (
    <div>
      <div className="row" style={{marginBottom:8}}>
        <input type="text" value={qd.title} placeholder="象限圖標題" style={{flex:1,minWidth:160,fontWeight:800}}
               onChange={e=>mq(q=>{q.title=e.target.value;})}/>
        <button className="btn small mint" onClick={()=>downloadNode(ref,(qd.title||"象限圖")+".png")}>⬇ 下載PNG</button>
      </div>
      <div className="row" style={{marginBottom:8,fontSize:13}}>
        <span style={{fontWeight:800}}>X軸：</span>
        {axisInput(qd.xLeft,e=>mq(q=>{q.xLeft=e.target.value;}))}
        <span>↔</span>
        {axisInput(qd.xRight,e=>mq(q=>{q.xRight=e.target.value;}))}
        <span style={{fontWeight:800,marginLeft:10}}>Y軸：</span>
        {axisInput(qd.yTop,e=>mq(q=>{q.yTop=e.target.value;}))}
        <span>↕</span>
        {axisInput(qd.yBottom,e=>mq(q=>{q.yBottom=e.target.value;}))}
      </div>
      <div className="row" style={{marginBottom:8,fontSize:13}}>
        <span style={{fontWeight:800}}>畫布尺寸：</span>
        <input type="text" value={cw} style={{width:70,textAlign:"center"}} title="寬（px）"
               onChange={e=>mq(q=>{q.canvasW=Math.max(200,Math.min(2000,+e.target.value||560));})}/>
        <span>×</span>
        <input type="text" value={chh} style={{width:70,textAlign:"center"}} title="高（px）"
               onChange={e=>mq(q=>{q.canvasH=Math.max(200,Math.min(2000,+e.target.value||420));})}/>
        <span className="hint">px（200～2000）</span>
        <button className="btn small" onClick={()=>mq(q=>{q.canvasW=560;q.canvasH=420;})}>橫式</button>
        <button className="btn small" onClick={()=>mq(q=>{q.canvasW=420;q.canvasH=560;})}>直式</button>
        <button className="btn small" onClick={()=>mq(q=>{q.canvasW=520;q.canvasH=520;})}>方形</button>
      </div>
      <div className="item-card">
        <b style={{fontSize:13}}>待放置（點擊即放到中央，之後可自由拖曳）：</b>
        <div className="row" style={{marginTop:6}}>
          {pool.length?pool.map(c=>(
            <span key={c.id} className="chip" onClick={()=>mq(q=>{q.pos[c.id]={x:0.5,y:0.5};})}>
              ＋ {c.name||"未命名角色"}
            </span>
          )):<span className="hint">全員已上場！拖曳頭像調整位置。</span>}
        </div>
        {placed.length>0 &&
          <div className="row" style={{marginTop:6}}>
            <span style={{fontSize:12,fontWeight:800}}>已放置：</span>
            {placed.map(c=>(
              <span key={c.id} className="chip on" style={{fontSize:11.5}}
                    onClick={()=>mq(q=>{delete q.pos[c.id];})}>{c.name||"未命名"} ✕</span>
            ))}
          </div>}
      </div>
      <div className="canvas-stage" ref={ref} style={{padding:14,overflowX:"auto"}}>
        <div style={{fontWeight:900,fontSize:18,textAlign:"center",marginBottom:8}}>{qd.title||"象限圖"}</div>
        <div style={{display:"flex",justifyContent:"center"}}>
          <div ref={boxRef}
               onPointerMove={onMove} onPointerUp={onUp} onPointerLeave={onUp}
               style={{position:"relative",width:cw,maxWidth:"100%",height:chh,border:"2.5px solid #2b2440",borderRadius:12,
                       background:"linear-gradient(to right,rgba(108,76,224,.06) 50%,rgba(255,93,143,.06) 50%)",
                       touchAction:"none",overflow:"hidden",flex:"none"}}>
            <div style={{position:"absolute",left:"50%",top:0,bottom:0,width:2.5,background:"#2b2440",opacity:.75}}></div>
            <div style={{position:"absolute",top:"50%",left:0,right:0,height:2.5,background:"#2b2440",opacity:.75}}></div>
            <span style={{position:"absolute",top:6,left:"50%",transform:"translateX(-50%)",fontWeight:900,fontSize:13,background:"#fff",border:"2px solid #2b2440",borderRadius:8,padding:"0 10px"}}>{qd.yTop||"上"}</span>
            <span style={{position:"absolute",bottom:6,left:"50%",transform:"translateX(-50%)",fontWeight:900,fontSize:13,background:"#fff",border:"2px solid #2b2440",borderRadius:8,padding:"0 10px"}}>{qd.yBottom||"下"}</span>
            <span style={{position:"absolute",left:6,top:"50%",transform:"translateY(-50%)",fontWeight:900,fontSize:13,background:"#fff",border:"2px solid #2b2440",borderRadius:8,padding:"0 10px"}}>{qd.xLeft||"左"}</span>
            <span style={{position:"absolute",right:6,top:"50%",transform:"translateY(-50%)",fontWeight:900,fontSize:13,background:"#fff",border:"2px solid #2b2440",borderRadius:8,padding:"0 10px"}}>{qd.xRight||"右"}</span>
            {placed.map(c=>{
              const pos=posOf(c.id);
              if(!pos) return null;
              return (
                <div key={c.id}
                     onPointerDown={e=>{e.preventDefault();dragId.current=c.id;}}
                     style={{position:"absolute",left:(pos.x*100)+"%",top:(pos.y*100)+"%",transform:"translate(-50%,-50%)",
                             display:"flex",flexDirection:"column",alignItems:"center",cursor:"grab",zIndex:2,userSelect:"none"}}>
                  <AvatarCircle name={c.name} color={c.color} avatar={c.avatar} size={38}/>
                  <span style={{fontSize:11,fontWeight:900,background:"rgba(255,255,255,.9)",border:"1.5px solid #2b2440",borderRadius:8,padding:"0 6px",marginTop:2,whiteSpace:"nowrap"}}>{c.name||"未命名"}</span>
                </div>
              );
            })}
          </div>
        </div>
        <div style={{textAlign:"right",fontSize:11,fontWeight:800,color:"rgba(43,36,64,.5)",marginTop:6}}>─ 你也來搞OC吧！ ─</div>
      </div>
      <div className="footnote">頭像可在象限內自由拖曳（滑鼠或觸控皆可）；位置與畫布尺寸會自動儲存。點「已放置」列的名字可將角色移回待放置區。</div>
    </div>
  );
}

    if(prev.length>=4) return prev;
    return [...prev,id];

    <div>

      {lines.length>0 &&
        <div className="canvas-stage" ref={ref} style={{background:"#241f36",marginTop:12}}>

            if(ln.speakerId==="narr"){

/* ---------- 創作輔助：問卷模式 ---------- */
const MBTI_TYPES=["INTJ","INTP","ENTJ","ENTP","INFJ","INFP","ENFJ","ENFP","ISTJ","ISFJ","ESTJ","ESFJ","ISTP","ISFP","ESTP","ESFP"];
const COLOR_WORDS={"緋":"#E53935","紅":"#E53935","粉":"#FF6B94","桃":"#FF5D8F","橘":"#FB8C00","橙":"#FB8C00","黃":"#FDD835","綠":"#43A047","藍":"#1E88E5","靛":"#3949AB","紫":"#8E24AA","黑":"#263238","白":"#FAFAFA","灰":"#9E9E9E","棕":"#8D6E63","咖啡":"#8D6E63","金":"#F5B301","銀":"#B0BEC5","青":"#00ACC1","水藍":"#4FC3F7","天藍":"#4FC3F7","薄荷":"#35D0A5","翡翠":"#2E9E6B","酒紅":"#8E2438","藏青":"#2C3E63","薰衣草":"#B39DDB","奶油":"#FFF3C4"};
function smartColor(a){
  const t=String(a||"").trim();
  if(isHex(t)) return t;
  const m=t.match(/#([0-9a-fA-F]{3}|[0-9a-fA-F]{6})/);
  if(m) return "#"+m[1];
  let best="";
  for(const k in COLOR_WORDS){ if(t.includes(k) && k.length>=best.length){ best=k; } }
  return best?COLOR_WORDS[best]:"";
}
const INTERVIEW_SECTIONS=[
  {title:"壹、基本資料",note:"這一區的答案會自動填入角色板塊的對應欄位。",items:[

function fieldLabelOf(key){ const d=FIELD_DEFS.find(x=>x.key===key); return d?d.label:key; }
function InterviewMode({db,mutate}){
  const [answers,setAnswers]=useState({});
  const [bonds,setBonds]=useState([]);
  const [target,setTarget]=useState("new");
  const [msg,setMsg]=useState("");
  const setA=(id,v)=>setAnswers(prev=>({...prev,[id]:v}));
  const allItems=INTERVIEW_SECTIONS.flatMap(sec=>sec.items);
  const answered=allItems.filter(it=>(answers[it.id]||"").trim()).length;
  const zodiacPreview=getZodiac(answers.birthday||"");
  const colorPreview=smartColor(answers.color||"");
  const bondTargets=db.characters.filter(c=>c.id!==target);
  const doImport=()=>{
    const hasAnswer=answered>0 || bonds.some(b=>b.targetId);
    if(!hasAnswer){ setMsg("還沒有回答任何問題喔！"); return; }
    const skipped=[];
    let importedName="";
    mutate(d=>{
      let c;
      if(target==="new"){ c=newCharacter(""); d.characters.push(c); }
      else { c=d.characters.find(x=>x.id===target); }
      if(!c) return;
      allItems.forEach(it=>{
        const raw=(answers[it.id]||"").trim();
        if(!raw) return;
        let val=raw;
        if(it.type==="color"){ const h=smartColor(raw); if(h) val=h; }
        if(it.type==="height" && /^\d+(\.\d+)?$/.test(raw)) val=raw+"cm";
        if(!it.map) return;
        if(["appearance","description","coreTheme"].includes(it.map)){
          c[it.map]=c[it.map]?(c[it.map]+"\n"+val):val;
        }else{
          if(!c[it.map]) c[it.map]=val;
          else if(c[it.map]!==val) skipped.push(fieldLabelOf(it.map));
        }
      });
      const qa=[];
      allItems.forEach(it=>{
        const raw=(answers[it.id]||"").trim();
        if(!it.map && raw) qa.push("Q："+it.q+"\nA："+raw);
      });
      if(qa.length){
        const block="【角色訪談】\n"+qa.join("\n\n");
        c.description=c.description?(c.description+"\n\n"+block):block;
      }
      bonds.forEach(b=>{
        if(!b.targetId || b.targetId===c.id) return;
        if(!d.characters.some(x=>x.id===b.targetId)) return;
        if(!c.relationships) c.relationships=[];
        const ex=c.relationships.find(r=>r.targetId===b.targetId);
        if(ex){
          if(b.relation && !ex.relation) ex.relation=b.relation;
          if(b.story) ex.story=ex.story?(ex.story+"\n"+b.story):b.story;
        }else{
          c.relationships.push({id:uid(),targetId:b.targetId,relation:b.relation||"",story:b.story||"",notes:""});
        }
      });
      importedName=c.name||"未命名角色";
    });
    let m="✔ 已將訪談結果匯入角色「"+(importedName||"未命名角色")+"」！";
    if(skipped.length) m+="（下列欄位已有內容，未覆蓋："+[...new Set(skipped)].join("、")+"）";
    setMsg(m);
    setAnswers({}); setBonds([]);
  };
  const renderItem=it=>{
    const v=answers[it.id]||"";
    if(it.type==="textarea") return <textarea value={v} style={{minHeight:52}} onChange={e=>setA(it.id,e.target.value)}/>;
    if(it.type==="mbti") return (
      <select value={v} onChange={e=>setA(it.id,e.target.value)} style={{maxWidth:200}}>
        <option value="">──請選擇──</option>
        {MBTI_TYPES.map(t=><option key={t} value={t}>{t}</option>)}
      </select>
    );
    if(it.type==="birthday") return (
      <div className="row" style={{flexWrap:"nowrap"}}>
        <input type="text" value={v} onChange={e=>setA(it.id,e.target.value)} placeholder="例：3月14日"/>
        {it.id==="birthday" && zodiacPreview && <span className="badge">★ {zodiacPreview}</span>}
      </div>
    );
    if(it.type==="color") return (
      <div className="row" style={{flexWrap:"nowrap"}}>
        <input type="text" value={v} onChange={e=>setA(it.id,e.target.value)} placeholder="#FF5D8F 或 酒紅"/>
        {colorPreview && <span style={{width:26,height:26,borderRadius:8,border:"2px solid var(--ink)",background:colorPreview,flex:"none"}} title={colorPreview}></span>}
      </div>
    );
    return <input type="text" value={v} onChange={e=>setA(it.id,e.target.value)}/>;
  };
  return (
    <div>
      <div className="sub">分區訪談，答案會智能對應到角色板塊：基本資料直接入欄（顏色名自動轉色號、生日即時偵測星座）、羈絆區直接建立人際關係。已有內容的欄位不會被覆蓋。</div>
      <div className="row" style={{marginBottom:8}}>
        <span style={{fontWeight:800,fontSize:14}}>匯入對象：</span>
        <select value={target} onChange={e=>setTarget(e.target.value)} style={{maxWidth:240}}>
          <option value="new">✚ 建立新角色</option>
          {db.characters.map(c=><option key={c.id} value={c.id}>{c.name||"未命名角色"}（附加）</option>)}
        </select>
        <button className="btn primary" onClick={doImport}>✔ 匯入角色板塊</button>
      </div>
      <div style={{border:"2px solid var(--ink)",borderRadius:999,overflow:"hidden",height:16,background:"#fff",marginBottom:4}}>
        <div style={{width:(answered/allItems.length*100)+"%",height:"100%",background:"linear-gradient(90deg,var(--accent),var(--accent2))",transition:"width .3s"}}></div>
      </div>
      <div className="footnote" style={{marginBottom:10}}>回答進度：{answered}／{allItems.length} 題（不必全部作答，可隨時匯入）</div>
      {msg && <div className="badge" style={{marginBottom:10}}>{msg}</div>}
      {INTERVIEW_SECTIONS.map((sec,si)=>(
        <div className="item-card" key={si}>
          <h3 className="section-title" style={{marginTop:0}}><span className="dot"></span>{sec.title}</h3>
          <div className="footnote" style={{marginBottom:8}}>{sec.note}</div>
          {sec.items.map((it,ii)=>(
            <div className="field" key={it.id}>
              <label>Q{ii+1}．{it.q}{it.map && <span className="badge" style={{marginLeft:6,fontSize:10.5}}>→ {fieldLabelOf(it.map)}</span>}</label>
              {renderItem(it)}
            </div>
          ))}
        </div>
      ))}
      <div className="item-card">
        <h3 className="section-title" style={{marginTop:0}}><span className="dot"></span>肆、羈絆</h3>
        <div className="footnote" style={{marginBottom:8}}>選擇已有角色並描述關係，匯入時會直接寫進「人際關係」。</div>
        {bondTargets.length===0 && <div className="empty">目前沒有其他角色可以建立羈絆。</div>}
        {bonds.map((b,bi)=>(
          <div className="rel-block" key={b.id}>
            <div className="row" style={{marginBottom:6}}>
              <select value={b.targetId} style={{maxWidth:200}}
                      onChange={e=>setBonds(prev=>prev.map(x=>x.id===b.id?{...x,targetId:e.target.value}:x))}>
                <option value="">──選擇角色──</option>
                {bondTargets.map(c=><option key={c.id} value={c.id}>{c.name||"未命名角色"}</option>)}
              </select>
              <input type="text" value={b.relation} placeholder="關係（例：青梅竹馬）" style={{flex:1,minWidth:140}}
                     onChange={e=>setBonds(prev=>prev.map(x=>x.id===b.id?{...x,relation:e.target.value}:x))}/>
              <button className="btn small danger" onClick={()=>setBonds(prev=>prev.filter(x=>x.id!==b.id))}>刪</button>
            </div>
            <textarea value={b.story} placeholder="兩人之間的故事…" style={{minHeight:44}}
                      onChange={e=>setBonds(prev=>prev.map(x=>x.id===b.id?{...x,story:e.target.value}:x))}/>
          </div>
        ))}
        {bondTargets.length>0 &&
          <button className="btn small mint" onClick={()=>setBonds(prev=>[...prev,{id:uid(),targetId:"",relation:"",story:""}])}>＋新增羈絆</button>}
      </div>
    </div>
  );
}

function GachaMode({db}){
  const [results,setResults]=useState([]);
  const ref=useRef(null);
  const chars=db.characters;
  if(!chars.length) return <div className="empty">卡池是空的！先到「角色」板塊建立角色，才能開始抽卡。</div>;
  const pick=a=>a[Math.floor(Math.random()*a.length)];
  const rollRarity=()=>{
    const total=GACHA_RARITIES.reduce((s,x)=>s+x.w,0);
    let n=Math.random()*total;
    for(const x of GACHA_RARITIES){ n-=x.w; if(n<0) return x; }
    return GACHA_RARITIES[GACHA_RARITIES.length-1];
  };
  const rollTitle=()=>Math.random()<0.15?pick(GACHA_SPECIAL):(pick(GACHA_PREFIX)+pick(GACHA_NOUN));
  const pull10=()=>setResults(Array.from({length:10},()=>({
    id:uid(), rarity:rollRarity(), title:rollTitle(), char:pick(chars)
  })));
  return (
    <div>
      <div className="sub">每天的創作運勢占卜！隨機抽出「（稀有度）＋【卡面名稱】＋（角色）」，卡面組合超過兩千五百種、另有五十餘張限定特殊卡面，抽到誰就畫誰、寫誰吧。</div>
      <div className="row" style={{marginBottom:12}}>
        <button className="btn primary" onClick={pull10}>🎰 10連抽！</button>
        {results.length>0 && <button className="btn small mint" onClick={()=>downloadNode(ref,"抽卡結果.png")}>⬇ 下載PNG</button>}
      </div>
      {results.length===0
        ? <div className="empty">按下「10連抽」，看看今天召喚出哪些卡面……</div>
        : <div className="canvas-stage" ref={ref}>
            <div style={{fontWeight:900,fontSize:17,textAlign:"center",marginBottom:12}}>✨ 10連抽結果 ✨</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(210px,1fr))",gap:10}}>
              {results.map(x=>(
                <div key={x.id} style={{border:"2.5px solid #2b2440",borderRadius:12,overflow:"hidden",background:"#fff",boxShadow:"3px 3px 0 rgba(43,36,64,.5)"}}>
                  <div style={{background:x.rarity.bg,color:x.rarity.fg,fontWeight:900,fontSize:13,padding:"3px 10px",borderBottom:"2px solid #2b2440",display:"flex",justifyContent:"space-between"}}>
                    <span>（{x.rarity.r}）</span>
                    <span style={{width:10,height:10,borderRadius:"50%",background:isHex(x.char.color)?x.char.color:"#fff",border:"1.5px solid #2b2440",alignSelf:"center"}}></span>
                  </div>
                  <div style={{padding:"8px 10px",fontSize:13.5}}>
                    <div style={{fontWeight:900}}>【{x.title}】</div>
                    <div style={{marginTop:2}}>{x.char.name||"未命名角色"}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>}
    </div>
  );
}

function AuGachaMode({db,mutate}){
  const [draw,setDraw]=useState(null);
  const [parent,setParent]=useState("");
  const [msg,setMsg]=useState("");
  const pick=a=>a[Math.floor(Math.random()*a.length)];
  const rollAll=()=>{ setDraw({setting:pick(AU_SETTINGS),scene:pick(AU_SCENES),plot:pick(AU_PLOTS)}); setMsg(""); };
  const rollOne=k=>setDraw(prev=>prev?{...prev,[k]:pick(k==="setting"?AU_SETTINGS:(k==="scene"?AU_SCENES:AU_PLOTS))}:prev);
  const exportAu=()=>{
    if(!draw) return;
    let auName="";
    mutate(d=>{
      let mw=d.worlds.find(x=>x.id===parent)||d.worlds[0];
      if(!mw){ mw=newMainWorld(""); d.worlds.push(mw); }
      if(!mw.aus) mw.aus=[];
      const w=newWorld(draw.setting+"AU");
      w.description="【AU設定】"+draw.setting+"\n【場景】"+draw.scene+"\n【劇情走向】"+draw.plot;
      w.events.push({id:uid(),time:"開端",title:draw.plot,description:"場景："+draw.scene,checked:true});
      mw.aus.push(w);
      auName=w.name;
    });
    setMsg("✔ 已建立次要世界觀「"+auName+"」！快到「主要世界觀」板塊繼續補完設定。");
  };
  const rows=draw?[["setting","🌍 AU設定",draw.setting],["scene","📍 場景",draw.scene],["plot","📖 劇情走向",draw.plot]]:[];
  return (
    <div>
      <div className="sub">隨機抽選「AU設定×場景×劇情走向」（五十種設定×六十種場景×六十種走向），不滿意可單項重抽；喜歡的組合可一鍵匯出成新的次要世界觀（AU），描述與開端事件會自動寫好。</div>
      <div className="row" style={{marginBottom:12}}>
        <button className="btn primary" onClick={rollAll}>🌀 抽選AU組合！</button>
        {draw && <React.Fragment>
          {db.worlds.length>1 &&
            <select value={parent||db.worlds[0].id} onChange={e=>setParent(e.target.value)} style={{maxWidth:220}}>
              {db.worlds.map(w=><option key={w.id} value={w.id}>隸屬：{w.name||"未命名主要世界觀"}</option>)}
            </select>}
          <button className="btn violet" onClick={exportAu}>📤 匯出為次要世界觀</button>
        </React.Fragment>}
      </div>
      {msg && <div className="badge" style={{marginBottom:10}}>{msg}</div>}
      {!draw
        ? <div className="empty">按下「抽選AU組合」，讓命運決定下一條世界線……</div>
        : <div>
            {rows.map(([k,label,val])=>(
              <div className="item-card" key={k} style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontWeight:900,minWidth:110}}>{label}</span>
                <span style={{flex:1,fontSize:16,fontWeight:800,color:"var(--accent2)"}}>{val}</span>
                <button className="btn small" onClick={()=>rollOne(k)}>🔄 重抽此項</button>
              </div>
            ))}
          </div>}
    </div>
  );
}

function ThirtyMode({db,mutate}){
  const [theme,setTheme]=useState(0);
  const [pickIdx,setPickIdx]=useState(-1);
  const [pickChar,setPickChar]=useState(null);
  const ref=useRef(null);
  const t=THIRTY_THEMES[theme];
  const items=t.items.split("|");
  const roll=()=>{
    setPickIdx(Math.floor(Math.random()*items.length));
    setPickChar(db.characters.length?db.characters[Math.floor(Math.random()*db.characters.length)]:null);
  };
  return (
    <div>
      <div className="sub">內建四十二種創作30題，選一套主題照著畫、照著寫；也可以讓系統幫你隨機抽一題（有角色的話會順便抽個主角），抽到的課題可存入角色的「靈感庫」。</div>
      <div className="row" style={{marginBottom:12}}>
        <select value={theme} onChange={e=>{setTheme(+e.target.value);setPickIdx(-1);}} style={{maxWidth:220}}>
          {THIRTY_THEMES.map((x,i)=><option key={i} value={i}>{x.name}</option>)}
        </select>
        <button className="btn primary" onClick={roll}>🎲 隨機抽一題</button>
        <button className="btn small mint" onClick={()=>downloadNode(ref,t.name+".png")}>⬇ 下載題目表PNG</button>
      </div>
      {pickIdx>=0 &&
        <div className="badge" style={{marginBottom:10,fontSize:14}}>
          今日課題：第{pickIdx+1}題「{items[pickIdx]}」{pickChar?("　主角：「"+(pickChar.name||"未命名角色")+"」"):""}
        </div>}
      {pickIdx>=0 && <SaveToInspiration db={db} mutate={mutate} type="30題"
        getTitle={()=>t.name+"第"+(pickIdx+1)+"題"}
        getContent={()=>"「"+items[pickIdx]+"」"+(pickChar?("　主角："+(pickChar.name||"未命名")):"")}/>}
      <div className="canvas-stage" ref={ref} style={{marginTop:10}}>
        <div style={{fontWeight:900,fontSize:18,textAlign:"center",marginBottom:12}}>📚 {t.name}</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:6}}>
          {items.map((it,i)=>(
            <div key={i} style={{
              border:"2px solid #2b2440",borderRadius:10,padding:"5px 8px",fontSize:12.5,
              background:i===pickIdx?"var(--sun)":"#fff",
              fontWeight:i===pickIdx?900:700,display:"flex",gap:6
            }}>
              <span style={{color:"var(--accent2)",fontWeight:900,minWidth:22}}>{String(i+1).padStart(2,"0")}</span>
              <span>{it}</span>
            </div>
          ))}
        </div>
        <div style={{textAlign:"right",fontSize:11,fontWeight:800,color:"rgba(43,36,64,.5)",marginTop:8}}>─ 你也來搞OC吧！ ─</div>
      </div>
    </div>
  );
}
