function TitleMode({db,mutate}){
  const [mode,setMode]=useState("combo");
  const [type,setType]=useState(0);
  const [ltype,setLtype]=useState(0);
  const [out,setOut]=useState([]);
  const pick=a=>a[Math.floor(Math.random()*a.length)];
  const gen=()=>{
    let arr=[];
    if(mode==="combo"){
      const t=TITLE_TYPES[type];
      const one=()=>pick(TITLE_PATS).replace("{A}",pick(t.A)).replace("{B2}",pick(t.B)).replace("{B}",pick(t.B));
      const set=new Set(); let g=0;
      while(set.size<5&&g<80){set.add(one());g++;}
      arr=[...set];
    }else{
      const list=[...TITLE_LISTS[ltype].list];
      for(let i=0;i<5&&list.length;i++){ const k=Math.floor(Math.random()*list.length); arr.push(list.splice(k,1)[0]); }
    }
    setOut(arr);
  };
  return (
    <div>
      <div className="sub">「組合生成」隨機拼出帶點文學味的標題；「風格題庫」收錄二十種主題（東西方文學風、詞牌名、心理學效應、影視與各語系歌曲風致敬）各二十個標題，一次抽五個任君挑選，可存入角色的「靈感庫」。</div>
      <div className="row" style={{marginBottom:12}}>
        <span className={"chip"+(mode==="combo"?" on":"")} onClick={()=>setMode("combo")}>🎲 組合生成</span>
        <span className={"chip"+(mode==="list"?" on":"")} onClick={()=>setMode("list")}>📖 風格題庫</span>
        {mode==="combo"
          ? <select value={type} onChange={e=>setType(+e.target.value)} style={{maxWidth:160}}>
              {TITLE_TYPES.map((t,i)=><option key={i} value={i}>{t.name}</option>)}
            </select>
          : <select value={ltype} onChange={e=>setLtype(+e.target.value)} style={{maxWidth:160}}>
              {TITLE_LISTS.map((t,i)=><option key={i} value={i}>{t.name}</option>)}
            </select>}
        <button className="btn primary" onClick={gen}>✒ 生成五個標題</button>
      </div>
      {out.length===0
        ? <div className="empty">選好類型後按下「生成」，為下一部作品命名吧。</div>
        : <div>
            {out.map((t,i)=>(
              <div className="item-card" key={i} style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontWeight:900,color:"var(--accent2)"}}>{String(i+1).padStart(2,"0")}</span>
                <span style={{fontSize:17,fontWeight:800,letterSpacing:1}}>《{t}》</span>
              </div>
            ))}
            <button className="btn small violet" onClick={gen}>🔄 再來五個</button>
            <SaveToInspiration db={db} mutate={mutate} type="標題"
              getTitle={()=>"標題靈感（"+(mode==="combo"?TITLE_TYPES[type].name:TITLE_LISTS[ltype].name)+"）"}
              getContent={()=>out.map(t=>"《"+t+"》").join("\n")}/>
          </div>}
    </div>
  );
}

function QuickQAMode({db,mutate}){
  const [q,setQ]=useState(-1);
  const [ch,setCh]=useState(null);
  const [ans,setAns]=useState("");
  const roll=()=>{
    setQ(Math.floor(Math.random()*QUICK_QUESTIONS.length));
    setCh(db.characters.length?db.characters[Math.floor(Math.random()*db.characters.length)]:null);
    setAns("");
  };
  const rollChar=()=>{ if(db.characters.length) setCh(db.characters[Math.floor(Math.random()*db.characters.length)]); };
  return (
    <div>
      <div className="sub">隨機抽一位角色＋一道刁鑽問題（題庫一百題），試著用角色的口吻回答，磨出屬於他的聲線。滿意的答案可直接「存入靈感庫」！</div>
      <div className="row" style={{marginBottom:12}}>
        <button className="btn primary" onClick={roll}>⚡ 抽題！</button>
        {q>=0 && db.characters.length>1 && <button className="btn small" onClick={rollChar}>🔄 換一位角色</button>}
        {q>=0 && <button className="btn small violet" onClick={()=>{setQ(Math.floor(Math.random()*QUICK_QUESTIONS.length));setAns("");}}>🔄 換一題</button>}
      </div>
      {q<0
        ? <div className="empty">按下「抽題」，看看今天輪到誰接受拷問……</div>
        : <div className="item-card" style={{borderLeft:"6px solid var(--accent2)"}}>
            <div className="row" style={{marginBottom:8}}>
              {ch
                ? <React.Fragment>
                    <AvatarCircle name={ch.name} color={ch.color} avatar={ch.avatar} size={36}/>
                    <span style={{fontWeight:900,fontSize:16}}>{ch.name||"未命名角色"}</span>
                  </React.Fragment>
                : <span style={{fontWeight:900,fontSize:16}}>（隨便一位孩子）</span>}
              <span className="badge">第{q+1}題</span>
            </div>
            <div style={{fontSize:16.5,fontWeight:800,marginBottom:10,lineHeight:1.6}}>Q．{QUICK_QUESTIONS[q]}</div>
            <textarea value={ans} onChange={e=>setAns(e.target.value)} style={{minHeight:80}}
                      placeholder={"用「"+((ch&&ch.name)||"角色")+"」的口吻回答……"}/>
            <SaveToInspiration db={db} mutate={mutate} type="快問快答"
              getTitle={()=>"快問快答 第"+(q+1)+"題"}
              getContent={()=>"Q："+QUICK_QUESTIONS[q]+"\nA："+ans}/>
          </div>}
    </div>
  );
}

async function aiGenerateQuestions(db,q){
  const chars=db.characters.filter(c=>q.charIds.includes(c.id));
  const summary=chars.map(c=>"【"+(c.name||"未命名")+"】MBTI："+(c.mbti||"？")+"；核心："+String(c.coreTheme||"").slice(0,60)+"；描述："+String(c.description||"").slice(0,150)).join("\n");
  const prompt="你是OC創作輔助工具的出題引擎。請根據以下角色設定與問卷主題，產生6道繁體中文問卷題目，題目需貼合角色個性與主題，混合三種題型。\n主題："+(q.topic||q.name||"角色綜合問卷")+"\n角色設定：\n"+summary+
    "\n\n只回傳JSON陣列，不要任何其他文字、說明或markdown符號。格式範例：[{\"type\":\"scale\",\"text\":\"題目\",\"min\":1,\"max\":10,\"leftLabel\":\"左端\",\"rightLabel\":\"右端\"},{\"type\":\"choice\",\"text\":\"題目\",\"options\":[\"甲\",\"乙\",\"丙\"]},{\"type\":\"radar\",\"text\":\"題目\",\"axes\":[\"軸1\",\"軸2\",\"軸3\",\"軸4\",\"軸5\"],\"min\":0,\"max\":10}]";
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1200,messages:[{role:"user",content:prompt}]})
  });
  const data=await res.json();
  const text=(data.content||[]).filter(x=>x.type==="text").map(x=>x.text).join("");
  const clean=text.replace(/```json|```/g,"").trim();
  const arr=JSON.parse(clean);
  if(!Array.isArray(arr)) throw new Error("format");
  return arr.map(x=>{
    if(x.type==="scale") return {...newQuestion("scale"),text:x.text||"",min:+x.min||1,max:+x.max||10,leftLabel:x.leftLabel||"",rightLabel:x.rightLabel||""};
    if(x.type==="radar") return {...newQuestion("radar"),text:x.text||"",axes:Array.isArray(x.axes)&&x.axes.length>=3?x.axes.map(String):["軸一","軸二","軸三","軸四","軸五"],min:+x.min||0,max:+x.max||10};
    return {...newQuestion("choice"),text:x.text||"",options:Array.isArray(x.options)&&x.options.length?x.options.map(String):["是","否"]};
  });
}
function localGenerateQuestions(db,q){
  const chars=db.characters.filter(c=>q.charIds.includes(c.id));
  const n1=(chars[0]&&chars[0].name)||"這位角色";
  const n2=(chars[1]&&chars[1].name)||"對方";
  const topic=(q.topic||q.name||"");
  const out=[];
  const mk=(t,extra)=>({...newQuestion(t.type||t),...extra});
  const isRel=chars.length>1||/關係|羈絆|CP|友情/.test(topic);
  if(/偶像|idol|演藝/i.test(topic)){
    out.push(mk("radar",{text:"偶像能力值",axes:["歌力","舞蹈","創作","綜藝反應","粉絲對應"],min:0,max:10}));
    out.push(mk("scale",{text:"舞台上與私下的反差程度？",leftLabel:"人設一致",rightLabel:"反差極大"}));
    out.push(mk("choice",{text:"最擅長的舞台位置是？",options:["主唱","主舞","門面擔當","綜藝擔當","隊長"]}));
  }else if(/TRPG|跑團|冒險/i.test(topic)){
    out.push(mk("radar",{text:"六維屬性",axes:["STR","DEX","CON","INT","WIS","CHA"],min:0,max:10}));
    out.push(mk("choice",{text:"隊伍中的定位是？",options:["前排坦","輸出","補師","控場","談判擔當"]}));
    out.push(mk("scale",{text:"擲骰運氣如何？",leftLabel:"大失敗常客",rightLabel:"天選之人"}));
  }else if(isRel){
    out.push(mk("radar",{text:n1+"與"+n2+"的關係指數",axes:["信任","默契","坦率","依賴","吵架頻率"],min:0,max:10}));
    out.push(mk("scale",{text:"兩人相處時誰比較主動？",leftLabel:n1,rightLabel:n2}));
    out.push(mk("choice",{text:"吵架之後通常誰先低頭？",options:[n1,n2,"一起裝沒事","從不吵架"]}));
    out.push(mk("scale",{text:"對彼此秘密的了解程度？",leftLabel:"一無所知",rightLabel:"瞭若指掌"}));
  }else{
    out.push(mk("scale",{text:"金錢觀傾向？",leftLabel:"節儉",rightLabel:"大方"}));
    out.push(mk("scale",{text:"面對重大抉擇時？",leftLabel:"理性計算",rightLabel:"感性直覺"}));
    out.push(mk("choice",{text:"難得的休假日，"+n1+"最可能在？",options:["睡到自然醒","戶外放風","進修充電","朋友聚會","加班（自願的）"]}));
    out.push(mk("radar",{text:"綜合能力值",axes:["體力","智力","魅力","行動力","幸運"],min:0,max:10}));
    out.push(mk("choice",{text:"是路痴嗎？",options:["是","否","看心情"]}));
  }
  return out;
}

function buildLibraryQuestions(lib,chars){
  const n1=(chars[0]&&chars[0].name)||"這位角色";
  const n2=(chars[1]&&chars[1].name)||"那個人";
  const sub=s=>String(s||"").replace(/{A}/g,n1).replace(/{B}/g,n2);
  return lib.qs.map(x=>{
    if(x.t==="scale") return {...newQuestion("scale"),text:sub(x.text),leftLabel:sub(x.l),rightLabel:sub(x.r),max:x.max||10};
    if(x.t==="radar") return {...newQuestion("radar"),text:sub(x.text),axes:x.axes.map(sub),min:0,max:10};
    return {...newQuestion("choice"),text:sub(x.text),options:x.opts.map(sub)};
  });
}
function choiceMarkStyle(style,color){
  if(style==="solid") return {background:color,color:"#fff",borderRadius:8,padding:"1px 8px",fontWeight:800};
  if(style==="underline") return {borderBottom:"3px solid "+color,fontWeight:800,paddingBottom:1};
  if(style==="outline") return {border:"2px solid "+color,borderRadius:8,padding:"0 8px",fontWeight:800};
  return {background:"linear-gradient(transparent 45%,"+color+"88 45%)",fontWeight:800,padding:"0 3px"};
}
function ScaleBarView({qu,chars,markColor}){
  const range=(qu.max-qu.min)||1;
  const vert=qu.orient==="v";
  const Marker=({c,i})=>{
    const a=qu.answers[c.id];
    if(!a||a.value==null) return null;
    const t=(a.value-qu.min)/range;
    const posStyle=vert?{bottom:"calc("+(t*100)+"% - 11px)",left:"50%",transform:"translateX(-50%)"}:{left:"calc("+(t*100)+"% - 11px)",top:"50%",transform:"translateY(-50%)"};
    const col=a.color||charColorOf(c,i);
    let inner;
    if(a.marker==="avatar"&&c.avatar) inner=<img src={c.avatar} alt="" style={{width:22,height:22,borderRadius:"50%",border:"2px solid #2b2440",objectFit:"cover",background:"#fff"}}/>;
    else if(a.marker==="emoji") inner=<span style={{fontSize:17,lineHeight:"22px"}}>{a.emoji||"⭐"}</span>;
    else inner=<span style={{width:16,height:16,borderRadius:"50%",background:col,border:"2.5px solid #2b2440",display:"inline-block"}}></span>;
    return <span style={{position:"absolute",...posStyle,zIndex:2}} title={(c.name||"未命名")+"："+a.value}>{inner}</span>;
  };
  return (
    <div style={vert?{display:"flex",flexDirection:"column",alignItems:"center",gap:4}:{}}>
      {vert
        ? <React.Fragment>
            <span style={{fontSize:11.5,fontWeight:800}}>{qu.rightLabel||qu.max}</span>
            <div style={{position:"relative",width:14,height:150,background:"#efe7fa",border:"2px solid #2b2440",borderRadius:999}}>
              {chars.map((c,i)=><Marker key={c.id} c={c} i={i}/>)}
            </div>
            <span style={{fontSize:11.5,fontWeight:800}}>{qu.leftLabel||qu.min}</span>
          </React.Fragment>
        : <div className="row" style={{flexWrap:"nowrap",gap:8}}>
            <span style={{fontSize:11.5,fontWeight:800,flex:"none",maxWidth:90}}>{qu.leftLabel||qu.min}</span>
            <div style={{position:"relative",flex:1,height:14,background:"#efe7fa",border:"2px solid #2b2440",borderRadius:999,minWidth:140}}>
              {chars.map((c,i)=><Marker key={c.id} c={c} i={i}/>)}
            </div>
            <span style={{fontSize:11.5,fontWeight:800,flex:"none",maxWidth:90,textAlign:"right"}}>{qu.rightLabel||qu.max}</span>
          </div>}
    </div>
  );
}
function ChoiceView({qu,chars,defStyle,defColor}){
  const style=qu.markStyle||defStyle;
  const color=qu.markColor||defColor;
  const multiChar=chars.length>1;
  const optRow=(opt,oi)=>{
    const who=chars.map((c,i)=>({c,i})).filter(({c})=>{const a=qu.answers[c.id];return a&&(a.sel||[]).includes(oi);});

        {picked&&multiChar&&who.map(({c,i})=>(
          <span key={c.id} style={{width:10,height:10,borderRadius:"50%",background:charColorOf(c,i),border:"1.5px solid #2b2440",display:"inline-block"}} title={c.name||"未命名"}></span>
        ))}

  if(qu.display==="dropdown"){

              {chars.length>1&&<span style={{fontWeight:800,fontSize:12}}>{c.name||"未命名"}：</span>}
              <span style={{border:"2px solid #2b2440",borderRadius:8,padding:"1px 22px 1px 8px",position:"relative",background:"#fff"}}>
                {sel!=null?<span style={choiceMarkStyle(style,charColorOf(c,i))}>{(qu.options||[])[sel]}</span>:<span style={{color:"#999"}}>──</span>}
                <span style={{position:"absolute",right:6}}>▾</span>
              </span>
            </div>
          );
        })}
      </div>
    );
  }
  return <div>{(qu.options||[]).map(optRow)}</div>;
}
function RadarView({qu,chars,size}){
  const S=size||280, cx=S/2, cy=S/2+6, r=S/2-46;
  const axes=qu.axes||[]; const n=axes.length;
  if(n<3) return <div className="hint">雷達圖至少需要三個軸向。</div>;
  const range=(qu.max-qu.min)||1;
  const pt=(t,i)=>{
    const ang=-Math.PI/2+i*2*Math.PI/n;
    return [cx+r*t*Math.cos(ang), cy+r*t*Math.sin(ang)];
  };
  const ring=t=>axes.map((_,i)=>pt(t,i).join(",")).join(" ");
  return (
    <svg width={S} height={S} viewBox={"0 0 "+S+" "+S} style={{fontFamily:'"Noto Sans TC","Microsoft JhengHei",sans-serif'}}>
      {[0.25,0.5,0.75,1].map(t=>(
        <polygon key={t} points={ring(t)} fill={t===1?"rgba(108,76,224,.05)":"none"} stroke="#b9a7ea" strokeWidth={t===1?2:1}/>
      ))}
      {axes.map((ax,i)=>{
        const [x,y]=pt(1,i); const [lx,ly]=pt(1.18,i);
        return (
          <g key={i}>
            <line x1={cx} y1={cy} x2={x} y2={y} stroke="#d8cdf2" strokeWidth="1"/>
            <text x={lx} y={ly+4} textAnchor="middle" fontSize="11.5" fontWeight="800" fill="#2b2440">{ax}</text>
          </g>
        );
      })}
      {chars.map((c,ci)=>{
        const a=qu.answers[c.id];
        if(!a||!a.vals) return null;
        const pts=axes.map((_,i)=>{
          const v=a.vals[i]!=null?a.vals[i]:qu.min;
          const t=Math.max(0,Math.min(1,(v-qu.min)/range));
          return pt(t,i).join(",");
        }).join(" ");
        const col=charColorOf(c,ci);
        return (
          <g key={c.id}>
            <polygon points={pts} fill={col+"33"} stroke={col} strokeWidth="2.5"/>
          </g>
        );
      })}
    </svg>
  );
}

}

            <input type="text" value={qu.rightLabel} placeholder="右端標籤（如：大方）" style={{width:150}}

                {a.marker==="emoji" &&

              <option value="solid">實色底</option><option value="hl">螢光筆</option>
              <option value="underline">底線</option><option value="outline">外框</option>
            </select>

              <input type="color" value={qu.markColor||quest.markColor} title="標記顏色"

                  <span key={c.id} className="row" style={{gap:3,flexWrap:"nowrap"}}>
                    <span style={{width:9,height:9,borderRadius:"50%",background:charColorOf(c,i),border:"1.5px solid #2b2440",flex:"none"}}></span>
                    <input type="text" value={v!=null?v:""} placeholder="—" style={{width:48}}
                      onChange={e=>setAns(c.id,x=>{
                        if(!x.vals) x.vals=qu.axes.map(()=>null);
                        while(x.vals.length<qu.axes.length) x.vals.push(null);
                        x.vals[ai]=e.target.value===""?null:+e.target.value;
                      })}/>
                  </span>
                );
              })}
              {(qu.axes||[]).length>3 &&
                <button className="btn small danger" onClick={()=>updateQ(x=>{
                  x.axes.splice(ai,1);
                  chars.forEach(c=>{const a=x.answers[c.id]; if(a&&a.vals) a.vals.splice(ai,1);});
                })}>刪</button>}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function QuestionnaireTab({db,mutate,selQ,setSelQ,autoGenRef}){
  const [nName,setNName]=useState("");
  const [nTopic,setNTopic]=useState("");
  const [nChars,setNChars]=useState([]);
  const [nMode,setNMode]=useState("ai");
  const [nLib,setNLib]=useState(-1);
  const [busy,setBusy]=useState(false);
  const [aiMsg,setAiMsg]=useState("");
  const stageRef=useRef(null);
  const list=db.questionnaires||[];
  const quest=list.find(x=>x.id===selQ);
  const chars=quest?db.characters.filter(c=>quest.charIds.includes(c.id)):[];
  const updateQuest=fn=>mutate(d=>{const t=(d.questionnaires||[]).find(x=>x.id===selQ); if(t) fn(t);});
  const runGen=async(target)=>{
    setBusy(true); setAiMsg("🤖 正在依角色設定生成推薦題目…");
    let qs=null, viaAi=true;
    try{ qs=await aiGenerateQuestions(db,target); }
    catch(e){ viaAi=false; qs=localGenerateQuestions(db,target); }
    mutate(d=>{const t=(d.questionnaires||[]).find(x=>x.id===target.id); if(t) t.questions=[...t.questions,...qs];});
    setAiMsg(viaAi?"✔ AI已依角色設定生成推薦題目，可自由編輯、刪除或再次生成。":"✔ 已依主題生成推薦題目（此環境無法連線AI，使用內建智慧題庫）。");
    setBusy(false);
  };
  useEffect(()=>{
    if(quest && autoGenRef.current===quest.id){
      autoGenRef.current="";
      if(!quest.questions.length) runGen(quest);
    }
  },[selQ]);
  const create=()=>{
    const q=newQuestionnaire(nName||"未命名問卷");
    q.topic=nTopic; q.charIds=[...nChars];
    if(nMode==="lib"&&nLib>=0){
      const lib=QUEST_LIBRARY[nLib];
      if(!nName) q.name=lib.name;
      if(!nTopic) q.topic=lib.topic;
      q.questions=buildLibraryQuestions(lib,db.characters.filter(c=>nChars.includes(c.id)));
    }
    mutate(d=>{ if(!d.questionnaires) d.questionnaires=[]; d.questionnaires.push(q); });
    if(nMode==="ai") autoGenRef.current=q.id;
    setSelQ(q.id);
    setNName(""); setNTopic(""); setNChars([]); setNLib(-1); setAiMsg("");
  };
  /* ---- 清單畫面 ---- */
  if(!quest) return (

/* ---------- 搜尋 ---------- */
function collectHits(db,q){
  const query=q.trim().toLowerCase();
  if(!query) return [];
  const hits=[];
  const push=(where,label,text,jump)=>{
    const t=String(text||"");
    const idx=t.toLowerCase().indexOf(query);
    if(idx<0) return;
    const start=Math.max(0,idx-24);
    const snippet=(start>0?"…":"")+t.slice(start,idx+query.length+40)+(idx+query.length+40<t.length?"…":"");
    hits.push({id:uid(),where,label,snippet,q:query,jump});
  };
  const scanWorld=(w,where,jump)=>{
    push(where,"名稱",w.name,jump); push(where,"世界觀描述",w.description,jump);
    (w.events||[]).forEach(e=>{push(where,"事件："+(e.title||"未命名"),[e.time,e.title,e.description].join("　"),jump);});
    (w.groups||[]).forEach(g=>{push(where,"組合："+(g.name||"未命名"),[g.name,g.description].join("　"),jump);});
  };
  db.worlds.forEach(mw=>{
    scanWorld(mw,"主要世界觀："+(mw.name||"未命名"),{tab:"world"});
    (mw.aus||[]).forEach(a=>scanWorld(a,"次要世界觀（AU）："+(a.name||"未命名")+"｜隸屬「"+(mw.name||"未命名")+"」",{tab:"world"}));
  });
  const scanProfile=(p,where,jump)=>{
    FIELD_DEFS.forEach(d=>push(where,d.label,p[d.key],jump));
    (p.customFields||[]).forEach(f=>push(where,f.label||"自訂欄位",f.value,jump));
    (p.events||[]).forEach(e=>push(where,"個人事件："+(e.title||"未命名"),[e.time,e.title,e.description].join("　"),jump));
    (p.inspirations||[]).forEach(x=>push(where,"靈感庫："+(x.title||x.type),[x.type,x.title,x.content].join("　"),jump));
    (p.foreignNames||[]).forEach(f=>push(where,"外文名（"+(f.lang||"？")+"）",f.value,jump));
    (p.relationships||[]).forEach(r=>{
      const t=db.characters.find(c=>c.id===r.targetId);
      push(where,"人際關係："+(t?t.name:"？"),[r.relation,r.story,r.notes].join("　"),jump);
    });
  };
  db.characters.forEach(c=>{
    scanProfile(c,"角色："+(c.name||"未命名"),{tab:"chars",charId:c.id});
    (c.auProfiles||[]).forEach(p=>scanProfile(p,"角色："+(c.name||"未命名")+"｜AU："+profileAuName(db.worlds,p),{tab:"chars",charId:c.id}));
  });
  return hits;
}
function Highlight({text,q}){
  const i=text.toLowerCase().indexOf(q);
  if(i<0) return <span>{text}</span>;
  return <span>{text.slice(0,i)}<mark>{text.slice(i,i+q.length)}</mark>{text.slice(i+q.length)}</span>;
}
function SearchPanel({db,query,onJump}){
  const hits=useMemo(()=>collectHits(db,query),[db,query]);
  return (
    <div className="card tape tape-mint">
      <h2>搜尋結果</h2>
      <div className="sub">關鍵字「{query}」共找到 {hits.length} 筆相符內容，點擊即可前往。</div>
      {hits.length===0 && <div className="empty">沒有找到包含「{query}」的內容，換個關鍵字試試？</div>}
      {hits.map(h=>(
        <div className="search-hit" key={h.id} onClick={()=>onJump(h.jump)}>
          <div className="where">{h.where}｜{h.label}</div>
          <div style={{fontSize:14}}><Highlight text={h.snippet} q={h.q}/></div>
        </div>
      ))}
    </div>
  );
}

                               }}
                               onClick={()=>setSelChar(c.id)}>
                            <AvatarCircle name={c.name} color={c.color} avatar={c.avatar} size={34}/>
                            <span style={{fontWeight:800,fontSize:14,flex:1}}>{c.name||"未命名角色"}</span>
                            {(c.tags||[]).length>0 &&
                              <span style={{fontSize:10.5,fontWeight:800,color:"rgba(43,36,64,.55)"}}>{(c.tags||[]).join("・")}</span>}
                          </div>
                        );
                      })}
                    </div>
                    {chars.length>1 && canDrag && <div className="footnote">直接拖曳項目即可重新排序；在角色頁面可加上標籤分類。</div>}
                  </React.Fragment>
                );
              })()}
              <div style={{marginTop:12}}>
                <button className="btn primary" onClick={()=>{
                  const id=uid();
                  mutate(d=>{const c=newCharacter("");c.id=id;d.characters.push(c);});
                  setSelChar(id);
                }}>＋新增角色</button>
              </div>
            </div>
            <div>
              {cur
                ? <CharacterEditor key={cur.id} char={cur} allChars={chars} worlds={db.worlds}
                    questionnaires={db.questionnaires||[]}
                    onOpenQuestionnaire={qid=>{setSelQuest(qid);setTab("quest");}}
                    update={fn=>mutate(d=>{const c=d.characters.find(x=>x.id===cur.id); if(c) fn(c);})}
                    onDelete={()=>{ if(confirm("確定要刪除角色「"+(cur.name||"未命名")+"」嗎？")) mutate(d=>{
                      d.characters=d.characters.filter(x=>x.id!==cur.id);
                      d.characters.forEach(c=>{
                        c.relationships=(c.relationships||[]).filter(r=>r.targetId!==cur.id);
                        (c.auProfiles||[]).forEach(p=>{p.relationships=(p.relationships||[]).filter(r=>r.targetId!==cur.id);});
                      });
                    }); }}/>
                : <div className="card tape"><div className="empty">從左側新增第一位角色，開始建立你的OC檔案吧！</div></div>}
            </div>
          </div>
        )}

        {tab==="quest" && <QuestionnaireTab db={db} mutate={mutate} selQ={selQuest} setSelQ={setSelQuest} autoGenRef={autoGenRef}/>}
        {tab==="charts" && <ChartsTab db={db} mutate={mutate}/>}
        {tab==="assist" && <AssistTab db={db} mutate={mutate}/>}
        {tab==="import" && <ImportTab db={db} mutate={mutate}/>}
        {tab==="export" && <ExportTab db={db}/>}

      </React.Fragment>}

      <div style={{textAlign:"center",marginTop:30,fontSize:12,color:"rgba(43,36,64,.5)",fontWeight:700}}>
        ✦ 你也來搞OC吧！因為這很有趣不是嗎？ ✦
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
