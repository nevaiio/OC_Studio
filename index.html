  "設計{A}送給{B}的生日禮物，以及{B}的反應。",
  "描述{A}與{B}並肩看著同一片風景時，各自在想什麼。",
  "寫{A}與{B}十年後重逢的第一句話。",
  "描述{A}與{B}之間，那條誰都不敢先跨過的線。",
  "寫{A}對{B}說過最溫柔、也最殘忍的一句話。",
  "設計一個讓{A}與{B}被迫合作的情境。",
  "描述{A}如何稱呼{B}，以及這個稱呼的由來。"
];
function todaySeed(){
  const d=new Date();
  return d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate();
}
function ChallengeMode({db,mutate}){
  const chars=db.characters;
  const seed=todaySeed();
  // 依日期決定今天是單人還是雙人題，以及題目與角色
  const useDuo = chars.length>=2 && (seed%3===0);
  const pool = useDuo ? CHALLENGE_DUO : CHALLENGE_SOLO;
  const qIdx = seed % pool.length;
  const aIdx = chars.length ? (Math.floor(seed/7) % chars.length) : -1;
  let bIdx=-1;
  if(useDuo && chars.length>=2){ bIdx=(aIdx + 1 + (Math.floor(seed/13) % (chars.length-1))) % chars.length; }
  const A = aIdx>=0 ? (chars[aIdx].name||"（某位角色）") : "（某位角色）";
  const B = bIdx>=0 ? (chars[bIdx].name||"（另一位角色）") : "（另一位角色）";
  const text = pool[qIdx].split("{A}").join(A).split("{B}").join(B);
  const dateStr=new Date().toLocaleDateString("zh-TW",{month:"long",day:"numeric",weekday:"long"});
  return (
    <div>
      <div className="sub">每天一個小任務，養成創作手感。題目每日固定、隔日更新——今天的挑戰是：</div>
      <div className="item-card" style={{textAlign:"center",padding:"22px 18px",background:"linear-gradient(135deg,rgba(255,93,143,.12),rgba(108,76,224,.12))",border:"2.5px solid var(--ink)"}}>
        <div style={{fontSize:12.5,fontWeight:900,color:"var(--accent2)",letterSpacing:1}}>📅 {dateStr} · 今日挑戰</div>
        <div style={{fontSize:19,fontWeight:900,lineHeight:1.7,margin:"12px 0"}}>{text}</div>
        {chars.length===0 && <div className="hint">（建立角色後，題目會自動代入你的角色名字）</div>}
        <div style={{fontSize:26}}>{useDuo?"👥":"✨"}</div>
      </div>
      <div className="footnote">想換個角色練手？到「創作輔助」的其他模式抽題；今日挑戰以日期為準，明天會換一題。</div>
      {mutate && <SaveInspoBar db={db} mutate={mutate} source="今日挑戰" defaultTitle={"今日挑戰："+dateStr} content={text}/>}
    </div>
  );
}

/* ---------- 創作輔助：隨機分組 ---------- */
function RandomGroupMode({db,mutate}){
  const chars=db.characters;
  const [scope,setScope]=useState("all");        // all | world | groups
  const [worldSel,setWorldSel]=useState("");
  const [groupSel,setGroupSel]=useState([]);
  const [excluded,setExcluded]=useState([]);     // 手動排除的角色id
  const [mode,setMode]=useState("count");
  const [num,setNum]=useState(2);
  const [result,setResult]=useState(null);
  const [expTarget,setExpTarget]=useState("");   // 匯出用：現有世界觀id
  const [newWorldName,setNewWorldName]=useState("");
  const [saveTo,setSaveTo]=useState("inspo");    // inspo | notes
  const [msg,setMsg]=useState("");

  // 所有世界觀（主＋AU）與所有組合，附來源標籤
  const worldOpts=[];
  db.worlds.forEach(mw=>{
    worldOpts.push({id:mw.id,label:"主要世界觀："+(mw.name||"未命名"),w:mw,isAu:false});
    (mw.aus||[]).forEach(a=>worldOpts.push({id:a.id,label:"　└ AU："+(a.name||"未命名"),w:a,isAu:true,parent:mw}));
  });
  const groupOpts=[];
  worldOpts.forEach(o=>(o.w.groups||[]).forEach(g=>{
    groupOpts.push({key:o.id+"|"+g.id,label:(g.name||"未命名組合")+"（"+(o.w.name||"未命名")+"）",g,world:o.w});
  }));

  // 依範圍算出候選池（以Set去重，同一角色不會重複出現）
  const poolIds=(()=>{
    const set=new Set();
    if(scope==="all"){ chars.forEach(c=>set.add(c.id)); }
    else if(scope==="world"){
      const o=worldOpts.find(x=>x.id===worldSel);
      if(o){
        (o.w.groups||[]).forEach(g=>(g.memberIds||[]).forEach(id=>set.add(id)));
        if(o.isAu) chars.forEach(c=>{ if((c.auProfiles||[]).some(pp=>pp.auWorldId===o.w.id)) set.add(c.id); });
      }
    }else{
      groupSel.forEach(k=>{ const go=groupOpts.find(x=>x.key===k); if(go)(go.g.memberIds||[]).forEach(id=>set.add(id)); });
    }
    return [...set].filter(id=>chars.some(c=>c.id===id));
  })();
  const candidates=poolIds.filter(id=>!excluded.includes(id)).map(id=>chars.find(c=>c.id===id));
  const shuffle=arr=>{ const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; };
  const run=()=>{
    if(!candidates.length){ setMsg("⚠ 候選池是空的，請調整範圍或取消排除。"); return; }
    setMsg("");
    const pool=shuffle(candidates);
    if(mode==="pick") setResult({type:"pick",groups:[pool.slice(0,Math.min(num,pool.length))]});
    else if(mode==="count"){
      const per=Math.max(1,num), gs=[];
      for(let i=0;i<pool.length;i+=per) gs.push(pool.slice(i,i+per));
      setResult({type:"count",groups:gs});
    }else{
      const g=Math.max(1,num), gs=Array.from({length:Math.min(g,pool.length)},()=>[]);
      pool.forEach((c,i)=>gs[i%gs.length].push(c));
      setResult({type:"groups",groups:gs});
    }
  };
  if(!chars.length) return <div className="empty">還沒有角色，先到「角色」板塊建立吧！</div>;
  const label = mode==="pick"?"抽出人數":(mode==="count"?"每組人數":"分成幾組");
  const stamp=new Date().toLocaleDateString("zh-TW");
  const groupName=gi=>(result&&result.type==="pick")?("隨機抽選 "+stamp):("隨機分組 "+stamp+" 第"+(gi+1)+"組");
  const resultText=()=>result.groups.map((g,gi)=>(result.type==="pick"?"抽選：":("第"+(gi+1)+"組："))+g.map(c=>c.name||"未命名角色").join("、")).join("\n");

  const exportToWorld=(worldId)=>{
    mutate(d=>{
      let target=null;
      d.worlds.forEach(mw=>{ if(mw.id===worldId) target=mw; (mw.aus||[]).forEach(a=>{ if(a.id===worldId) target=a; }); });
      if(!target) return;
      if(!target.groups) target.groups=[];
      result.groups.forEach((g,gi)=>{
        target.groups.push({id:uid(),name:groupName(gi),memberIds:g.map(c=>c.id),
          description:"由「隨機分組」於 "+stamp+" 產生。",color:"#6c4ce0"});
      });
    });
    setMsg("✔ 已在該世界觀底下新增 "+result.groups.length+" 個組合！");
  };
  const exportToNewWorld=()=>{
    const nm=(newWorldName||"").trim();
    if(!nm){ setMsg("⚠ 請先輸入新世界觀的名稱。"); return; }
    mutate(d=>{
      const w=newMainWorld(nm);
      w.description="由「隨機分組」於 "+stamp+" 建立。";
      w.groups=result.groups.map((g,gi)=>({id:uid(),name:groupName(gi),memberIds:g.map(c=>c.id),
        description:"由「隨機分組」於 "+stamp+" 產生。",color:"#6c4ce0"}));
      d.worlds.push(w);
    });
    setMsg("✔ 已建立新世界觀「"+nm+"」並寫入 "+result.groups.length+" 個組合！");
    setNewWorldName("");
  };
  const exportToChars=()=>{
    const txt=resultText();
    mutate(d=>{
      result.groups.forEach((g,gi)=>{
        const mates=g.map(c=>c.name||"未命名角色").join("、");
        const line=(result.type==="pick"?"【隨機抽選 "+stamp+"】":"【隨機分組 "+stamp+"・第"+(gi+1)+"組】")+mates;
        g.forEach(c=>{
          const t=d.characters.find(x=>x.id===c.id); if(!t) return;
          if(saveTo==="notes") t.notes=(t.notes?t.notes+"\n":"")+line;
          else addInspiration(d,c.id,"隨機分組",result.type==="pick"?"隨機抽選結果":("第"+(gi+1)+"組"),line);
        });
      });
    });
    setMsg("✔ 已寫入所有相關角色的"+(saveTo==="notes"?"備註欄":"靈感庫")+"！");
  };

  return (
    <div>
      <div className="sub">先限定範圍，再隨機分組——決定今天畫誰、配對、抽接龍組合都好用。</div>
      <HelpTips title="三個步驟" tips={[
        ["1️⃣","設定候選範圍","全體／單一世界觀／既有組合"],
        ["2️⃣","選分組方式","抽N人、每組N人、分成N組"],
        ["3️⃣","匯出結果","寫回世界觀，或存進角色資料"]
      ]}/>

      <Collapse title="🎯 候選範圍設定">
        <div className="row" style={{marginBottom:8}}>
          <span style={{fontWeight:800,fontSize:13}}>來源：</span>
          <span className={"chip"+(scope==="all"?" on":"")} onClick={()=>{setScope("all");setResult(null);setExcluded([]);}}>全體角色</span>
          <span className={"chip"+(scope==="world"?" on":"")} onClick={()=>{setScope("world");setResult(null);setExcluded([]);}}>單一世界觀／AU</span>
          <span className={"chip"+(scope==="groups"?" on":"")} onClick={()=>{setScope("groups");setResult(null);setExcluded([]);}}>既有組合（可複選）</span>
        </div>
        {scope==="world" &&
          <div className="row" style={{marginBottom:8}}>
            <select value={worldSel} onChange={e=>{setWorldSel(e.target.value);setResult(null);setExcluded([]);}} style={{maxWidth:320}}>
              <option value="">──選擇世界觀／AU──</option>
              {worldOpts.map(o=><option key={o.id} value={o.id}>{o.label}</option>)}
            </select>
            <span className="hint">取該世界觀所有「角色關係組合」的成員；AU另含已綁定此AU的角色分頁。</span>
          </div>}
        {scope==="groups" &&
          <div className="row" style={{marginBottom:8}}>
            {groupOpts.length===0
              ? <span className="hint">目前沒有任何組合，請先到世界觀板塊建立「角色關係組合」。</span>
              : groupOpts.map(o=>(
                  <span key={o.key} className={"chip"+(groupSel.includes(o.key)?" on":"")}

/* ══════════════════════════════════════════════════════════════
   Infographic 自動排版引擎（獨立模組・可替換）
   ─ 輸入：questions（沿用既有題目資料結構）、比例、選項
   ─ 輸出：純資料的 layout plan，渲染器只負責照 plan 畫
   ─ 未來要加「手動微調」時，只要產生／修改 plan.zones 即可，
     不需更動題目資料或渲染器（zone 具 manual 旗標預留擴充）
   ══════════════════════════════════════════════════════════════ */
const INFO_RATIOS=[["1:1","1：1 方形"],["3:4","3：4 直式"],["9:16","9：16 限動"],
                   ["4:3","4：3 橫式"],["16:9","16：9 寬幅"],["2:3","2：3 直式"],["orig","單欄長條（傳統）"]];
function infoRatioValue(key){
  if(!key||key==="orig") return null;
  const a=String(key).split(":").map(Number);
  return (a.length===2&&a[0]&&a[1])?a[0]/a[1]:null;
}
/* 內容量估算：讓引擎在不依賴DOM的情況下先做空間分配 */
function estimateQ(q){
  if(q.type==="radar") return {w:250,h:296,kind:"radar"};
  if(q.type==="choice"){
    const n=Math.max(2,(q.options||[]).length);
    const long=String(q.text||"").length>18;
    return {w:210,h:34+(long?16:0)+21*n,kind:"choice"};
  }
  if(q.type==="text"){
    // 依已填答案的長度估算高度（每位角色至少一行）
    const ans=Object.values(q.answers||{}).map(a=>String((a&&a.text)||""));
    const lines=ans.reduce((n,t)=>n+Math.max(1,Math.ceil(t.length/26)),0)||1;
    return {w:230,h:34+Math.min(9,lines)*24,kind:"text"};
  }
  return {w:250,h:78,kind:"scale"};
}
function planInfographicAuto(questions,ratioKey,opts){
  opts=opts||{};
  const BASE_W=opts.baseW||1000;
  const rv=infoRatioValue(ratioKey);
  const W=BASE_W;
  const H=rv?Math.round(BASE_W/rv):null;          // null = 高度隨內容（傳統單欄）
  const PAD=opts.pad||36, GAP=opts.gap||18;
  // 標題＋主題＋圖例的實際高度（圖例頭像42px＋名字，需留足空間避免裁切）
  const legendH=opts.legendH||58;
  const headH=opts.headH||(46+(opts.hasTopic?20:0)+legendH+10);
  const footH=28;
  const innerX=PAD, innerY=PAD+headH;
  const innerW=W-PAD*2;
  const innerH=H?(H-PAD*2-headH-footH):null;

  const radars=questions.filter(q=>q.type==="radar");
  // 問答題與選擇題同屬「文字型」，可多欄並排
  const choices=questions.filter(q=>q.type==="choice"||q.type==="text");
  const scales=questions.filter(q=>q.type==="scale");

  const RADAR_MIN=236, CHOICE_MIN=196, SCALE_MIN=248;
  // 欄數偏好隨比例調整：直式少欄（讓內容往下長）、橫式多欄（讓內容往兩側鋪）
  const shape = rv==null ? 0 : (rv<=0.62 ? -2 : (rv<0.85 ? -1 : (rv>=1.5 ? 2 : (rv>1.15 ? 1 : 0))));
  const colFit=(w,min,max)=>{
    const fit=Math.floor((w+GAP)/(min+GAP));
    return Math.max(1,Math.min(Math.max(1,max+shape),fit));
  };
  const stackH=(list,cols)=>{
    // 依欄數把題目輪流分配，取最高的一欄作為高度
    const h=new Array(cols).fill(0);
    list.forEach((q,i)=>{ h[i%cols]+=estimateQ(q).h+10; });
    return Math.max(0,...h);
  };

  const bands=[];   // 每個 band 是一列，內含 1~2 個 zone
  let zid=0;
  const mkZone=(kind,items,cols)=>({id:"z"+(zid++),kind,items:items.map(q=>q.id),cols,
                                    x:0,y:0,w:0,h:0,manual:false});

  // ── 版面策略 ──
  if(radars.length===1 && choices.length>0 && innerW>=RADAR_MIN+CHOICE_MIN+GAP){
    // 單一雷達圖 → 左側大區塊；右側並排選擇題（多欄）
    const rw=Math.max(RADAR_MIN,Math.min(Math.round(innerW*0.46),innerW-CHOICE_MIN-GAP));
    const cw=innerW-rw-GAP;
    const ccols=colFit(cw,CHOICE_MIN,3);
    const zr=mkZone("radar",radars,1);
    const zc=mkZone("choice",choices,ccols);
    bands.push({zones:[zr,zc],widths:[rw,cw],
                h:Math.max(estimateQ(radars[0]).h,stackH(choices,ccols))});
  }else{
    if(radars.length){
      const cols=colFit(innerW,RADAR_MIN,Math.min(radars.length,3));
      const rows=Math.ceil(radars.length/cols);
      const z=mkZone("radar",radars,cols);
      bands.push({zones:[z],widths:[innerW],h:rows*estimateQ(radars[0]).h+(rows-1)*GAP});
    }
    if(choices.length){
      const cols=colFit(innerW,CHOICE_MIN,4);
      const z=mkZone("choice",choices,cols);
      bands.push({zones:[z],widths:[innerW],h:stackH(choices,cols)});
    }
  }
  if(scales.length){
    // 量表壓縮為短橫條，多欄並排
    const cols=colFit(innerW,SCALE_MIN,scales.length>=4?3:2);
    const z=mkZone("scale",scales,cols);
    bands.push({zones:[z],widths:[innerW],h:stackH(scales,cols)});
  }
  if(!bands.length){
    return {engine:"auto",ratio:ratioKey,canvas:{w:W,h:H||420},pad:PAD,gap:GAP,
            headH,footH,zones:[],fontScale:1,empty:true};
  }

  // ── 垂直分配：不足則等比壓縮，有餘則按權重補足以填滿畫面 ──
  const totalNat=bands.reduce((n,b)=>n+b.h,0)+GAP*(bands.length-1);
  let fontScale=1;
  let heights=bands.map(b=>b.h);
  let topOffset=0;
  if(innerH){
    const avail=innerH-GAP*(bands.length-1);
    const natSum=bands.reduce((n,b)=>n+b.h,0);
    const k=avail/natSum;
    if(k<1){
      // 空間不足：等比壓縮並縮小字級（下限0.62），FitBox 做最終保證
      heights=bands.map(b=>b.h*k);
      fontScale=Math.max(0.62,Math.pow(k,0.55));
    }else{
      // 空間有餘：適度放大（最多1.75倍）避免區塊被拉成大片空白，剩餘空間整體置中
      const grow=Math.min(k,1.75);
      heights=bands.map(b=>b.h*grow);
      fontScale=Math.min(1.2,Math.pow(grow,0.3));
      const used=heights.reduce((n,h)=>n+h,0)+GAP*(bands.length-1);
      topOffset=Math.max(0,(innerH-used)/2);
    }
  }

  // ── 落實座標 ──
  const zones=[];
  let y=innerY+topOffset;
  bands.forEach((b,bi)=>{
    let x=innerX;
    const bh=Math.round(heights[bi]);
    b.zones.forEach((z,i)=>{
      z.x=Math.round(x); z.y=Math.round(y);
      z.w=Math.round(b.widths[i]); z.h=bh;
      zones.push(z);
      x+=b.widths[i]+GAP;
    });
    y+=bh+GAP;
  });
  const contentH=Math.round(y-GAP-innerY-topOffset);
  return {
    engine:"auto", ratio:ratioKey,
    canvas:{w:W,h:H||Math.round(innerY+contentH+footH+PAD)},
    pad:PAD, gap:GAP, headH, footH, zones, fontScale,
    fits: innerH? totalNat<=innerH : true,
    density: innerH? totalNat/innerH : 1
  };
}
/* 引擎登錄表：未來新增「手動排版」引擎時在此註冊即可 */
const INFOGRAPHIC_ENGINES={ auto:planInfographicAuto };
function planInfographic(questions,ratioKey,opts,override){
  // 預留：若 quest 帶有相同比例的手動排版覆寫，直接採用
  if(override && override.ratio===ratioKey && Array.isArray(override.zones) && override.zones.length){
    return {...override,engine:override.engine||"manual"};
  }
  const fn=INFOGRAPHIC_ENGINES[(opts&&opts.engine)||"auto"]||planInfographicAuto;
  return fn(questions,ratioKey,opts);
}
/* 內容超出區塊時自動等比縮小，確保所有題目容納於同一張圖 */
function FitBox({children,align}){
  const outer=useRef(null), inner=useRef(null);
  const [k,setK]=useState(1);
  useLayoutEffect(()=>{
    const o=outer.current, i=inner.current;
    if(!o||!i) return;
    const ow=o.clientWidth, oh=o.clientHeight;
    const iw=i.scrollWidth, ih=i.scrollHeight;
    if(!ow||!oh||!iw||!ih) return;
    const nk=Math.min(1, ow/iw, oh/ih);
    if(Math.abs(nk-k)>0.012) setK(nk);
  });
  return (
    <div ref={outer} style={{width:"100%",height:"100%",overflow:"hidden",
         display:"flex",alignItems:align||"flex-start",justifyContent:"center"}}>
      <div ref={inner} style={{width:k<1?(100/k)+"%":"100%",transform:"scale("+k+")",
           transformOrigin:"top center"}}>
        {children}
      </div>
    </div>
  );
}

/* ── Infographic 渲染器：乾淨排版風格（參考同人問卷版面設計） ── */
function DotMark({color,size}){

    </span>
  );
}
function ZoneTitle({text,idx,fs,color}){
  const ink=color||"#2b2440";
  return (
    <div style={{display:"flex",alignItems:"flex-start",gap:Math.round(6*fs),
         marginBottom:Math.round(7*fs)}}>

      <span style={{fontWeight:900,fontSize:Math.round(13.5*fs),lineHeight:1.4,
            borderBottom:"2px solid "+ink,paddingBottom:1,flex:1}}>
        <span style={{color:"var(--accent2)",marginRight:4}}>Q{idx+1}</span>{text||"（未命名題目）"}
      </span>
    </div>
  );
}
function InfographicCanvas({quest,chars,plan,legendStyle,innerRef}){
  const fs=plan.fontScale||1;
  const idxOf=qid=>quest.questions.findIndex(q=>q.id===qid);
  const qOf=qid=>quest.questions.find(q=>q.id===qid);
  const renderZone=z=>{
    const items=z.items.map(qOf).filter(Boolean);
    if(!items.length) return null;
    if(z.kind==="radar"){
      const cols=z.cols||1;
      const cellW=(z.w-(cols-1)*plan.gap)/cols;
      const rows=Math.ceil(items.length/cols);
      const cellH=(z.h-(rows-1)*10)/rows;
      const size=Math.max(150,Math.min(cellW-10,cellH-Math.round(40*fs)));
      return (
        <div style={{display:"grid",gridTemplateColumns:"repeat("+cols+",1fr)",gap:plan.gap+"px 10px",width:"100%"}}>
          {items.map(q=>(
            <div key={q.id} style={{display:"flex",flexDirection:"column",alignItems:"stretch",minWidth:0}}>
              <ZoneTitle text={q.text} idx={idxOf(q.id)} fs={fs}/>
              <div style={{display:"flex",justifyContent:"center"}}>
                <RadarView qu={q} chars={chars} size={size}/>
              </div>
            </div>
          ))}
        </div>
      );
    }
    const cols=z.cols||1;
    return (
      <div style={{columnCount:cols,columnGap:Math.round(plan.gap*1.4)+"px",width:"100%"}}>
        {items.map((q,i)=>(
          <div key={q.id} style={{breakInside:"avoid",WebkitColumnBreakInside:"avoid",
               marginBottom:Math.round(14*fs)}}>
            <ZoneTitle text={q.text} idx={idxOf(q.id)} fs={fs}/>
            <div style={{paddingLeft:Math.round(11*fs)}}>
              {q.type==="choice" && <ChoiceView qu={q} chars={chars} defStyle={quest.markStyle} defColor={quest.markColor} scale={fs}/>}
              {q.type==="scale" && <ScaleBarView qu={q} chars={chars} markColor={quest.markColor} scale={fs*0.94}/>}
              {q.type==="text" && <TextView qu={q} chars={chars} scale={fs}/>}
            </div>
          </div>
        ))}
      </div>
    );
  };
  const dots=n=>Array.from({length:n},(_,i)=>(
    <span key={i} style={{width:3.5,height:3.5,borderRadius:"50%",background:"rgba(43,36,64,.5)",display:"inline-block"}}></span>
  ));
  return (
    <div ref={innerRef} style={{width:plan.canvas.w,height:plan.canvas.h,position:"relative",
         background:"#fff",boxSizing:"border-box",overflow:"hidden",
         fontFamily:'"Noto Sans TC","Microsoft JhengHei",sans-serif'}}>
      {/* 外框：細雙線，乾淨不搶戲 */}
      <div style={{position:"absolute",inset:12,border:"2.5px solid #2b2440",borderRadius:4,pointerEvents:"none"}}></div>
      <div style={{position:"absolute",inset:18,border:"1px solid rgba(43,36,64,.25)",borderRadius:2,pointerEvents:"none"}}></div>
      {/* 標題區 */}
      <div style={{position:"absolute",left:plan.pad,top:Math.round(plan.pad*0.72),
           width:plan.canvas.w-plan.pad*2,textAlign:"center"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:12}}>
          <span style={{display:"flex",gap:5,alignItems:"center"}}>{dots(5)}</span>
          <span style={{fontWeight:900,fontSize:Math.round(27*Math.min(1.1,fs)),letterSpacing:3}}>{quest.name||"角色問卷"}</span>
          <span style={{display:"flex",gap:5,alignItems:"center"}}>{dots(5)}</span>
        </div>
        {quest.topic &&
          <div style={{fontSize:Math.round(13*fs),color:"rgba(43,36,64,.6)",fontWeight:700,marginTop:3,letterSpacing:1}}>
            {quest.topic}
          </div>}
        <QuestLegend chars={chars} style={legendStyle} scale={Math.min(1.05,fs)}/>
      </div>
      {/* 各區塊：無邊框、無類型標籤，以留白與細分隔線區分 */}
      {plan.zones.map((z,zi)=>(
        <div key={z.id} style={{position:"absolute",left:z.x,top:z.y,width:z.w,height:z.h,
             boxSizing:"border-box",overflow:"hidden",
             borderLeft:zi>0&&plan.zones[zi-1].y===z.y?"1.5px dashed rgba(43,36,64,.22)":"none",
             paddingLeft:zi>0&&plan.zones[zi-1].y===z.y?Math.round(plan.gap*0.8):0}}>
          <FitBox align={z.kind==="radar"?"center":"flex-start"}>{renderZone(z)}</FitBox>
        </div>
      ))}
      {/* 頁尾 */}
      <div style={{position:"absolute",left:plan.pad,right:plan.pad,bottom:Math.round(plan.pad*0.5),
           display:"flex",alignItems:"center",justifyContent:"space-between",
           fontSize:11,fontWeight:800,color:"rgba(43,36,64,.4)"}}>
        <span style={{display:"flex",gap:4,alignItems:"center"}}>{dots(3)}</span>
        <span>─ 你也來搞OC吧！ ─</span>
      </div>
    </div>
  );
}
/* 將 Infographic 以列印方式輸出成PDF（沿用瀏覽器列印流程） */
function printInfographic(node,title,ratioKey){
  if(!node||!window.html2canvas) return;
  window.html2canvas(node,{backgroundColor:"#ffffff",scale:2}).then(cv=>{
    const url=cv.toDataURL("image/png");
    const land=(infoRatioValue(ratioKey)||1)>1;
    const w=window.open("","_blank");
    if(!w){ alert("瀏覽器阻擋了彈出視窗，請允許後再試一次。"); return; }
    w.document.write('<!DOCTYPE html><html><head><meta charset="utf-8"><title>'+
      (title||"角色問卷")+'</title><style>@page{size:A4 '+(land?"landscape":"portrait")+
      ';margin:10mm;}body{margin:0;display:flex;align-items:center;justify-content:center;}'+
      'img{max-width:100%;max-height:100vh;object-fit:contain;}</style></head><body>'+
      '<img src="'+url+'"/></body></html>');
    w.document.close();
    setTimeout(()=>{ w.focus(); w.print(); },420);
  });
}

function questionsFromTemplate(tpl,chars){
  const n1=(chars[0]&&chars[0].name)||"Ａ", n2=(chars[1]&&chars[1].name)||"Ｂ", n3=(chars[2]&&chars[2].name)||"Ｃ";
  const fill=t=>String(t||"").split("{A}").join(n1).split("{B}").join(n2).split("{C}").join(n3);
  return tpl.qs.map(q=>{
    if(q.t==="scale") return {...newQuestion("scale"),text:fill(q.x),leftLabel:fill(q.l||""),rightLabel:fill(q.r||"")};
    if(q.t==="radar") return {...newQuestion("radar"),text:fill(q.x),axes:q.axes.map(fill)};
    if(q.t==="text") return {...newQuestion("text"),text:fill(q.x),placeholder:fill(q.p||"")};
    return {...newQuestion("choice"),text:fill(q.x),options:q.o.map(fill)};
  });
}
function choiceMarkStyle(style,color){
  if(style==="solid") return {background:color,color:"#fff",borderRadius:8,padding:"1px 8px",fontWeight:800};
  if(style==="underline") return {borderBottom:"3px solid "+color,fontWeight:800,paddingBottom:1};
  if(style==="outline") return {border:"2px solid "+color,borderRadius:8,padding:"0 8px",fontWeight:800};
  return {background:"linear-gradient(transparent 45%,"+color+"88 45%)",fontWeight:800,padding:"0 3px"};
}
function ScaleBarView({qu,chars,markColor,scale}){
  const range=(qu.max-qu.min)||1;
  const vert=qu.orient==="v";
  const K=scale||1;
  const size=Math.round(22*K);
  const gap=Math.round(4*K);
  // 依「數值」分群：同一數值的角色會排成一個緊湊的群集，避免互相覆蓋
  const items=chars.map((c,i)=>{
    const a=qu.answers[c.id];
    if(!a||a.value==null) return null;
    return {c,i,a,t:(a.value-qu.min)/range,v:a.value};
  }).filter(Boolean);
  const map={};
  items.forEach(it=>{ (map[String(it.v)]=map[String(it.v)]||[]).push(it); });
  const groups=Object.keys(map).map(k=>({v:+k,t:map[k][0].t,list:map[k]}));
  const maxCount=Math.max(1,...groups.map(g=>g.list.length));

  const One=({it})=>{
    const {c,i,a}=it;
    const col=a.color||charColorOf(c,i);
    if(a.marker==="avatar"&&c.avatar)
      return <img src={c.avatar} alt="" title={(c.name||"未命名")+"："+a.value}
                  style={{width:size,height:size,borderRadius:"50%",border:"2.5px solid "+col,objectFit:"cover",
                          background:"#fff",boxShadow:"0 0 0 1.5px #2b2440",display:"block"}}/>;
    if(a.marker==="emoji")
      return <span title={(c.name||"未命名")+"："+a.value}
                   style={{fontSize:Math.round(17*K),lineHeight:size+"px",display:"block",textAlign:"center",width:size}}>{a.emoji||"⭐"}</span>;
    return <span title={(c.name||"未命名")+"："+a.value}
                 style={{width:Math.round(15*K),height:Math.round(15*K),borderRadius:"50%",background:col,
                         border:"2.5px solid #2b2440",display:"block",boxShadow:"0 0 0 2px #fff"}}></span>;
  };
  // 單一角色：直接落在軸線上；多位同值：整群浮在軸線外側，並以一個小尖角指回刻度
  const Cluster=({g})=>{
    const many=g.list.length>1;
    const pos=vert
      ? {bottom:"calc("+(g.t*100)+"% - "+(size/2)+"px)", left:many?"calc(100% + "+Math.round(10*K)+"px)":"50%",
         transform:many?"none":"translateX(-50%)"}
      : {left:"calc("+(g.t*100)+"% )", bottom:many?("calc(100% + "+Math.round(9*K)+"px)"):"auto",
         top:many?"auto":"50%", transform:many?"translateX(-50%)":"translate(-50%,-50%)"};
    return (
      <span style={{position:"absolute",...pos,zIndex:3,display:"flex",
            flexDirection:vert?"row":"row",alignItems:"center",gap:gap}}>
        {many
          ? <span style={{display:"flex",alignItems:"center",gap:gap,
                   background:"rgba(255,255,255,.94)",border:"2px solid #2b2440",borderRadius:999,
                   padding:Math.round(3*K)+"px "+Math.round(6*K)+"px",
                   boxShadow:"0 2px 6px rgba(43,36,64,.25)",position:"relative"}}>
              {g.list.map(it=><One key={it.c.id} it={it}/>)}
              {/* 指回刻度的小尖角 */}
              {!vert &&
                <span style={{position:"absolute",top:"100%",left:"50%",transform:"translateX(-50%)",
                       width:0,height:0,borderLeft:Math.round(6*K)+"px solid transparent",
                       borderRight:Math.round(6*K)+"px solid transparent",
                       borderTop:Math.round(7*K)+"px solid #2b2440"}}></span>}
              {vert &&
                <span style={{position:"absolute",right:"100%",top:"50%",transform:"translateY(-50%)",
                       width:0,height:0,borderTop:Math.round(6*K)+"px solid transparent",
                       borderBottom:Math.round(6*K)+"px solid transparent",
                       borderRight:Math.round(7*K)+"px solid #2b2440"}}></span>}
            </span>
          : g.list.map(it=><One key={it.c.id} it={it}/>)}
      </span>
    );
  };
  // 預留群集所需的空間
  const clusterPad = maxCount>1 ? Math.round((size+18)*K)+Math.round(6*K) : Math.round(6*K);
  const fs=Math.round(11.5*K);
  return (
    <div style={vert?{display:"flex",flexDirection:"column",alignItems:"center",gap:4*K}:{}}>
      {vert
        ? <React.Fragment>
            <span style={{fontSize:fs,fontWeight:800}}>{qu.rightLabel||qu.max}</span>
            <div style={{position:"relative",width:Math.round(2*K),height:Math.round(150*K),
                 background:"#2b2440",borderRadius:2,
                 marginRight:maxCount>1?(maxCount*(size+gap)+Math.round(30*K)):Math.round(14*K)}}>
              {groups.map(g=><Cluster key={g.v} g={g}/>)}
            </div>
            <span style={{fontSize:fs,fontWeight:800}}>{qu.leftLabel||qu.min}</span>
          </React.Fragment>
        : <div className="row" style={{flexWrap:"nowrap",gap:8*K,paddingTop:clusterPad,paddingBottom:Math.round(6*K)}}>
            <span style={{fontSize:fs,fontWeight:800,flex:"none",maxWidth:Math.round(90*K)}}>{qu.leftLabel||qu.min}</span>
            <div style={{position:"relative",flex:1,height:Math.round(11*K),minWidth:Math.round(140*K),
                 display:"flex",alignItems:"center"}}>
              {/* 主軸線 */}
              <span style={{position:"absolute",left:0,right:0,top:"50%",height:2,
                    background:"#2b2440",transform:"translateY(-50%)",borderRadius:2}}></span>
              {/* 端點與中央刻度（參考範例的細線量表） */}
              {[0,0.5,1].map(t=>(
                <span key={t} style={{position:"absolute",left:(t*100)+"%",top:"50%",
                      transform:"translate(-50%,-50%)",width:2,
                      height:Math.round((t===0.5?9:13)*K),background:"#2b2440",
                      opacity:t===0.5?.55:1,borderRadius:1}}></span>
              ))}
              {groups.map(g=><Cluster key={g.v} g={g}/>)}
            </div>
            <span style={{fontSize:fs,fontWeight:800,flex:"none",maxWidth:Math.round(90*K),textAlign:"right"}}>{qu.rightLabel||qu.max}</span>
          </div>}
    </div>
  );
}
function TextView({qu,chars,scale}){
  const K=scale||1;
  const multi=chars.length>1;
  return (
    <div>
      {chars.map((c,i)=>{
        const a=qu.answers[c.id]||{};
        const col=charColorOf(c,i);
        const txt=String(a.text||"").trim();
        return (
          <div key={c.id} style={{display:"flex",gap:Math.round(7*K),alignItems:"flex-start",
               margin:Math.round(4*K)+"px 0"}}>
            {multi &&
              (c.avatar
                ? <img src={c.avatar} alt="" title={c.name||"未命名"}
                       style={{width:Math.round(22*K),height:Math.round(22*K),borderRadius:"50%",objectFit:"cover",
                               border:"2px solid "+col,boxShadow:"0 0 0 1px #2b2440",flex:"none"}}/>
                : <span style={{width:Math.round(13*K),height:Math.round(13*K),borderRadius:"50%",background:col,
                         border:"1.5px solid #2b2440",flex:"none",marginTop:Math.round(3*K)}}></span>)}
            <div style={{flex:1,minWidth:0,borderBottom:"1.5px dashed rgba(43,36,64,.3)",
                 paddingBottom:Math.round(3*K),minHeight:Math.round(20*K)}}>
              {multi && <span style={{fontWeight:900,fontSize:Math.round(11*K),color:col,marginRight:5}}>{c.name||"未命名"}</span>}
              <span style={{fontSize:Math.round(13*K),lineHeight:1.7,whiteSpace:"pre-wrap",wordBreak:"break-word",
                    color:txt?"#2b2440":"rgba(43,36,64,.32)"}}>{txt||"（未填寫）"}</span>
            </div>
          </div>
        );
      })}
    </div>
  );
}
function ChoiceView({qu,chars,defStyle,defColor,scale}){
  const style=qu.markStyle||defStyle;
  const color=qu.markColor||defColor;
  const K=scale||1;
  const multiChar=chars.length>1;
  const optRow=(opt,oi)=>{
    const who=chars.map((c,i)=>({c,i})).filter(({c})=>{const a=qu.answers[c.id];return a&&(a.sel||[]).includes(oi);});
    const picked=who.length>0;
    const useColor=who.length===1?(charColorOf(who[0].c,who[0].i)):color;
    return (
      <div key={oi} style={{margin:(3*K)+"px 0",fontSize:Math.round(13.5*K),display:"flex",alignItems:"center",gap:Math.round(6*K),flexWrap:"wrap"}}>
        <span>{qu.display==="checkbox"?(picked?"☑":"☐"):(picked?"◉":"○")}</span>
        <span style={picked?choiceMarkStyle(style,useColor):{}}>{opt}</span>
        {picked&&multiChar&&who.map(({c,i})=>(
          c.avatar
            ? <img key={c.id} src={c.avatar} alt="" title={c.name||"未命名"}
                   style={{width:Math.round(20*K),height:Math.round(20*K),borderRadius:"50%",objectFit:"cover",
                           border:"2px solid "+charColorOf(c,i),boxShadow:"0 0 0 1px #2b2440"}}/>
            : <span key={c.id} style={{width:Math.round(12*K),height:Math.round(12*K),borderRadius:"50%",
                     background:charColorOf(c,i),border:"1.5px solid #2b2440",display:"inline-block"}} title={c.name||"未命名"}></span>
        ))}
      </div>
    );
  };
  if(qu.display==="dropdown"){
    return (
      <div>
        {chars.map((c,i)=>{
          const a=qu.answers[c.id];
          const sel=a&&(a.sel||[])[0];
          return (
            <div key={c.id} style={{margin:"3px 0",fontSize:13.5,display:"flex",gap:6,alignItems:"center"}}>
              {chars.length>1&&<span style={{fontWeight:800,fontSize:12}}>{c.name||"未命名"}：</span>}
              <span style={{border:"2px solid #2b2440",borderRadius:8,padding:"1px 22px 1px 8px",position:"relative",background:"#fff"}}>
                {sel!=null?<span style={choiceMarkStyle(style,charColorOf(c,i))}>{(qu.options||[])[sel]}</span>:<span style={{color:"#999"}}>──</span>}
                <span style={{position:"absolute",right:6}}>▾</span>
              </span>
            </div>
          );
        })}
      </div>
    );
  }
  return <div>{(qu.options||[]).map(optRow)}</div>;
}
function RadarView({qu,chars,size}){
  const S=size||280, cx=S/2, cy=S/2+6, r=S/2-46;
  const axes=qu.axes||[]; const n=axes.length;
  if(n<3) return <div className="hint">雷達圖至少需要三個軸向。</div>;
  const range=(qu.max-qu.min)||1;
  const pt=(t,i)=>{
    const ang=-Math.PI/2+i*2*Math.PI/n;
    return [cx+r*t*Math.cos(ang), cy+r*t*Math.sin(ang)];
  };
  const ring=t=>axes.map((_,i)=>pt(t,i).join(",")).join(" ");
  return (
    <svg width={S} height={S} viewBox={"0 0 "+S+" "+S} style={{fontFamily:'"Noto Sans TC","Microsoft JhengHei",sans-serif'}}>
      {[0.25,0.5,0.75,1].map(t=>(
        <polygon key={t} points={ring(t)} fill={t===1?"rgba(108,76,224,.05)":"none"} stroke="#b9a7ea" strokeWidth={t===1?2:1}/>
      ))}
      {axes.map((ax,i)=>{
        const [x,y]=pt(1,i); const [lx,ly]=pt(1.18,i);
        return (
          <g key={i}>
            <line x1={cx} y1={cy} x2={x} y2={y} stroke="#d8cdf2" strokeWidth="1"/>
            <text x={lx} y={ly+4} textAnchor="middle" fontSize="11.5" fontWeight="800" fill="#2b2440">{ax}</text>
          </g>
        );
      })}
      {chars.map((c,ci)=>{
        const a=qu.answers[c.id];
        if(!a||!a.vals) return null;
        const pts=axes.map((_,i)=>{
          const v=a.vals[i]!=null?a.vals[i]:qu.min;
          const t=Math.max(0,Math.min(1,(v-qu.min)/range));
          return pt(t,i).join(",");
        }).join(" ");
        const col=charColorOf(c,ci);
        return (
          <g key={c.id}>
            <polygon points={pts} fill={col+"33"} stroke={col} strokeWidth="2.5"/>
          </g>
        );
      })}
    </svg>
  );
}
function QuestLegend({chars,style,scale}){
  if(chars.length<1) return null;
  const K=scale||1;
  const mode=style||"both";   // both=頭像+色框；color=純色塊；avatar=只有頭像
  const av=Math.round(34*K);
  return (
    <div className="row" style={{justifyContent:"center",gap:Math.round(15*K),
         margin:Math.round(8*K)+"px 0 "+Math.round(6*K)+"px",paddingBottom:Math.round(4*K),
         alignItems:"center",lineHeight:1.2}}>
      {chars.map((c,i)=>{
        const col=charColorOf(c,i);
        return (
          <span key={c.id} style={{display:"inline-flex",alignItems:"center",gap:Math.round(6*K),
                fontSize:Math.round(12.5*K),fontWeight:900}}>
            {mode==="color"
              ? <span style={{width:Math.round(16*K),height:Math.round(16*K),borderRadius:5,background:col,
                       border:"2px solid #2b2440",display:"inline-block",flex:"none"}}></span>
              : (c.avatar
                  ? <img src={c.avatar} alt="" style={{width:av,height:av,borderRadius:"50%",objectFit:"cover",
                           border:"3px solid "+col,boxShadow:"0 0 0 1.5px #2b2440",background:"#fff",
                           flex:"none",display:"block"}}/>
                  : <span style={{width:av,height:av,borderRadius:"50%",background:col,border:"3px solid #2b2440",
                           display:"inline-flex",alignItems:"center",justifyContent:"center",color:"#fff",
                           fontSize:Math.round(15*K),fontWeight:900,flex:"none"}}>{(c.name||"？").slice(0,1)}</span>)}
            {mode!=="avatar" && <span>{c.name||"未命名"}</span>}
          </span>
        );
      })}
    </div>
  );
}

function QuestionEditor({qu,qi,chars,quest,updateQ,removeQ,move}){
  const setF=(k,v)=>updateQ(x=>{x[k]=v;});
  const setAns=(cid,fn)=>updateQ(x=>{ if(!x.answers[cid]) x.answers[cid]={}; fn(x.answers[cid]); });
  const typeName={scale:"📊 量表題",choice:"☑ 選擇題",radar:"🕸 雷達圖",text:"✍ 問答題"}[qu.type];
  return (
    <div className="item-card">
      <div className="row" style={{marginBottom:6}}>
        <span className="badge">{typeName}</span>
        <input type="text" value={qu.text} placeholder="題目內容…" style={{flex:1,minWidth:160}}
               onChange={e=>setF("text",e.target.value)}/>
        <button className="btn small" onClick={()=>move(qi,-1)}>↑</button>
        <button className="btn small" onClick={()=>move(qi,1)}>↓</button>
        <button className="btn small danger" onClick={removeQ}>刪</button>
      </div>
      {qu.type==="scale" && (
        <div>
          <div className="row" style={{marginBottom:6}}>
            <select value={qu.max} style={{width:"auto"}} onChange={e=>setF("max",+e.target.value)}>
              <option value={5}>範圍 1–5</option><option value={10}>範圍 1–10</option>
            </select>
            <select value={qu.orient} style={{width:"auto"}} onChange={e=>setF("orient",e.target.value)}>
              <option value="h">橫向</option><option value="v">直向</option>
            </select>
            <input type="text" value={qu.leftLabel} placeholder="左端標籤（如：節儉）" style={{width:150}}
                   onChange={e=>setF("leftLabel",e.target.value)}/>
            <input type="text" value={qu.rightLabel} placeholder="右端標籤（如：大方）" style={{width:150}}
                   onChange={e=>setF("rightLabel",e.target.value)}/>
          </div>
          {chars.map((c,i)=>{
            const a=qu.answers[c.id]||{};
            return (
              <div className="row" key={c.id} style={{marginBottom:4}}>
                <span style={{fontWeight:800,fontSize:12.5,minWidth:70}}>{c.name||"未命名"}</span>
                <input type="range" min={qu.min} max={qu.max} value={a.value!=null?a.value:qu.min}
                       style={{flex:1,minWidth:120,accentColor:charColorOf(c,i)}}
                       onChange={e=>setAns(c.id,x=>{x.value=+e.target.value;})}/>
                <span className="badge">{a.value!=null?a.value:"—"}</span>
                <select value={a.marker||"dot"} style={{width:"auto"}}
                        onChange={e=>setAns(c.id,x=>{x.marker=e.target.value;})}>
                  <option value="dot">圓點</option><option value="emoji">emoji</option>
                  <option value="avatar">頭像{c.avatar?"":"（未上傳）"}</option>
                </select>
                {(a.marker||"dot")==="dot" &&
                  <input type="color" value={a.color||charColorOf(c,i)} title="標記顏色"
                         style={{width:30,height:28,border:"2px solid var(--ink)",borderRadius:8,padding:1}}
                         onChange={e=>setAns(c.id,x=>{x.color=e.target.value;})}/>}
                {a.marker==="emoji" &&
                  <input type="text" value={a.emoji||""} placeholder="⭐" style={{width:52}}
                         onChange={e=>setAns(c.id,x=>{x.emoji=e.target.value;})}/>}
              </div>
            );
          })}
        </div>
      )}
      {qu.type==="choice" && (
        <div>
          <div className="row" style={{marginBottom:6}}>
            <select value={qu.display} style={{width:"auto"}} onChange={e=>setF("display",e.target.value)}>
              <option value="list">列表</option><option value="dropdown">下拉選單</option><option value="checkbox">勾選方塊（可複選）</option>
            </select>
            <select value={qu.markStyle||""} style={{width:"auto"}} onChange={e=>setF("markStyle",e.target.value)}>
              <option value="">標記樣式：跟隨問卷</option>
              <option value="solid">實色底</option><option value="hl">螢光筆</option>
              <option value="underline">底線</option><option value="outline">外框</option>
            </select>
            {qu.markStyle &&
              <input type="color" value={qu.markColor||quest.markColor} title="標記顏色"
                     style={{width:30,height:28,border:"2px solid var(--ink)",borderRadius:8,padding:1}}
                     onChange={e=>setF("markColor",e.target.value)}/>}
            <button className="btn small mint" onClick={()=>updateQ(x=>{x.options.push("新選項");})}>＋選項</button>
          </div>
          {(qu.options||[]).map((opt,oi)=>(
            <div className="row" key={oi} style={{marginBottom:3}}>
              <input type="text" value={opt} style={{flex:1,minWidth:120}}
                     onChange={e=>updateQ(x=>{x.options[oi]=e.target.value;})}/>
              {chars.map((c,i)=>{
                const a=qu.answers[c.id]||{};
                const on=(a.sel||[]).includes(oi);
                return (
                  <span key={c.id} className={"chip"+(on?" on":"")} style={{fontSize:11,padding:"1px 8px"}}
                    title={(c.name||"未命名")+"是否選擇此項"}
                    onClick={()=>setAns(c.id,x=>{
                      if(!x.sel) x.sel=[];
                      const k=x.sel.indexOf(oi);
                      if(k>=0) x.sel.splice(k,1);
                      else { if(qu.display!=="checkbox") x.sel=[]; x.sel.push(oi); }
                    })}>
                    {(c.name||"？").slice(0,2)}
                  </span>
                );
              })}
              <button className="btn small danger" onClick={()=>updateQ(x=>{
                x.options.splice(oi,1);
                chars.forEach(c=>{const a=x.answers[c.id]; if(a&&a.sel) a.sel=a.sel.filter(k=>k!==oi).map(k=>k>oi?k-1:k);});
              })}>刪</button>
            </div>
          ))}
        </div>
      )}
      {qu.type==="text" && (
        <div>
          <div className="row" style={{marginBottom:6}}>
            <input type="text" value={qu.placeholder||""} placeholder="作答提示（可留空，例：請用一句話回答）"
                   style={{flex:1,minWidth:180}} onChange={e=>setF("placeholder",e.target.value)}/>
          </div>
          {chars.map((c,i)=>{
            const a=qu.answers[c.id]||{};
            return (
              <div key={c.id} style={{marginBottom:6}}>
                <div className="row" style={{marginBottom:3}}>
                  <AvatarCircle name={c.name} color={c.color} avatar={c.avatar} size={22}/>
                  <span style={{fontWeight:800,fontSize:12.5}}>{c.name||"未命名"}</span>
                </div>
                <textarea value={a.text||""} placeholder={qu.placeholder||"在此輸入答案…"}
                          style={{minHeight:52,borderColor:charColorOf(c,i)}}
                          onChange={e=>setAns(c.id,x=>{x.text=e.target.value;})}/>
              </div>
            );
          })}
        </div>
      )}
      {qu.type==="radar" && (
        <div>
          <div className="row" style={{marginBottom:6}}>
            <span style={{fontWeight:800,fontSize:12.5}}>數值範圍：</span>
            <input type="text" value={qu.min} style={{width:52}} onChange={e=>setF("min",+e.target.value||0)}/>
            <span>～</span>
            <input type="text" value={qu.max} style={{width:52}} onChange={e=>setF("max",+e.target.value||10)}/>
            <button className="btn small mint" onClick={()=>updateQ(x=>{x.axes.push("新軸向");chars.forEach(c=>{const a=x.answers[c.id];if(a&&a.vals)a.vals.push(x.min);});})}>＋軸向</button>
          </div>
          {(qu.axes||[]).map((ax,ai)=>(
            <div className="row" key={ai} style={{marginBottom:3}}>
              <input type="text" value={ax} style={{width:120,fontWeight:800}}
                     onChange={e=>updateQ(x=>{x.axes[ai]=e.target.value;})}/>
              {chars.map((c,i)=>{
                const a=qu.answers[c.id]||{};
                const v=(a.vals||[])[ai];
                return (
                  <span key={c.id} className="row" style={{gap:3,flexWrap:"nowrap"}}>
                    <span style={{width:9,height:9,borderRadius:"50%",background:charColorOf(c,i),border:"1.5px solid #2b2440",flex:"none"}}></span>
                    <input type="text" value={v!=null?v:""} placeholder="—" style={{width:48}}
                      onChange={e=>setAns(c.id,x=>{
                        if(!x.vals) x.vals=qu.axes.map(()=>null);
                        while(x.vals.length<qu.axes.length) x.vals.push(null);
                        x.vals[ai]=e.target.value===""?null:+e.target.value;
                      })}/>
                  </span>
                );
              })}
              {(qu.axes||[]).length>3 &&
                <button className="btn small danger" onClick={()=>updateQ(x=>{
                  x.axes.splice(ai,1);
                  chars.forEach(c=>{const a=x.answers[c.id]; if(a&&a.vals) a.vals.splice(ai,1);});
                })}>刪</button>}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function QuestionnaireTab({db,mutate,selQ,setSelQ}){
  const [nName,setNName]=useState("");
  const [nTopic,setNTopic]=useState("");
  const [nChars,setNChars]=useState([]);
  const [tplPreview,setTplPreview]=useState(-1);
  const [tplQuery,setTplQuery]=useState("");
  const [tplCat,setTplCat]=useState("all");
  const [tplPpl,setTplPpl]=useState("all");
  const [legendStyle,setLegendStyle]=useState("both");
  const pngRatio=usePngRatio();
  const [infoRatio,setInfoRatio]=useState("1:1");
  const [confirmed,setConfirmed]=useState(false);
  const scQ=useCharScope(db);
  const [useScopeQ,setUseScopeQ]=useState(false);
  const [aiMsg,setAiMsg]=useState("");
  const stageRef=useRef(null);
  const exportRef=useRef(null);
  const list=db.questionnaires||[];
  const quest=list.find(x=>x.id===selQ);
  const chars=quest?db.characters.filter(c=>quest.charIds.includes(c.id)):[];
  // ⚠ Hook 必須無條件呼叫：排版計畫在早退之前就算好
  const plan=useMemo(
    ()=>planInfographic((quest&&quest.questions)||[],infoRatio,
        {hasTopic:!!(quest&&quest.topic)},quest&&quest.layoutOverride),
    [quest&&quest.questions,infoRatio,quest&&quest.topic,quest&&quest.layoutOverride,chars.length]
  );
  const previewK=Math.min(1,640/Math.max(1,plan.canvas.w));
  const updateQuest=fn=>mutate(d=>{const t=(d.questionnaires||[]).find(x=>x.id===selQ); if(t) fn(t);});
  const create=()=>{
    const q=newQuestionnaire(nName||"未命名問卷");
    q.topic=nTopic; q.charIds=[...nChars];
    mutate(d=>{ if(!d.questionnaires) d.questionnaires=[]; d.questionnaires.push(q); });
    setSelQ(q.id);
    setNName(""); setNTopic(""); setNChars([]); setAiMsg("");
  };
  /* ---- 清單畫面 ---- */
  if(!quest) return (
    <div className="card tape">
      <h2>🧩 角色問卷 / Infographic</h2>
      <div className="sub">替角色做問卷，填完輸出成好看的資訊圖表。</div>
      <HelpTips title="問卷能做什麼？" tips={[
        ["👤","單一角色","做自我問卷、性格檢定"],
        ["👥","多位角色","做關係問卷、互動比較"],
        ["📊","四種題型","量表、選擇題、雷達圖、問答題"],
        ["📚","內建題庫","五十組現成問卷，含雙人與三人題"],
        ["🖼","輸出方式","PNG資訊圖，或併入角色PDF"]
      ]}/>
      <div className="item-card">
        <h3 className="section-title" style={{marginTop:0}}><span className="dot"></span>新增問卷</h3>
        <div className="row" style={{marginBottom:6}}>
          <input type="text" value={nName} placeholder="問卷名稱（如：本體檢定）" style={{flex:1,minWidth:150}} onChange={e=>setNName(e.target.value)}/>
          <input type="text" value={nTopic} placeholder="聚焦主題（如：價值觀、偶像AU設定、與OO的關係）" style={{flex:2,minWidth:200}} onChange={e=>setNTopic(e.target.value)}/>
        </div>
        <div className="row" style={{marginBottom:6,alignItems:"center"}}>
          <span style={{fontSize:11.5,fontWeight:900,color:"rgba(43,36,64,.5)",minWidth:56,flex:"none"}}>關聯角色</span>
          <span className={"chip"+(!useScopeQ?" on":"")} onClick={()=>setUseScopeQ(false)}>逐一勾選</span>
          <span className={"chip"+(useScopeQ?" on":"")} onClick={()=>setUseScopeQ(true)}>🎯 依範圍篩選</span>
          <span className="badge">已選 {nChars.length} 位</span>
        </div>
        {useScopeQ
          ? <div>
              <CharScopePicker sc={scQ} title="🎯 角色範圍" compact/>
              <div className="row" style={{marginBottom:6}}>
                <button className="btn small primary" disabled={!scQ.selectedIds.length}
                        style={!scQ.selectedIds.length?{opacity:.5}:{}}
                        onClick={()=>setNChars([...scQ.selectedIds])}>
                  ✔ 套用篩選結果（{scQ.selectedIds.length} 位）
                </button>
                {nChars.length>0 && <span className="hint">目前已選：{db.characters.filter(c=>nChars.includes(c.id)).map(c=>c.name||"未命名").join("、")}</span>}
              </div>
            </div>
          : <div className="row" style={{marginBottom:6}}>
              {db.characters.length===0&&<span className="hint">請先到「角色」板塊建立角色。</span>}
              {db.characters.map(c=>(
                <span key={c.id} className={"chip"+(nChars.includes(c.id)?" on":"")}
                  onClick={()=>setNChars(prev=>prev.includes(c.id)?prev.filter(x=>x!==c.id):[...prev,c.id])}>
                  {nChars.includes(c.id)?"✓ ":""}{c.name||"未命名角色"}
                </span>
              ))}
            </div>}
        <div className="row">
          <button className="btn primary" disabled={!nChars.length} style={!nChars.length?{opacity:.5}:{}} onClick={create}>＋ 建立空白問卷</button>
          <span className="hint">建立後可自行新增題目，或直接從下方題庫套用一組。</span>
        </div>
      </div>
      <Collapse title={"📚 內建智慧問卷庫（"+QUEST_TEMPLATES.length+"組現成題庫）"} defaultOpen={false}>
        <HelpTips title="怎麼用題庫？" tips={[
          ["1️⃣","先勾選關聯角色","在上方「新增問卷」區選好角色"],
          ["👁","預覽","展開看完整題目再決定"],
          ["✅","套用","立刻建立問卷，之後仍可增刪修改"],
          ["🅰️","題目中的Ａ／Ｂ／Ｃ","自動代入前三位勾選的角色"]
        ]}/>
        <div className="row" style={{marginBottom:6}}>
          <input type="text" value={tplQuery} placeholder="🔍 搜尋名稱、主題或題目內容…" style={{flex:1,minWidth:160}}
                 onChange={e=>setTplQuery(e.target.value)}/>
          {tplQuery && <button className="btn small ghost" onClick={()=>setTplQuery("")}>清除</button>}
          <span className="hint">共 {QUEST_TEMPLATES.length} 組・{QUEST_TEMPLATES.reduce((n,t)=>n+t.qs.length,0)} 題</span>
        </div>
        <div className="row" style={{marginBottom:6,alignItems:"center"}}>
          <span style={{fontSize:11.5,fontWeight:900,color:"rgba(43,36,64,.5)",minWidth:44,flex:"none"}}>類型</span>
          <span className={"chip"+(tplCat==="all"?" on":"")} onClick={()=>setTplCat("all")}>全部</span>
          {[...new Set(QUEST_TEMPLATES.map(t=>t.cat))].map(c=>(
            <span key={c} className={"chip"+(tplCat===c?" on":"")} onClick={()=>setTplCat(c)}>
              {c}<span style={{opacity:.6}}> {QUEST_TEMPLATES.filter(t=>t.cat===c).length}</span>
            </span>
          ))}
        </div>
        <div className="row" style={{marginBottom:10,alignItems:"center"}}>
          <span style={{fontSize:11.5,fontWeight:900,color:"rgba(43,36,64,.5)",minWidth:44,flex:"none"}}>人數</span>
          {[["all","全部"],["1","👤 單人"],["2","👥 雙人"],["3","👨‍👩‍👦 三人"]].map(([k,label])=>(
            <span key={k} className={"chip"+(tplPpl===k?" on":"")} onClick={()=>setTplPpl(k)}>
              {label}{k!=="all"&&<span style={{opacity:.6}}> {QUEST_TEMPLATES.filter(t=>(t.min||1)===+k).length}</span>}
            </span>
          ))}
        </div>
        {(()=>{
          const kw=tplQuery.trim().toLowerCase();
          const list=QUEST_TEMPLATES.map((tpl,ti)=>({tpl,ti}))
            .filter(({tpl})=>tplCat==="all"||tpl.cat===tplCat)
            .filter(({tpl})=>tplPpl==="all"||(tpl.min||1)===+tplPpl)
            .filter(({tpl})=>!kw||tpl.name.toLowerCase().includes(kw)||tpl.topic.toLowerCase().includes(kw)
              ||tpl.qs.some(q=>String(q.x||"").toLowerCase().includes(kw)));
          if(!list.length) return <div className="empty">沒有符合條件的題庫，試著放寬篩選吧。</div>;
          const TYPE_ICON={scale:"📊",choice:"☑",radar:"🕸"};
          return list.map(({tpl,ti})=>{
            const open=tplPreview===ti;
            const need=tpl.min||1;
            const locked=nChars.length<need;
            const counts={scale:0,choice:0,radar:0};
            tpl.qs.forEach(q=>{counts[q.t]=(counts[q.t]||0)+1;});
            return (
              <div key={ti} className="item-card" style={{marginBottom:8,padding:"10px 12px"}}>
                <div className="row" style={{alignItems:"center"}}>
                  <span style={{fontWeight:900,flex:1,minWidth:160,fontSize:14.5}}>{tpl.name}</span>
                  <span className="badge" style={{fontSize:10.5}}>{tpl.cat}</span>
                  <span className="hint" style={{flex:"none"}}>{tpl.topic}</span>
                  {tpl.min===2 && <span className="badge" style={{fontSize:10.5,background:"#ffe0ea"}}>👥 雙人</span>}
                  {tpl.min===3 && <span className="badge" style={{fontSize:10.5,background:"#ffe9c9"}}>👨‍👩‍👦 三人</span>}
                  <span className="hint" style={{flex:"none"}}>
                    {tpl.qs.length}題　{counts.scale?"📊"+counts.scale+" ":""}{counts.choice?"☑"+counts.choice+" ":""}{counts.radar?"🕸"+counts.radar:""}
                  </span>
                  <button className={"btn small"+(open?" violet":"")} style={{flex:"none"}}
                          onClick={()=>setTplPreview(open?-1:ti)}>{open?"收合 ▴":"👁 預覽"}</button>
                  <button className="btn small primary" style={{flex:"none",...(locked?{opacity:.45}:{})}}
                    disabled={locked}
                    onClick={()=>{
                      const cs=db.characters.filter(c=>nChars.includes(c.id));
                      const q=newQuestionnaire(tpl.name);
                      q.topic=tpl.topic; q.charIds=[...nChars];
                      q.questions=questionsFromTemplate(tpl,cs);
                      mutate(d=>{ if(!d.questionnaires) d.questionnaires=[]; d.questionnaires.push(q); });
                      setSelQ(q.id); setAiMsg("✔ 已套用內建智慧問卷「"+tpl.name+"」！");
                    }}>套用</button>
                </div>
                {locked && <div className="hint" style={{marginTop:4}}>
                  ↑ 此題庫需要勾選 {need} 位以上的角色（目前 {nChars.length} 位）
                </div>}
                {open &&
                  <div style={{marginTop:8,paddingTop:8,borderTop:"1.5px dashed rgba(43,36,64,.25)"}}>
                    {tpl.qs.map((q,qi)=>(
                      <div key={qi} style={{display:"flex",gap:8,alignItems:"flex-start",padding:"3px 0",fontSize:13,lineHeight:1.6}}>
                        <span style={{fontWeight:900,color:"var(--accent2)",minWidth:26,flex:"none"}}>Q{qi+1}</span>
                        <span style={{flex:"none"}}>{TYPE_ICON[q.t]}</span>
                        <span>
                          <b>{q.x}</b>
                          {q.t==="scale" && <span className="hint">　{q.l} ↔ {q.r}</span>}
                          {q.t==="choice" && <span className="hint">　{(q.o||[]).join("／")}</span>}
                          {q.t==="radar" && <span className="hint">　軸：{(q.axes||[]).join("・")}</span>}
                        </span>
                      </div>
                    ))}
                  </div>}
              </div>
            );
          });
        })()}
      </Collapse>
      {list.length===0
        ? <div className="empty">還沒有任何問卷。勾選角色、按下「建立問卷」，或從內建智慧問卷庫直接套用一組吧！</div>
        : list.map(q=>{
            const qc=db.characters.filter(c=>q.charIds.includes(c.id));
            return (
              <div className="item-card" key={q.id} style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                <div style={{flex:1,minWidth:180}}>
                  <div style={{fontWeight:900}}>{q.name||"未命名問卷"}{q.topic&&<span className="badge" style={{marginLeft:6}}>{q.topic}</span>}{q.includeInPdf&&<span className="badge" style={{marginLeft:6,background:"var(--mint)"}}>併入PDF</span>}</div>
                  <div style={{fontSize:12,color:"rgba(43,36,64,.6)"}}>
                    {qc.map(c=>c.name||"未命名").join("、")||"（未關聯角色）"}｜{q.questions.length}題｜建立於{q.created}
                  </div>
                </div>
                <button className="btn small violet" onClick={()=>{setAiMsg("");setSelQ(q.id);}}>編輯</button>
                <button className="btn small" onClick={()=>mutate(d=>{
                  const cp=JSON.parse(JSON.stringify(q)); cp.id=uid(); cp.name=(cp.name||"未命名問卷")+"（複本）";
                  cp.questions.forEach(x=>{x.id=uid();});
                  d.questionnaires.push(cp);
                })}>複製</button>
                <button className="btn small danger" onClick={()=>{
                  if(confirm("確定刪除問卷「"+(q.name||"未命名")+"」？")) mutate(d=>{d.questionnaires=d.questionnaires.filter(x=>x.id!==q.id);});
                }}>刪除</button>
              </div>
            );
          })}
    </div>
  );
  /* ---- 編輯畫面 ---- */
  const move=(qi,dir)=>updateQuest(t=>{
    const j=qi+dir; if(j<0||j>=t.questions.length) return;
    const [m]=t.questions.splice(qi,1); t.questions.splice(j,0,m);
  });
  return (
    <div className="card tape">
      <div className="row" style={{justifyContent:"space-between"}}>
        <h2>🧩 {quest.name||"未命名問卷"}</h2>
        <button className="btn small" onClick={()=>setSelQ("")}>← 返回問卷列表</button>
      </div>
      <Collapse title="⚙ 問卷設定">
        <div className="row" style={{marginBottom:6}}>
          <input type="text" value={quest.name} placeholder="問卷名稱" style={{flex:1,minWidth:140}}
                 onChange={e=>updateQuest(t=>{t.name=e.target.value;})}/>
          <input type="text" value={quest.topic} placeholder="聚焦主題" style={{flex:1,minWidth:140}}
                 onChange={e=>updateQuest(t=>{t.topic=e.target.value;})}/>
        </div>
        <TagEditor tags={quest.tags||[]} label="問卷標籤" update={fn=>updateQuest(t=>{if(!t.tags)t.tags=[];fn(t.tags);})}/>
        <div className="row" style={{marginBottom:6}}>
          <span style={{fontWeight:800,fontSize:13}}>關聯角色：</span>
          {db.characters.map(c=>(
            <span key={c.id} className={"chip"+(quest.charIds.includes(c.id)?" on":"")}
              onClick={()=>updateQuest(t=>{
                const k=t.charIds.indexOf(c.id);
                if(k>=0) t.charIds.splice(k,1); else t.charIds.push(c.id);
              })}>
              {quest.charIds.includes(c.id)?"✓ ":""}{c.name||"未命名角色"}
            </span>
          ))}
        </div>
        <div className="row">
          <span style={{fontWeight:800,fontSize:13}}>預設標記樣式：</span>
          <select value={quest.markStyle} style={{width:"auto"}} onChange={e=>updateQuest(t=>{t.markStyle=e.target.value;})}>
            <option value="solid">實色底</option><option value="hl">螢光筆手繪感</option>
            <option value="underline">底線</option><option value="outline">外框</option>
          </select>
          <input type="color" value={quest.markColor} title="標記顏色"

/* ---------- 搜尋 ---------- */
function collectHits(db,q){
  const query=q.trim().toLowerCase();
  if(!query) return [];
  const hits=[];
  const push=(where,label,text,jump)=>{
    const t=String(text||"");
    const idx=t.toLowerCase().indexOf(query);
    if(idx<0) return;
    const start=Math.max(0,idx-24);
    const snippet=(start>0?"…":"")+t.slice(start,idx+query.length+40)+(idx+query.length+40<t.length?"…":"");
    hits.push({id:uid(),where,label,snippet,q:query,jump});
  };
  const scanWorld=(w,where,jump)=>{
    push(where,"名稱",w.name,jump); push(where,"世界觀描述",w.description,jump);
    if((w.tags||[]).length) push(where,"標籤",(w.tags||[]).join("、"),jump);
    (w.events||[]).forEach(e=>{push(where,"事件："+(e.title||"未命名"),[e.time,e.title,e.description].join("　"),jump);});
    (w.groups||[]).forEach(g=>{push(where,"組合："+(g.name||"未命名"),[g.name,g.description].join("　"),jump);});
  };
  db.worlds.forEach(mw=>{
    scanWorld(mw,"主要世界觀："+(mw.name||"未命名"),{tab:"world"});
    (mw.aus||[]).forEach(a=>scanWorld(a,"次要世界觀（AU）："+(a.name||"未命名")+"｜隸屬「"+(mw.name||"未命名")+"」",{tab:"world"}));
  });
  const scanProfile=(p,where,jump)=>{
    FIELD_DEFS.forEach(d=>push(where,d.label,p[d.key],jump));
    (p.customFields||[]).forEach(f=>push(where,f.label||"自訂欄位",f.value,jump));
    (p.events||[]).forEach(e=>push(where,"個人事件："+(e.title||"未命名"),[e.time,e.title,e.description].join("　"),jump));
    (p.foreignNames||[]).forEach(f=>push(where,"外文名（"+(f.lang||"？")+"）",f.value,jump));
    (p.relationships||[]).forEach(r=>{
      const t=db.characters.find(c=>c.id===r.targetId);
      push(where,"人際關係："+(t?t.name:"？"),[r.relation,r.story,r.notes].join("　"),jump);
    });
    if((p.tags||[]).length) push(where,"標籤",(p.tags||[]).join("、"),jump);
    if(p.draft) push(where,"快速草稿",p.draft,jump);
    (p.speech||[]).forEach(sp=>push(where,"稱呼："+(sp.who||"？"),[sp.callThem,sp.theyCall,sp.tone].join("　"),jump));
  };
  db.characters.forEach(c=>{
    scanProfile(c,"角色："+(c.name||"未命名"),{tab:"chars",charId:c.id});
    (c.auProfiles||[]).forEach(p=>scanProfile(p,"角色："+(c.name||"未命名")+"｜AU："+profileAuName(db.worlds,p),{tab:"chars",charId:c.id}));
  });
  (db.questionnaires||[]).forEach(qn=>{
    const w="問卷："+(qn.name||"未命名");
    push(w,"名稱",qn.name,{tab:"quest"}); push(w,"主題",qn.topic,{tab:"quest"});
    if((qn.tags||[]).length) push(w,"標籤",(qn.tags||[]).join("、"),{tab:"quest"});
    (qn.questions||[]).forEach(qu=>push(w,"題目",qu.text,{tab:"quest"}));
  });
  return hits;
}
function Highlight({text,q}){
  const i=text.toLowerCase().indexOf(q);
  if(i<0) return <span>{text}</span>;
  return <span>{text.slice(0,i)}<mark>{text.slice(i,i+q.length)}</mark>{text.slice(i+q.length)}</span>;
}
function SearchPanel({db,query,onJump}){
  const hits=useMemo(()=>collectHits(db,query),[db,query]);
  return (
    <div className="card tape tape-mint">
      <h2>搜尋結果</h2>
      <div className="sub">關鍵字「{query}」共找到 {hits.length} 筆相符內容，點擊即可前往。</div>
      {hits.length===0 && <div className="empty">沒有找到包含「{query}」的內容，換個關鍵字試試？</div>}
      {hits.map(h=>(
        <div className="search-hit" key={h.id} onClick={()=>onJump(h.jump)}>
          <div className="where">{h.where}｜{h.label}</div>
          <div style={{fontSize:14}}><Highlight text={h.snippet} q={h.q}/></div>
        </div>
      ))}
    </div>
  );
}

/* ---------- 首頁：OC統計儀表板 ---------- */
function StatDashboard({db}){
  const chars=db.characters;
  const ref=useRef(null);
  if(chars.length<1) return null;
  // 身高直方圖（每10cm一組）
  const heights=chars.map(c=>parseFloat(String(c.height||"").replace(/[^\d.]/g,""))).filter(h=>h>0);
  const hMin=heights.length?Math.floor(Math.min(...heights)/10)*10:150;
  const hMax=heights.length?Math.ceil(Math.max(...heights)/10)*10:190;
  const hbins=[];
  for(let lo=hMin;lo<hMax;lo+=10){ hbins.push({label:lo+"–"+(lo+10),n:heights.filter(h=>h>=lo&&h<lo+10).length}); }
  const hMaxN=Math.max(1,...hbins.map(b=>b.n));
  // 星座圓餅
  const signCount={};
  chars.forEach(c=>{const z=getZodiac(c.birthday); if(z){signCount[z]=(signCount[z]||0)+1;}});
  const signEntries=Object.entries(signCount);
  const signTotal=signEntries.reduce((n,[,v])=>n+v,0);
  const PIE=["#ff5d8f","#6c4ce0","#35d0a5","#f5b301","#4aa3ff","#e4572e","#a06cd5","#48b1bf","#ff9f68","#7cb342","#ec407a","#26a69a"];
  // MBTI長條
  const mbtiCount={};
  chars.forEach(c=>{const m=String(c.mbti||"").toUpperCase().match(/[IE][NS][TF][JP]/); if(m) mbtiCount[m[0]]=(mbtiCount[m[0]]||0)+1;});
  const mbtiEntries=Object.entries(mbtiCount).sort((a,b)=>b[1]-a[1]);
  const mbtiMax=Math.max(1,...mbtiEntries.map(([,v])=>v));
  // 色相環分布
  const hues=chars.map(c=>{const rgb=hexToRgb(c.color); if(!rgb) return null; return {h:rgbToHsl(rgb.r,rgb.g,rgb.b).h,color:c.color,name:c.name};}).filter(Boolean);
  // 生日月份分布
  const monthCount=Array(12).fill(0);
  chars.forEach(c=>{const b=parseBirthday(c.birthday); if(b) monthCount[b.m-1]++;});
  const monthMax=Math.max(1,...monthCount);
  // MBTI 四軸傾向（E/I、N/S、T/F、J/P）
  const axes=[["E","I",0],["N","S",1],["T","F",2],["J","P",3]];
  const axisStat=axes.map(([a,b,idx])=>{
    let na=0,nb=0;
    chars.forEach(c=>{
      const m=String(c.mbti||"").toUpperCase().match(/[IE][NS][TF][JP]/);
      if(!m) return;
      const ch=m[0][idx];
      if(ch===a) na++; else if(ch===b) nb++;
    });
    return {a,b,na,nb,total:na+nb};
  });
  // 標籤使用次數 Top
  const tagCount={};
  chars.forEach(c=>(c.tags||[]).forEach(t=>{tagCount[t]=(tagCount[t]||0)+1;}));
  const tagTop=Object.entries(tagCount).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const tagMax=Math.max(1,...tagTop.map(t=>t[1]));

  // 圓餅路徑
  const pieR=70,pieC=90; let acc=0;
  const arcs=signEntries.map(([sign,v],i)=>{
    const frac=v/signTotal, a0=acc*2*Math.PI-Math.PI/2; acc+=frac; const a1=acc*2*Math.PI-Math.PI/2;
    const large=frac>0.5?1:0;
    const x0=pieC+pieR*Math.cos(a0), y0=pieC+pieR*Math.sin(a0);
    const x1=pieC+pieR*Math.cos(a1), y1=pieC+pieR*Math.sin(a1);
    return {d:"M"+pieC+" "+pieC+" L"+x0+" "+y0+" A"+pieR+" "+pieR+" 0 "+large+" 1 "+x1+" "+y1+" Z",color:PIE[i%PIE.length],sign,v};
  });

  const Section=({title,children})=>(
    <div style={{background:"#fff",border:"2px solid #2b2440",borderRadius:14,padding:"12px 14px"}}>
      <div style={{fontWeight:900,fontSize:14,marginBottom:8}}>{title}</div>
      {children}
    </div>
  );
  return (
    <div style={{marginTop:6}}>
      <h3 className="section-title"><span className="dot"></span>📊 OC 統計儀表板
        <button className="btn small mint" onClick={()=>downloadNode(ref,"OC統計儀表板.png")}>⬇ 下載PNG</button>
      </h3>
      <div ref={ref} style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(240px,1fr))",gap:12,background:"#faf7ff",padding:12,borderRadius:14}}>
        <Section title={"📏 身高分布（"+heights.length+"人）"}>
          {heights.length===0 ? <div className="hint">尚無身高資料</div>
            : <svg width="100%" viewBox="0 0 240 150" style={{fontFamily:'"Noto Sans TC",sans-serif'}}>
                {hbins.map((b,i)=>{
                  const bw=220/hbins.length, x=10+i*bw, h=b.n/hMaxN*100;
                  return <g key={i}>
                    <rect x={x+3} y={120-h} width={bw-6} height={h} fill="#6c4ce0" stroke="#2b2440" strokeWidth="1.5" rx="3"/>
                    {b.n>0 && <text x={x+bw/2} y={116-h} textAnchor="middle" fontSize="10" fontWeight="900" fill="#2b2440">{b.n}</text>}
                    <text x={x+bw/2} y="134" textAnchor="middle" fontSize="7.5" fill="#2b2440">{b.label}</text>
                  </g>;
                })}
              </svg>}
        </Section>
        <Section title={"♈ 星座比例（"+signTotal+"人）"}>
          {signTotal===0 ? <div className="hint">尚無生日資料</div>
            : <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                <svg width="160" height="180" viewBox="0 0 180 180">
                  {arcs.length===1
                    ? <circle cx={pieC} cy={pieC} r={pieR} fill={arcs[0].color} stroke="#2b2440" strokeWidth="2"/>
                    : arcs.map((a,i)=><path key={i} d={a.d} fill={a.color} stroke="#2b2440" strokeWidth="1.5"/>)}
                </svg>
                <div style={{fontSize:11}}>
                  {signEntries.map(([sign,v],i)=>(
                    <div key={sign} style={{display:"flex",alignItems:"center",gap:4,marginBottom:2}}>
                      <span style={{width:10,height:10,borderRadius:2,background:PIE[i%PIE.length],border:"1px solid #2b2440"}}></span>
                      <span style={{fontWeight:700}}>{sign} {v}</span>
                    </div>
                  ))}
                </div>
              </div>}
        </Section>
        <Section title={"🧠 MBTI 分布（"+mbtiEntries.reduce((n,[,v])=>n+v,0)+"人）"}>
          {mbtiEntries.length===0 ? <div className="hint">尚無MBTI資料</div>
            : <div>
                {mbtiEntries.map(([m,v])=>(
                  <div key={m} style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
                    <span style={{fontWeight:900,fontSize:11,minWidth:38}}>{m}</span>
                    <div style={{flex:1,background:"#efe7fa",borderRadius:6,overflow:"hidden",border:"1.5px solid #2b2440"}}>
                      <div style={{width:(v/mbtiMax*100)+"%",background:"#35d0a5",height:14}}></div>
                    </div>
                    <span style={{fontWeight:800,fontSize:11}}>{v}</span>
                  </div>
                ))}
              </div>}
        </Section>
        <Section title={"🎨 代表色色相環（"+hues.length+"人）"}>
          {hues.length===0 ? <div className="hint">尚無代表色資料</div>
            : <svg width="100%" viewBox="0 0 180 180">
                <circle cx="90" cy="90" r="66" fill="none" stroke="#e6ddf7" strokeWidth="14"/>
                {[0,30,60,90,120,150,180,210,240,270,300,330].map(deg=>{
                  const a=(deg-90)*Math.PI/180;
                  return <circle key={deg} cx={90+72*Math.cos(a)} cy={90+72*Math.sin(a)} r="1.5" fill="#b9a7ea"/>;
                })}
                {hues.map((hu,i)=>{
                  const a=(hu.h-90)*Math.PI/180;
                  const x=90+66*Math.cos(a), y=90+66*Math.sin(a);
                  return <g key={i}><circle cx={x} cy={y} r="8" fill={hu.color} stroke="#2b2440" strokeWidth="2"/></g>;
                })}
                <text x="90" y="94" textAnchor="middle" fontSize="10" fontWeight="800" fill="#2b2440">色相分布</text>
              </svg>}
        </Section>

        <Section title={"🎂 生日月份分布（"+monthCount.reduce((n,v)=>n+v,0)+"人）"}>
          {monthCount.every(v=>v===0) ? <div className="hint">尚無生日資料</div>
            : <svg width="100%" viewBox="0 0 240 150" style={{fontFamily:'"Noto Sans TC",sans-serif'}}>
                {monthCount.map((v,i)=>{
                  const bw=220/12, x=10+i*bw, h=v/monthMax*100;
                  return <g key={i}>
                    <rect x={x+2} y={120-h} width={bw-4} height={h} fill="#ff9ec4" stroke="#2b2440" strokeWidth="1.2" rx="2"/>
                    {v>0 && <text x={x+bw/2} y={116-h} textAnchor="middle" fontSize="9" fontWeight="900" fill="#2b2440">{v}</text>}
                    <text x={x+bw/2} y="133" textAnchor="middle" fontSize="7.5" fill="#2b2440">{i+1}</text>
                  </g>;
                })}
                <text x="120" y="145" textAnchor="middle" fontSize="8" fill="rgba(43,36,64,.5)">月份</text>
              </svg>}
        </Section>

        <Section title="🧭 MBTI 四軸傾向">
          {axisStat.every(a=>a.total===0) ? <div className="hint">尚無MBTI資料</div>
            : axisStat.map(a=>(
                <div key={a.a} style={{marginBottom:7}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:11,fontWeight:800,marginBottom:2}}>
                    <span>{a.a} {a.na}</span><span>{a.nb} {a.b}</span>
                  </div>
                  <div style={{display:"flex",height:15,border:"1.5px solid #2b2440",borderRadius:8,overflow:"hidden",background:"#efe7fa"}}>
                    <div style={{width:(a.total?a.na/a.total*100:50)+"%",background:"#6c4ce0"}}></div>
                    <div style={{width:(a.total?a.nb/a.total*100:50)+"%",background:"#f5b301"}}></div>
                  </div>
                </div>
              ))}
        </Section>


        {tagTop.length>0 &&
          <Section title={"🏷 常用標籤 Top "+tagTop.length}>
            {tagTop.map(([t,v])=>(
              <div key={t} style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
                <span style={{fontWeight:800,fontSize:11,minWidth:60,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t}</span>
                <div style={{flex:1,background:"#efe7fa",borderRadius:6,overflow:"hidden",border:"1.5px solid #2b2440"}}>
                  <div style={{width:(v/tagMax*100)+"%",background:"#f5b301",height:13}}></div>
                </div>
                <span style={{fontWeight:800,fontSize:10.5,minWidth:16,textAlign:"right"}}>{v}</span>
              </div>
            ))}
          </Section>}
      </div>
    </div>
  );
}

/* ---------- 首頁儀表板 ---------- */
function DashboardTab({db,goto}){
  const chars=db.characters;
  const worldCount=db.worlds.length;
  const auCount=db.worlds.reduce((n,w)=>n+(w.aus||[]).length,0);
  const questCount=(db.questionnaires||[]).length;
  const eventCount=db.worlds.reduce((n,w)=>n+(w.events||[]).length+(w.aus||[]).reduce((m,a)=>m+(a.events||[]).length,0),0);
  // 生日將近
  const today=new Date();
  const upcoming=chars.map(c=>{
    const b=parseBirthday(c.birthday); if(!b) return null;
    let d=new Date(today.getFullYear(),b.m-1,b.d);
    if(d<new Date(today.getFullYear(),today.getMonth(),today.getDate())) d=new Date(today.getFullYear()+1,b.m-1,b.d);
    return {c,days:Math.round((d-new Date(today.getFullYear(),today.getMonth(),today.getDate()))/864e5),b};
  }).filter(Boolean).sort((a,b)=>a.days-b.days).slice(0,5);
  // 設定檢查
  const issues=[];
  chars.forEach(c=>{
    const miss=[];
    if(!c.avatar) miss.push("頭像");
    if(!c.birthday) miss.push("生日");
    if(!isHex(c.color)) miss.push("代表色");
    if(!(c.description||"").trim()) miss.push("角色描述");
    const hasRel=(c.relationships||[]).length>0 || chars.some(o=>(o.relationships||[]).some(r=>r.targetId===c.id));
    if(chars.length>1 && !hasRel) miss.push("人際關係（孤立角色）");
    if(miss.length) issues.push({c,miss});
  });
  db.worlds.forEach(w=>{ if(!(w.description||"").trim() && !(w.events||[]).length) issues.push({world:w,miss:["世界觀內容為空"]}); });
  const Stat=({icon,label,value,to})=>(
    <div className="item-card" style={{textAlign:"center",cursor:to?"pointer":"default",margin:0}} onClick={()=>to&&goto(to)}>
      <div style={{fontSize:26}}>{icon}</div>
      <div style={{fontSize:28,fontWeight:900,color:"var(--accent2)"}}>{value}</div>
      <div style={{fontSize:12.5,fontWeight:700}}>{label}</div>
    </div>
  );
  return (
    <div className="card tape">
      <h2>🏠 創作總覽</h2>
      <div className="sub">你的OC宇宙一覽——點卡片可直接跳到對應板塊。</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(120px,1fr))",gap:10,marginBottom:16}}>
        <Stat icon="👤" label="角色" value={chars.length} to="chars"/>
        <Stat icon="🌍" label="主要世界觀" value={worldCount} to="world"/>
        <Stat icon="🌙" label="次要世界觀" value={auCount} to="world"/>
        <Stat icon="📜" label="事件總數" value={eventCount} to="world"/>
        <Stat icon="🧩" label="角色問卷" value={questCount} to="quest"/>
        <Stat icon="🎵" label="印象曲" value={chars.filter(c=>spotifyEmbedUrl(c.song)).length} to="playlist"/>
      </div>
      <div className="split" style={{gridTemplateColumns:"1fr 1fr"}}>
        <div>
          <h3 className="section-title"><span className="dot"></span>🎂 即將到來的生日</h3>
          {upcoming.length===0 ? <div className="empty">尚無填寫生日的角色。</div>
            : upcoming.map(u=>(
                <div className="char-list-item" key={u.c.id} onClick={()=>goto("chars",u.c.id)}>
                  <AvatarCircle name={u.c.name} color={u.c.color} avatar={u.c.avatar} size={30}/>
                  <span style={{fontWeight:800,fontSize:14,flex:1}}>{u.c.name||"未命名"}</span>
                  <span className="badge">{u.days===0?"就是今天！":("還有 "+u.days+" 天")}</span>
                </div>
              ))}
        </div>
        <div>
          <h3 className="section-title"><span className="dot"></span>🔍 設定檢查</h3>
          {issues.length===0 ? <div className="empty">全部設定完整，太棒了！</div>
            : issues.slice(0,8).map((it,i)=>(
                <div className="search-hit" key={i} onClick={()=>it.c?goto("chars",it.c.id):goto("world")}>
                  <div className="where">{it.c?("角色："+(it.c.name||"未命名")):("世界觀："+(it.world.name||"未命名"))}</div>
                  <div style={{fontSize:13}}>待補：{it.miss.join("、")}</div>
                </div>
              ))}
          {issues.length>8 && <div className="footnote">…還有 {issues.length-8} 項待補。</div>}
        </div>
      </div>
      <StatDashboard db={db}/>
    </div>
  );
}

/* ---------- 印象曲播放清單 ---------- */
function PlaylistTab({db,goto}){
  const withSong=db.characters.map(c=>({c,embed:spotifyEmbedUrl(c.song)})).filter(x=>x.embed);

  return (
    <div className="card tape tape-mint">
      <h2>🎵 全員印象曲播放清單</h2>
      <div className="sub">把每位角色的Spotify印象曲串成一頁，一次聽完全員。（填的是純歌名者列於下方。）</div>
      {withSong.length===0 && textOnly.length===0 && <div className="empty">還沒有角色填寫印象曲。到角色的「印象曲」欄貼上Spotify連結吧！</div>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:12}}>
