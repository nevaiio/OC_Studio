/* ---------- 主程式 ---------- */
function App(){
  const [db,setDb]=useState(initialDb);
  const [tab,setTab]=useState("home");
  const [query,setQuery]=useState("");
  const [selChar,setSelChar]=useState("");
  const [tagFilter,setTagFilter]=useState("all");
  const dragIdx=useRef(-1);
  const [selQuest,setSelQuest]=useState("");
  const worldDrag=useRef(-1);
  const auDrag=useRef({w:"",i:-1});
  const [saveState,setSaveState]=useState("");
  const loaded=useRef(false);
  const mutate=fn=>setDb(prev=>{const d=JSON.parse(JSON.stringify(prev));fn(d);return d;});

  useEffect(()=>{ (async()=>{
    try{
      const v=await OCStore.get(OC_KEY);
      if(v){ const j=migrateDb(JSON.parse(v)); if(j) setDb(j); }
    }catch(e){}
    loaded.current=true;
    setSaveState("已載入存檔");
  })(); },[]);
  // 自動儲存（變更後 700ms 內無新變更即寫入）
  const doSave=async(silent)=>{
    try{
      const payload=JSON.stringify(db);
      const r=await OCStore.set(OC_KEY,payload);
      const kb=Math.round(payload.length/1024);
      if(r.quota&&!r.ok){
        setSaveState("⚠ 儲存空間已滿（約"+kb+"KB）──立繪／頭像佔用較大，請用「匯出JSON」備份");
      }else if(r.ok){
        setSaveState("已自動儲存 ✔ "+new Date().toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit",second:"2-digit"})
                     +"（"+kb+"KB・"+(r.via==="idb"?"IndexedDB":"localStorage")+"）");
      }else{
        setSaveState("⚠ 無法自動儲存，請用「匯出JSON」備份");
      }
    }catch(e){ setSaveState("⚠ 儲存失敗，請用「匯出JSON」備份"); }
  };
  useEffect(()=>{
    if(!loaded.current) return;
    setSaveState("編輯中…");
    const t=setTimeout(()=>doSave(),700);
    return ()=>clearTimeout(t);
  },[db]);
  // 關閉分頁前再存一次
  useEffect(()=>{
    const fn=()=>{ const j=JSON.stringify(db);
      try{ IDB.set(OC_KEY,j); }catch(e){}
      try{ if(j.length<4000000) localStorage.setItem(OC_KEY,j); }catch(e){} };
    window.addEventListener("beforeunload",fn);
    return ()=>window.removeEventListener("beforeunload",fn);
  },[db]);

  const jump=j=>{ setQuery(""); setTab(j.tab); if(j.charId) setSelChar(j.charId); };
  useEffect(()=>{ window.__gotoChar=cid=>{ setQuery(""); setSelChar(cid); setTab("chars"); }; },[]);
  useEffect(()=>{
    const grow=el=>{
      if(!el || el.tagName!=="TEXTAREA") return;
      if(el.dataset.noGrow) return;
      el.style.height="auto";
      el.style.height=Math.min(el.scrollHeight+2, 600)+"px";
    };
    const onInput=e=>grow(e.target);
    const onFocus=e=>grow(e.target);
    document.addEventListener("input",onInput,true);
    document.addEventListener("focusin",onFocus,true);
    // 初次與每次更新後，替現有 textarea 調整高度
    const id=setTimeout(()=>{ document.querySelectorAll("textarea").forEach(grow); },50);
    return ()=>{ document.removeEventListener("input",onInput,true); document.removeEventListener("focusin",onFocus,true); clearTimeout(id); };
  });
  const chars=db.characters;
  const cur=chars.find(c=>c.id===selChar)||chars[0];

  const TABS=[["home","🏠 首頁"],["world","🌍 世界觀"],["chars","👤 角色"],["quest","🧩 角色問卷"],["charts","📊 圖表生成器"],["assist","✨ 創作輔助"],["playlist","🎵 播放清單"],["import","📥 匯入資料"],["export","📤 匯出文件"]];
  return (
    <div className="app">
      <div className="topbar">
        <div className="topbar-inner">
          <span className="logo"><span className="oc-badge">OC</span>你也來搞OC吧！</span>
          <div className="searchbox">
            <span>🔍</span>
            <input value={query} onChange={e=>setQuery(e.target.value)} placeholder="輸入關鍵字，搜尋世界觀、事件與角色設定…"/>
            {query && <button className="btn small ghost" onClick={()=>setQuery("")}>清除</button>}
          </div>
          <span className="row" style={{gap:6,flex:"none",flexWrap:"nowrap"}}>
            <span className="save-tag">{saveState}</span>
            <button className="btn small ghost" title="立即寫入存檔" onClick={()=>doSave()}>💾 立即儲存</button>
          </span>
        </div>
        <div className="tabs">
          {[["建立",["home","world","chars"]],
            ["產出",["quest","charts","assist","playlist"]],
            ["資料",["import","export"]]].map(([grp,keys])=>(
            <div className="tabrow" key={grp}>
              <span className="tab-grouplabel">{grp}</span>
              {keys.map(k=>{
                const item=TABS.find(x=>x[0]===k); if(!item) return null;
                return (
                  <button key={k} className={"tab"+(tab===k&&!query?" active":"")}
                          onClick={()=>{setQuery("");setTab(k);}}>{item[1]}</button>
                );
              })}
            </div>
          ))}
        </div>
      </div>

      {query.trim()
        ? <SearchPanel db={db} query={query} onJump={jump}/>
        : <React.Fragment>

        {tab==="world" && (
          <React.Fragment>
            {db.worlds.map((mw,mi)=>(
              <React.Fragment key={mw.id}>
                <CardSection className="card tape"
                  onDragOver={e=>{ if(worldDrag.current>=0) e.preventDefault(); }}
                  onDrop={()=>{ const f=worldDrag.current; worldDrag.current=-1;
                    if(f>=0&&f!==mi) mutate(d=>{ const [m]=d.worlds.splice(f,1); d.worlds.splice(mi,0,m); }); }}
                  dragHandle={db.worlds.length>1 &&
                    <span draggable title="拖曳調整主要世界觀順序"
                      style={{cursor:"grab",fontWeight:900,color:"var(--accent2)",fontSize:20,flex:"none",
                              padding:"2px 4px",userSelect:"none"}}
                      onDragStart={()=>{worldDrag.current=mi;}}
                      onDragEnd={()=>{worldDrag.current=-1;}}>⋮⋮</span>}
                  title={<span>🌍 主要世界觀{db.worlds.length>1?` #${mi+1}`:""}{mw.name?<span style={{color:"var(--accent2)"}}>　{mw.name}</span>:<span style={{opacity:.5,fontSize:15}}>　（未命名）</span>}</span>}
                  badge={((mw.events||[]).length||(mw.groups||[]).length)?((mw.events||[]).length+"事件・"+(mw.groups||[]).length+"組合"):null}
                  subtitle={db.worlds.length>1
                    ? "你的本命宇宙！填寫世界背景、事件列表與角色關係組合。拖曳左側 ⋮⋮ 可調整世界觀順序。"
                    : "你的本命宇宙！填寫世界背景、事件列表與角色關係組合。"}
                  collapsedHint={"（已收合）"+(mw.name||"未命名主要世界觀")+"　點標題展開編輯"}
                  extra={db.worlds.length>1 &&
                    <button className="btn small danger" style={{flex:"none"}} onClick={()=>{
                      if(confirm("確定要刪除主要世界觀「"+(mw.name||"未命名")+"」嗎？其下的AU也會一併刪除。"))
                        mutate(d=>{d.worlds=d.worlds.filter(x=>x.id!==mw.id);});
                    }}>刪除此主要世界觀</button>}>
                  <WorldEditor world={mw} characters={chars} namePlaceholder="主要世界觀名稱…"
                    update={fn=>mutate(d=>{const t=d.worlds.find(x=>x.id===mw.id); if(t) fn(t);})}/>
                </CardSection>
                <CardSection className="card tape tape-pink" style={{marginLeft:24}}
                  title="🌙 次要世界觀（AU）"
                  badge={(mw.aus||[]).length?((mw.aus||[]).length+" 個"):null}
                  subtitle={"隸屬於「"+(mw.name||"未命名主要世界觀")+"」之下的平行宇宙／if線，可建立多個"+
                            ((mw.aus||[]).length>1?"；拖曳標題左側 ⋮⋮ 可調整順序。":"。")}
                  collapsedHint={"（已收合）共 "+((mw.aus||[]).length)+" 個AU　點標題展開"}
                  defaultOpen={(mw.aus||[]).length<=3}>
                  {(mw.aus||[]).length===0 && <div className="empty">還沒有AU世界觀。校園AU？西幻AU？按下方按鈕開一個吧！</div>}
                  {(mw.aus||[]).map((au,ai)=>(
                    <div key={au.id}
                      onDragOver={e=>{ if(auDrag.current.w===mw.id&&auDrag.current.i>=0) e.preventDefault(); }}
                      onDrop={()=>{ const d0=auDrag.current; auDrag.current={w:"",i:-1};
                        if(d0.w===mw.id&&d0.i>=0&&d0.i!==ai)
                          mutate(d=>{ const m=d.worlds.find(x=>x.id===mw.id);
                            if(m&&m.aus){ const [x]=m.aus.splice(d0.i,1); m.aus.splice(ai,0,x); } }); }}>
                    <Collapse defaultOpen={(mw.aus||[]).length<=2}
                      title={<span style={{display:"inline-flex",alignItems:"center",gap:6}}>
                        {(mw.aus||[]).length>1 &&
                          <span draggable title="拖曳調整AU順序"
                            style={{cursor:"grab",fontWeight:900,color:"var(--accent2)",fontSize:15,userSelect:"none"}}
                            onClick={e=>e.stopPropagation()}
                            onDragStart={e=>{e.stopPropagation();auDrag.current={w:mw.id,i:ai};}}
                            onDragEnd={()=>{auDrag.current={w:"",i:-1};}}>⋮⋮</span>}
                        <span>🌙 {au.name||<span style={{opacity:.55}}>未命名AU</span>}</span>
                        {((au.events||[]).length||(au.groups||[]).length)?
                          <span className="badge" style={{fontSize:10.5}}>{(au.events||[]).length}事件・{(au.groups||[]).length}組合</span>:null}
                      </span>}>
                      <WorldEditor world={au} characters={chars} namePlaceholder="AU世界觀名稱…"
                        update={fn=>mutate(d=>{const m=d.worlds.find(x=>x.id===mw.id); const t=m&&(m.aus||[]).find(x=>x.id===au.id); if(t) fn(t);})}
                        onDelete={()=>{ if(confirm("確定要刪除AU「"+(au.name||"未命名")+"」嗎？"))
                          mutate(d=>{const m=d.worlds.find(x=>x.id===mw.id); if(m) m.aus=m.aus.filter(x=>x.id!==au.id);}); }}/>
                    </Collapse>
                    </div>
                  ))}
                  <button className="btn primary" onClick={()=>mutate(d=>{
                    const m=d.worlds.find(x=>x.id===mw.id); if(m){ if(!m.aus) m.aus=[]; m.aus.push(newWorld("")); }
                  })}>＋新增次要世界觀（AU）</button>
                </CardSection>
              </React.Fragment>
            ))}
            <div style={{textAlign:"center",marginBottom:8}}>
              <button className="btn violet" onClick={()=>mutate(d=>{d.worlds.push(newMainWorld(""));})}>＋新增主要世界觀</button>
            </div>
          </React.Fragment>
        )}

        {tab==="chars" && (
          <div className="split">
            <div className="card tape tape-mint" style={{position:"sticky",top:130}}>
              <h2>角色清單</h2>
              {(()=>{
                const allTags=[...new Set(chars.flatMap(c=>c.tags||[]))];
                const visible=tagFilter==="all"?chars:chars.filter(c=>(c.tags||[]).includes(tagFilter));
                const canDrag=tagFilter==="all";
                return (
                  <React.Fragment>
                    {allTags.length>0 &&
                      <div className="row" style={{marginBottom:8}}>
                        <span className={"chip"+(tagFilter==="all"?" on":"")} onClick={()=>setTagFilter("all")}>全部</span>
                        {allTags.map(t=>(
                          <span key={t} className={"chip"+(tagFilter===t?" on":"")} onClick={()=>setTagFilter(t)}>🏷 {t}</span>
                        ))}
                      </div>}
                    <div className="char-list">
                      {chars.length===0 && <div className="empty">還沒有角色！</div>}
                      {chars.length>0 && visible.length===0 && <div className="empty">此標籤下沒有角色。</div>}
                      {visible.map(c=>{
                        const realIdx=chars.findIndex(x=>x.id===c.id);
                        return (
                          <div key={c.id} className={"char-list-item"+(cur&&cur.id===c.id?" active":"")}
                               style={{background:tint(c.color,.14)==="transparent"?"#fff":tint(c.color,.14),cursor:canDrag?"grab":"pointer"}}
                               draggable={canDrag}
                               onDragStart={()=>{dragIdx.current=realIdx;}}
                               onDragOver={e=>e.preventDefault()}
                               onDrop={()=>{
                                 const from=dragIdx.current, to=realIdx;
                                 dragIdx.current=-1;
                                 if(from<0||from===to) return;
                                 mutate(d=>{ const [m]=d.characters.splice(from,1); d.characters.splice(to,0,m); });
                               }}
                               onClick={()=>setSelChar(c.id)}>
                            <AvatarCircle name={c.name} color={c.color} avatar={c.avatar} size={34}/>
                            <span style={{fontWeight:800,fontSize:14,flex:1}}>{c.name||"未命名角色"}</span>
                            {(c.tags||[]).length>0 &&
                              <span style={{fontSize:10.5,fontWeight:800,color:"rgba(43,36,64,.55)"}}>{(c.tags||[]).join("・")}</span>}
                          </div>
                        );
                      })}
                    </div>
                    {chars.length>1 && canDrag && <div className="footnote">直接拖曳項目即可重新排序；在角色頁面可加上標籤分類。</div>}
                  </React.Fragment>
                );
              })()}
              <div style={{marginTop:12}}>
                <button className="btn primary" onClick={()=>{
                  const id=uid();
                  mutate(d=>{const c=newCharacter("");c.id=id;d.characters.push(c);});
                  setSelChar(id);
                }}>＋新增角色</button>
              </div>
            </div>
            <div>
              {cur
                ? <CharacterEditor key={cur.id} char={cur} allChars={chars} worlds={db.worlds}
                    questionnaires={db.questionnaires||[]}
                    onOpenQuestionnaire={qid=>{setSelQuest(qid);setTab("quest");}}
                    update={fn=>mutate(d=>{const c=d.characters.find(x=>x.id===cur.id); if(c) fn(c);})}
                    onDelete={()=>{ if(confirm("確定要刪除角色「"+(cur.name||"未命名")+"」嗎？")) mutate(d=>{
                      d.characters=d.characters.filter(x=>x.id!==cur.id);
                      d.characters.forEach(c=>{
                        c.relationships=(c.relationships||[]).filter(r=>r.targetId!==cur.id);
                        (c.auProfiles||[]).forEach(p=>{p.relationships=(p.relationships||[]).filter(r=>r.targetId!==cur.id);});
                      });
                    }); }}/>
                : <div className="card tape"><div className="empty">從左側新增第一位角色，開始建立你的OC檔案吧！</div></div>}
            </div>
          </div>
        )}

        {tab==="home" && <DashboardTab db={db} goto={(t,cid)=>{setQuery("");setTab(t);if(cid)setSelChar(cid);}}/>}
        {tab==="playlist" && <PlaylistTab db={db} goto={(t,cid)=>{setQuery("");setTab(t);if(cid)setSelChar(cid);}}/>}
        {tab==="quest" && <QuestionnaireTab db={db} mutate={mutate} selQ={selQuest} setSelQ={setSelQuest}/>}
        {tab==="charts" && <ChartsTab db={db} mutate={mutate}/>}
        {tab==="assist" && <AssistTab db={db} mutate={mutate}/>}
        {tab==="import" && <ImportTab db={db} mutate={mutate}/>}
        {tab==="export" && <ExportTab db={db}/>}

      </React.Fragment>}

      <div style={{textAlign:"center",marginTop:30,fontSize:12,color:"rgba(43,36,64,.5)",fontWeight:700}}>
        ✦ 你也來搞OC吧！──獻給每一位認真對待自家孩子的創作者 ✦
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
