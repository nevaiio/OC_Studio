            <b>編輯連線：{(db.characters.find(c=>c.id===selEdge.charId)||{}).name||"？"} → {(db.characters.find(c=>c.id===selEdge.to)||{}).name||"？"}</b>
            <span className="row" style={{gap:6,flex:"none"}}>
              <button className="btn small danger" onClick={()=>{ if(confirm("刪除這條關係線？此關係也會從角色的「人際關係」中移除。")) deleteEdge(); }}>刪除關係</button>
              <button className="btn small" onClick={()=>setSelEdge(null)}>關閉</button>
            </span>
          </div>
          <div className="footnote" style={{marginTop:4}}>此處的修改會同步寫入{auMode?"該角色的AU分頁":"角色"}的「人際關係」欄位。</div>
          <div className="row" style={{marginTop:6}}>
            <input type="text" value={selData.relation||""} placeholder="關係標籤" style={{flex:1,minWidth:140}}
                   onChange={e=>editEdge(r=>{r.relation=e.target.value;})}/>
            <input type="color" value={selData.lineColor||"#6c4ce0"} title="線條顏色"
                   style={{width:34,height:30,border:"2px solid var(--ink)",borderRadius:8,padding:2}}
                   onChange={e=>editEdge(r=>{r.lineColor=e.target.value;})}/>
            <select value={selData.lineStyle||"dashed"} style={{width:"auto"}} onChange={e=>editEdge(r=>{r.lineStyle=e.target.value;})}>
              <option value="solid">實線</option><option value="dashed">虛線</option><option value="dotted">點線</option>
            </select>
            <select value={selData.arrow||"none"} style={{width:"auto"}} onChange={e=>editEdge(r=>{r.arrow=e.target.value;})}>

      <div className="canvas-stage" style={{overflowX:"auto"}}>
        <svg width={W} height={H} viewBox={"0 0 "+W+" "+H} xmlns="http://www.w3.org/2000/svg"
             ref={el=>{svgRef.current=el; boxRef.current=el;}}
             onPointerMove={onMove} onPointerUp={onUp} onPointerLeave={onUp}
             style={{fontFamily:'"Noto Sans TC","Microsoft JhengHei",sans-serif',touchAction:"none",maxWidth:"100%"}}>
          <rect x="0" y="0" width={W} height={H} fill="#ffffff" onClick={()=>setSelEdge(null)}/>

          </text>
          <defs>
            {edges.map((e,i)=>(
              <marker key={i} id={"arw2-"+i} viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
                <path d="M0,0 L10,5 L0,10 z" fill={e.color}/>
              </marker>
            ))}
          </defs>
          {drawGroups.map((dg,gi)=>{
            const {g,mem,pad,depth}=dg;
            const centers=mem.map(id=>({x:pos[id].x,y:pos[id].y+6}));
            const d=hullPath(centers,pad);
            if(!d) return null;
            const col=g.color||"#6c4ce0";
            // 名牌置於框的最上緣；疊層越外側的框，名牌越往上，避免互相遮擋
            const topY=Math.min(...centers.map(c=>c.y))-pad;
            const topX=centers.reduce((m,c)=>c.y<m.y?c:m,centers[0]).x;
            const bw=(g.name||"").length*15+30;
            return (
              <g key={"grp"+gi}>
                <path d={d} fill={col} opacity={depth===0?0.09:0.06} stroke={col}
                      strokeWidth={depth===0?2.5:2} strokeDasharray={depth===0?"8 5":"3 5"}/>
                {g.name && <g>
                  <rect x={topX-bw/2} y={topY-11} width={bw} height="22" rx="9" fill={col} stroke="#2b2440" strokeWidth="1.5"/>
                  <text x={topX} y={topY+5} textAnchor="middle" fontSize="12.5" fontWeight="900" fill="#fff">👥 {g.name}</text>
                </g>}
              </g>
            );
          })}
          {intruderIds.map(id=>(
            <circle key={"in"+id} cx={pos[id].x} cy={pos[id].y} r="34" fill="#fff" opacity="0.62"
                    stroke="#e4572e" strokeWidth="2" strokeDasharray="3 4"/>
          ))}
          {geoms.map((g,i)=>{
            const e=g.e;
            const isSel=selEdge&&selEdge.charId===e.charId&&selEdge.relId===e.relId;
            const width=1.2+e.strength*0.9;
            const op=0.35+e.strength*0.13;
            const path="M"+g.x1+" "+g.y1+" Q"+g.cx0+" "+g.cy0+" "+g.x2+" "+g.y2;
            // 標籤若被推離曲線，畫一條細引導線連回曲線中點
            const mid=bezAt(0.5,g.x1,g.y1,g.cx0,g.cy0,g.x2,g.y2);
            const far=Math.hypot(g.lx-mid.x,g.ly-mid.y)>18;
            return (
              <g key={"e"+i} style={{cursor:"pointer"}}
                 onClick={ev=>{ev.stopPropagation(); setSelEdge({charId:e.charId,relId:e.relId,to:e.to});}}>
                <path d={path} fill="none" stroke="transparent" strokeWidth="16"/>
                <path d={path} fill="none" stroke={e.color} strokeWidth={isSel?width+2:width}
                      strokeDasharray={dashOf(e.style)==="none"?undefined:dashOf(e.style)} opacity={op}
                      markerEnd={e.arrow!=="none"?("url(#arw2-"+i+")"):undefined}
                      markerStart={e.arrow==="both"?("url(#arw2-"+i+")"):undefined}/>
                {g.label && <g>
                  {far && <line x1={mid.x} y1={mid.y} x2={g.lx} y2={g.ly} stroke={e.color} strokeWidth="1" opacity="0.5" strokeDasharray="2 3"/>}
                  <rect x={g.lx-g.bw/2} y={g.ly-11} width={g.bw} height="20" rx="9" fill="#fff" stroke={e.color} strokeWidth={isSel?2.5:1.5}/>
                  <text x={g.lx} y={g.ly+4} textAnchor="middle" fontSize="11.5" fontWeight="700" fill="#2b2440">{g.label}</text>
                </g>}
              </g>
            );
          })}
          {chars.map(c=>{
            const pp=pos[c.id], d=disp[c.id];
            return (
              <g key={c.id} style={{cursor:linkMode?"crosshair":"grab"}}
                 onPointerDown={ev=>{ if(linkMode) return; ev.preventDefault(); dragId.current=c.id;}}
                 onClick={ev=>{
                   if(!linkMode) return;
                   ev.stopPropagation();
                   if(!linkFrom) setLinkFrom(c.id);
                   else createLink(linkFrom,c.id);
                 }}
                 onDoubleClick={()=>{ if(!linkMode) openChar(c.id); }}>
                {linkMode && linkFrom===c.id &&
                  <circle cx={pp.x} cy={pp.y} r="34" fill="none" stroke="var(--accent)" strokeWidth="3" strokeDasharray="5 4"/>}
                {d.avatar
                  ? <g>
                      <clipPath id={"clip2-"+c.id}><circle cx={pp.x} cy={pp.y} r="26"/></clipPath>
                      <image href={d.avatar} x={pp.x-26} y={pp.y-26} width="52" height="52" preserveAspectRatio="xMidYMid slice" clipPath={"url(#clip2-"+c.id+")"}/>
                      <circle cx={pp.x} cy={pp.y} r="26" fill="none" stroke="#2b2440" strokeWidth="3"/>
                    </g>
                  : <g>
                      <circle cx={pp.x} cy={pp.y} r="26" fill={d.color} stroke="#2b2440" strokeWidth="3"/>
                      <text x={pp.x} y={pp.y+6} textAnchor="middle" fontSize="15" fontWeight="900" fill="#fff">{d.name.slice(0,1)}</text>
                    </g>}
                {showName && <text x={pp.x} y={pp.y+46} textAnchor="middle" fontSize="13" fontWeight="800" fill="#2b2440">{d.name}</text>}
              </g>
            );
          })}
        </svg>
      </div>
    </div>
  );
}

/* ---------- 圖表：身高對照表 ---------- */
function HeightChart({db}){
  const ref=useRef(null);
  const sc=useCharScope(db);
  const [sortMode,setSortMode]=useState("tall");   // tall | short | group | manual
  const hOf=c=>parseFloat(String(c.height||"").replace(/[^\d.]/g,""))||0;
  const withH=db.characters.filter(c=>hOf(c)>0);
  const chosen=sc.selected.filter(c=>hOf(c)>0);
  // 組別對照（取第一個包含該角色的組合）
  const groupOf=cid=>{
    for(const mw of db.worlds){
      for(const w of [mw,...(mw.aus||[])]){
        for(const g of (w.groups||[])) if((g.memberIds||[]).includes(cid)) return {name:g.name||"未命名組合",color:g.color||"#6c4ce0"};
      }
    }
    return null;
  };
  let ordered=[...chosen];
  if(sortMode==="tall") ordered.sort((a,b)=>hOf(b)-hOf(a));
  else if(sortMode==="short") ordered.sort((a,b)=>hOf(a)-hOf(b));
  else if(sortMode==="group"){
    const key=c=>{const g=groupOf(c.id); return g?g.name:"\uffff（未分組）";};
    ordered.sort((a,b)=>{ const ka=key(a),kb=key(b); return ka<kb?-1:(ka>kb?1:hOf(b)-hOf(a)); });
  }
  const list=ordered.map(c=>{
    const g=groupOf(c.id);
    return {name:c.name||"未命名",h:hOf(c),color:isHex(c.color)?c.color:"#9e9e9e",
            group:(sortMode==="group"&&g)?g.name:"",groupColor:g?g.color:""};
  });
  const memberPicker=(
    <div>
      <CharScopePicker sc={sc} title="🎯 納入人員" compact/>
      <div className="row" style={{marginBottom:8,alignItems:"center"}}>
        <span style={{fontSize:11.5,fontWeight:900,color:"rgba(43,36,64,.5)",minWidth:44,flex:"none"}}>排序</span>
        {[["tall","⬇ 由高到矮"],["short","⬆ 由矮到高"],["group","👥 依關係組別"],["manual","📋 依角色清單順序"]].map(([k,label])=>(
          <span key={k} className={"chip"+(sortMode===k?" on":"")} onClick={()=>setSortMode(k)}>{label}</span>
        ))}
      </div>
    </div>
  );
  if(!withH.length) return <div className="empty">請先在角色的「身高」欄填入數值（例：172cm）。</div>;
  if(!list.length) return <div>{memberPicker}<div className="empty">目前範圍內沒有填寫身高的角色。</div></div>;
  const maxH=Math.max(...list.map(c=>c.h));
  const top=Math.ceil((maxH+12)/20)*20;
  const W=Math.max(560,110*list.length+90), H=460;
  const baseY=H-52, chartH=H-120;
  const yOf=v=>baseY-(v/top)*chartH;
  const grid=[]; for(let v=0;v<=top;v+=20) grid.push(v);
  return (
    <div>
      {memberPicker}
      <div className="row" style={{marginBottom:10}}>
        <button className="btn small mint" onClick={()=>downloadSvg(ref,"身高對照表.png",W,H)}>⬇ 下載PNG</button>
      </div>
      <div className="canvas-stage" style={{overflowX:"auto"}}>
        <svg ref={ref} width={W} height={H} viewBox={`0 0 ${W} ${H}`} xmlns="http://www.w3.org/2000/svg"
             style={{fontFamily:'"Noto Sans TC","Microsoft JhengHei",sans-serif'}}>
          <rect x="0" y="0" width={W} height={H} fill="#ffffff"/>
          <text x={W/2} y="32" textAnchor="middle" fontSize="20" fontWeight="900" fill="#2b2440">角色身高對照表</text>
          {grid.map(v=>(
            <g key={v}>
              <line x1="60" y1={yOf(v)} x2={W-20} y2={yOf(v)} stroke={v%100===0?"#b9a7ea":"#e6ddf7"} strokeWidth={v%100===0?2:1}/>
              <text x="52" y={yOf(v)+4} textAnchor="end" fontSize="11" fill="#6c4ce0" fontWeight="700">{v}</text>
            </g>
          ))}
          {list.map((c,i)=>{
            const x=100+i*110;
            const topY=yOf(c.h);
            const r=Math.min(20,(baseY-topY)*0.16+8);
            const newGroup = c.group && (i===0 || list[i-1].group!==c.group);
            const groupEnd = c.group && (i===list.length-1 || list[i+1].group!==c.group);
            return (
              <g key={i}>
                {newGroup &&
                  <g>
                    {i>0 && <line x1={x-55} y1="46" x2={x-55} y2={baseY+30} stroke="#b9a7ea" strokeWidth="2" strokeDasharray="5 4"/>}
                    <rect x={x-46} y="44" width={c.group.length*14+22} height="21" rx="9"
                          fill={c.groupColor||"#6c4ce0"} stroke="#2b2440" strokeWidth="1.5"/>
                    <text x={x-46+(c.group.length*14+22)/2} y="59" textAnchor="middle" fontSize="12" fontWeight="900" fill="#fff">👥 {c.group}</text>
                  </g>}
                <circle cx={x} cy={topY+r} r={r} fill={c.color} stroke="#2b2440" strokeWidth="2.5"/>
                <rect x={x-r*0.85} y={topY+r*2+2} width={r*1.7} height={Math.max(4,baseY-(topY+r*2+2))}
                      rx={r*0.7} fill={c.color} stroke="#2b2440" strokeWidth="2.5" opacity="0.9"/>
                <text x={x} y={topY-8} textAnchor="middle" fontSize="12.5" fontWeight="900" fill="#2b2440">{c.h}cm</text>
                <text x={x} y={baseY+20} textAnchor="middle" fontSize="13" fontWeight="800" fill="#2b2440">{c.name}</text>
              </g>
            );
          })}
          <line x1="60" y1={baseY} x2={W-20} y2={baseY} stroke="#2b2440" strokeWidth="3"/>
        </svg>
      </div>
    </div>
  );
}

/* ---------- 圖表：MBTI十六宮格 ---------- */
const MBTI_GRID=[["INTJ","INTP","ENTJ","ENTP"],["INFJ","INFP","ENFJ","ENFP"],["ISTJ","ISFJ","ESTJ","ESFJ"],["ISTP","ISFP","ESTP","ESFP"]];
const MBTI_ROW_INFO=[["分析家",'#E4D6FF'],["外交家",'#D3F2DF'],["守護者",'#D6E7FF'],["探險家",'#FFF1C2']];
function MbtiChart({db}){
  const ref=useRef(null);
  if(!db.characters.length) return <div className="empty">還沒有角色，先到「角色」板塊建立吧！</div>;
  const typeOf=c=>{ const m=String(c.mbti||"").toUpperCase().match(/[IE][NS][TF][JP]/); return m?m[0]:null; };
  const byType={};
  const unknown=[];
  db.characters.forEach(c=>{ const t=typeOf(c); if(t){ (byType[t]=byType[t]||[]).push(c); } else unknown.push(c); });
  return (

/* ---------- 圖表：角色年表對照圖 ---------- */
function MultiTimelineChart({db}){
  const [sel,setSel]=useState([]);
  const ref=useRef(null);
  const withEv=db.characters.filter(c=>(c.events||[]).length);
  if(!withEv.length) return <div className="empty">還沒有任何角色填寫「個人事件」。先到「角色」板塊，在角色主設定底部的「個人事件」新增年表吧！</div>;
  const toggle=id=>setSel(prev=>prev.includes(id)?prev.filter(x=>x!==id):[...prev,id]);
  const picked=withEv.filter(c=>sel.includes(c.id));
  const merged=picked.flatMap(c=>(c.events||[]).filter(e=>e.checked).map(e=>({c,e})))
    .sort((a,b)=>naturalCompare(a.e.time,b.e.time));
  return (
    <div>
      <div className="row" style={{marginBottom:10}}>
        <span style={{fontWeight:800,fontSize:14}}>勾選角色：</span>
        {withEv.map(c=>(
          <span key={c.id} className={"chip"+(sel.includes(c.id)?" on":"")} onClick={()=>toggle(c.id)}>
            {sel.includes(c.id)?"✓ ":""}{c.name||"未命名角色"}
          </span>
        ))}
        {picked.length>0 && <button className="btn small mint" onClick={()=>downloadNode(ref,"角色年表對照圖.png")}>⬇ 下載PNG</button>}
      </div>
      {picked.length===0
        ? <div className="empty">勾選一位以上的角色，把他們的個人事件放上同一條時間軸。</div>
        : merged.length===0
          ? <div className="empty">所選角色沒有「已勾選加入時間軸」的個人事件。</div>
          : <div className="canvas-stage" ref={ref}>
              <div style={{fontWeight:900,fontSize:18,textAlign:"center",marginBottom:10}}>🧵 角色年表對照圖</div>
              <div className="row" style={{justifyContent:"center",marginBottom:8}}>
                {picked.map(c=>(
                  <span key={c.id} style={{display:"inline-flex",alignItems:"center",gap:5,fontSize:12,fontWeight:800}}>
                    <span style={{width:10,height:10,borderRadius:"50%",background:isHex(c.color)?c.color:"#9e9e9e",border:"1.5px solid #2b2440"}}></span>
                    {c.name||"未命名"}
                  </span>
                ))}
              </div>
              <div className="timeline">
                {merged.map(({c,e},i)=>(
                  <div className="timeline-item" key={i}>
                    <div className="row" style={{gap:6}}>
                      <span style={{background:isHex(c.color)?c.color:"#9e9e9e",color:"#fff",fontWeight:900,fontSize:11,padding:"0 8px",borderRadius:8,border:"1.5px solid #2b2440"}}>{c.name||"未命名"}</span>
                      <span className="t-time">{e.time||"（未填時間）"}</span>
                    </div>
                    <div className="t-title">{e.title||"（未命名事件）"}</div>
                    {e.description && <div className="t-desc">{e.description}</div>}

                ))}
              </div>
              <div style={{textAlign:"right",fontSize:11,fontWeight:800,color:"rgba(43,36,64,.5)"}}>─ 你也來搞OC吧！ ─</div>
            </div>}
    </div>
  );
}

/* ---------- 圖表：象限圖 ---------- */
function QuadrantChart({db,mutate}){
  const ref=useRef(null);
  const boxRef=useRef(null);
  const dragId=useRef("");
  const [livePos,setLivePos]=useState(null);
  const chars=db.characters;
  const qd=db.quadrant||defaultQuadrant();
  const mq=fn=>mutate(d=>{ if(!d.quadrant) d.quadrant=defaultQuadrant(); fn(d.quadrant); });
  if(!chars.length) return <div className="empty">還沒有角色，先到「角色」板塊建立吧！</div>;
  const placed=chars.filter(c=>qd.pos[c.id]);
  const pool=chars.filter(c=>!qd.pos[c.id]);
  const relOf=e=>{
    const r=boxRef.current.getBoundingClientRect();
    const x=Math.min(0.97,Math.max(0.03,(e.clientX-r.left)/r.width));
    const y=Math.min(0.96,Math.max(0.04,(e.clientY-r.top)/r.height));
    return {x,y};
  };
  const onMove=e=>{
    if(!dragId.current) return;
    e.preventDefault();
    setLivePos({cid:dragId.current,...relOf(e)});
  };
  const onUp=e=>{
    if(!dragId.current) return;
    const {x,y}=relOf(e);
    const cid=dragId.current;
    dragId.current="";
    setLivePos(null);
    mq(q=>{ q.pos[cid]={x,y}; });
  };
  const posOf=cid=>{
    if(livePos&&livePos.cid===cid) return livePos;
    return qd.pos[cid];
  };
  const axisInput=(val,setter,w)=>(
    <input type="text" value={val} style={{width:w||90,fontWeight:800,textAlign:"center"}} onChange={setter}/>
  );
  return (
    <div>
      <div className="row" style={{marginBottom:8}}>
        <input type="text" value={qd.title} placeholder="象限圖標題" style={{flex:1,minWidth:160,fontWeight:800}}
               onChange={e=>mq(q=>{q.title=e.target.value;})}/>
        <button className="btn small mint" onClick={()=>downloadNode(ref,(qd.title||"象限圖")+".png")}>⬇ 下載PNG</button>
      </div>
      <div className="row" style={{marginBottom:8,fontSize:13}}>
        <span style={{fontWeight:800}}>X軸：</span>
        {axisInput(qd.xLeft,e=>mq(q=>{q.xLeft=e.target.value;}))}
        <span>↔</span>
        {axisInput(qd.xRight,e=>mq(q=>{q.xRight=e.target.value;}))}
        <span style={{fontWeight:800,marginLeft:10}}>Y軸：</span>
        {axisInput(qd.yTop,e=>mq(q=>{q.yTop=e.target.value;}))}
        <span>↕</span>
        {axisInput(qd.yBottom,e=>mq(q=>{q.yBottom=e.target.value;}))}
        <span style={{fontWeight:800,marginLeft:10}}>畫布：</span>
        <input type="text" value={qd.w||560} style={{width:64,textAlign:"center"}}
               onChange={e=>mq(q=>{q.w=Math.max(280,Math.min(1200,+e.target.value||560));})}/>
        <span>×</span>
        <input type="text" value={qd.h||420} style={{width:64,textAlign:"center"}}
               onChange={e=>mq(q=>{q.h=Math.max(240,Math.min(1200,+e.target.value||420));})}/>
        <span className="hint">px</span>
      </div>
      <div className="item-card">
        <b style={{fontSize:13}}>待放置（點擊即放到中央，之後可自由拖曳）：</b>
        <div className="row" style={{marginTop:6}}>
          {pool.length?pool.map(c=>(
            <span key={c.id} className="chip" onClick={()=>mq(q=>{q.pos[c.id]={x:0.5,y:0.5};})}>
              ＋ {c.name||"未命名角色"}
            </span>
          )):<span className="hint">全員已上場！拖曳頭像調整位置。</span>}
        </div>
        {placed.length>0 &&
          <div className="row" style={{marginTop:6}}>
            <span style={{fontSize:12,fontWeight:800}}>已放置：</span>
            {placed.map(c=>(
              <span key={c.id} className="chip on" style={{fontSize:11.5}}
                    onClick={()=>mq(q=>{delete q.pos[c.id];})}>{c.name||"未命名"} ✕</span>
            ))}
          </div>}
      </div>
      <div className="canvas-stage" ref={ref} style={{padding:14}}>
        <div style={{fontWeight:900,fontSize:18,textAlign:"center",marginBottom:8}}>{qd.title||"象限圖"}</div>
        <div style={{display:"flex",justifyContent:"center"}}>
          <div ref={boxRef}
               onPointerMove={onMove} onPointerUp={onUp} onPointerLeave={onUp}
               style={{position:"relative",width:"min("+(qd.w||560)+"px,100%)",height:(qd.h||420),border:"2.5px solid #2b2440",borderRadius:12,
                       background:"linear-gradient(to right,rgba(108,76,224,.06) 50%,rgba(255,93,143,.06) 50%)",
                       touchAction:"none",overflow:"hidden"}}>
            <div style={{position:"absolute",left:"50%",top:0,bottom:0,width:2.5,background:"#2b2440",opacity:.75}}></div>
            <div style={{position:"absolute",top:"50%",left:0,right:0,height:2.5,background:"#2b2440",opacity:.75}}></div>
            <span style={{position:"absolute",top:6,left:"50%",transform:"translateX(-50%)",fontWeight:900,fontSize:13,background:"#fff",border:"2px solid #2b2440",borderRadius:8,padding:"0 10px"}}>{qd.yTop||"上"}</span>
            <span style={{position:"absolute",bottom:6,left:"50%",transform:"translateX(-50%)",fontWeight:900,fontSize:13,background:"#fff",border:"2px solid #2b2440",borderRadius:8,padding:"0 10px"}}>{qd.yBottom||"下"}</span>
            <span style={{position:"absolute",left:6,top:"50%",transform:"translateY(-50%)",fontWeight:900,fontSize:13,background:"#fff",border:"2px solid #2b2440",borderRadius:8,padding:"0 10px"}}>{qd.xLeft||"左"}</span>
            <span style={{position:"absolute",right:6,top:"50%",transform:"translateY(-50%)",fontWeight:900,fontSize:13,background:"#fff",border:"2px solid #2b2440",borderRadius:8,padding:"0 10px"}}>{qd.xRight||"右"}</span>
            {placed.map(c=>{
              const pos=posOf(c.id);
              if(!pos) return null;
              return (
                <div key={c.id}
                     onPointerDown={e=>{e.preventDefault();dragId.current=c.id;}}
                     style={{position:"absolute",left:(pos.x*100)+"%",top:(pos.y*100)+"%",transform:"translate(-50%,-50%)",
                             display:"flex",flexDirection:"column",alignItems:"center",cursor:"grab",zIndex:2,userSelect:"none"}}>
                  <AvatarCircle name={c.name} color={c.color} avatar={c.avatar} size={38}/>
                  <span style={{fontSize:11,fontWeight:900,background:"rgba(255,255,255,.9)",border:"1.5px solid #2b2440",borderRadius:8,padding:"0 6px",marginTop:2,whiteSpace:"nowrap"}}>{c.name||"未命名"}</span>
                </div>
              );
            })}
          </div>
        </div>
        <div style={{textAlign:"right",fontSize:11,fontWeight:800,color:"rgba(43,36,64,.5)",marginTop:6}}>─ 你也來搞OC吧！ ─</div>
      </div>
      <div className="footnote">頭像可在象限內自由拖曳（滑鼠或觸控皆可）；位置會自動儲存。點「已放置」列的名字可將角色移回待放置區。</div>
    </div>
  );
}

  if(!chars.length) return <div className="empty">還沒有角色，先到「角色」板塊建立吧！</div>;
  const color=isHex(c.color)?c.color:"#6c4ce0";
  const date=new Date().toLocaleDateString("zh-TW",{year:"numeric",month:"long",day:"numeric"});
  const F=VOICE_FORMATS[fmt];
  const parts=F.wrap(c,text||F.placeholder,date);
  const isSocial=fmt==="social";
  return (
    <div>
      <div className="row" style={{marginBottom:8}}>
        <span style={{fontWeight:800,fontSize:13}}>以誰的視角：</span>
        <select value={cid} onChange={e=>setCid(e.target.value)} style={{maxWidth:180}}>
          {chars.map(x=><option key={x.id} value={x.id}>{x.name||"未命名角色"}</option>)}
        </select>
        <span style={{fontWeight:800,fontSize:13}}>格式：</span>
        {Object.keys(VOICE_FORMATS).map(k=>(
          <span key={k} className={"chip"+(fmt===k?" on":"")} onClick={()=>setFmt(k)}>{VOICE_FORMATS[k].name}</span>
        ))}
        <RatioSelect/>
        <button className="btn small mint" onClick={()=>downloadNode(ref,(c.name||"角色")+"_"+F.name+".png")}>⬇ 下載PNG</button>
      </div>
      <div className="field">
        <label>以「{c.name||"未命名角色"}」的口吻寫下內容（會自動帶入名字與今天的日期）</label>
        <textarea value={text} onChange={e=>setText(e.target.value)} placeholder={F.placeholder} style={{minHeight:120}}/>
      </div>
      <div style={{display:"flex",justifyContent:"center",marginTop:8}}>
        <div ref={ref} style={{width:440,maxWidth:"100%",background:isSocial?"#fff":"#fffdf7",
             border:"3px solid #2b2440",borderRadius:isSocial?16:6,overflow:"hidden",
             boxShadow:"6px 6px 0 rgba(43,36,64,.85)",backgroundImage:fmt==="diary"?"repeating-linear-gradient(transparent,transparent 27px,rgba(43,36,64,.08) 28px)":"none"}}>
          {isSocial &&
            <div style={{display:"flex",alignItems:"center",gap:10,padding:"12px 16px",borderBottom:"2px solid rgba(43,36,64,.15)"}}>
              {c.avatar?<img src={c.avatar} alt="" style={{width:44,height:44,borderRadius:"50%",border:"2px solid #2b2440",objectFit:"cover"}}/>
                       :<AvatarCircle name={c.name} color={c.color} avatar="" size={44}/>}
              <div>
                <div style={{fontWeight:900,fontSize:15}}>{c.name||"未命名角色"}</div>
                <div style={{fontSize:12,color:"rgba(43,36,64,.55)"}}>{parts.header}</div>
              </div>
            </div>}
          <div style={{padding:"16px 20px"}}>
            {!isSocial && parts.header &&
              <div style={{fontWeight:900,fontSize:13,color,marginBottom:10,borderBottom:"2px solid "+color,paddingBottom:6}}>{parts.header}</div>}
            <div style={{fontSize:15,lineHeight:1.9,whiteSpace:"pre-wrap",color:"#2b2440",minHeight:60}}>{parts.body}</div>
            {parts.sign &&
              <div style={{marginTop:14,fontSize:13,fontWeight:700,color:isSocial?"rgba(43,36,64,.55)":color,textAlign:isSocial?"left":"right",whiteSpace:"pre-wrap",borderTop:isSocial?"2px solid rgba(43,36,64,.12)":"none",paddingTop:isSocial?10:0}}>{parts.sign}</div>}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ---------- 圖表：視覺化設定卡 ---------- */
function VisualCardChart({db}){
  const chars=db.characters;
  const [cid,setCid]=useState(chars[0]?chars[0].id:"");
  const [pid,setPid]=useState("main");
  const [scheme,setScheme]=useState("base");
  const [layout,setLayout]=useState("side");     // side=立繪在左；top=立繪在上；none=不放立繪
  const [artFit,setArtFit]=useState("fill");    // fill=填滿欄位（裁切）；contain=完整顯示；balance=自動平衡
  const [showRel,setShowRel]=useState(true);
  const [showFields,setShowFields]=useState(true);
  const [showDesc,setShowDesc]=useState(true);
  const ref=useRef(null);
  const c=chars.find(x=>x.id===cid)||chars[0];
  if(!chars.length) return <div className="empty">還沒有角色，先到「角色」板塊建立吧！</div>;
  const profiles=[{key:"main",label:"主設定",p:c}].concat((c.auProfiles||[]).map(pp=>({key:pp.id,label:"AU："+profileAuName(db.worlds,pp),p:pp})));
  const cur=profiles.find(x=>x.key===pid)||profiles[0];
  const p=cur.p;
  const dispName = cur.key==="main" ? (c.name||"未命名角色") : (auDisplayName(c,p)||p.name||c.name||"未命名角色");
  const baseColor=isHex(p.color)?p.color:(isHex(c.color)?c.color:"#9e9e9e");
  const th=cardTheme(baseColor,scheme);
  const art=p.artwork||c.artwork||"";
  const avatar=p.avatar||c.avatar||"";
  const zodiac=getZodiac(p.birthday);
  const rows=[["age","外貌年齡"],["birthday","生日"],["height","身高"],["weight","體重"],["cv","CV"],["mbti","MBTI"]]
    .map(([k,label])=>[label, k==="birthday"?((p[k]||"")+(zodiac?"（"+zodiac+"）":"")):(p[k]||"")])
    .filter(r=>String(r[1]).trim()!=="");
  // 人際網路（以此角色為中心的放射圖）
  const rels=(p.relationships||[]).filter(r=>chars.some(x=>x.id===r.targetId)).slice(0,8);
  // 半徑依人數自動放大，確保每個節點之間留有足夠弧長；畫布也跟著長大
  const NODE_R=17, SLOT=76;
  const rr=Math.max(76, Math.ceil((rels.length*SLOT)/(2*Math.PI)));
  const MARGIN=58;
  const RW=Math.round((rr+MARGIN)*2), RH=Math.round((rr+MARGIN*0.86)*2);
  const rcx=RW/2, rcy=RH/2;
  // ── 預先算好每個節點、名稱與關係標籤的位置，並排解重疊 ──
  const relLayout=(()=>{
    const n=rels.length;
    const nodes=rels.map((r,i)=>{
      const a=-Math.PI/2+i*2*Math.PI/n;
      return {r,i,a,x:rcx+rr*Math.cos(a),y:rcy+rr*Math.sin(a)};
    });
    // 佔位框：中心頭像、各節點頭像、各節點名稱
    const boxes=[{x:rcx,y:rcy,w:52,h:52}];
    nodes.forEach(nd=>{
      boxes.push({x:nd.x,y:nd.y,w:NODE_R*2+6,h:NODE_R*2+6});
      const nm=String((chars.find(c=>c.id===nd.r.targetId)||{}).name||"？").slice(0,7);
      const cosA=Math.cos(nd.a);
      const nx=rcx+(rr+NODE_R+13)*Math.cos(nd.a), ny=rcy+(rr+NODE_R+13)*Math.sin(nd.a);
      const nw=nm.length*10+8;
      const anchor=Math.abs(cosA)<0.35?"middle":(cosA>0?"start":"end");
      const cx=anchor==="middle"?nx:(anchor==="start"?nx+nw/2:nx-nw/2);
      nd.nm=nm; nd.nx=nx; nd.ny=ny; nd.anchor=anchor;
      nd.ndy=Math.abs(cosA)<0.35?(Math.sin(nd.a)>0?9:-2):4;
      boxes.push({x:cx,y:ny+nd.ndy-5,w:nw,h:15});
    });
    // 關係標籤：沿自己的射線嘗試多個距離與側向偏移，挑選不碰撞的位置
    const hit=(A,B)=>Math.abs(A.x-B.x)*2 < (A.w+B.w)+7 && Math.abs(A.y-B.y)*2 < (A.h+B.h)+5;
    nodes.forEach(nd=>{
      const txt=String(nd.r.relation||"").slice(0,6);
      if(!txt){ nd.label=null; return; }
      const bw=txt.length*10+12, bh=15;
      const ux=Math.cos(nd.a), uy=Math.sin(nd.a);
      const px=-uy, py=ux;                       // 射線的法向
      let best=null, bestCost=Infinity;
      for(const frac of [0.58,0.70,0.46,0.80,0.36]){
        for(const off of [0,13,-13,24,-24,34,-34]){
          const cx=rcx+rr*frac*ux+px*off, cy=rcy+rr*frac*uy+py*off;
          const cand={x:cx,y:cy,w:bw,h:bh};
          let bad=0;
          boxes.forEach(q=>{ if(hit(cand,q)) bad++; });
          const cost=bad*100+Math.abs(frac-0.58)*20+Math.abs(off)*0.6;
          if(cost<bestCost){ bestCost=cost; best={x:cx,y:cy,bw,bh,txt}; }
          if(bad===0) break;
        }
        if(bestCost<10) break;
      }
      nd.label=best;
      if(best) boxes.push({x:best.x,y:best.y,w:bw,h:bh});
    });
    return nodes;
  })();
  const useArt = layout!=="none" && art;
  // 自動平衡：文字越多，立繪欄位越窄，減少下方留白
  const textLen=String(p.appearance||"").length+String(p.description||"").length;
  const sideArtW = artFit==="balance"
    ? Math.max(200,Math.min(300,320-Math.round(textLen/14)))
    : 290;
  return (
    <div>
      <div className="row" style={{marginBottom:8}}>
        <span style={{fontWeight:800,fontSize:13,flex:"none"}}>角色：</span>
        <select value={cid} onChange={e=>{setCid(e.target.value);setPid("main");}} style={{maxWidth:170}}>
          {chars.map(x=><option key={x.id} value={x.id}>{x.name||"未命名角色"}</option>)}
        </select>
        <select value={pid} onChange={e=>setPid(e.target.value)} style={{maxWidth:190}}>
          {profiles.map(x=><option key={x.key} value={x.key}>{x.label}</option>)}
        </select>
        <RatioSelect/>
        <button className="btn small mint" onClick={()=>downloadNode(ref,(dispName||"角色")+"_視覺卡.png")}>⬇ 下載PNG</button>
      </div>
      <div className="row" style={{marginBottom:6,alignItems:"center"}}>
        <span style={{fontSize:11.5,fontWeight:900,color:"rgba(43,36,64,.5)",minWidth:44,flex:"none"}}>版面</span>
        {[["side","立繪在左"],["top","立繪在上"],["none","不放立繪"]].map(([k,label])=>(
          <span key={k} className={"chip"+(layout===k?" on":"")} onClick={()=>setLayout(k)}>{label}</span>
        ))}
        {!art && layout!=="none" && <span className="hint">（此角色尚未上傳立繪，將顯示頭像替代）</span>}
      </div>
      {layout!=="none" &&
        <div className="row" style={{marginBottom:6,alignItems:"center"}}>
          <span style={{fontSize:11.5,fontWeight:900,color:"rgba(43,36,64,.5)",minWidth:44,flex:"none"}}>立繪</span>
          {[["fill","填滿欄位（裁切邊緣）"],["contain","完整顯示（可能留白）"],["balance","自動平衡欄寬"]].map(([k,label])=>(
            <span key={k} className={"chip"+(artFit===k?" on":"")} onClick={()=>setArtFit(k)}>{label}</span>
          ))}
        </div>}
      <div className="row" style={{marginBottom:6,alignItems:"center"}}>
        <span style={{fontSize:11.5,fontWeight:900,color:"rgba(43,36,64,.5)",minWidth:44,flex:"none"}}>內容</span>
        <span className={"chip"+(showFields?" on":"")} onClick={()=>setShowFields(v=>!v)}>{showFields?"✓ ":""}基本資料</span>
        <span className={"chip"+(showDesc?" on":"")} onClick={()=>setShowDesc(v=>!v)}>{showDesc?"✓ ":""}角色描述</span>
        <span className={"chip"+(showRel?" on":"")} onClick={()=>setShowRel(v=>!v)}>{showRel?"✓ ":""}人際網路</span>
        {showRel && rels.length===0 && <span className="hint">（此設定尚無人際關係）</span>}
      </div>
      <HelpTips title="立繪下方留白怎麼辦？" tips={[
        ["🖼","填滿欄位","立繪放大填滿整欄、頂端對齊保留頭部，底部漸層柔化（推薦）"],
        ["🔲","完整顯示","保留整張圖不裁切，文字多時下方會留白"],
        ["⚖","自動平衡","文字越多立繪欄越窄，讓兩側高度接近"],
        ["▯","改用直式","把立繪改放上方，留白問題自然消失"]
      ]}/>
      <div className="row" style={{marginBottom:12,alignItems:"center"}}>
        <span style={{fontSize:11.5,fontWeight:900,color:"rgba(43,36,64,.5)",minWidth:44,flex:"none"}}>配色</span>
        {CARD_SCHEMES.map(([k,label])=>{
          const t2=cardTheme(baseColor,k);
          return (
            <span key={k} onClick={()=>setScheme(k)} title={label}
              style={{display:"inline-flex",alignItems:"center",gap:5,cursor:"pointer",fontSize:12,fontWeight:800,
                      border:scheme===k?"2.5px solid var(--ink)":"2px solid rgba(43,36,64,.25)",borderRadius:999,padding:"2px 10px 2px 4px",
                      background:scheme===k?"var(--sun)":"#fff"}}>
              <span style={{width:15,height:15,borderRadius:"50%",background:t2.head,border:"1.5px solid #2b2440"}}></span>{label}
            </span>
          );
        })}
      </div>

      <div style={{display:"flex",justifyContent:"center"}}>
        <div ref={ref} style={{width:layout==="side"?(sideArtW+430):460,maxWidth:"100%",background:"#fff",
             border:"3px solid "+th.border,borderRadius:20,overflow:"hidden",boxShadow:"7px 7px 0 "+th.shadow}}>
          {/* 卡頭 */}
          <div style={{background:th.head,padding:"14px 20px",borderBottom:"3px solid "+th.border,
               display:"flex",alignItems:"center",gap:12}}>
            {avatar
              ? <img src={avatar} alt="" style={{width:48,height:48,borderRadius:"50%",border:"3px solid #2b2440",objectFit:"cover",background:"#fff",flex:"none"}}/>
              : <div style={{width:48,height:48,borderRadius:"50%",background:"#fff",border:"3px solid #2b2440",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:22,color:th.head,flex:"none"}}>{dispName.slice(0,1)}</div>}
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:900,fontSize:23,color:th.headText,letterSpacing:1,
                   textShadow:th.headText==="#ffffff"?"1px 1px 0 rgba(43,36,64,.55)":"none"}}>{dispName}</div>
              {(p.coreTheme||c.coreTheme) &&
                <div style={{fontSize:12,color:th.headText,opacity:.92,marginTop:1,lineHeight:1.5}}>「{p.coreTheme||c.coreTheme}」</div>}
            </div>
            {cur.key!=="main" && <span style={{background:"#fff",color:th.head,fontWeight:900,fontSize:11,
                 padding:"2px 10px",borderRadius:999,border:"2px solid #2b2440",flex:"none"}}>{cur.label}</span>}
          </div>

          <div style={{display:"flex",flexDirection:layout==="side"?"row":"column",alignItems:"stretch"}}>
            {/* 立繪區 */}
            {layout!=="none" &&
              <div style={{flex:layout==="side"?("0 0 "+sideArtW+"px"):"none",
                   background:th.soft,position:"relative",overflow:"hidden",
                   borderRight:layout==="side"?("3px solid "+th.border):"none",
                   borderBottom:layout==="top"?("3px solid "+th.border):"none",
                   display:"flex",alignItems:artFit==="contain"?"flex-start":"stretch",
                   justifyContent:"center",padding:artFit==="contain"?14:0,
                   minHeight:layout==="top"?260:0}}>
                {useArt
                  ? (artFit==="contain"
                      ? <img src={art} alt="立繪" style={{maxWidth:"100%",maxHeight:layout==="side"?420:300,
                             borderRadius:10,border:"2.5px solid "+th.border,background:"#fff",alignSelf:"flex-start"}}/>
                      /* 填滿模式：以背景圖填滿整欄，圖片頂端對齊（保留頭部）＋底部漸層柔化 */
                      : <div style={{position:"absolute",inset:0,backgroundImage:"url("+art+")",
                             backgroundSize:"cover",backgroundPosition:"top center",backgroundRepeat:"no-repeat"}}>
                          <div style={{position:"absolute",left:0,right:0,bottom:0,height:"22%",
                               background:"linear-gradient(180deg,rgba(255,255,255,0) 0%,"+th.soft+" 100%)"}}></div>
                        </div>)
                  : (avatar
                      ? <img src={avatar} alt="" style={{width:150,height:150,borderRadius:"50%",
                             border:"3px solid "+th.border,objectFit:"cover",alignSelf:"center",margin:14}}/>
                      : <div style={{fontSize:13,color:"rgba(43,36,64,.45)",fontWeight:800,
                             padding:"40px 14px",alignSelf:"center"}}>（尚未上傳立繪）</div>)}
              </div>}

            {/* 資訊區 */}
            <div style={{flex:1,padding:"14px 18px",minWidth:0}}>
              {showFields && rows.length>0 &&
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(112px,1fr))",gap:"6px 10px",marginBottom:12}}>
                  {rows.map(([label,val])=>(
                    <div key={label} style={{background:th.soft,border:"2px solid "+th.border,borderRadius:9,padding:"4px 9px"}}>
                      <div style={{fontSize:9.5,fontWeight:900,color:th.accent,letterSpacing:1}}>{label}</div>
                      <div style={{fontSize:13,fontWeight:800,wordBreak:"break-all"}}>{val}</div>
                    </div>
                  ))}
                </div>}

              {showDesc && (p.appearance||p.description) &&
                <div style={{marginBottom:12}}>
                  {p.appearance &&
                    <div style={{marginBottom:8}}>
                      <div style={{fontSize:10.5,fontWeight:900,color:th.accent,letterSpacing:1,marginBottom:2}}>◆ 外觀</div>
                      <div style={{fontSize:String(p.appearance).length>320?11:12.5,lineHeight:1.75,whiteSpace:"pre-wrap",wordBreak:"break-word"}}>{p.appearance}</div>
                    </div>}
                  {p.description &&
                    <div>
                      <div style={{fontSize:10.5,fontWeight:900,color:th.accent,letterSpacing:1,marginBottom:2}}>◆ 角色描述</div>
                      <div style={{fontSize:String(p.description).length>420?11:12.5,lineHeight:1.75,whiteSpace:"pre-wrap",wordBreak:"break-word"}}>{p.description}</div>
                    </div>}
                </div>}

              {showRel && rels.length>0 &&
                <div>
                  <div style={{fontSize:10.5,fontWeight:900,color:th.accent,letterSpacing:1,marginBottom:4}}>◆ 人際網路</div>
                  <div style={{display:"flex",justifyContent:"center",background:th.soft,border:"2px solid "+th.border,borderRadius:12,padding:4}}>
                    <svg width={RW} height={RH} viewBox={"0 0 "+RW+" "+RH} style={{maxWidth:"100%",fontFamily:'"Noto Sans TC",sans-serif'}}>
                      {/* 連線（最底層） */}
                      {relLayout.map(nd=>{
                        const ux=Math.cos(nd.a), uy=Math.sin(nd.a);
                        const col=isHex(nd.r.lineColor)?nd.r.lineColor:th.accent;
                        const sw=1+((nd.r.strength!=null?nd.r.strength:3)*0.55);
                        return <line key={"l"+nd.r.id} x1={rcx+ux*23} y1={rcy+uy*23}
                                     x2={nd.x-ux*(NODE_R+2)} y2={nd.y-uy*(NODE_R+2)}
                                     stroke={col} strokeWidth={sw} opacity="0.7" strokeLinecap="round"/>;
                      })}
                      {/* 關係標籤（已排解重疊；偏離線時以細虛線標示歸屬） */}
                      {relLayout.map(nd=>{
                        if(!nd.label) return null;
                        const col=isHex(nd.r.lineColor)?nd.r.lineColor:th.accent;
                        const anchorX=rcx+rr*0.58*Math.cos(nd.a), anchorY=rcy+rr*0.58*Math.sin(nd.a);
                        const far=Math.hypot(nd.label.x-anchorX,nd.label.y-anchorY)>16;
                        return (
                          <g key={"t"+nd.r.id}>
                            {far && <line x1={anchorX} y1={anchorY} x2={nd.label.x} y2={nd.label.y}
                                          stroke={col} strokeWidth="1" opacity="0.45" strokeDasharray="2 3"/>}
                            <rect x={nd.label.x-nd.label.bw/2} y={nd.label.y-nd.label.bh/2}
                                  width={nd.label.bw} height={nd.label.bh} rx="7"
                                  fill="#fff" stroke={col} strokeWidth="1.5"/>
                            <text x={nd.label.x} y={nd.label.y+4} textAnchor="middle" fontSize="9" fontWeight="800" fill="#2b2440">{nd.label.txt}</text>
                          </g>
                        );
                      })}
                      {/* 節點與名稱（最上層） */}
                      {relLayout.map(nd=>{
                        const t=chars.find(x=>x.id===nd.r.targetId);
                        return (
                          <g key={"n"+nd.r.id}>
                            {t&&t.avatar
                              ? <g>
                                  <clipPath id={"vc-"+nd.r.id}><circle cx={nd.x} cy={nd.y} r={NODE_R}/></clipPath>
                                  <image href={t.avatar} x={nd.x-NODE_R} y={nd.y-NODE_R} width={NODE_R*2} height={NODE_R*2}
                                         preserveAspectRatio="xMidYMid slice" clipPath={"url(#vc-"+nd.r.id+")"}/>
                                  <circle cx={nd.x} cy={nd.y} r={NODE_R} fill="none"
                                          stroke={isHex(t&&t.color)?t.color:"#2b2440"} strokeWidth="2.5"/>
                                </g>
                              : <g>
                                  <circle cx={nd.x} cy={nd.y} r={NODE_R} fill={isHex(t&&t.color)?t.color:"#9e9e9e"} stroke="#2b2440" strokeWidth="2"/>
                                  <text x={nd.x} y={nd.y+5} textAnchor="middle" fontSize="13" fontWeight="900" fill="#fff">{nd.nm.slice(0,1)}</text>
                                </g>}
                            <text x={nd.nx} y={nd.ny+nd.ndy} textAnchor={nd.anchor} fontSize="10" fontWeight="800" fill="#2b2440"
                                  stroke="#fff" strokeWidth="3" paintOrder="stroke">{nd.nm}</text>
                          </g>
                        );
                      })}
                      {avatar
                        ? <g>
                            <clipPath id="vc-self"><circle cx={rcx} cy={rcy} r="21"/></clipPath>
                            <image href={avatar} x={rcx-21} y={rcy-21} width="42" height="42" preserveAspectRatio="xMidYMid slice" clipPath="url(#vc-self)"/>
                            <circle cx={rcx} cy={rcy} r="21" fill="none" stroke="#2b2440" strokeWidth="2.5"/>
                          </g>
                        : <g>
                            <circle cx={rcx} cy={rcy} r="21" fill={th.head} stroke="#2b2440" strokeWidth="2.5"/>
                            <text x={rcx} y={rcy+6} textAnchor="middle" fontSize="16" fontWeight="900" fill={th.headText}>{dispName.slice(0,1)}</text>
                          </g>}
                    </svg>
                  </div>
                </div>}
            </div>
          </div>
          <div style={{background:th.soft,borderTop:"2.5px solid "+th.border,padding:"4px 16px",
               textAlign:"right",fontSize:10.5,fontWeight:900,color:th.accent}}>─ 你也來搞OC吧！ ─</div>
        </div>
      </div>
    </div>
  );
}

                    background:bg==="custom"?"var(--sun)":"#fff"}}>

        <button className="btn small sun" onClick={()=>bgFileRef.current.click()}>

        {customBg && <button className="btn small danger" onClick={()=>{setCustomBg("");if(bg==="custom")setBg("classroom");}}>移除</button>}
        <input type="file" ref={bgFileRef} accept="image/*" style={{display:"none"}}
          onChange={e=>{

      </div>
      {usingCustom &&

          {[["cover","填滿裁切"],["contain","完整顯示"],["stretch","拉伸鋪滿"]].map(([k,label])=>(

                 boxShadow:"0 3px 10px rgba(0,0,0,.3)"}}>

            </div>

              <div style={{position:"absolute",left:"3%",right:"3%",bottom:"4%",

                {chatLines.map((line,i)=>{
                  const idx=line.indexOf("：");

                  const hue=(i*67)%360;
                  return (
                    <div key={i} style={{fontSize:orient==="land"?12.5:11,lineHeight:1.65,color:"#fff",
                         overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                      {who && <span style={{fontWeight:900,color:hslToHex(hue,70,72)}}>{who}　</span>}
                      {msg}
                    </div>
                  );
                })}
              </div>}
          </React.Fragment>}
        </div>
      </div>
    </div>
  );
}

function ImpressionChart({db,mutate}){

  const ref=useRef(null);

  const [orient,setOrient]=useState("v");        // v=直式長條；h=橫式表格

  const list=sc.selected;
  const setImp=(cid,idx,val)=>mutate(d=>{
    const c=d.characters.find(x=>x.id===cid); if(!c) return;
    if(!c.impressions) c.impressions={};
    c.impressions[idx]=val;
  });
  if(!db.characters.length) return <div className="empty">還沒有角色，先到「角色」板塊建立吧！</div>;

  const tableW=W-PADX*2;                           // 表格實際可用寬度
  const rowH=orient==="v"?96:78;
  return (
    <div>
      <div className="row" style={{marginBottom:8}}>
        <input type="text" value={title} placeholder="表格標題（如：我對他們的印象變化）"
               style={{flex:1,minWidth:180,fontWeight:800}} onChange={e=>setTitle(e.target.value)}/>
        <RatioSelect/>
        <button className="btn small mint" disabled={!list.length} style={!list.length?{opacity:.5}:{}}
                onClick={()=>downloadNode(ref,(title||"角色印象表")+(blank?"_空白版":"")+".png")}>⬇ 下載PNG</button>
      </div>
      <CharScopePicker sc={sc} title="🎯 納入角色" compact/>
      <div className="row" style={{marginBottom:6,alignItems:"center"}}>
        <span style={{fontSize:11.5,fontWeight:900,color:"rgba(43,36,64,.5)",minWidth:44,flex:"none"}}>版式</span>

        <span className={"chip"+(orient==="h"?" on":"")} onClick={()=>setOrient("h")}>▭ 橫式寬表</span>
        <span className={"chip"+(blank?" on":"")} onClick={()=>setBlank(v=>!v)}>
          {blank?"✓ ":""}空白版（供他人手寫）
        </span>
      </div>
      <div className="row" style={{marginBottom:10,alignItems:"center"}}>
        <span style={{fontSize:11.5,fontWeight:900,color:"rgba(43,36,64,.5)",minWidth:44,flex:"none"}}>欄位</span>
        {cols.map((c,i)=>(
          <input key={i} type="text" value={c} style={{width:120,fontWeight:800}}
                 onChange={e=>setCols(p=>p.map((x,j)=>j===i?e.target.value:x))}/>
        ))}
        {cols.length<4 && <button className="btn small mint" onClick={()=>setCols(p=>[...p,"新欄位"])}>＋欄位</button>}
        {cols.length>1 && <button className="btn small danger" onClick={()=>setCols(p=>p.slice(0,-1))}>－欄位</button>}
      </div>
      <HelpTips title="怎麼用？" tips={[
        ["✍","線上填寫","直接在下方表格輸入，會存進角色資料"],

                {title||"角色印象表"}

                   borderLeft:"2.5px solid #2b2440",background:"#efe7fa",fontWeight:900,fontSize:13.5}}>
                <div style={{width:nameW,flex:"0 0 "+nameW+"px",padding:"7px 10px",
                     borderRight:"2.5px solid #2b2440",borderBottom:"2.5px solid #2b2440"}}>角色</div>
                {cols.map((c,i)=>(

                         background:tint(col,.14)}}>
                      {c.avatar
                        ? <img src={c.avatar} alt="" style={{width:46,height:46,borderRadius:"50%",objectFit:"cover",
                                 border:"3px solid "+col,flex:"none",background:"#fff"}}/>
                        : <span style={{width:46,height:46,borderRadius:"50%",background:col,flex:"none",
                                 border:"3px solid #2b2440",display:"inline-flex",alignItems:"center",
                                 justifyContent:"center",color:"#fff",fontWeight:900,fontSize:19}}>{(c.name||"？").slice(0,1)}</span>}
                      <span style={{fontWeight:900,fontSize:14,wordBreak:"break-word",minWidth:0,flex:1}}>{c.name||"未命名"}</span>
                    </div>
                    {cols.map((_,i)=>{
                      const val=blank?"":String(((c.impressions||{})[i])||"");
                      return (
                        <div key={i} style={{flex:"1 1 0",minWidth:0,padding:"8px 10px",
                             borderRight:"2.5px solid #2b2440",borderBottom:"2.5px solid #2b2440",
                             fontSize:13,lineHeight:1.7,whiteSpace:"pre-wrap",wordBreak:"break-word",

                          {blank?"":(val||"（未填寫）")}
                        </div>
                      );
                    })}
                  </div>
                );
              })}
              <div style={{textAlign:"right",fontSize:11,fontWeight:900,color:"rgba(43,36,64,.45)",marginTop:8}}>─ 你也來搞OC吧！ ─</div>
            </div>
          </div>}

      {!blank && list.length>0 &&
        <div style={{marginTop:12}}>
          <h3 className="section-title"><span className="dot"></span>線上填寫</h3>
          {list.map(c=>(
            <div className="item-card" key={c.id}>
              <div className="row" style={{marginBottom:6}}>
                <AvatarCircle name={c.name} color={c.color} avatar={c.avatar} size={28}/>
                <span style={{fontWeight:900}}>{c.name||"未命名角色"}</span>
              </div>
              <div className="row" style={{alignItems:"flex-start"}}>
                {cols.map((label,i)=>(
                  <div className="field" key={i} style={{flex:1,minWidth:180,marginBottom:0}}>
                    <label style={{fontSize:12}}>{label||"（欄位）"}</label>
                    <textarea value={((c.impressions||{})[i])||""} placeholder={"寫下對「"+(c.name||"他")+"」的"+(label||"印象")+"…"}
                              style={{minHeight:52}} onChange={e=>setImp(c.id,i,e.target.value)}/>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>}
    </div>
  );
}

/* ---------- 圖表：AU對比模式 ---------- */
function AuCompareChart({db}){
  const chars=db.characters;
  const [cid,setCid]=useState(chars[0]?chars[0].id:"");
  const [sel,setSel]=useState([]);   // profile keys: "main" 或 auProfile.id
  const ref=useRef(null);
  const c=chars.find(x=>x.id===cid)||chars[0];
  useEffect(()=>{ setSel([]); },[cid]);
  if(!chars.length) return <div className="empty">還沒有角色，先到「角色」板塊建立吧！</div>;
  const profiles=[{key:"main",label:"主設定",p:c}].concat((c.auProfiles||[]).map(pp=>({key:pp.id,label:"AU："+profileAuName(db.worlds,pp),p:pp})));
  const chosen=profiles.filter(pr=>sel.includes(pr.key));
  const nameOf=pr=> pr.key==="main" ? (c.name||"未命名") : (auDisplayName(c,pr.p)||pr.p.name||"未命名");
  const rows=[["avatar","頭像"],["name","姓名"],["age","外貌年齡"],["birthday","生日"],["height","身高"],["weight","體重"],["cv","CV"],["color","代表色"],["mbti","MBTI"],["song","印象曲"],["appearance","外觀描述"],["description","角色描述"],["coreTheme","核心命題"],["notes","備註"],["analysis","角色分析"]];
  const cellVal=(pr,key)=>{
    const p=pr.p;
    if(key==="name") return nameOf(pr);
    if(key==="birthday"){const z=getZodiac(p.birthday);return p.birthday?(p.birthday+(z?"（"+z+"）":"")):"";}
    return p[key]||"";
  };
  return (
    <div>
      <div className="row" style={{marginBottom:8}}>
        <span style={{fontWeight:800,fontSize:13}}>選擇角色：</span>
        <select value={cid} onChange={e=>setCid(e.target.value)} style={{maxWidth:200}}>
          {chars.map(x=><option key={x.id} value={x.id}>{x.name||"未命名角色"}</option>)}
        </select>
        <RatioSelect/>
        <button className="btn small mint" disabled={chosen.length<2} style={chosen.length<2?{opacity:.45}:{}}
                onClick={()=>downloadNode(ref,(c.name||"角色")+"_AU對比.png")}>⬇ 下載PNG</button>
        {chosen.length<2 && <span className="hint">（勾選2個以上分頁後即可下載）</span>}
      </div>
      <div className="row" style={{marginBottom:10}}>
        <span style={{fontWeight:800,fontSize:13}}>並排的設定分頁（可多選）：</span>
        {profiles.map(pr=>(
          <span key={pr.key} className={"chip"+(sel.includes(pr.key)?" on":"")}
            onClick={()=>setSel(prev=>prev.includes(pr.key)?prev.filter(x=>x!==pr.key):[...prev,pr.key])}>
            {sel.includes(pr.key)?"✓ ":""}{pr.label}
          </span>
        ))}
      </div>
      {(c.auProfiles||[]).length===0 && <div className="footnote" style={{color:"var(--accent)"}}>此角色還沒有AU分頁；到「角色」板塊為他新增AU分頁，就能在此並排比較不同世界線的差異。</div>}
      {chosen.length<2
        ? <div className="empty">請至少勾選兩個設定分頁（主設定＋AU，或多個AU）進行並排比較。</div>
        : <div className="canvas-stage" ref={ref} style={{overflowX:"auto"}}>
            <div style={{fontWeight:900,fontSize:18,textAlign:"center",marginBottom:10}}>🔀 「{c.name||"未命名角色"}」AU設定對比</div>
            <table style={{borderCollapse:"collapse",width:"100%",fontSize:13}}>
              <thead><tr>
                <th style={{border:"2px solid #2b2440",padding:"6px 10px",background:"#efe7fa",width:84}}>欄位</th>
                {chosen.map(pr=>(
                  <th key={pr.key} style={{border:"2px solid #2b2440",padding:"6px 10px",background:tint(pr.p.color||c.color,.2)}}>{pr.label}</th>
                ))}
              </tr></thead>
              <tbody>
                {rows.map(([key,label])=>(
                  <tr key={key}>
                    <th style={{border:"2px solid #2b2440",padding:"5px 8px",background:"#efe7fa",textAlign:"left",fontSize:12.5,verticalAlign:"top"}}>{label}</th>
                    {chosen.map(pr=>{
                      const p=pr.p;
                      if(key==="avatar"){
                        const av=p.avatar||c.avatar;
                        return <td key={pr.key} style={{border:"2px solid #2b2440",padding:"5px 8px",textAlign:"center"}}>
                          {av?<img src={av} alt="" style={{width:48,height:48,borderRadius:"50%",border:"2px solid #2b2440",objectFit:"cover"}}/>
                             :<AvatarCircle name={nameOf(pr)} color={p.color||c.color} avatar="" size={44}/>}
                        </td>;
                      }
                      if(key==="color"){
                        const col=p.color;
                        return <td key={pr.key} style={{border:"2px solid #2b2440",padding:"5px 8px"}}>
                          {isHex(col)?<span style={{display:"inline-flex",alignItems:"center",gap:6}}><span style={{width:16,height:16,borderRadius:5,background:col,border:"2px solid #2b2440"}}></span>{col}</span>:"—"}
                        </td>;
                      }
                      const v=cellVal(pr,key);
                      return <td key={pr.key} style={{border:"2px solid #2b2440",padding:"5px 8px",whiteSpace:"pre-wrap",wordBreak:"break-word",verticalAlign:"top"}}>{v||"—"}</td>;
                    })}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>}
    </div>
  );
}

/* ---------- 圖表：角色歌單製作 ---------- */
function PlaylistMaker({db,mutate}){
  const chars=db.characters;
  const [cid,setCid]=useState(chars[0]?chars[0].id:"");
  const [plid,setPlid]=useState("");
  const cardRef=useRef(null);
  const c=chars.find(x=>x.id===cid)||chars[0];
  useEffect(()=>{ setPlid(""); },[cid]);
  if(!chars.length) return <div className="empty">還沒有角色，先到「角色」板塊建立吧！</div>;
  const mc=fn=>mutate(d=>{const x=d.characters.find(y=>y.id===cid); if(x){ if(!x.playlists) x.playlists=[]; fn(x); }});
  const lists=c.playlists||[];
  const pl=lists.find(x=>x.id===plid);
  return (
    <div>
      <div className="row" style={{marginBottom:8}}>
        <span style={{fontWeight:800,fontSize:13}}>角色：</span>
        <select value={cid} onChange={e=>setCid(e.target.value)} style={{maxWidth:180}}>
          {chars.map(x=><option key={x.id} value={x.id}>{x.name||"未命名角色"}</option>)}
        </select>
        <select value={plid} onChange={e=>setPlid(e.target.value)} style={{maxWidth:200}}>
          <option value="">──選擇歌單──</option>
          {lists.map(x=><option key={x.id} value={x.id}>{x.name||"未命名歌單"}（{(x.songs||[]).length}）</option>)}
        </select>
        <button className="btn small primary" onClick={()=>{
          const id=uid();
          mc(x=>{x.playlists.push({id,name:"新歌單",songs:[]});});
          setPlid(id);
        }}>＋新歌單</button>
      </div>
      {!pl
        ? <div className="empty">選擇或新增一個歌單，開始為「{c.name||"未命名角色"}」收錄多首印象曲。</div>
        : <div>
            <div className="row" style={{marginBottom:8}}>
              <input type="text" value={pl.name} placeholder="歌單名稱" style={{flex:1,minWidth:160,fontWeight:800}}
                     onChange={e=>mc(x=>{x.playlists.find(y=>y.id===plid).name=e.target.value;})}/>
              <RatioSelect/>
              <button className="btn small mint"
                      disabled={(pl.songs||[]).filter(x=>String(x||"").trim()).length===0}
                      style={(pl.songs||[]).filter(x=>String(x||"").trim()).length===0?{opacity:.45}:{}}
                      onClick={()=>downloadNode(cardRef,(c.name||"角色")+"_"+(pl.name||"歌單")+".png")}>⬇ 下載歌單卡PNG</button>
              <button className="btn small danger" onClick={()=>{
                if(confirm("刪除歌單「"+(pl.name||"未命名")+"」？")){ mc(x=>{x.playlists=x.playlists.filter(y=>y.id!==plid);}); setPlid(""); }
              }}>刪除歌單</button>
            </div>
            {(pl.songs||[]).map((sg,si)=>{
              const embed=spotifyEmbedUrl(sg);
              return (
                <div className="item-card" key={si}>
                  <div className="row" style={{marginBottom:embed?6:0,flexWrap:"nowrap"}}>
                    <span style={{fontWeight:900,color:"var(--accent2)",flex:"none"}}>{String(si+1).padStart(2,"0")}</span>
                    <input type="text" value={sg} placeholder="歌名或Spotify連結" style={{flex:1}}
                           onChange={e=>mc(x=>{x.playlists.find(y=>y.id===plid).songs[si]=e.target.value;})}/>
                    <button className="btn small" onClick={()=>mc(x=>{const L=x.playlists.find(y=>y.id===plid); if(si>0){const[m]=L.songs.splice(si,1);L.songs.splice(si-1,0,m);}})}>↑</button>
                    <button className="btn small" onClick={()=>mc(x=>{const L=x.playlists.find(y=>y.id===plid); if(si<L.songs.length-1){const[m]=L.songs.splice(si,1);L.songs.splice(si+1,0,m);}})}>↓</button>
                    <button className="btn small danger" onClick={()=>mc(x=>{x.playlists.find(y=>y.id===plid).songs.splice(si,1);})}>刪</button>
                  </div>
                  {embed
                    ? <iframe src={embed} width="100%" height="80" frameBorder="0" loading="lazy"
                        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
                        style={{borderRadius:12,border:"2px solid var(--ink)",background:"#fff"}} title={"曲目"+si}></iframe>
                    : (sg && <span className="hint">♪ {sg}（純文字，非Spotify連結）</span>)}
                </div>
              );
            })}
            <button className="btn small mint" onClick={()=>mc(x=>{x.playlists.find(y=>y.id===plid).songs.push("");})}>＋新增歌曲</button>
            <HelpTips title="歌單小提示" tips={[
              ["🔗","貼Spotify連結","顯示可播放的嵌入播放器"],
              ["✏","只寫歌名","以純文字保存也沒問題"],
              ["🖼","下載PNG","輸出一張帶曲序的歌單卡"],
              ["💾","自動保存","歌單存在角色資料中"]
            ]}/>
            <h3 className="section-title" style={{marginTop:14}}><span className="dot"></span>歌單卡預覽（即下載樣式）</h3>
            <div style={{display:"flex",justifyContent:"center"}}>
              <div ref={cardRef} style={{width:400,maxWidth:"100%",background:"#fff",border:"3px solid #2b2440",borderRadius:18,overflow:"hidden",boxShadow:"6px 6px 0 rgba(43,36,64,.85)"}}>
                <div style={{background:isHex(c.color)?c.color:"#6c4ce0",padding:"14px 18px",borderBottom:"3px solid #2b2440",display:"flex",alignItems:"center",gap:12}}>
                  {c.avatar
                    ? <img src={c.avatar} alt="" style={{width:46,height:46,borderRadius:"50%",border:"3px solid #2b2440",objectFit:"cover"}}/>
                    : <div style={{width:46,height:46,borderRadius:"50%",background:"#fff",border:"3px solid #2b2440",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:20,color:isHex(c.color)?c.color:"#6c4ce0"}}>{(c.name||"？").slice(0,1)}</div>}
                  <div>
                    <div style={{fontSize:11,color:"#fff",fontWeight:800,opacity:.95}}>🎧 {c.name||"未命名角色"} 的歌單</div>
                    <div style={{fontSize:18,fontWeight:900,color:"#fff",textShadow:"1px 1px 0 rgba(43,36,64,.6)"}}>{pl.name||"未命名歌單"}</div>
                  </div>
                </div>
                <div style={{padding:"10px 16px"}}>
                  {(pl.songs||[]).filter(x=>String(x||"").trim()).length===0
                    ? <div style={{fontSize:13,color:"rgba(43,36,64,.5)",padding:"8px 0"}}>（尚無歌曲）</div>
                    : (pl.songs||[]).map((sg,si)=>{
                        if(!String(sg||"").trim()) return null;
                        const isSp=spotifyEmbedUrl(sg);
                        return (
                          <div key={si} style={{display:"flex",gap:8,alignItems:"center",padding:"5px 0",borderBottom:"1px dashed rgba(43,36,64,.25)",fontSize:13}}>
                            <span style={{fontWeight:900,color:isHex(c.color)?c.color:"#6c4ce0",minWidth:24}}>{String(si+1).padStart(2,"0")}</span>
                            <span style={{flex:1,wordBreak:"break-all"}}>{isSp?"♪ Spotify 曲目":sg}</span>
                          </div>
                        );
                      })}
                  <div style={{textAlign:"right",fontSize:11,fontWeight:900,color:"rgba(43,36,64,.5)",marginTop:8}}>─ 你也來搞OC吧！ ─</div>
                </div>
              </div>
            </div>
          </div>}
    </div>
  );
}

/* ---------- 圖表：角色關係時間軸 ---------- */
function RelTimelineChart({db,mutate}){
  const tls=db.relTimelines||[];
  const [selId,setSelId]=useState("");
  const ref=useRef(null);
  const tl=tls.find(x=>x.id===selId);
  const mt=fn=>mutate(d=>{ if(!d.relTimelines) d.relTimelines=[]; const t=d.relTimelines.find(x=>x.id===selId); if(t) fn(t); });
  const STAGE_ICON={"": "🔗", up:"💗", down:"💔", flat:"➖", peak:"⭐", turn:"🔀"};
  const STAGE_COLOR={"":"#6c4ce0", up:"#35d0a5", down:"#e4572e", flat:"#9e9e9e", peak:"#f5b301", turn:"#4aa3ff"};
  if(!tl){
    return (
      <div>
        <div className="row" style={{marginBottom:10}}>
          <select value={selId} onChange={e=>setSelId(e.target.value)} style={{maxWidth:220}}>
            <option value="">──選擇關係時間軸──</option>
            {tls.map(x=><option key={x.id} value={x.id}>{x.title||"未命名關係軸"}</option>)}
          </select>
          <button className="btn primary" onClick={()=>{
            const id=uid();
            mutate(d=>{ if(!d.relTimelines) d.relTimelines=[]; d.relTimelines.push({id,title:"新的關係歷程",aId:"",bId:"",nodes:[]}); });
            setSelId(id);
          }}>＋新增關係時間軸</button>
        </div>
        <div className="empty">選擇或新增一條「角色關係時間軸」，記錄兩位（或多位）角色關係隨時間的變化歷程。</div>
      </div>
    );
  }
  const chars=db.characters;
  const nameOf=id=>{const c=chars.find(x=>x.id===id);return c?(c.name||"未命名"):"";};
  const a=chars.find(x=>x.id===tl.aId), b=chars.find(x=>x.id===tl.bId);
  return (
    <div>
      <div className="row" style={{marginBottom:10}}>
        <select value={selId} onChange={e=>setSelId(e.target.value)} style={{maxWidth:200}}>
          {tls.map(x=><option key={x.id} value={x.id}>{x.title||"未命名關係軸"}</option>)}
        </select>
        <RatioSelect/>
        {(tl.nodes||[]).length>0 && <button className="btn small mint" onClick={()=>downloadNode(ref,(tl.title||"關係時間軸")+".png")}>⬇ 下載PNG</button>}
        <button className="btn small danger" onClick={()=>{
          if(confirm("刪除關係時間軸「"+(tl.title||"未命名")+"」？")){ mutate(d=>{d.relTimelines=d.relTimelines.filter(x=>x.id!==selId);}); setSelId(""); }
        }}>刪除</button>
      </div>
      <div className="item-card">
        <div className="row" style={{marginBottom:6}}>
          <input type="text" value={tl.title} placeholder="關係歷程標題（如：A與B的十年）" style={{flex:1,minWidth:180,fontWeight:800}}
                 onChange={e=>mt(t=>{t.title=e.target.value;})}/>
        </div>
        <div className="row">
          <span style={{fontWeight:800,fontSize:13}}>關係雙方：</span>
          <select value={tl.aId} onChange={e=>mt(t=>{t.aId=e.target.value;})} style={{maxWidth:150}}>
            <option value="">角色A</option>
            {chars.map(c=><option key={c.id} value={c.id}>{c.name||"未命名"}</option>)}
          </select>
          <span style={{fontWeight:900}}>↔</span>
          <select value={tl.bId} onChange={e=>mt(t=>{t.bId=e.target.value;})} style={{maxWidth:150}}>
            <option value="">角色B</option>
            {chars.map(c=><option key={c.id} value={c.id}>{c.name||"未命名"}</option>)}
          </select>
        </div>
      </div>
      <h3 className="section-title"><span className="dot"></span>關係節點
        <button className="btn small mint" onClick={()=>mt(t=>{ if(!t.nodes) t.nodes=[]; t.nodes.push({id:uid(),time:"",title:"",description:"",stage:""}); })}>＋新增節點</button>
      </h3>
      <div className="footnote">每個節點代表一個關係轉折（初識、和解、決裂…）。「階段」圖示會標在時間軸上，直觀呈現關係升溫或降溫。</div>

        <div className="item-card" key={nd.id}>
          <div className="row" style={{marginBottom:6,flexWrap:"nowrap"}}>
            <input type="text" value={nd.time} placeholder="時間" style={{width:120,flex:"none"}}
                   onChange={e=>mt(t=>{t.nodes[ni].time=e.target.value;})}/>
            <input type="text" value={nd.title} placeholder="關係狀態（如：命運般的初遇）" style={{flex:1,minWidth:130}}
                   onChange={e=>mt(t=>{t.nodes[ni].title=e.target.value;})}/>

              <option value="">🔗 一般</option>
              <option value="up">💗 升溫</option>
              <option value="down">💔 降溫</option>
              <option value="peak">⭐ 高峰</option>
              <option value="turn">🔀 轉折</option>
              <option value="flat">➖ 平淡</option>
            </select>
            <button className="btn small" onClick={()=>mt(t=>{ if(ni>0){const[m]=t.nodes.splice(ni,1);t.nodes.splice(ni-1,0,m);} })}>↑</button>
            <button className="btn small" onClick={()=>mt(t=>{ if(ni<t.nodes.length-1){const[m]=t.nodes.splice(ni,1);t.nodes.splice(ni+1,0,m);} })}>↓</button>
            <button className="btn small danger" onClick={()=>mt(t=>{t.nodes.splice(ni,1);})}>刪</button>
          </div>
          <textarea value={nd.description} placeholder="這個階段發生了什麼…" style={{minHeight:48}}
                    onChange={e=>mt(t=>{t.nodes[ni].description=e.target.value;})}/>
        </div>
      ))}
      {(tl.nodes||[]).length>0 &&
        <div>
          <h3 className="section-title"><span className="dot"></span>預覽（即下載樣式）</h3>
          <div className="canvas-stage" ref={ref}>
            <div style={{fontWeight:900,fontSize:18,textAlign:"center",marginBottom:4}}>🔗 {tl.title||"關係歷程"}</div>
            {(a||b) &&
              <div className="row" style={{justifyContent:"center",marginBottom:12,gap:8}}>
                {a && <span style={{display:"inline-flex",alignItems:"center",gap:5,fontWeight:800,fontSize:13}}>
                  <AvatarCircle name={a.name} color={a.color} avatar={a.avatar} size={26}/>{a.name||"未命名"}</span>}

/* ---------- 創作輔助：問卷模式 ---------- */
const MBTI_TYPES=["INTJ","INTP","ENTJ","ENTP","INFJ","INFP","ENFJ","ENFP","ISTJ","ISFJ","ESTJ","ESFJ","ISTP","ISFP","ESTP","ESFP"];
const COLOR_WORDS={"緋":"#E53935","紅":"#E53935","粉":"#FF6B94","桃":"#FF5D8F","橘":"#FB8C00","橙":"#FB8C00","黃":"#FDD835","綠":"#43A047","藍":"#1E88E5","靛":"#3949AB","紫":"#8E24AA","黑":"#263238","白":"#FAFAFA","灰":"#9E9E9E","棕":"#8D6E63","咖啡":"#8D6E63","金":"#F5B301","銀":"#B0BEC5","青":"#00ACC1","水藍":"#4FC3F7","天藍":"#4FC3F7","薄荷":"#35D0A5","翡翠":"#2E9E6B","酒紅":"#8E2438","藏青":"#2C3E63","薰衣草":"#B39DDB","奶油":"#FFF3C4"};
function smartColor(a){
  const t=String(a||"").trim();
  if(isHex(t)) return t;
  const m=t.match(/#([0-9a-fA-F]{3}|[0-9a-fA-F]{6})/);
  if(m) return "#"+m[1];
  let best="";
  for(const k in COLOR_WORDS){ if(t.includes(k) && k.length>=best.length){ best=k; } }
  return best?COLOR_WORDS[best]:"";
}
const INTERVIEW_SECTIONS=[

  ]}
];
function fieldLabelOf(key){ const d=FIELD_DEFS.find(x=>x.key===key); return d?d.label:key; }
function InterviewMode({db,mutate}){
  const [answers,setAnswers]=useState({});
  const [bonds,setBonds]=useState([]);
  const [target,setTarget]=useState("new");
  const [msg,setMsg]=useState("");
  const setA=(id,v)=>setAnswers(prev=>({...prev,[id]:v}));
  const allItems=INTERVIEW_SECTIONS.flatMap(sec=>sec.items);
  const answered=allItems.filter(it=>(answers[it.id]||"").trim()).length;
  const zodiacPreview=getZodiac(answers.birthday||"");
  const colorPreview=smartColor(answers.color||"");
  const bondTargets=db.characters.filter(c=>c.id!==target);
  const doImport=()=>{
    const hasAnswer=answered>0 || bonds.some(b=>b.targetId);
    if(!hasAnswer){ setMsg("還沒有回答任何問題喔！"); return; }
    const skipped=[];
    let importedName="";
    mutate(d=>{
      let c;
      if(target==="new"){ c=newCharacter(""); d.characters.push(c); }
      else { c=d.characters.find(x=>x.id===target); }
      if(!c) return;
      allItems.forEach(it=>{
        const raw=(answers[it.id]||"").trim();
        if(!raw) return;
        let val=raw;
        if(it.type==="color"){ const h=smartColor(raw); if(h) val=h; }
        if(it.type==="height" && /^\d+(\.\d+)?$/.test(raw)) val=raw+"cm";
        if(!it.map) return;
        if(["appearance","description","coreTheme"].includes(it.map)){
          c[it.map]=c[it.map]?(c[it.map]+"\n"+val):val;
        }else{
          if(!c[it.map]) c[it.map]=val;
          else if(c[it.map]!==val) skipped.push(fieldLabelOf(it.map));
        }
      });
      const qa=[];
      allItems.forEach(it=>{
        const raw=(answers[it.id]||"").trim();
        if(!it.map && raw) qa.push("Q："+it.q+"\nA："+raw);
      });
      if(qa.length){
        const block="【角色訪談】\n"+qa.join("\n\n");
        c.description=c.description?(c.description+"\n\n"+block):block;
      }
      bonds.forEach(b=>{
        if(!b.targetId || b.targetId===c.id) return;
        if(!d.characters.some(x=>x.id===b.targetId)) return;
        if(!c.relationships) c.relationships=[];
        const ex=c.relationships.find(r=>r.targetId===b.targetId);
        if(ex){
          if(b.relation && !ex.relation) ex.relation=b.relation;
          if(b.story) ex.story=ex.story?(ex.story+"\n"+b.story):b.story;
        }else{
          c.relationships.push({id:uid(),targetId:b.targetId,relation:b.relation||"",story:b.story||"",notes:""});
        }
      });
      importedName=c.name||"未命名角色";
    });
    let m="✔ 已將訪談結果匯入角色「"+(importedName||"未命名角色")+"」！";
    if(skipped.length) m+="（下列欄位已有內容，未覆蓋："+[...new Set(skipped)].join("、")+"）";
    setMsg(m);
    setAnswers({}); setBonds([]);
  };
  const renderItem=it=>{
    const v=answers[it.id]||"";
    if(it.type==="textarea") return <textarea value={v} style={{minHeight:52}} onChange={e=>setA(it.id,e.target.value)}/>;
    if(it.type==="mbti") return (
      <select value={v} onChange={e=>setA(it.id,e.target.value)} style={{maxWidth:200}}>
        <option value="">──請選擇──</option>
        {MBTI_TYPES.map(t=><option key={t} value={t}>{t}</option>)}
      </select>
    );
    if(it.type==="birthday") return (
      <div className="row" style={{flexWrap:"nowrap"}}>
        <input type="text" value={v} onChange={e=>setA(it.id,e.target.value)} placeholder="例：3月14日"/>
        {it.id==="birthday" && zodiacPreview && <span className="badge">★ {zodiacPreview}</span>}
      </div>
    );
    if(it.type==="color") return (
      <div className="row" style={{flexWrap:"nowrap"}}>
        <input type="text" value={v} onChange={e=>setA(it.id,e.target.value)} placeholder="#FF5D8F 或 酒紅"/>
        {colorPreview && <span style={{width:26,height:26,borderRadius:8,border:"2px solid var(--ink)",background:colorPreview,flex:"none"}} title={colorPreview}></span>}
      </div>
    );
    return <input type="text" value={v} onChange={e=>setA(it.id,e.target.value)}/>;
  };
  return (
    <div>
      <div className="sub">分區訪談，答完自動寫進角色板塊。</div>
      <HelpTips title="會自動幫你做什麼？" tips={[
        ["📝","基本資料","直接填入對應欄位"],
        ["🎨","顏色名稱","自動轉成色號"],

function ThirtyMode({db,mutate}){
  const [savedMsg,setSavedMsg]=useState("");
  const [theme,setTheme]=useState(0);
  const [pickIdx,setPickIdx]=useState(-1);
  const [pickChar,setPickChar]=useState(null);
  const ref=useRef(null);
  const t=THIRTY_THEMES[theme];
  const items=t.items.split("|");
  const roll=()=>{
    setPickIdx(Math.floor(Math.random()*items.length));
    setPickChar(db.characters.length?db.characters[Math.floor(Math.random()*db.characters.length)]:null);
  };
  return (
    <div>
      <div className="sub">內建七十二套主題，每套三十題，照著畫、照著寫。</div>
      <HelpTips title="怎麼用？" tips={[
        ["📚","選一套主題","從清單挑喜歡的方向"],
        ["🎲","隨機抽題","順便替你抽一位主角"],
        ["💾","存入靈感庫","抽到喜歡的題目就收藏"]
      ]}/>
      <div className="row" style={{marginBottom:12}}>
        <select value={theme} onChange={e=>{setTheme(+e.target.value);setPickIdx(-1);}} style={{maxWidth:220}}>
          {THIRTY_THEMES.map((x,i)=><option key={i} value={i}>{x.name}</option>)}
        </select>
        <button className="btn primary" onClick={roll}>🎲 隨機抽一題</button>
        <button className="btn small mint" onClick={()=>downloadNode(ref,t.name+".png")}>⬇ 下載題目表PNG</button>
      </div>
      {pickIdx>=0 &&
        <div className="row" style={{marginBottom:10}}>
          <span className="badge" style={{fontSize:14}}>
            今日課題：第{pickIdx+1}題「{items[pickIdx]}」{pickChar?("　主角：「"+(pickChar.name||"未命名角色")+"」"):""}
          </span>
          {pickChar &&
            <button className="btn small primary" onClick={()=>{
              mutate(d=>{addInspiration(d,pickChar.id,"30題模式",t.name+" 第"+(pickIdx+1)+"題","題目："+items[pickIdx]);});
              setSavedMsg("✔ 已存入「"+(pickChar.name||"未命名角色")+"」的靈感庫！");
            }}>💾 存入靈感庫</button>}
          {savedMsg && <span className="badge">{savedMsg}</span>}
        </div>}
      <div className="canvas-stage" ref={ref}>
        <div style={{fontWeight:900,fontSize:18,textAlign:"center",marginBottom:12}}>📚 {t.name}</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:6}}>
          {items.map((it,i)=>(
            <div key={i} style={{
              border:"2px solid #2b2440",borderRadius:10,padding:"5px 8px",fontSize:12.5,
              background:i===pickIdx?"var(--sun)":"#fff",
              fontWeight:i===pickIdx?900:700,display:"flex",gap:6
            }}>
              <span style={{color:"var(--accent2)",fontWeight:900,minWidth:22}}>{String(i+1).padStart(2,"0")}</span>
              <span>{it}</span>
            </div>
          ))}
        </div>
        <div style={{textAlign:"right",fontSize:11,fontWeight:800,color:"rgba(43,36,64,.5)",marginTop:8}}>─ 你也來搞OC吧！ ─</div>
      </div>
    </div>
  );
}

      a=chars[i].name||"未命名角色"; b=chars[j].name||"未命名角色";

  };

  const [saved,setSaved]=useState("");
  const [q,setQ]=useState(-1);
  const [ch,setCh]=useState(null);
  const [ans,setAns]=useState("");
  const roll=()=>{
    setQ(Math.floor(Math.random()*QUICK_QUESTIONS.length));
    setCh(db.characters.length?db.characters[Math.floor(Math.random()*db.characters.length)]:null);
    setAns("");
  };
  const rollChar=()=>{ if(db.characters.length) setCh(db.characters[Math.floor(Math.random()*db.characters.length)]); };
  return (
    <div>
      <div className="sub">隨機抽一位角色 ＋ 一道刁鑽問題，用他的口吻回答，磨出專屬聲線。</div>
      <HelpTips title="使用方式" tips={[
        ["⚡","題庫一百題","每次隨機抽選"],
        ["🔄","可換題換人","抽到不順手就重抽"],
        ["💾","滿意的答案","按「存入靈感庫」保存"]
      ]}/>
      <div className="row" style={{marginBottom:12}}>
        <button className="btn primary" onClick={roll}>⚡ 抽題！</button>
        {q>=0 && db.characters.length>1 && <button className="btn small" onClick={rollChar}>🔄 換一位角色</button>}
        {q>=0 && <button className="btn small violet" onClick={()=>{setQ(Math.floor(Math.random()*QUICK_QUESTIONS.length));setAns("");}}>🔄 換一題</button>}
      </div>
      {q<0
        ? <div className="empty">按下「抽題」，看看今天輪到誰接受拷問……</div>
        : <div className="item-card" style={{borderLeft:"6px solid var(--accent2)"}}>
            <div className="row" style={{marginBottom:8}}>
              {ch
                ? <React.Fragment>
                    <AvatarCircle name={ch.name} color={ch.color} avatar={ch.avatar} size={36}/>
                    <span style={{fontWeight:900,fontSize:16}}>{ch.name||"未命名角色"}</span>
                  </React.Fragment>
                : <span style={{fontWeight:900,fontSize:16}}>（隨便一位孩子）</span>}
              <span className="badge">第{q+1}題</span>
            </div>
            <div style={{fontSize:16.5,fontWeight:800,marginBottom:10,lineHeight:1.6}}>Q．{QUICK_QUESTIONS[q]}</div>
            <textarea value={ans} onChange={e=>setAns(e.target.value)} style={{minHeight:80}}
                      placeholder={"用「"+((ch&&ch.name)||"角色")+"」的口吻回答……"}/>
            <div className="row" style={{marginTop:8}}>
              {ch && ans.trim() &&
                <button className="btn small primary" onClick={()=>{
                  mutate(d=>{addInspiration(d,ch.id,"快問快答","第"+(q+1)+"題","Q："+QUICK_QUESTIONS[q]+"\nA："+ans.trim());});
                  setSaved("✔ 已存入「"+(ch.name||"未命名角色")+"」的靈感庫！");
                }}>💾 存入靈感庫</button>}
              {saved && <span className="badge">{saved}</span>}
            </div>
          </div>}
    </div>
  );
}

  "描述{A}此刻最想吃的一頓飯。"
];

  "寫一段{A}與{B}的日常對話，主題是「晚餐吃什麼」。",
  "描述{A}與{B}第一次見面的場景。",
