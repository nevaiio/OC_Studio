<style>
:root{
  --ink:#2b2440;
  --bg:#f6f1fb;
  --paper:#ffffff;
  --accent:#ff5d8f;
  --accent2:#6c4ce0;
  --mint:#35d0a5;
  --sun:#ffd84d;
  --soft:#efe7fa;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  background-image:radial-gradient(rgba(108,76,224,.10) 1.6px, transparent 1.6px);
  background-size:26px 26px;
  color:var(--ink);
  font-family:"Noto Sans TC","PingFang TC","Yuanti TC","Microsoft JhengHei",sans-serif;
  line-height:1.6;
}
.app{max-width:1080px;margin:0 auto;padding:0 16px 80px;}
.topbar{
  position:sticky;top:0;z-index:50;
  background:rgba(246,241,251,.92);backdrop-filter:blur(6px);
  padding:14px 0 10px;margin-bottom:8px;
  border-bottom:2px dashed rgba(43,36,64,.25);
}
.topbar-inner{display:flex;flex-wrap:wrap;align-items:center;gap:12px;}
.logo{
  display:inline-flex;align-items:center;gap:8px;
  font-weight:900;font-size:22px;letter-spacing:1px;
  background:var(--paper);border:2.5px solid var(--ink);border-radius:14px;
  padding:6px 14px;box-shadow:4px 4px 0 var(--ink);
  transform:rotate(-1.5deg);
}
.logo .oc-badge{
  background:var(--accent);color:#fff;border:2px solid var(--ink);
  border-radius:10px;padding:0 8px;font-size:18px;transform:rotate(3deg);
  display:inline-block;
}
.searchbox{
  flex:1;min-width:220px;display:flex;align-items:center;gap:8px;
  background:var(--paper);border:2px solid var(--ink);border-radius:999px;
  padding:6px 14px;box-shadow:3px 3px 0 rgba(43,36,64,.25);
}
.searchbox input{border:none;outline:none;flex:1;font-size:15px;background:transparent;font-family:inherit;color:var(--ink);min-height:auto;}
.searchbox{transition:box-shadow .12s ease;}
.searchbox:focus-within{box-shadow:3px 3px 0 rgba(43,36,64,.25),0 0 0 3px rgba(108,76,224,.2);}
.tabs{display:flex;flex-direction:column;gap:6px;margin:14px 0 16px;}
.tabrow{display:flex;flex-wrap:wrap;align-items:center;gap:7px;}
.tab{
  border:2px solid var(--ink);background:var(--paper);color:var(--ink);
  border-radius:12px 12px 4px 12px;padding:7px 14px;font-size:14.5px;font-weight:700;
  cursor:pointer;box-shadow:3px 3px 0 rgba(43,36,64,.35);font-family:inherit;
  transition:transform .08s ease,background .12s ease;white-space:nowrap;
}
.tab:hover{transform:translateY(-2px);background:#fff;}
.tab.active{background:var(--accent2);color:#fff;box-shadow:3px 3px 0 var(--ink);transform:translateY(-1px);}
.tab-grouplabel{
  font-size:10.5px;font-weight:900;color:rgba(43,36,64,.5);letter-spacing:1.5px;

}
@media(max-width:640px){
  .tabrow{flex-wrap:nowrap;overflow-x:auto;padding-bottom:4px;scrollbar-width:thin;}
  .tab{font-size:13.5px;padding:6px 11px;}
  .tab-grouplabel{min-width:38px;font-size:9.5px;letter-spacing:0;position:sticky;left:0;background:var(--bg,#fdf9f3);z-index:1;}
}
.card{
  position:relative;background:var(--paper);

}
.card.tape::before{
  content:"";position:absolute;top:-12px;left:28px;width:96px;height:24px;
  background:rgba(255,216,77,.75);border:1.5px solid rgba(43,36,64,.35);
  transform:rotate(-3deg);border-radius:3px;
}
.card.tape.tape-pink::before{background:rgba(255,93,143,.55);left:auto;right:36px;transform:rotate(2.5deg);}
.card.tape.tape-mint::before{background:rgba(53,208,165,.55);}
.card h2{margin:0 0 4px;font-size:20px;letter-spacing:1px;}
.card h3{margin:14px 0 6px;font-size:16px;}
.card .sub{font-size:13px;color:rgba(43,36,64,.65);margin-bottom:12px;}
.section-title{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.section-title .dot{width:12px;height:12px;border-radius:50%;background:var(--accent);border:2px solid var(--ink);display:inline-block;}
.grid2{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px 14px;}
.field{display:flex;flex-direction:column;gap:3px;margin-bottom:8px;}
.field label{font-size:13px;font-weight:800;letter-spacing:.5px;}
.field .hint{font-size:11px;color:rgba(43,36,64,.55);}
/* ── 易讀性強化 ── */
body{line-height:1.65;}

.card h2{margin:0 0 6px;}
.sub{line-height:1.6;margin-bottom:12px;}
.section-title{margin:20px 0 10px;}
.item-card{margin-bottom:12px;line-height:1.6;}

input[type=text],textarea,select{

.row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;}

  display:inline-flex;align-items:center;gap:6px;

@media(max-width:760px){.split{grid-template-columns:1fr;}}
.au-tabs{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0;}
.au-tab{
  border:2px solid var(--ink);border-radius:10px 10px 0 0;padding:4px 12px;
  font-size:13px;font-weight:700;cursor:pointer;background:var(--soft);font-family:inherit;
}
.au-tab.active{background:var(--accent);color:#fff;}
.timeline{border-left:3px solid var(--accent2);margin:10px 0 4px 10px;padding-left:18px;}
.timeline-item{position:relative;margin-bottom:14px;}
.timeline-item::before{

  border-radius:50%;background:var(--accent);border:2.5px solid var(--ink);
}
.timeline-item .t-time{font-size:12px;font-weight:900;color:var(--accent2);}
.timeline-item .t-title{font-weight:800;}
.timeline-item .t-desc{font-size:13px;color:rgba(43,36,64,.75);white-space:pre-wrap;}
.search-hit{border:2px dashed var(--accent2);border-radius:12px;padding:10px 12px;margin-bottom:10px;cursor:pointer;background:#fff;}
.search-hit:hover{background:var(--soft);}
.search-hit .where{font-size:12px;font-weight:900;color:var(--accent);}
mark{background:var(--sun);border-radius:3px;padding:0 2px;}
.preview-doc{
  border:2px solid var(--ink);border-radius:12px;background:#fff;

}
.preview-doc h1{font-size:22px;border-bottom:3px double var(--ink);padding-bottom:6px;}

.preview-doc table{border-collapse:collapse;width:100%;font-size:13px;}
.preview-doc td,.preview-doc th{border:1px solid rgba(43,36,64,.5);padding:4px 8px;text-align:left;}
.canvas-stage{background:#fff;border:2px solid var(--ink);border-radius:12px;padding:16px;overflow:auto;}
.footnote{font-size:12px;color:rgba(43,36,64,.55);margin-top:6px;}
.empty{
  border:2px dashed rgba(43,36,64,.4);border-radius:12px;padding:20px;
  text-align:center;color:rgba(43,36,64,.6);font-size:14px;background:rgba(255,255,255,.6);

#print-area{display:none;}
@media print{
  body{background:#fff;}
  #root{display:none;}
  #print-area{display:block;font-size:13px;color:#000;}
}
.spot-link{font-size:12px;font-weight:800;color:var(--mint);text-decoration:underline;word-break:break-all;}
.rel-block{border:2px solid rgba(43,36,64,.5);border-radius:10px;padding:10px;margin-top:8px;background:var(--soft);}
.save-tag{font-size:11px;color:rgba(43,36,64,.5);}

<body>
<div id="root"></div>
<div id="print-area"></div>
<script type="text/babel">
const {useState,useEffect,useLayoutEffect,useMemo,useRef} = React;

/* ---------- 工具 ---------- */
const uid = () => Math.random().toString(36).slice(2,10) + Date.now().toString(36).slice(-3);
const esc = s => String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const nl  = s => esc(s).replace(/\n/g,"<br/>");
const isHex = s => /^#([0-9a-fA-F]{3}|[0-9a-fA-F]{6})$/.test(String(s||"").trim());
const tint = (hex,alpha) => {
  if(!isHex(hex)) return "transparent";
  let h = hex.trim().slice(1);
  if(h.length===3) h = h.split("").map(c=>c+c).join("");
  const r=parseInt(h.slice(0,2),16), g=parseInt(h.slice(2,4),16), b=parseInt(h.slice(4,6),16);
  return `rgba(${r},${g},${b},${alpha})`;
};
function hexToRgb(hex){
  let h=String(hex||"").trim().replace("#","");
  if(h.length===3) h=h.split("").map(c=>c+c).join("");
  if(!/^[0-9a-fA-F]{6}$/.test(h)) return null;
  return {r:parseInt(h.slice(0,2),16),g:parseInt(h.slice(2,4),16),b:parseInt(h.slice(4,6),16)};
}
function rgbToHex(r,g,b){const f=v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,"0");return "#"+f(r)+f(g)+f(b);}
function rgbToHsl(r,g,b){
  r/=255;g/=255;b/=255;
  const mx=Math.max(r,g,b),mn=Math.min(r,g,b);let h,s,l=(mx+mn)/2;
  if(mx===mn){h=s=0;}else{const d=mx-mn;s=l>0.5?d/(2-mx-mn):d/(mx+mn);
    switch(mx){case r:h=(g-b)/d+(g<b?6:0);break;case g:h=(b-r)/d+2;break;default:h=(r-g)/d+4;}h/=6;}
  return {h:h*360,s:s*100,l:l*100};
}
function hslToHex(h,s,l){
  h=(h%360+360)%360;s/=100;l/=100;
  const c=(1-Math.abs(2*l-1))*s, x=c*(1-Math.abs((h/60)%2-1)), m=l-c/2;
  let r=0,g=0,b=0;
  if(h<60){r=c;g=x;}else if(h<120){r=x;g=c;}else if(h<180){g=c;b=x;}
  else if(h<240){g=x;b=c;}else if(h<300){r=x;b=c;}else{r=c;b=x;}
  return rgbToHex((r+m)*255,(g+m)*255,(b+m)*255);
}
function paletteSchemes(hex){
  const rgb=hexToRgb(hex); if(!rgb) return null;
  const {h,s,l}=rgbToHsl(rgb.r,rgb.g,rgb.b);
  return {
    base:hex,
    complement:hslToHex(h+180,s,l),
    analogous:[hslToHex(h-30,s,l),hslToHex(h+30,s,l)],
    triadic:[hslToHex(h+120,s,l),hslToHex(h+240,s,l)],
    split:[hslToHex(h+150,s,l),hslToHex(h+210,s,l)],
    tetrad:[hslToHex(h+90,s,l),hslToHex(h+180,s,l),hslToHex(h+270,s,l)],
    shades:[hslToHex(h,s,Math.max(12,l-28)),hslToHex(h,s,Math.min(92,l+24))],
    muted:hslToHex(h,Math.max(12,s*0.42),Math.min(84,l+16)),
    vivid:hslToHex(h,Math.min(96,s*1.35+12),Math.max(38,Math.min(58,l))),
    textOn: l>58?"#2b2440":"#ffffff"
  };
}
/* 依代表色產生完整的卡片配色（底、邊框、標題、內文、表格） */
function cardTheme(hex,mode){
  const pal=paletteSchemes(hex);
  if(!pal) return {head:"#9e9e9e",headText:"#fff",border:"#2b2440",accent:"#9e9e9e",soft:"#f3f3f3",shadow:"rgba(43,36,64,.85)"};
  const rgb=hexToRgb(hex), hsl=rgbToHsl(rgb.r,rgb.g,rgb.b);
  const softOf=c=>{const r2=hexToRgb(c),h2=rgbToHsl(r2.r,r2.g,r2.b);return hslToHex(h2.h,Math.max(14,h2.s*0.5),92);};
  const pick={
    base:pal.base, complement:pal.complement, analogous:pal.analogous[1],
    triadic:pal.triadic[0], split:pal.split[0], shade:pal.shades[0],
    muted:pal.muted, vivid:pal.vivid
  }[mode]||pal.base;
  const pt=paletteSchemes(pick)||pal;
  return {
    head:pick,
    headText:pt.textOn,
    border:mode==="base"?"#2b2440":pick,
    accent:pick,
    soft:softOf(pick),
    deep:hslToHex(rgbToHsl(hexToRgb(pick).r,hexToRgb(pick).g,hexToRgb(pick).b).h,hsl.s,Math.max(18,hsl.l-30)),
    shadow:mode==="base"?"rgba(43,36,64,.85)":pick
  };
}
const CARD_SCHEMES=[["base","代表色"],["vivid","鮮豔"],["muted","柔和"],["shade","深色調"],
  ["analogous","類似色"],["complement","互補色"],["split","分裂互補"],["triadic","三等分"]];
/* ── 儲存層 ──
   IndexedDB 為主（容量以GB計，足以放立繪），localStorage 作為後備，
   若在 Claude 環境則同時寫入 window.storage。
   部署到 GitHub Pages 等靜態網站時同樣可用（同源即同一份存檔）。 */
const OC_KEY="oc-app-data";
const IDB={
  db:null,
  open(){
    if(this.db) return Promise.resolve(this.db);
    return new Promise((res,rej)=>{
      if(!window.indexedDB) return rej(new Error("no-idb"));
      const req=indexedDB.open("oc-maker",1);
      req.onupgradeneeded=()=>{ const d=req.result; if(!d.objectStoreNames.contains("kv")) d.createObjectStore("kv"); };
      req.onsuccess=()=>{ this.db=req.result; res(this.db); };
      req.onerror=()=>rej(req.error);
    });
  },
  async get(k){
    const d=await this.open();
    return new Promise((res,rej)=>{
      const t=d.transaction("kv","readonly").objectStore("kv").get(k);
      t.onsuccess=()=>res(t.result||null); t.onerror=()=>rej(t.error);
    });
  },
  async set(k,v){
    const d=await this.open();
    return new Promise((res,rej)=>{
      const t=d.transaction("kv","readwrite").objectStore("kv").put(v,k);
      t.onsuccess=()=>res(true); t.onerror=()=>rej(t.error);
    });
  }
};
const OCStore={
  mode:"idb",
  async get(key){
    try{ const v=await IDB.get(key); if(v) return v; }catch(e){ OCStore.mode="local"; }
    try{ const v=localStorage.getItem(key); if(v) return v; }catch(e){}
    try{ if(window.storage){ const r=await window.storage.get(key); if(r&&r.value) return r.value; } }catch(e){}
    return null;
  },
  async set(key,val){
    let ok=false, quota=false, via="";
    try{ await IDB.set(key,val); ok=true; via="idb"; }
    catch(e){ OCStore.mode="local"; }
    if(!ok){
      try{ localStorage.setItem(key,val); ok=true; via="local"; }
      catch(e){ if(e && /quota|exceeded/i.test(e.name+""+e.message)) quota=true; }
    }else{
      // IndexedDB 成功時，順手在 localStorage 留一份小備份（超量就略過）
      try{ if(val.length<4000000) localStorage.setItem(key,val); }catch(e){}
    }
    try{ if(window.storage){ await window.storage.set(key,val); ok=true; } }catch(e){}
    return {ok,quota,via};
  }
};
function saveBlob(blob,name){
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob); a.download=name;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{URL.revokeObjectURL(a.href); a.remove();},800);
}
function naturalCompare(a,b){
  return String(a||"").localeCompare(String(b||""),"zh-Hant",{numeric:true,sensitivity:"base"});
}
function spotifyEmbedUrl(url){
  const m=String(url||"").match(/open\.spotify\.com\/(?:intl-[\w-]+\/)?(track|album|playlist|episode)\/([A-Za-z0-9]+)/);
  return m ? ("https://open.spotify.com/embed/"+m[1]+"/"+m[2]) : null;
}
function readImageFile(file,cb,maxSize,quality,keepAlpha){
  const reader=new FileReader();
  reader.onload=()=>{
    const img=new Image();
    img.onload=()=>{
      const max=maxSize||256;
      const scale=Math.min(1,max/Math.max(img.width,img.height));
      const w=Math.round(img.width*scale), h=Math.round(img.height*scale);
      const canvas=document.createElement("canvas");
      canvas.width=w; canvas.height=h;
      const ctx=canvas.getContext("2d");
      // 需要保留透明度時（PNG／WebP／GIF）不填白底，直接輸出PNG
      const alpha = keepAlpha!==false &&
        /image\/(png|webp|gif)/i.test(file.type||"");
      if(!alpha){ ctx.fillStyle="#ffffff"; ctx.fillRect(0,0,w,h); }
      ctx.drawImage(img,0,0,w,h);
      cb(alpha ? canvas.toDataURL("image/png") : canvas.toDataURL("image/jpeg",quality||0.86));
    };
    img.src=String(reader.result);
  };
  reader.readAsDataURL(file);
}
/* 自動去背：支援三種模式
   corners = 從四角洪水填充（安全，保留角色顏色）
   global  = 全圖比對背景色（可清掉肢體之間的縫隙）
   point   = 從使用者點選處洪水填充（精準清除指定區域） */
function removeBackground(dataUrl,tolerance,cb,mode,seed){
  const img=new Image();
  img.onload=()=>{
    const w=img.width,h=img.height;
    const canvas=document.createElement("canvas");
    canvas.width=w; canvas.height=h;
    const ctx=canvas.getContext("2d");
    ctx.drawImage(img,0,0);
    const id=ctx.getImageData(0,0,w,h);
    const d=id.data;
    const tol=(tolerance==null?38:tolerance);
    const at=(x,y)=>(y*w+x)*4;
    const md=mode||"corners";
    // 決定背景基準色
    let br,bg,bb;
    if(md==="point" && seed){
      const sx=Math.max(0,Math.min(w-1,Math.round(seed.x)));
      const sy=Math.max(0,Math.min(h-1,Math.round(seed.y)));
      const i=at(sx,sy);
      if(d[i+3]<10){ cb(dataUrl); return; }      // 點到已透明處，不動作
      br=d[i]; bg=d[i+1]; bb=d[i+2];
    }else{
      const corners=[[0,0],[w-1,0],[0,h-1],[w-1,h-1]];
      if(corners.every(([x,y])=>d[at(x,y)+3]<10)){ cb(dataUrl); return; }
      br=0;bg=0;bb=0;
      corners.forEach(([x,y])=>{const i=at(x,y);br+=d[i];bg+=d[i+1];bb+=d[i+2];});
      br/=4; bg/=4; bb/=4;
    }
    const near=i=>{
      if(d[i+3]<10) return false;
      const dr=d[i]-br, dg=d[i+1]-bg, db=d[i+2]-bb;
      return Math.sqrt(dr*dr+dg*dg+db*db) <= tol;
    };
    const changed=new Uint8Array(w*h);
    if(md==="global"){
      for(let p2=0;p2<w*h;p2++){
        const i=p2*4;
        if(near(i)){ d[i+3]=0; changed[p2]=1; }
      }
    }else{
      const seen=new Uint8Array(w*h);
      const stack=[];
      if(md==="point" && seed){
        stack.push(Math.round(seed.x),Math.round(seed.y));
      }else{
        stack.push(0,0, w-1,0, 0,h-1, w-1,h-1);
      }
      while(stack.length){
        const y=stack.pop(), x=stack.pop();
        if(x<0||y<0||x>=w||y>=h) continue;
        const p2=y*w+x;
        if(seen[p2]) continue;
        const i=p2*4;
        if(!near(i)) continue;
        seen[p2]=1;
        d[i+3]=0; changed[p2]=1;
        stack.push(x+1,y, x-1,y, x,y+1, x,y-1);
      }
    }
    // 邊緣柔化：只處理這次被清除區域的鄰接像素
    const copy=new Uint8ClampedArray(d);
    for(let y=1;y<h-1;y++) for(let x=1;x<w-1;x++){
      const p2=y*w+x, i=p2*4;
      if(copy[i+3]===0) continue;
      let clear=0;
      for(let dy=-1;dy<=1;dy++) for(let dx=-1;dx<=1;dx++){
        if(copy[((y+dy)*w+(x+dx))*4+3]===0) clear++;
      }
      if(clear>0) d[i+3]=Math.max(0,255-clear*34);
    }
    ctx.putImageData(id,0,0);
    cb(canvas.toDataURL("image/png"));
  };
  img.src=dataUrl;
}
function readAvatarFile(file,cb){
  const reader=new FileReader();
  reader.onload=()=>{
    const img=new Image();
    img.onload=()=>{
      const max=256;
      const scale=Math.min(1,max/Math.max(img.width,img.height));
      const w=Math.round(img.width*scale), h=Math.round(img.height*scale);
      const canvas=document.createElement("canvas");
      canvas.width=w; canvas.height=h;
      canvas.getContext("2d").drawImage(img,0,0,w,h);
      cb(canvas.toDataURL("image/jpeg",0.86));
    };
    img.src=String(reader.result);
  };
  reader.readAsDataURL(file);
}

  if(!m) return null;
  const mm=+m[1], dd=+m[2];

};
const WORLD_ALIASES={

  description:["世界觀描述","世界觀","描述","簡介","設定","背景"],

function matchKey(label,aliases){
  const l=label.trim().toLowerCase();
  for(const key in aliases){
    if(aliases[key].some(a=>l===a.toLowerCase())) return key;
  }
  return null;
}
function smartParse(text){
  const lines=String(text||"").split(/\r?\n/);
  const charFields={}, worldFields={};
  let lastTarget=null, extra=[];
  for(const raw of lines){
    const line=raw.trim();
    if(!line) { lastTarget=null; continue; }
    const m=line.match(/^[-•・\*]?\s*(.{1,12}?)\s*[：:]\s*(.*)$/);
    if(m){
      const ck=matchKey(m[1],IMPORT_ALIASES);
      const wk=matchKey(m[1],WORLD_ALIASES);
      if(ck){ charFields[ck]=(charFields[ck]?charFields[ck]+"\n":"")+m[2]; lastTarget=["c",ck]; continue; }
      if(wk){ worldFields[wk]=(worldFields[wk]?worldFields[wk]+"\n":"")+m[2]; lastTarget=["w",wk]; continue; }
    }
    if(lastTarget){
      const [t,k]=lastTarget;
      if(t==="c") charFields[k]=(charFields[k]?charFields[k]+"\n":"")+line;
      else worldFields[k]=(worldFields[k]?worldFields[k]+"\n":"")+line;
    } else { extra.push(line); }
  }
  const hasChar=Object.keys(charFields).length>0;
  const hasWorldWord=/世界觀|worldbuilding/i.test(text);
  let guess="character";
  if(!charFields.name && (hasWorldWord || (!hasChar && Object.keys(worldFields).length>0))) guess="world";
  if(extra.length){
    if(guess==="character") charFields.description=(charFields.description?charFields.description+"\n":"")+extra.join("\n");
    else worldFields.description=(worldFields.description?worldFields.description+"\n":"")+extra.join("\n");
  }
  return {charFields,worldFields,guess};
}
const CSV_COLUMNS=[["name","姓名"],["age","外貌年齡"],["birthday","生日"],["height","身高"],["weight","體重"],["cv","CV"],["color","代表色"],["mbti","MBTI"],["song","印象曲"],["appearance","外觀描述"],["description","角色描述"],["coreTheme","核心命題"],["notes","備註"],["analysis","角色分析"]];
function parseCsv(text){
  // 支援逗號／分號／Tab 分隔、含引號跳脫、換行於引號內；自動去除BOM
  let t=String(text||"").replace(/^\uFEFF/,"").replace(/\r\n/g,"\n").replace(/\r/g,"\n");
  // 依第一行的出現次數自動判斷分隔符（Excel 在部分地區會用分號）
  const head=t.split("\n")[0]||"";
  const cnt=ch=>(head.split(ch).length-1);
  let DELIM=",";
  if(cnt(";")>cnt(",") && cnt(";")>cnt("\t")) DELIM=";";
  else if(cnt("\t")>cnt(",")) DELIM="\t";
  const rows=[]; let row=[], cell="", q=false;
  for(let i=0;i<t.length;i++){
    const ch=t[i];
    if(q){
      if(ch==='"'){ if(t[i+1]==='"'){cell+='"';i++;} else q=false; }
      else cell+=ch;
    }else{
      if(ch==='"') q=true;
      else if(ch===DELIM){ row.push(cell); cell=""; }
      else if(ch==="\n"){ row.push(cell); rows.push(row); row=[]; cell=""; }
      else cell+=ch;
    }
  }
  if(cell!==""||row.length){ row.push(cell); rows.push(row); }
  return rows.filter(r=>r.some(c=>String(c).trim()!==""));
}
function csvHeaderKeys(text){
  const rows=parseCsv(text);
  if(!rows.length) return {rows:[],keys:[],header:[]};
  // 清掉 BOM、全形空白、前後空白與可能的引號殘留
  const header=rows[0].map(h=>String(h).replace(/^\uFEFF/,"").replace(/[\u3000\s]/g,"").trim());
  const keys=header.map(h=>{
    if(!h) return null;
    const lower=h.toLowerCase();
    const hit=CSV_COLUMNS.find(([k,label])=>label===h||k===lower);
    if(hit) return hit[0];
    return matchKey(h,IMPORT_ALIASES);
  });
  return {rows,keys,header};
}
function csvToChars(text){
  const {rows,keys}=csvHeaderKeys(text);
  if(rows.length<2) return [];
  if(!keys.some(Boolean)) return [];
  const out=[];
  for(let i=1;i<rows.length;i++){
    const r=rows[i]; const obj={};
    keys.forEach((k,ci)=>{ if(k && r[ci]!=null && String(r[ci]).trim()!=="") obj[k]=String(r[ci]).trim(); });
    if(Object.keys(obj).length) out.push(obj);
  }
  return out;
}

    groupOpts.push({key:o.id+"|"+g.id,label:(g.name||"未命名組合")+"（"+(o.w.name||"未命名")+"）",g,world:o.w});
  }));
  const poolIds=(()=>{
    const set=new Set();
    if(scope==="all") chars.forEach(c=>set.add(c.id));
    else if(scope==="world"){
      const o=worldOpts.find(x=>x.id===worldSel);
      if(o){
        (o.w.groups||[]).forEach(g=>(g.memberIds||[]).forEach(id=>set.add(id)));
        if(o.isAu) chars.forEach(c=>{ if((c.auProfiles||[]).some(pp=>pp.auWorldId===o.w.id)) set.add(c.id); });
      }
    }else groupSel.forEach(k=>{ const go=groupOpts.find(x=>x.key===k); if(go)(go.g.memberIds||[]).forEach(id=>set.add(id)); });
    return [...set].filter(id=>chars.some(c=>c.id===id));
  })();
  const selectedIds=poolIds.filter(id=>!excluded.includes(id));
  const selected=selectedIds.map(id=>chars.find(c=>c.id===id)).filter(Boolean);
  const reset=()=>{setExcluded([]);};
  return {scope,setScope,worldSel,setWorldSel,groupSel,setGroupSel,excluded,setExcluded,
          worldOpts,groupOpts,poolIds,selectedIds,selected,reset,chars};
}

function ArtworkUpload({value,onChange,label}){
  const fileRef=useRef(null);
  const imgRef=useRef(null);
  const [busy,setBusy]=useState("");
  const [tol,setTol]=useState(38);
  const [orig,setOrig]=useState("");
  const [history,setHistory]=useState([]);
  const [checker,setChecker]=useState(true);
  const [pickMode,setPickMode]=useState(false);
  const [msg,setMsg]=useState("");
  const push=v=>{ setHistory(h=>[...h.slice(-9),value]); onChange(v); };
  const run=(mode,seed)=>{
    if(!value) return;
    setBusy(mode==="global"?"全圖比對中…":(mode==="point"?"清除選取區域…":"去背處理中…"));
    setMsg("");
    setTimeout(()=>{
      removeBackground(value,tol,v=>{
        push(v); setBusy("");
        setMsg(mode==="point"?"✔ 已清除點選處的色塊，可繼續點其他縫隙。":"✔ 完成，可再調整容差或用「點選去除」補刀。");
      },mode,seed);
    },30);
  };
  const onPick=e=>{
    if(!pickMode||!imgRef.current||busy) return;
    const el=imgRef.current;
    const rect=el.getBoundingClientRect();
    const sx=el.naturalWidth/rect.width, sy=el.naturalHeight/rect.height;
    run("point",{x:(e.clientX-rect.left)*sx, y:(e.clientY-rect.top)*sy});

    <div>
      <div className="row" style={{marginBottom:8}}>

        </button>
        {value && <button className="btn small danger" onClick={()=>{ if(confirm("移除這張立繪？")){ onChange(""); setOrig(""); setHistory([]); } }}>移除</button>}

        <input type="file" ref={fileRef} accept="image/*" style={{display:"none"}}
          onChange={e=>{
            const f=e.target.files[0];
            if(f){ setBusy("讀取中…"); readImageFile(f,v=>{onChange(v);setOrig(v);setHistory([]);setBusy("");setMsg("");},900,0.9,true); }
            e.target.value="";
          }}/>
        <span className="hint">全身圖／半身圖皆可，長邊自動縮至900px；<b>PNG／WebP 的透明背景會完整保留</b>。</span>
      </div>

      {value &&
        <div style={{border:"2px dashed rgba(43,36,64,.3)",borderRadius:12,padding:"10px 12px",marginBottom:10,background:"rgba(255,255,255,.6)"}}>
          <div className="row" style={{marginBottom:7,alignItems:"center"}}>
            <span style={{fontWeight:900,fontSize:13.5,flex:"none"}}>✂ 自動去背</span>
            <span style={{fontSize:12,fontWeight:800,flex:"none"}}>容差</span>
            <input type="range" min="8" max="140" value={tol} style={{width:140,accentColor:"var(--accent2)"}}
                   onChange={e=>setTol(+e.target.value)}/>
            <span className="badge">{tol}</span>
          </div>
          <div className="row" style={{marginBottom:7}}>
            <button className="btn small violet" disabled={!!busy} style={busy?{opacity:.5}:{}}
                    onClick={()=>run("corners")}>① 去除外圍背景</button>
            <button className="btn small violet" disabled={!!busy} style={busy?{opacity:.5}:{}}
                    onClick={()=>run("global")}>② 連縫隙一起清</button>
            <button className={"btn small"+(pickMode?" primary":"")} disabled={!!busy} style={busy?{opacity:.5}:{}}
                    onClick={()=>{setPickMode(v=>!v);setMsg(pickMode?"":"👆 現在點預覽圖中要清除的區域（例如手臂與身體之間的縫隙）");}}>
              {pickMode?"👆 點選去除：開啟中":"③ 點選去除"}
            </button>
            {history.length>0 &&
              <button className="btn small" disabled={!!busy} onClick={()=>{
                const last=history[history.length-1];
                if(last!=null){ onChange(last); setHistory(history.slice(0,-1)); setMsg("↺ 已還原上一步。"); }
              }}>↺ 上一步</button>}
            {orig && orig!==value &&
              <button className="btn small" disabled={!!busy} onClick={()=>{push(orig);setMsg("↺ 已回到原始圖片。");}}>⟲ 回到原圖</button>}
            <label className="row" style={{gap:4,fontSize:12,fontWeight:800,cursor:"pointer",flex:"none"}}>
              <input type="checkbox" checked={checker} onChange={e=>setChecker(e.target.checked)}/>透明格底
            </label>
          </div>
          {msg && <div className="badge" style={{marginBottom:7}}>{msg}</div>}
          <HelpTips title="去背三步驟（建議照順序）" tips={[
            ["①","去除外圍背景","從四角清掉與角色相連以外的背景，最安全"],
            ["②","連縫隙一起清","比對整張圖的同色像素，能清掉手臂、髮絲之間的縫隙"],
            ["③","點選去除","開啟後直接點縫隙，只清掉那一塊，最精準"],
            ["🎚","容差","調小＝保守；調大＝清得乾淨但可能吃到角色邊緣"],
            ["↺","隨時還原","「上一步」可逐步退回，「回到原圖」重新開始"],
            ["✅","已是透明PNG","直接上傳即可，不需再去背"]

        </div>}

      {value

                   : "#fff",
                 outline:pickMode?"3px dashed var(--accent)":"none",outlineOffset:3}}>
              <img ref={imgRef} src={value} alt={label||"立繪"} onClick={onPick}
                   style={{maxWidth:"100%",maxHeight:340,display:"block",
                           cursor:pickMode?"crosshair":"default"}}/>

      {pickMode && value &&
        <div className="footnote" style={{textAlign:"center",color:"var(--accent)",fontWeight:800}}>

        </div>}
    </div>
  );
}

function FieldGrid({values,setField,mutateOwner}){
  const zodiac=getZodiac(values.birthday);
  const [sortMode,setSortMode]=useState(false);
  const dragIdx=useRef(-1);
  const order=fieldOrderOf(values);
  const labelOfKey=k=>{
    if(k.startsWith("cf:")){
      const f=(values.customFields||[]).find(x=>"cf:"+x.id===k);
      return f?(f.label||"自訂欄位"):"自訂欄位";
    }
    const d=FIELD_DEFS.find(x=>x.key===k);
    return d?d.label:k;
  };
  const reorder=(from,to)=>{
    if(from<0||from===to) return;
    const a=[...order]; const [m]=a.splice(from,1); a.splice(to,0,m);
    mutateOwner&&mutateOwner(o=>{o.fieldOrder=a;});
  };
  return (
    <div className="grid2">
      <div className="field" style={{gridColumn:"1 / -1"}}>
        <label>頭像</label>
        <AvatarUpload value={values.avatar} name={values.name} color={values.color}
                      onChange={v=>setField("avatar",v)}/>
      </div>
      {mutateOwner &&
        <div className="row" style={{gridColumn:"1 / -1"}}>
          <button className={"btn small"+(sortMode?" violet":"")} onClick={()=>setSortMode(v=>!v)}>
            {sortMode?"✔ 完成排序":"↕ 調整欄位順序"}
          </button>
          <button className="btn small sun" onClick={()=>mutateOwner(o=>{
            if(!o.customFields) o.customFields=[];
            o.customFields.push({id:uid(),label:"自訂欄位",value:""});
          })}>＋新增自訂欄位</button>
          {sortMode && <span className="hint">拖曳下方欄位名稱即可調整順序（含自訂欄位）。</span>}
        </div>}
      {sortMode
        ? <div className="row" style={{gridColumn:"1 / -1"}}>
            {order.map((k,i)=>(
              <span key={k} className="chip" draggable style={{cursor:"grab"}}
                    onDragStart={()=>{dragIdx.current=i;}}
                    onDragOver={e=>e.preventDefault()}
                    onDrop={()=>{const f=dragIdx.current; dragIdx.current=-1; reorder(f,i);}}>
                ⋮⋮ {labelOfKey(k)}
              </span>
            ))}
          </div>
        : order.map(k=>{
            if(k.startsWith("cf:")){
              const cf=(values.customFields||[]).find(x=>"cf:"+x.id===k);
              if(!cf) return null;
              return (
                <div className="field" key={k} style={{gridColumn:"1 / -1"}}>
                  <div className="row" style={{marginBottom:2}}>
                    <input type="text" value={cf.label} placeholder="自訂欄位名稱" style={{maxWidth:200,fontWeight:800}}
                      onChange={e=>mutateOwner(o=>{const f=(o.customFields||[]).find(x=>x.id===cf.id); if(f) f.label=e.target.value;})}/>
                    <button className="btn small danger" onClick={()=>mutateOwner(o=>{
                      o.customFields=(o.customFields||[]).filter(x=>x.id!==cf.id);
                    })}>刪除欄位</button>
                  </div>
                  <textarea value={cf.value} placeholder={"請輸入"+(cf.label||"自訂欄位")+"…"}
                    onChange={e=>mutateOwner(o=>{const f=(o.customFields||[]).find(x=>x.id===cf.id); if(f) f.value=e.target.value;})}/>
                </div>
              );
            }
            const def=FIELD_DEFS.find(d=>d.key===k);
            if(!def) return null;
            const fieldEl=<Field key={def.key} def={def} value={values[def.key]} zodiac={zodiac}
                          onChange={v=>setField(def.key,v)}/>;
            if(def.key==="birthday") return (
              <React.Fragment key="birthday-zodiac">
                {fieldEl}

/* ---------- 事件列表與劇情時間軸 ---------- */
function EventList({world,update}){
  const [showTimeline,setShowTimeline]=useState(false);
  const [tlSort,setTlSort]=useState("manual");
  const dragIdx=useRef(-1);
  const events=world.events||[];
  const move=(from,to)=>{
    if(from<0||to<0||from===to||to>=events.length) return;
    update(w=>{ const [m]=w.events.splice(from,1); w.events.splice(to,0,m); });
  };
  const checkedList=events.filter(e=>e.checked);
  const sorted = tlSort==="time"
    ? [...checkedList].sort((a,b)=>naturalCompare(a.time,b.time))
    : checkedList;
  return (
    <div>
      <h3 className="section-title"><span className="dot"></span>事件列表
        <button className="btn small violet" onClick={()=>setShowTimeline(v=>!v)}>
          {showTimeline?"收起劇情時間軸":"▶ 檢視劇情時間軸"}
        </button>
      </h3>
      <div className="footnote">勾選事件即可加入時間軸；拖曳事件卡左側的 ⋮⋮ 握把可調整順序。時間欄支援「第1章」「0003年春」「10/2」等寫法。</div>
      {events.map((ev,i)=>(
        <div className="item-card" key={ev.id}
             onDragOver={e=>{ if(dragIdx.current>=0) e.preventDefault(); }}
             onDrop={()=>{ const f=dragIdx.current; dragIdx.current=-1; move(f,i); }}>
          <div className="row" style={{marginBottom:6,flexWrap:"nowrap"}}>
            <span draggable style={{cursor:"grab",fontWeight:900,color:"var(--accent2)",fontSize:16,flex:"none",padding:"0 2px"}}
                  title="拖曳調整順序"
                  onDragStart={()=>{dragIdx.current=i;}}
                  onDragEnd={()=>{dragIdx.current=-1;}}>⋮⋮</span>
            <label className="row" style={{gap:4,fontSize:13,fontWeight:800,cursor:"pointer",flex:"none"}}>
              <input type="checkbox" checked={!!ev.checked}
                     onChange={e=>update(w=>{w.events[i].checked=e.target.checked;})}/>
              加入時間軸
            </label>
            <input type="text" style={{width:130,flex:"none"}} value={ev.time} placeholder="時間"
                   onChange={e=>update(w=>{w.events[i].time=e.target.value;})}/>
            <input type="text" value={ev.title} placeholder="事件標題" style={{flex:1,minWidth:120}}
                   onChange={e=>update(w=>{w.events[i].title=e.target.value;})}/>
            <button className="btn small danger" style={{flex:"none"}} onClick={()=>update(w=>{w.events.splice(i,1);})}>刪除</button>
          </div>
          <textarea value={ev.description} placeholder="事件描述…" style={{minHeight:48}}
                    onChange={e=>update(w=>{w.events[i].description=e.target.value;})}/>
        </div>
      ))}
      <button className="btn small primary" onClick={()=>update(w=>{
        if(!w.events) w.events=[];
        w.events.push({id:uid(),time:"",title:"",description:"",checked:true});
      })}>＋新增事件</button>
      {showTimeline && (
        <div>
          <div className="row" style={{margin:"10px 0 4px"}}>
            <span style={{fontWeight:800,fontSize:13}}>時間軸排序：</span>
            <span className={"chip"+(tlSort==="manual"?" on":"")} onClick={()=>setTlSort("manual")}>依清單順序</span>
            <span className={"chip"+(tlSort==="time"?" on":"")} onClick={()=>setTlSort("time")}>依時間欄自動排序</span>
          </div>
          {sorted.length
            ? <div className="timeline">
                {sorted.map(ev=>(
                  <div className="timeline-item" key={ev.id}>
                    <div className="t-time">{ev.time||"（未填時間）"}</div>
                    <div className="t-title">{ev.title||"（未命名事件）"}</div>
                    {ev.description && <div className="t-desc">{ev.description}</div>}
                  </div>
                ))}
              </div>
            : <div className="empty" style={{marginTop:10}}>還沒有勾選任何事件，勾選後就能在這裡看到時間軸囉！</div>}
        </div>
      )}
    </div>
  );
}

/* ---------- 角色AU分頁 ---------- */
function InheritPanel({char,profile,update}){
  const INHERIT_FIELDS=FIELD_DEFS.filter(d=>d.key!=="name");
  const EXTRA=[["avatar","頭像"],["artwork","立繪"],["customFields","自訂欄位"],["foreignNames","外文名"],["relationships","人際關係"]];
  const [sel,setSel]=useState(()=>{
    const o={}; INHERIT_FIELDS.forEach(d=>{o[d.key]=true;}); EXTRA.forEach(([k])=>{o[k]=k==="avatar";});
    return o;
  });
  const [msg,setMsg]=useState("");
  const tog=k=>{ setSel(p=>({...p,[k]:!p[k]})); setMsg(""); };
  const setAll=v=>{ const o={}; INHERIT_FIELDS.forEach(d=>{o[d.key]=v;}); EXTRA.forEach(([k])=>{o[k]=v;}); setSel(o); setMsg(""); };
  const diffCount=INHERIT_FIELDS.filter(d=>sel[d.key] && (profile[d.key]||"")!==(char[d.key]||"")).length;
  const apply=(onlyEmpty)=>{
    update(p=>{
      INHERIT_FIELDS.forEach(d=>{
        if(!sel[d.key]) return;
        if(onlyEmpty && String(p[d.key]||"").trim()!=="") return;
        p[d.key]=char[d.key]||"";
      });
      if(sel.avatar && (!onlyEmpty || !p.avatar)) p.avatar=char.avatar||"";
      if(sel.artwork && (!onlyEmpty || !p.artwork)) p.artwork=char.artwork||"";
      if(sel.customFields && (!onlyEmpty || !(p.customFields||[]).length)){
        p.customFields=JSON.parse(JSON.stringify(char.customFields||[])).map(f=>({...f,id:uid()}));
        p.fieldOrder=[...(char.fieldOrder||[])];
      }
      if(sel.foreignNames && (!onlyEmpty || !(p.foreignNames||[]).some(f=>f.value))){
        p.foreignNames=JSON.parse(JSON.stringify(char.foreignNames||[])).map(f=>({...f,id:uid()}));
      }
      if(sel.relationships && (!onlyEmpty || !(p.relationships||[]).length)){
        p.relationships=JSON.parse(JSON.stringify(char.relationships||[])).map(r=>({...r,id:uid()}));
      }
    });
    setMsg(onlyEmpty?"✔ 已將主設定填入此AU的空白欄位（原有內容保留）。":"✔ 已用主設定覆蓋勾選的欄位。");
  };
  return (
    <Collapse title="🔗 繼承主設定（勾選要與主設定相同的部分）" defaultOpen={false}>
      <HelpTips title="兩種繼承方式" tips={[
        ["⬇","僅填入空白欄位","只補空格，已改寫的AU設定不動"],
        ["⟳","覆蓋勾選欄位","整個以主設定蓋掉，重新同步"],
        ["＊","名稱旁的星號","代表此欄目前與主設定不同"]
      ]} defaultOpen/>
      <div className="row" style={{marginBottom:6}}>
        <span style={{fontWeight:800,fontSize:13}}>基本欄位：</span>
        <button className="btn small ghost" onClick={()=>setAll(true)}>全選</button>
        <button className="btn small ghost" onClick={()=>setAll(false)}>全不選</button>
      </div>
      <div className="row" style={{marginBottom:8}}>
        {INHERIT_FIELDS.map(d=>{
          const same=(profile[d.key]||"")===(char[d.key]||"");
          return (
            <span key={d.key} className={"chip"+(sel[d.key]?" on":"")} style={{fontSize:12,padding:"2px 10px"}}
                  title={same?"目前與主設定相同":"目前與主設定不同"} onClick={()=>tog(d.key)}>
              {sel[d.key]?"✓ ":""}{d.label}{same?"":" *"}
            </span>
          );
        })}
      </div>
      <div className="row" style={{marginBottom:10}}>
        <span style={{fontWeight:800,fontSize:13}}>其他區塊：</span>
        {EXTRA.map(([k,label])=>(
          <span key={k} className={"chip"+(sel[k]?" on":"")} style={{fontSize:12,padding:"2px 10px"}} onClick={()=>tog(k)}>
            {sel[k]?"✓ ":""}{label}
          </span>
        ))}
      </div>
      <div className="row">
        <button className="btn small primary" onClick={()=>apply(true)}>⬇ 僅填入空白欄位</button>
        <button className="btn small violet" onClick={()=>{ if(confirm("將以主設定覆蓋勾選的欄位，此AU分頁原有內容會被取代，確定嗎？")) apply(false); }}>⟳ 覆蓋勾選欄位</button>
        {diffCount>0 && <span className="hint">（標記 * 的欄位目前與主設定不同，共 {diffCount} 項）</span>}
        {msg && <span className="badge">{msg}</span>}
      </div>
    </Collapse>
  );
}

                  ))}

                <span className="hint">選擇外文名後，設定卡、關係圖（AU模式）與匯出文件中的此AU角色名將同步採用。</span>

              update={fn=>update(c=>{const p=c.auProfiles.find(x=>x.id===active.id); if(p) fn(p);})}/>

              update={fn=>update(c=>{const p=c.auProfiles.find(x=>x.id===active.id); if(p) fn(p);})}/>

        )}
    </div>
  );
}

/* ---------- 匯出文件HTML ---------- */
const DEFAULT_EXPORT_OPTS=()=>({
  fields:Object.fromEntries(FIELD_DEFS.map(d=>[d.key,true])),
  avatar:true,artwork:true,custom:true,foreign:true,relations:true,events:true,auProfiles:true,aus:true,quests:true,inspirations:true,speech:true,draft:false
});
function charName(allChars,id){const c=allChars.find(x=>x.id===id);return c?(c.name||"未命名角色"):"（已刪除的角色）";}
function fieldRow(label,val){ return val ? `<p style="margin:2px 0"><b>${esc(label)}：</b>${nl(val)}</p>` : ""; }
function worldHtml(w,allChars,level){
  const h = level===2?"h2":(level===3?"h3":"h4");
  let s = `<${h}>${esc(w.name||"（未命名世界觀）")}</${h}>`;
  if(w.description) s += `<p>${nl(w.description)}</p>`;
  const evs=[...(w.events||[])].sort((a,b)=>naturalCompare(a.time,b.time));
  if(evs.length){
    s += `<h4>事件列表</h4><table><tr><th>時間</th><th>事件</th><th>描述</th></tr>`;
    evs.forEach(e=>{ s+=`<tr><td>${esc(e.time)}</td><td>${esc(e.title)}</td><td>${nl(e.description)}</td></tr>`; });
    s += `</table>`;
  }
  if((w.groups||[]).length){
    s += `<h4>角色關係組合</h4>`;
    w.groups.forEach(g=>{
      s += `<p style="margin:4px 0"><b>${esc(g.name||"未命名組合")}</b>（${g.memberIds.map(id=>esc(charName(allChars,id))).join("、")||"尚未選擇角色"}）</p>`;
      if(g.description) s += `<p style="margin:2px 0 8px">${nl(g.description)}</p>`;
    });
  }
  return s;
}
function profileHtml(p,allChars,opts){
  opts=opts||DEFAULT_EXPORT_OPTS();
  let s="";
  if(opts.avatar && p.avatar) s+=`<p style="margin:4px 0"><img src="${p.avatar}" alt="頭像" width="90" style="border-radius:12px;border:2px solid #333"/></p>`;
  if(opts.artwork && p.artwork) s+=`<p style="margin:6px 0"><img src="${p.artwork}" alt="立繪" style="max-width:320px;max-height:420px;border-radius:10px;border:2px solid #333"/></p>`;
  fieldOrderOf(p).forEach(k=>{
    if(k.startsWith("cf:")){
      if(!opts.custom) return;
      const f=(p.customFields||[]).find(x=>"cf:"+x.id===k);
      if(f) s+=fieldRow(f.label||"自訂欄位",f.value);
    }else{
      if(!opts.fields[k]) return;
      const d=FIELD_DEFS.find(x=>x.key===k);
      if(d) s+=fieldRow(d.label,p[d.key]);
    }
  });
  const z=opts.fields.birthday?getZodiac(p.birthday):"";
  if(z) s+=fieldRow("星座",z);
  const fns=opts.foreign?(p.foreignNames||[]).filter(f=>f.value):[];
  if(fns.length) s+=`<p style="margin:2px 0"><b>外文名：</b>${fns.map(f=>esc((f.lang||"？")+"／"+f.value)).join("；")}</p>`;
  const rels=opts.relations?(p.relationships||[]).filter(r=>allChars.some(c=>c.id===r.targetId)):[];
  if(rels.length){
    s+=`<p style="margin:6px 0 2px"><b>人際關係：</b></p>`;
    rels.forEach(r=>{
      s+=`<p style="margin:2px 0 2px 14px">◆ 與「${esc(charName(allChars,r.targetId))}」：${esc(r.relation||"")}</p>`;
      if(r.story) s+=`<p style="margin:0 0 2px 28px">故事：${nl(r.story)}</p>`;
      if(r.notes) s+=`<p style="margin:0 0 2px 28px">補充：${nl(r.notes)}</p>`;
    });
  }
  return s;
}
function mdEsc(t){ return String(t==null?"":t).replace(/\r/g,""); }
function profileMd(db,c,p,opts,head){
  const L=[];
  L.push(head);
  const fieldLine=(label,val)=>{ if(val!=null && String(val).trim()!=="" && String(val).trim()!=="（未填寫）") L.push("- **"+label+"**："+mdEsc(val).replace(/\n/g,"　")); };
  fieldOrderOf(p).forEach(k=>{
    if(k.startsWith("cf:")){
      if(!opts.custom) return;
      const f=(p.customFields||[]).find(x=>"cf:"+x.id===k);
      if(f) fieldLine(f.label||"自訂欄位",f.value);
    }else{
      if(!opts.fields[k]) return;
      const d=FIELD_DEFS.find(x=>x.key===k);
      if(d && d.type!=="textarea") fieldLine(d.label,p[d.key]);
    }
  });
  if(opts.fields.birthday){ const z=getZodiac(p.birthday); if(z) fieldLine("星座",z); }
  if(opts.foreign){
    const fns=(p.foreignNames||[]).filter(f=>f.value);
    if(fns.length) fieldLine("外文名",fns.map(f=>(f.lang||"？")+"／"+f.value).join("；"));
  }
  // 長文欄位以段落呈現
  ["appearance","description","coreTheme","notes","analysis"].forEach(k=>{
    if(!opts.fields[k]) return;
    const d=FIELD_DEFS.find(x=>x.key===k);
    if(d && p[k] && String(p[k]).trim()){ L.push(""); L.push("**"+d.label+"**"); L.push(""); L.push(mdEsc(p[k])); }
  });
  if(opts.relations){
    const rels=(p.relationships||[]).filter(r=>db.characters.some(x=>x.id===r.targetId));
    if(rels.length){
      L.push(""); L.push("**人際關係**"); L.push("");
      rels.forEach(r=>{
        const t=db.characters.find(x=>x.id===r.targetId);
        L.push("- 與「"+(t?(t.name||"未命名"):"？")+"」："+mdEsc(r.relation||"")+(r.story?("　"+mdEsc(r.story)):""));
      });
    }
  }
  return L.join("\n");
}
function charMd(db,c,opts){
  const L=[];
  L.push("## "+mdEsc(c.name||"未命名角色"));
  L.push("");
  L.push(profileMd(db,c,c,opts,""));
  if(opts.events){
    const evs=[...(c.events||[])].sort((a,b)=>naturalCompare(a.time,b.time));
    if(evs.length){ L.push(""); L.push("### 個人事件"); L.push(""); L.push("| 時間 | 事件 | 描述 |"); L.push("| --- | --- | --- |");
      evs.forEach(e=>L.push("| "+mdEsc(e.time)+" | "+mdEsc(e.title)+" | "+mdEsc(e.description).replace(/\n/g,"<br>")+" |")); }
  }
  if(opts.speech && ((c.speech||[]).length||(c.firstPerson||"").trim())){
    L.push(""); L.push("### 自稱／他稱");
    if((c.firstPerson||"").trim()) L.push("- **第一人稱**："+mdEsc(c.firstPerson));
    (c.speech||[]).forEach(sp=>L.push("- 對「"+mdEsc(sp.who)+"」：我稱「"+mdEsc(sp.callThem)+"」／對方稱「"+mdEsc(sp.theyCall)+"」"+(sp.tone?("（"+mdEsc(sp.tone)+"）"):"")));
  }
  if(opts.inspirations && c.exportInspirations!==false && (c.inspirations||[]).length){
    L.push(""); L.push("### 靈感庫");
    c.inspirations.forEach(ins=>{ L.push("- **【"+mdEsc(ins.source)+"】"+mdEsc(ins.title||"未命名靈感")+"**（"+mdEsc(ins.created)+"）"); if(ins.content) L.push("  > "+mdEsc(ins.content).replace(/\n/g,"\n  > ")); });
  }
  if(opts.auProfiles) (c.auProfiles||[]).forEach(pp=>{
    L.push(""); L.push("### AU分頁："+mdEsc(profileAuName(db.worlds,pp)));
    L.push(""); L.push(profileMd(db,c,{...pp,name:auDisplayName(c,pp)||pp.name},opts,""));
  });
  if(opts.draft && (c.draft||"").trim()){ L.push(""); L.push("### 快速草稿"); L.push(""); L.push(mdEsc(c.draft)); }
  return L.join("\n");
}
function worldMd(db,w,opts,level){
  const h="#".repeat(level||2);
  const L=[h+" "+mdEsc(w.name||"未命名世界觀")];
  if((w.tags||[]).length) L.push("`"+w.tags.join("` `")+"`");
  if(w.description){ L.push(""); L.push(mdEsc(w.description)); }
  const evs=[...(w.events||[])].filter(e=>e.checked).sort((a,b)=>naturalCompare(a.time,b.time));
  if(evs.length){ L.push(""); L.push(h+"# 劇情時間軸"); L.push(""); evs.forEach(e=>L.push("- **"+mdEsc(e.time)+"**　"+mdEsc(e.title)+(e.description?("："+mdEsc(e.description).replace(/\n/g,"　")):""))); }
  (w.groups||[]).forEach(g=>{ if(g.name||(g.memberIds||[]).length){ L.push(""); L.push("**組合："+mdEsc(g.name||"未命名")+"**　"+(g.memberIds||[]).map(id=>{const c=db.characters.find(x=>x.id===id);return c?(c.name||"未命名"):"";}).filter(Boolean).join("、")); if(g.description) L.push(mdEsc(g.description)); } });
  return L.join("\n");
}
function buildExportMd(db,opts){
  const L=["# OC 設定集","","匯出日期："+new Date().toLocaleDateString("zh-TW"),""];
  L.push("# 世界觀");
  db.worlds.forEach(mw=>{
    L.push(""); L.push(worldMd(db,mw,opts,2));
    if(opts.aus) (mw.aus||[]).forEach(au=>{ L.push(""); L.push(worldMd(db,au,opts,3)+"　`AU`"); });
  });
  L.push(""); L.push("# 角色");
  db.characters.forEach(c=>{ L.push(""); L.push(charMd(db,c,opts)); L.push(""); L.push("---"); });
  return L.join("\n");
}
function buildSingleMd(db,key,opts){
  if(key.startsWith("c:")){ const c=db.characters.find(x=>x.id===key.slice(2)); return c?("# 角色檔案\n\n"+charMd(db,c,opts)):""; }
  if(key.startsWith("w:")){ const mw=db.worlds.find(x=>x.id===key.slice(2)); if(!mw) return "";
    let m="# 世界觀檔案\n\n"+worldMd(db,mw,opts,2);
    if(opts.aus)(mw.aus||[]).forEach(au=>{ m+="\n\n"+worldMd(db,au,opts,3)+"　`AU`"; });
    return m; }
  if(key.startsWith("a:")){ for(const mw of db.worlds){ const au=(mw.aus||[]).find(x=>x.id===key.slice(2)); if(au) return "# AU世界觀檔案\n\n"+worldMd(db,au,opts,2); } }
  return "";
}
function downloadText(content,name,mime){ saveBlob(new Blob([content],{type:(mime||"text/plain")+";charset=utf-8"}),name); }
function buildExportHtml(db,opts){
  opts=opts||DEFAULT_EXPORT_OPTS();
  const allChars=db.characters;
  const CN=["壹","貳","參","肆","伍","陸","柒","捌","玖","拾"];
  const cn=i=>CN[i]||String(i+1);
  let s=`<h1>你也來搞OC吧！　設定資料集</h1>`;
  db.worlds.forEach((mw,i)=>{
    s+=`<h2>${cn(i)}、主要世界觀</h2>`+worldHtml(mw,allChars,3);
    if(opts.aus) (mw.aus||[]).forEach(au=>{
      s+=`<p style="margin:12px 0 0"><b>▼ 次要世界觀（AU）</b></p>`+worldHtml(au,allChars,4);
    });
  });
  s+=`<h2>${cn(db.worlds.length)}、角色</h2>`;
  if(!allChars.length) s+=`<p>（尚未建立角色）</p>`;
  allChars.forEach(c=>{ s+=charSectionHtml(db,c,opts); });
  return s;
}
function charSectionHtml(db,c,opts){
  opts=opts||DEFAULT_EXPORT_OPTS();
  const allChars=db.characters;
  const bar=isHex(c.color)?`border-left:10px solid ${c.color};padding-left:10px;`:"";
  let s=`<h3 style="${bar}">${esc(c.name||"未命名角色")}</h3>`;
  s+=profileHtml(c,allChars,opts);
  const pevs=opts.events?[...(c.events||[])].sort((a,b)=>naturalCompare(a.time,b.time)):[];
  if(pevs.length){
    s+=`<h4>個人事件</h4><table><tr><th>時間</th><th>事件</th><th>描述</th></tr>`;
    pevs.forEach(e=>{ s+=`<tr><td>${esc(e.time)}</td><td>${esc(e.title)}</td><td>${nl(e.description)}</td></tr>`; });
    s+=`</table>`;
  }
  if(opts.quests) (db.questionnaires||[]).filter(q=>q.includeInPdf&&q.charIds.includes(c.id)).forEach(q=>{ s+=questionnaireHtml(db,q); });
  if(opts.speech && ((c.speech||[]).length || (c.firstPerson||"").trim())){
    s+=`<h4>自稱／他稱表</h4>`;
    if((c.firstPerson||"").trim()) s+=`<p style="margin:2px 0"><b>第一人稱：</b>${esc(c.firstPerson)}</p>`;
    if((c.speech||[]).length){
      s+=`<table><tr><th>對象</th><th>我稱呼對方</th><th>對方稱呼我</th><th>語氣／備註</th></tr>`;
      c.speech.forEach(sp=>{ s+=`<tr><td>${esc(sp.who)}</td><td>${esc(sp.callThem)}</td><td>${esc(sp.theyCall)}</td><td>${esc(sp.tone||"")}</td></tr>`; });
      s+=`</table>`;
    }
  }
  if(opts.inspirations && c.exportInspirations!==false && (c.inspirations||[]).length){
    s+=`<h4>靈感庫</h4>`;
    c.inspirations.forEach(ins=>{
      s+=`<p style="margin:4px 0"><b>【${esc(ins.source)}】${esc(ins.title||"未命名靈感")}</b>（${esc(ins.created)}）</p>`;
      if(ins.content) s+=`<p style="margin:0 0 6px 14px">${nl(ins.content)}</p>`;
    });
  }
  if(opts.draft && (c.draft||"").trim()){
    s+=`<h4>快速草稿</h4><p style="margin:2px 0">${nl(c.draft)}</p>`;
  }
  if(opts.auProfiles) (c.auProfiles||[]).forEach(p=>{
    const pp={...p,name:auDisplayName(c,p)||p.name};
    s+=`<h4>AU分頁：${esc(profileAuName(db.worlds,p))}</h4>`+profileHtml(pp,allChars,opts);
  });
  return s;
}
function questionnairePlainText(db,q){
  const chars=db.characters.filter(c=>q.charIds.includes(c.id));
  const lines=["問卷："+(q.name||"未命名問卷")+(q.topic?("（"+q.topic+"）"):"")];
  q.questions.forEach((qu,qi)=>{
    lines.push("Q"+(qi+1)+"．"+(qu.text||"（未命名題目）"));
    if(qu.type==="scale"){
      chars.forEach(c=>{const a=qu.answers[c.id]; if(a&&a.value!=null) lines.push("　"+(c.name||"未命名")+"："+a.value+"／"+qu.max+"（"+(qu.leftLabel||qu.min)+"↔"+(qu.rightLabel||qu.max)+"）");});
    }else if(qu.type==="choice"){
      chars.forEach(c=>{const a=qu.answers[c.id]; if(a&&(a.sel||[]).length) lines.push("　"+(c.name||"未命名")+"："+a.sel.map(i=>(qu.options||[])[i]).join("、"));});
    }else if(qu.type==="text"){
      chars.forEach(c=>{const a=qu.answers[c.id]; if(a&&String(a.text||"").trim()) lines.push("　"+(c.name||"未命名")+"："+a.text);});
    }else if(qu.type==="radar"){
      chars.forEach(c=>{const a=qu.answers[c.id]; if(a&&a.vals) lines.push("　"+(c.name||"未命名")+"："+(qu.axes||[]).map((ax,i)=>ax+" "+(a.vals[i]!=null?a.vals[i]:"—")).join("／"));});
    }
  });
  return lines.join("\n");
}
function questionnaireHtml(db,q){
  const chars=db.characters.filter(c=>q.charIds.includes(c.id));
  let s=`<h4>問卷：${esc(q.name||"未命名問卷")}${q.topic?("（"+esc(q.topic)+"）"):""}</h4>`;
  if(chars.length>1) s+=`<p style="margin:2px 0"><b>關聯角色：</b>${chars.map(c=>esc(c.name||"未命名")).join("、")}</p>`;
  q.questions.forEach((qu,qi)=>{
    s+=`<p style="margin:8px 0 2px"><b>Q${qi+1}．${esc(qu.text||"（未命名題目）")}</b>`;
    if(qu.type==="scale") s+=`（${esc(qu.leftLabel||qu.min)} ↔ ${esc(qu.rightLabel||qu.max)}）`;
    s+=`</p>`;
    if(qu.type==="scale"){
      s+=`<table><tr><th>角色</th><th>數值</th><th>量表</th></tr>`;
      chars.forEach(c=>{
        const a=qu.answers[c.id];
        if(a&&a.value!=null){
          const t=Math.round((a.value-qu.min)/((qu.max-qu.min)||1)*10);
          s+=`<tr><td>${esc(c.name||"未命名")}</td><td>${a.value}／${qu.max}</td><td>${"▰".repeat(t)}${"▱".repeat(10-t)}</td></tr>`;
        }
      });
      s+=`</table>`;
    }else if(qu.type==="choice"){
      (qu.options||[]).forEach((opt,oi)=>{
        const who=chars.filter(c=>{const a=qu.answers[c.id];return a&&(a.sel||[]).includes(oi);});
        s+=`<p style="margin:1px 0 1px 14px">${who.length?"☑":"☐"} ${esc(opt)}${who.length?("　←"+who.map(c=>esc(c.name||"未命名")).join("、")):""}</p>`;
      });
    }else if(qu.type==="text"){
      chars.forEach(c=>{
        const a=qu.answers[c.id];
        if(a&&String(a.text||"").trim())
          s+=`<p style="margin:1px 0 3px 14px"><b>${esc(c.name||"未命名")}：</b>${nl(a.text)}</p>`;
      });
    }else if(qu.type==="radar"){
      s+=`<table><tr><th>軸向</th>${chars.map(c=>`<th>${esc(c.name||"未命名")}</th>`).join("")}</tr>`;
      (qu.axes||[]).forEach((ax,ai)=>{
        s+=`<tr><td>${esc(ax)}</td>${chars.map(c=>{const a=qu.answers[c.id];return `<td>${a&&a.vals&&a.vals[ai]!=null?a.vals[ai]:"—"}</td>`;}).join("")}</tr>`;
      });
      s+=`</table>`;
    }
  });
  return s;
}
function buildSingleHtml(db,key,opts){
  opts=opts||DEFAULT_EXPORT_OPTS();
  const allChars=db.characters;
  if(key.startsWith("c:")){
    const c=allChars.find(x=>x.id===key.slice(2)); if(!c) return "";
    return `<h1>角色檔案：${esc(c.name||"未命名角色")}</h1>`+charSectionHtml(db,c,opts);
  }
  if(key.startsWith("w:")){
    const mw=db.worlds.find(x=>x.id===key.slice(2)); if(!mw) return "";
    let s=`<h1>世界觀檔案：${esc(mw.name||"未命名世界觀")}</h1>`+worldHtml(mw,allChars,3);
    if(opts.aus) (mw.aus||[]).forEach(au=>{ s+=`<p style="margin:12px 0 0"><b>▼ 次要世界觀（AU）</b></p>`+worldHtml(au,allChars,4); });
    return s;
  }
  if(key.startsWith("a:")){
    const f=findAuById(db.worlds,key.slice(2)); if(!f) return "";
    return `<h1>AU世界觀檔案：${esc(f.au.name||"未命名AU")}</h1><p><b>隸屬主要世界觀：</b>${esc(f.mw.name||"未命名")}</p>`+worldHtml(f.au,allChars,3);
  }
  return "";
}
function downloadWord(html,filename){
  const doc=`<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word"><head><meta charset="utf-8"><title>OC設定集</title><style>body{font-family:"Microsoft JhengHei","PMingLiU",sans-serif;font-size:12pt;}table{border-collapse:collapse;}td,th{border:1px solid #555;padding:3pt 6pt;}h1{border-bottom:2px solid #333;}</style></head><body>${html}</body></html>`;
  saveBlob(new Blob(["\ufeff",doc],{type:"application/msword;charset=utf-8"}),filename||"OC設定集.doc");
}

function ImportTab({db,mutate}){
  const [text,setText]=useState("");
  const [target,setTarget]=useState("auto");
  const [auParent,setAuParent]=useState("");
  const [parsed,setParsed]=useState(null);
  const [msg,setMsg]=useState("");
  const fileRef=useRef(null);
  const doParse=(t)=>{ const p=smartParse(t); setParsed(p); setMsg(""); };
  const onFile=e=>{
    const f=e.target.files[0]; if(!f) return;
    const isCsv=/\.csv$/i.test(f.name);
    const handle=(content,enc)=>{
      // CSV 若解析不到欄位，可能是 Excel 存成 Big5，換編碼再試一次
      if(isCsv && enc==="utf-8"){
        const bad=content.indexOf("\uFFFD")>=0 || !csvHeaderKeys(content).keys.some(Boolean);
        if(bad){
          const r2=new FileReader();
          r2.onload=()=>runImport(String(r2.result||""),"big5");
          try{ r2.readAsText(f,"big5"); return; }catch(err){}
        }
      }
      runImport(content,enc);
    };
    const runImport=(content,enc)=>{
      if(isCsv){
        const info=csvHeaderKeys(content);
        const rows=csvToChars(content);
        if(rows.length){
          setCsvRows(rows); setText(content); setParsed(null);
          setMsg("✔ 已讀取CSV（"+(enc==="big5"?"Big5":"UTF-8")+"），偵測到 "+rows.length+" 位角色，確認後即可批量匯入。");
        }else if(!info.keys.some(Boolean)){
          setCsvRows(null); setText(content); setParsed(null);
          setMsg("⚠ 讀不出CSV欄位。請確認第一列是欄位名稱（姓名、生日、身高…）。偵測到的第一列為："+
                 (info.header||[]).slice(0,6).join("｜"));
        }else{
          setCsvRows(null); setText(content); setParsed(null);
          setMsg("⚠ CSV只有欄位列、沒有資料列，請在第二列之後填入角色資料。");
        }
        return;
      }
      if(/\.json$/i.test(f.name)){
        try{
          const mg=migrateDb(JSON.parse(content));
          if(mg){
            if(confirm("偵測到完整備份檔，要覆蓋目前所有資料進行還原嗎？")){
              mutate(d=>{d.worlds=mg.worlds;d.characters=mg.characters;d.questionnaires=mg.questionnaires;});
              setMsg("✔ 已從JSON備份還原全部資料！");
            }
            return;
          }
        }catch(err){}
      }
      setText(content); doParse(content); setCsvRows(null);
    };
    const reader=new FileReader();
    reader.onload=()=>{
      handle(String(reader.result||""),"utf-8");
    };
    reader.readAsText(f,"utf-8");
    e.target.value="";
  };
  const confirmImport=()=>{
    if(!parsed) return;
    const kind = target==="auto" ? parsed.guess : target;
    if(kind==="character"){
      mutate(d=>{
        const c=newCharacter("");
        Object.keys(parsed.charFields).forEach(k=>{ c[k]=parsed.charFields[k]; });
        if(!c.name && parsed.worldFields.name) c.name=parsed.worldFields.name;
        d.characters.push(c);
      });
      setMsg("✔ 已建立新角色條目，快到「角色」板塊看看！");
    }else{
      const f=parsed.worldFields, cf=parsed.charFields;
      const name=f.name||cf.name||"";
      const desc=[f.description,cf.description].filter(Boolean).join("\n");
      if(kind==="mainWorld"){
        mutate(d=>{ const w=newMainWorld(name); w.description=desc; d.worlds.push(w); });
        setMsg("✔ 已建立新的主要世界觀！");
      }else{
        mutate(d=>{
          let mw=d.worlds.find(x=>x.id===auParent)||d.worlds[0];
          if(!mw){ mw=newMainWorld(""); d.worlds.push(mw); }
          if(!mw.aus) mw.aus=[];
          const w=newWorld(name); w.description=desc;
          mw.aus.push(w);
        });
        setMsg("✔ 已建立新的次要世界觀（AU）！");
      }
    }
    setParsed(null); setText("");
  };
  const [csvRows,setCsvRows]=useState(null);
  const importCsvChars=()=>{
    if(!csvRows||!csvRows.length) return;
    mutate(d=>{ csvRows.forEach(obj=>{ const c=newCharacter(""); Object.keys(obj).forEach(k=>{c[k]=obj[k];}); d.characters.push(c); }); });
    setMsg("✔ 已批量匯入 "+csvRows.length+" 位角色！");
    setCsvRows(null); setText("");
  };
  const kindLabel={auto:"自動判斷",character:"角色",mainWorld:"主要世界觀",world:"次要世界觀（AU）"};
  return (
    <div className="card tape tape-mint">
      <h2>匯入資料</h2>
      <div className="sub">貼上外部文字或上傳檔案，系統會智能偵測「姓名：」「身高：」等內容並寫入對應欄位；也支援CSV批量匯入多位角色。</div>
      <Collapse title="📋 下載匯入範本（先在外部整理，再一鍵匯入）" defaultOpen={false}>
        <div className="row" style={{marginBottom:10,fontSize:12.5,fontWeight:800,gap:6}}>
          <span className="badge">1 下載範本</span><span>→</span>
          <span className="badge">2 在試算表／記事本填寫</span><span>→</span>
          <span className="badge">3 回來上傳或貼上</span><span>→</span>
          <span className="badge">4 匯入</span>
        </div>
        <div className="row">
          <button className="btn small mint" onClick={()=>downloadText(csvTemplate(),"角色匯入範本.csv","text/csv")}>⬇ CSV範本（批量多角色）</button>
          <button className="btn small mint" onClick={()=>downloadText(txtTemplate(),"角色匯入範本.txt")}>⬇ TXT範本（單一角色）</button>
        </div>
        <HelpTips title="範本怎麼填？" tips={[
          ["1️⃣","CSV第一列","放欄位名稱（姓名、生日、身高…）"],
          ["2️⃣","之後每一列","一位角色，可只填部分欄位"],
          ["🔀","欄位順序","可自由調整，系統會自動對應"],
          ["📘","Word（.docx）","請先另存為純文字，或直接複製內容貼上"]
        ]}/>
      </Collapse>
      <div className="row" style={{marginBottom:8}}>
        <span style={{fontWeight:800,fontSize:14}}>匯入為：</span>
        {["auto","character","mainWorld","world"].map(k=>(
          <span key={k} className={"chip"+(target===k?" on":"")} onClick={()=>setTarget(k)}>{kindLabel[k]}</span>
        ))}
        <button className="btn small sun" onClick={()=>fileRef.current.click()}>📂 上傳檔案</button>
        <input type="file" ref={fileRef} accept=".txt,.md,.json,.csv" style={{display:"none"}} onChange={onFile}/>
      </div>
      {target==="world" && db.worlds.length>1 && (
        <div className="row" style={{marginBottom:8}}>
          <span style={{fontWeight:800,fontSize:14}}>隸屬主要世界觀：</span>
          <select value={auParent||db.worlds[0].id} onChange={e=>setAuParent(e.target.value)} style={{maxWidth:280}}>
            {db.worlds.map(w=><option key={w.id} value={w.id}>{w.name||"未命名主要世界觀"}</option>)}
          </select>
        </div>
      )}
      <textarea style={{minHeight:160}} value={text} onChange={e=>setText(e.target.value)}
        placeholder={"貼上文字，例如：\n姓名：白羽\n生日：3月14日\n身高：172cm\nCV：某某\n角色描述：……"}/>

/* ---------- 圖表下載 ---------- */
function fitRatioCanvas(canvas){
  const r=window.__pngRatio||"orig";
  if(r==="orig") return canvas;
  const parts=r.split(":").map(Number);
  if(parts.length!==2||!parts[0]||!parts[1]) return canvas;
  const target=parts[0]/parts[1];
  const W=canvas.width,H=canvas.height;
  let newW=W,newH=H;
  if(W/H<target) newW=Math.round(H*target); else newH=Math.round(W/target);
  const c2=document.createElement("canvas");
  c2.width=newW; c2.height=newH;
  const ctx=c2.getContext("2d");
  ctx.fillStyle="#ffffff"; ctx.fillRect(0,0,newW,newH);
  ctx.drawImage(canvas,Math.round((newW-W)/2),Math.round((newH-H)/2));
  return c2;
}
/* PNG比例：共享狀態＋訂閱機制，讓所有使用者介面都能即時反映變更 */
window.__pngRatioSubs = window.__pngRatioSubs || [];
function setPngRatio(v){
  window.__pngRatio=v;
  (window.__pngRatioSubs||[]).forEach(fn=>{ try{ fn(v); }catch(e){} });
}
function usePngRatio(){
  const [r,setR]=useState(window.__pngRatio||"orig");
  useEffect(()=>{
    const fn=v=>setR(v);
    window.__pngRatioSubs.push(fn);
    return ()=>{ const i=window.__pngRatioSubs.indexOf(fn); if(i>=0) window.__pngRatioSubs.splice(i,1); };
  },[]);
  return r;
}
const RATIO_OPTS=[["orig","原始比例"],["1:1","1：1（方形）"],["4:3","4：3（橫）"],["3:4","3：4（直）"],["16:9","16：9（寬）"],["9:16","9：16（限動）"]];
function ratioValue(r){
  if(!r||r==="orig") return null;
  const p2=r.split(":").map(Number);
  return (p2.length===2&&p2[0]&&p2[1])?p2[0]/p2[1]:null;
}
function RatioSelect(){
  const r=usePngRatio();
  return (
    <label className="row" style={{gap:4,fontSize:12.5,fontWeight:800,flexWrap:"nowrap"}}>
      PNG比例：
      <select value={r} style={{width:"auto"}} onChange={e=>setPngRatio(e.target.value)}>
        {RATIO_OPTS.map(([k,label])=><option key={k} value={k}>{label}</option>)}
      </select>
    </label>
  );
}
function downloadNode(ref,name){
  if(!ref.current || !window.html2canvas) return;
  window.html2canvas(ref.current,{backgroundColor:"#ffffff",scale:2}).then(c=>fitRatioCanvas(c).toBlob(b=>saveBlob(b,name)));
}
function downloadCardPng(ref,name,songLabel){
  if(!ref.current || !window.html2canvas) return;
  window.html2canvas(ref.current,{backgroundColor:"#ffffff",scale:2,onclone:doc=>{
    doc.querySelectorAll("iframe.card-embed").forEach(f=>{
      const d=doc.createElement("div");
      d.style.cssText="border:2px solid #2b2440;border-radius:12px;padding:12px;margin-top:8px;font-size:12.5px;font-weight:800;background:#f3ecff;text-align:center;";
      d.textContent=songLabel||"♪ 印象曲（Spotify）";
      f.parentNode.replaceChild(d,f);
    });
  }}).then(c=>fitRatioCanvas(c).toBlob(b=>saveBlob(b,name)));
}
function downloadSvg(ref,name,w,h){
  const svg=ref.current; if(!svg) return;
  const xml=new XMLSerializer().serializeToString(svg);
  const img=new Image();
  img.onload=()=>{
    const canvas=document.createElement("canvas");
    canvas.width=w*2; canvas.height=h*2;
    const ctx=canvas.getContext("2d");
    ctx.fillStyle="#ffffff"; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.scale(2,2); ctx.drawImage(img,0,0,w,h);
    fitRatioCanvas(canvas).toBlob(b=>saveBlob(b,name));
  };
  img.src="data:image/svg+xml;charset=utf-8,"+encodeURIComponent(xml);
}

/* ---------- 幾何工具：凸包（用於群組色暈） ---------- */
function convexHull(pts){
  if(pts.length<3) return pts.slice();
  const p=[...pts].sort((a,b)=>a.x-b.x||a.y-b.y);
  const cross=(o,a,b)=>(a.x-o.x)*(b.y-o.y)-(a.y-o.y)*(b.x-o.x);
  const lower=[];
  for(const q of p){ while(lower.length>=2 && cross(lower[lower.length-2],lower[lower.length-1],q)<=0) lower.pop(); lower.push(q); }
  const upper=[];
  for(let i=p.length-1;i>=0;i--){ const q=p[i]; while(upper.length>=2 && cross(upper[upper.length-2],upper[upper.length-1],q)<=0) upper.pop(); upper.push(q); }
  lower.pop(); upper.pop();
  return lower.concat(upper);
}
function hullPath(centers,pad){
  // 對每個成員取樣一圈點，再求凸包 → 外框會緊貼成員、不會把遠處的人圈進來
  const samples=[];
  centers.forEach(c=>{
    for(let k=0;k<18;k++){
      const a=k*2*Math.PI/18;
      samples.push({x:c.x+pad*Math.cos(a), y:c.y+pad*Math.sin(a)});
    }
  });
  const h=convexHull(samples);
  if(h.length<3) return "";
  // 以二次貝茲平滑各頂點，做出圓潤的手繪感外框
  let d="";
  for(let i=0;i<h.length;i++){
    const cur=h[i], nxt=h[(i+1)%h.length];
    const mx=(cur.x+nxt.x)/2, my=(cur.y+nxt.y)/2;
    if(i===0){ const prev=h[h.length-1]; d="M"+((prev.x+cur.x)/2)+" "+((prev.y+cur.y)/2); }
    d+=" Q"+cur.x+" "+cur.y+" "+mx+" "+my;
  }
  return d+" Z";
}
function pointInPolygon(pt,poly){
  let inside=false;
  for(let i=0,j=poly.length-1;i<poly.length;j=i++){
    const xi=poly[i].x, yi=poly[i].y, xj=poly[j].x, yj=poly[j].y;
    if(((yi>pt.y)!==(yj>pt.y)) && (pt.x < (xj-xi)*(pt.y-yi)/((yj-yi)||1e-9)+xi)) inside=!inside;
  }
  return inside;
}

function RelationChart({db,mutate}){

  });

  const sel=options.find(o=>o.id===src)||options[0];
  const auMode=sel.kind==="au";
  const profileOf=c=>auMode?(c.auProfiles||[]).find(pp=>pp.auWorldId===sel.world.id):null;

  let baseChars=db.characters;
  if(sel.world){
    const ids=new Set();
    (sel.world.groups||[]).forEach(g=>(g.memberIds||[]).forEach(id=>ids.add(id)));
    if(auMode) db.characters.forEach(c=>{ if(profileOf(c)) ids.add(c.id); });

  const W=(layout.__size&&layout.__size.w)||760;
  const H=(layout.__size&&layout.__size.h)||520;

  // 依「角色關係組合」把成員聚攏排列，未分組者集中到另一區
  const HULL_PAD=46;                       // 與繪製色暈時的 pad 一致
  const autoArrange=()=>{
    const pools = sel.world ? [sel.world] : (()=>{ const arr=[]; db.worlds.forEach(mw=>{arr.push(mw);(mw.aus||[]).forEach(a=>arr.push(a));}); return arr; })();
    const allGroups=[];
    pools.forEach(w=>(w.groups||[]).forEach(g=>{
      const mem=(g.memberIds||[]).filter(id=>chars.some(c=>c.id===id));
      if(mem.length) allGroups.push({name:g.name||"",members:mem});
    }));
    // 每位角色只歸入第一個包含他的組合，避免同一人被兩個框搶
    const taken=new Set(); const clusters=[];
    allGroups.forEach(g=>{
      const mem=g.members.filter(id=>!taken.has(id));
      mem.forEach(id=>taken.add(id));
      if(mem.length) clusters.push({name:g.name,members:mem});
    });
    const loners=chars.filter(c=>!taken.has(c.id)).map(c=>c.id);
    if(loners.length) clusters.push({name:"（未分組）",members:loners,lone:true});
    if(!clusters.length) return;

    // 成員在群內排成同心環；回傳群內半徑（節點中心到最外圈的距離）
    const ringsOf=n=>{
      if(n<=1) return [{count:1,r:0}];
      if(n<=6) return [{count:n,r:38+n*7}];
      const inner=Math.floor(n/3), outer=n-inner;
      return [{count:inner,r:34+inner*8},{count:outer,r:34+inner*8+72}];
    };
    const items=clusters.map(cl=>{
      const rings=ringsOf(cl.members.length);
      const innerR=Math.max(...rings.map(r=>r.r));
      return {cl,rings,innerR,box:innerR+HULL_PAD+16};   // box = 群組框半徑再加安全邊界
    });
    items.sort((a,b)=>b.box-a.box);

    // 貨架式打包：一列列排下去，列寬不足就換行；保證任兩群的框不相交
    const GAP=34, PADX=30, PADY=54;
    // 依總面積估一個接近方形的畫布寬度，避免群組一路往下疊成長條
    const area=items.reduce((n,it)=>n+Math.pow(it.box*2+GAP,2),0);
    const maxW=Math.max(760, Math.min(1800, Math.sqrt(area)*1.45), items[0].box*2+PADX*2);
    let x=PADX, y=PADY, rowH=0;
    const spots=[];
    items.forEach(it=>{
      const d=it.box*2;
      if(x>PADX && x+d>maxW-PADX){ x=PADX; y+=rowH+GAP; rowH=0; }
      spots.push({it,cx:x+it.box,cy:y+it.box});
      x+=d+GAP;
      rowH=Math.max(rowH,d);
    });
    const needH=y+rowH+PADY;

    const next={};
    spots.forEach(({it,cx,cy})=>{
      const mem=it.cl.members;
      let idx=0;
      it.rings.forEach(ring=>{
        const cnt=Math.min(ring.count,mem.length-idx);
        for(let m=0;m<cnt;m++,idx++){
          const id=mem[idx];
          if(ring.r===0){ next[id]={x:cx,y:cy}; continue; }
          const a=-Math.PI/2 + m*2*Math.PI/cnt;
          next[id]={x:cx+ring.r*Math.cos(a), y:cy+ring.r*Math.sin(a)};
        }
      });
      while(idx<mem.length){ next[mem[idx]]={x:cx,y:cy}; idx++; }
    });
    mutate(d=>{
      if(!d.relLayouts) d.relLayouts={};
      d.relLayouts[layoutKey]={...(d.relLayouts[layoutKey]||{}),...next,
        __size:{w:Math.round(maxW),h:Math.round(Math.max(520,needH))}};
    });
  };

  // 力導向自動散開：節點互斥、有關係者以彈簧維持距離、節點主動避開別人的連線
  const autoSpread=()=>{
    const ids=chars.map(c=>c.id);
    if(ids.length<2) return;
    const P={}; ids.forEach(id=>{ P[id]={x:pos[id].x, y:pos[id].y}; });
    // 無向連線清單（雙向只算一條）
    const lset=new Set();
    edges.forEach(e=>lset.add(e.from<e.to?(e.from+"~"+e.to):(e.to+"~"+e.from)));
    const links=[...lset].map(k=>k.split("~")).filter(([a,b])=>P[a]&&P[b]);
    // 同組合成員的輕微凝聚力，避免散開時把群組拆散
    const pools = sel.world ? [sel.world] : (()=>{ const arr=[]; db.worlds.forEach(mw=>{arr.push(mw);(mw.aus||[]).forEach(a=>arr.push(a));}); return arr; })();
    const groupPairs=[];
    pools.forEach(w=>(w.groups||[]).forEach(g=>{
      const mem=(g.memberIds||[]).filter(id=>P[id]);
      for(let i=0;i<mem.length;i++) for(let j=i+1;j<mem.length;j++) groupPairs.push([mem[i],mem[j]]);
    }));
    const MIN=120, IDEAL=200, SAFE=76, GROUP_IDEAL=170;
    // 角色多時降低迭代次數，避免瀏覽器卡頓
    const ITER = ids.length<=20 ? 600 : (ids.length<=40 ? 380 : 240);
    for(let it=0; it<ITER; it++){
      const F={}; ids.forEach(id=>F[id]={x:0,y:0});
      // 節點互斥
      for(let i=0;i<ids.length;i++) for(let j=i+1;j<ids.length;j++){
        const a=P[ids[i]], b=P[ids[j]];
        const dx=b.x-a.x, dy=b.y-a.y, d=Math.hypot(dx,dy)||0.01;
        if(d<MIN*1.9){
          const f=(MIN*1.9-d)/d*0.5;
          F[ids[i]].x-=dx*f; F[ids[i]].y-=dy*f;
          F[ids[j]].x+=dx*f; F[ids[j]].y+=dy*f;
        }
      }
      // 有關係者：彈簧拉回理想距離
      links.forEach(([a,b])=>{
        const dx=P[b].x-P[a].x, dy=P[b].y-P[a].y, d=Math.hypot(dx,dy)||0.01;
        const f=(d-IDEAL)/d*0.045;
        F[a].x+=dx*f; F[a].y+=dy*f; F[b].x-=dx*f; F[b].y-=dy*f;
      });
      // 同組合成員：輕微互相靠攏
      groupPairs.forEach(([a,b])=>{
        const dx=P[b].x-P[a].x, dy=P[b].y-P[a].y, d=Math.hypot(dx,dy)||0.01;
        if(d>GROUP_IDEAL){
          const f=(d-GROUP_IDEAL)/d*0.02;
          F[a].x+=dx*f; F[a].y+=dy*f; F[b].x-=dx*f; F[b].y-=dy*f;
        }
      });
      // 節點避開「與自己無關的連線」，讓頭像不會卡在線上
      ids.forEach(id=>{
        links.forEach(([a,b])=>{
          if(id===a||id===b) return;
          const pa=P[a], pb=P[b], pp=P[id];
          const vx=pb.x-pa.x, vy=pb.y-pa.y, L2=vx*vx+vy*vy||1;
          let t=((pp.x-pa.x)*vx+(pp.y-pa.y)*vy)/L2;
          t=Math.max(0,Math.min(1,t));
          const dx=pp.x-(pa.x+t*vx), dy=pp.y-(pa.y+t*vy), d=Math.hypot(dx,dy)||0.01;
          if(d<SAFE){ const f=(SAFE-d)/d*0.9; F[id].x+=dx*f; F[id].y+=dy*f; }
        });
      });
      // 套用位移並逐步冷卻
      const cool=1-it/ITER;
      ids.forEach(id=>{
        const f=F[id], m=Math.hypot(f.x,f.y)||1, step=Math.min(18,m)*cool;
        P[id].x+=f.x/m*step; P[id].y+=f.y/m*step;
      });
    }
    // 置中並依實際範圍調整畫布
    const PAD=70;
    const xs=ids.map(id=>P[id].x), ys=ids.map(id=>P[id].y);
    const minX=Math.min(...xs), minY=Math.min(...ys);
    const spanW=Math.max(...xs)-minX, spanH=Math.max(...ys)-minY;
    const newW=Math.max(760, Math.round(spanW+PAD*2));
    const newH=Math.max(520, Math.round(spanH+PAD*2+30));
    const offX=(newW-spanW)/2-minX, offY=(newH-spanH)/2-minY;
    const next={};
    ids.forEach(id=>{ next[id]={x:Math.round(P[id].x+offX), y:Math.round(P[id].y+offY)}; });
    mutate(d=>{
      if(!d.relLayouts) d.relLayouts={};
      d.relLayouts[layoutKey]={...(d.relLayouts[layoutKey]||{}),...next,__size:{w:newW,h:newH}};
    });
  };

  const disp={};
  chars.forEach(c=>{
    const prof=auMode?profileOf(c):null;
    const pr=prof||c;
    disp[c.id]={
      name:(auMode&&prof?auDisplayName(c,prof):c.name)||"未命名角色",
      color:isHex(pr.color)?pr.color:(isHex(c.color)?c.color:"#9e9e9e"),
      avatar:pr.avatar||c.avatar||""
    };
  });
  const pos={};
  chars.forEach((c,i)=>{
    const cx=W/2, cy=H/2, R=Math.min(W,H)/2-90;
    const ang=-Math.PI/2 + i*2*Math.PI/(chars.length||1);
    const def={x:cx+R*Math.cos(ang), y:cy+R*Math.sin(ang)};
    pos[c.id]= (live&&live.id===c.id) ? {x:live.x,y:live.y} : (layout[c.id]||def);
  });

  const groupPools = sel.world ? [sel.world] : (()=>{
    const arr=[]; db.worlds.forEach(mw=>{ arr.push(mw); (mw.aus||[]).forEach(a=>arr.push(a)); }); return arr;
  })();
  // 群組框：一位角色可同時屬於多個組合，重疊的框依「疊層深度」向外推開，形成同心疊合
  const drawGroups=(()=>{
    const raw=[];
    groupPools.forEach(w=>(w.groups||[]).forEach(g=>{
      const mem=(g.memberIds||[]).filter(id=>pos[id]);
      if(mem.length>=1) raw.push({g,mem,set:new Set(mem)});
    }));
    // 成員數多的先畫（在最內層），與先前的框有交集就往外疊一層
    raw.sort((a,b)=>b.mem.length-a.mem.length);
    raw.forEach((cur,i)=>{
      let depth=0;
      for(let j=0;j<i;j++){
        const prev=raw[j];
        let share=false;
        cur.set.forEach(id=>{ if(prev.set.has(id)) share=true; });
        if(share) depth=Math.max(depth,prev.depth+1);
      }
      cur.depth=depth;
      cur.pad=HULL_PAD+depth*17;
    });
    return raw;
  })();
  // 只有「完全不屬於任何組合」的角色誤入框內才提示，避免多重歸屬被誤判
  const groupedIds=new Set();
  drawGroups.forEach(dg=>dg.mem.forEach(id=>groupedIds.add(id)));
  const intruderIds=(()=>{
    const out=new Set();
    drawGroups.forEach(dg=>{
      const hullPts=convexHull(dg.mem.flatMap(id=>{
        const c={x:pos[id].x,y:pos[id].y+6}, a=[];
        for(let k2=0;k2<18;k2++){ const t=k2*2*Math.PI/18; a.push({x:c.x+dg.pad*Math.cos(t),y:c.y+dg.pad*Math.sin(t)}); }
        return a;
      }));
      chars.forEach(c=>{
        if(dg.set.has(c.id)||groupedIds.has(c.id)) return;
        if(pointInPolygon({x:pos[c.id].x,y:pos[c.id].y+6},hullPts)) out.add(c.id);
      });
    });
    return [...out];
  })();
  const edgeGroupName=(a,b)=>{
    for(const w of groupPools){ for(const g of (w.groups||[])){
      if((g.memberIds||[]).includes(a)&&(g.memberIds||[]).includes(b)) return g.name||"";
    }}
    return "";
  };
  const edges=[];
  chars.forEach(c=>{
    const owner = auMode ? profileOf(c) : c;
    if(!owner) return;
    (owner.relationships||[]).forEach(r=>{
      if(pos[r.targetId]) edges.push({
        charId:c.id, relId:r.id, from:c.id, to:r.targetId, label:r.relation||"",
        group:edgeGroupName(c.id,r.targetId),
        color:r.lineColor||"#6c4ce0", style:r.lineStyle||"dashed", arrow:r.arrow||"none",
        strength:r.strength!=null?r.strength:3, auMode
      });
    });
  });
  // 依「無序配對」分配車道，避免任何兩條線（含雙向、重複）重疊
  const pairMap={};
  edges.forEach(e=>{
    const key=[e.from,e.to].sort().join("~");
    (pairMap[key]=pairMap[key]||[]).push(e);
  });
  Object.values(pairMap).forEach(list=>{
    const n=list.length;
    const laneStep=26;
    if(n===1){ list[0].lane=0; return; }
    // 排序：先依方向（from<to 者在前），使雙向兩條穩定分居兩側
    const ordered=[...list].sort((p,q)=>{
      const dp=p.from<p.to?0:1, dq=q.from<q.to?0:1;
      return dp-dq || (p.relId<q.relId?-1:1);
    });
    ordered.forEach((e,idx)=>{
      // 對稱分布：2條→ -1,+1；3條→ -1,0,+1；4條→ -1.5,-0.5,+0.5,+1.5 …
      e.lane=(idx-(n-1)/2)*laneStep*2;
    });
  });
  const dashOf=st=>st==="solid"?"none":(st==="dotted"?"2 6":"6 4");

  // ── 先計算每條線的幾何與標籤位置，再做防重疊排解 ──
  const bezAt=(t,x1,y1,cx,cy,x2,y2)=>{
    const mt=1-t;
    return {x:mt*mt*x1+2*mt*t*cx+t*t*x2, y:mt*mt*y1+2*mt*t*cy+t*t*y2};
  };
  const geoms=edges.map(e=>{
    const a=pos[e.from], b=pos[e.to];
    const dx=b.x-a.x, dy=b.y-a.y, len=Math.hypot(dx,dy)||1;
    const ux=dx/len, uy=dy/len;
    // 法向量以固定的配對基準方向計算，雙向兩條才會落在實體兩側
    const lo=e.from<e.to?a:b, hi=e.from<e.to?b:a;
    const bdx=hi.x-lo.x, bdy=hi.y-lo.y, blen=Math.hypot(bdx,bdy)||1;
    const nx=-bdy/blen, ny=bdx/blen;
    const x1=a.x+ux*32, y1=a.y+uy*32, x2=b.x-ux*32, y2=b.y-uy*32;
    const bend=e.lane||0;
    const cx0=(x1+x2)/2+nx*bend*2, cy0=(y1+y2)/2+ny*bend*2;
    const label=e.label||"";                    // 組合名不再放進線上標籤
    const bw=label.length*12+14, bh=20;
    return {e,x1,y1,x2,y2,cx0,cy0,nx,ny,label,bw,bh,lx:0,ly:0};
  });
  // 標籤防重疊：沿曲線調整 t，再不行就往法向量方向推開
  const placed=[];
  const hit=(A,B)=>Math.abs(A.x-B.x)*2 < (A.w+B.w)+8 && Math.abs(A.y-B.y)*2 < (A.h+B.h)+6;
  // 節點框涵蓋頭像與底下的名稱文字，避免標籤壓到名字
  const nodeBoxes=chars.map(c=>({x:pos[c.id].x,y:pos[c.id].y+14,w:92,h:94}));
  geoms.forEach(g=>{
    if(!g.label){ return; }
    const tries=[0.5,0.38,0.62,0.3,0.7,0.24,0.76];
    let best=null, bestScore=Infinity;
    for(const t of tries){
      for(const push of [0,14,-14,28,-28,44,-44,60,-60]){
        const pt=bezAt(t,g.x1,g.y1,g.cx0,g.cy0,g.x2,g.y2);
        const cand={x:pt.x+g.nx*push, y:pt.y+g.ny*push, w:g.bw, h:g.bh};
        let bad=0;
        placed.forEach(q=>{ if(hit(cand,q)) bad+=10; });
        nodeBoxes.forEach(q=>{ if(hit(cand,q)) bad+=9; });
        // 越偏離線段中央、推得越遠，成本略增（優先保持自然位置）
        const cost=bad*100 + Math.abs(t-0.5)*12 + Math.abs(push)*0.5;
        if(cost<bestScore){ bestScore=cost; best={x:cand.x,y:cand.y}; }
        if(bad===0) break;
      }
      if(bestScore<10) break;
    }
    g.lx=best.x; g.ly=best.y;
    placed.push({x:g.lx,y:g.ly,w:g.bw,h:g.bh});
  });

  // 拖曳
  const rel=e=>{
    const rc=boxRef.current.getBoundingClientRect();
    const sx=W/rc.width, sy=H/rc.height;
    return {x:(e.clientX-rc.left)*sx, y:(e.clientY-rc.top)*sy};
  };
  const onMove=e=>{ if(!dragId.current) return; e.preventDefault(); const{x,y}=rel(e); setLive({id:dragId.current,x,y}); };
  const onUp=e=>{
    if(!dragId.current) return;
    const{x,y}=rel(e); const id=dragId.current; dragId.current="";
    setLive(null);
    mutate(d=>{ if(!d.relLayouts) d.relLayouts={}; if(!d.relLayouts[layoutKey]) d.relLayouts[layoutKey]={}; d.relLayouts[layoutKey][id]={x,y}; });
  };
  const openChar=cid=>{ window.__gotoChar && window.__gotoChar(cid); };

  // 取得「關係應寫入哪個物件」：主設定 → 角色本身；AU模式 → 該角色對應的AU分頁
  const ownerIn=(root,charId,createIfMissing)=>{
    const c=root.characters.find(x=>x.id===charId);
    if(!c) return null;
    if(!auMode) return c;
    if(!c.auProfiles) c.auProfiles=[];
    let pr=c.auProfiles.find(pp=>pp.auWorldId===sel.world.id);
    if(!pr && createIfMissing){
      pr={id:uid(),auWorldId:sel.world.id,auName:sel.world.name||"未命名AU",...emptyCharFields(),name:c.name};
      c.auProfiles.push(pr);
    }
    return pr||null;
  };
  // 編輯選中的關係（自動對應到主設定或AU分頁）
  const editEdge=(fn)=>{
    if(!selEdge) return;
    mutate(d=>{
      const holder=ownerIn(d,selEdge.charId);
      if(!holder) return;
      const r=(holder.relationships||[]).find(x=>x.id===selEdge.relId); if(r) fn(r);
    });
  };
  const selData=(()=>{
    if(!selEdge) return null;
    const c=db.characters.find(x=>x.id===selEdge.charId); if(!c) return null;
    const holder=auMode?(c.auProfiles||[]).find(pp=>pp.auWorldId===sel.world.id):c;
    if(!holder) return null;
    return (holder.relationships||[]).find(x=>x.id===selEdge.relId)||null;
  })();
  const deleteEdge=()=>{
    if(!selEdge) return;
    mutate(d=>{
      const holder=ownerIn(d,selEdge.charId);
      if(holder&&holder.relationships) holder.relationships=holder.relationships.filter(x=>x.id!==selEdge.relId);
    });
    setSelEdge(null);
  };
  // 在圖上直接建立新的關係線，並同步寫入角色的「人際關係」
  const createLink=(fromId,toId)=>{
    if(!fromId||!toId||fromId===toId){ setLinkFrom(""); return; }
    const exist=edges.find(e=>e.from===fromId&&e.to===toId);
    if(exist){ setSelEdge({charId:exist.charId,relId:exist.relId,to:exist.to}); setLinkFrom(""); return; }
    const rid=uid();
    mutate(d=>{
      const holder=ownerIn(d,fromId,true);
      if(!holder) return;
      if(!holder.relationships) holder.relationships=[];
      holder.relationships.push({id:rid,targetId:toId,relation:"",story:"",notes:"",
        strength:3,lineColor:"#6c4ce0",lineStyle:"dashed",arrow:"to",
        spectrum:{affection:50,power:50,distance:50}});
    });
    setSelEdge({charId:fromId,relId:rid,to:toId});
    setLinkFrom("");
  };

  const picker=(
    <div>
      <div className="row" style={{marginBottom:8}}>
        <select value={sel.id} onChange={e=>{setSrc(e.target.value);setSelEdge(null);}} style={{maxWidth:300}}>
          {options.map(o=><option key={o.id} value={o.id}>{o.name}</option>)}
        </select>
        <button className="btn small mint" onClick={()=>downloadSvg(svgRef,"角色關係圖.png",W,H)}>⬇ 下載PNG</button>
        <button className="btn small" onClick={()=>{ if(confirm("重設此視圖的節點佈局為預設環狀（畫布大小也會還原）？")) mutate(d=>{ if(d.relLayouts) delete d.relLayouts[layoutKey]; }); }}>↺ 重設佈局</button>
        <button className="btn small violet" onClick={autoArrange} title="把同一組合的角色聚在一起，未分組者另置一區">🧲 依組合自動排列</button>
        <button className="btn small violet" onClick={autoSpread} title="自動把角色與關係線彼此推開，避免頭像與線條打結">🌐 自動散開</button>
        <span className={"chip"+(showName?" on":"")} onClick={()=>setShowName(v=>!v)}>{showName?"✓ ":""}顯示角色名稱</span>
        <button className={"btn small"+(linkMode?" primary":"")} onClick={()=>{setLinkMode(v=>!v);setLinkFrom("");setSelEdge(null);}}>
          {linkMode?"✏ 連線模式：開啟中（點兩位角色建立關係）":"➕ 新增關係線"}
        </button>
      </div>
      <div className="row" style={{marginBottom:8}}>

        ["🧲","依組合自動排列","同組聚攏，各組分開不重疊"],
        ["🌐","自動散開","推開頭像與線條，解決打結"],

        ["🎯","多重歸屬","屬於多組時，框會疊成同心層"],
        ["🟠","橘色虛線圈","未分組的角色誤入某個群組框"]

          <div className="footnote">
            ➡️ 關係是單向的，A→B 與 B→A 可各自不同　·　✅ 建立後自動寫入角色的「人際關係」
