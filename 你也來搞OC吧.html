/* ---------- 圖表：他想說的話 ---------- */
const VOICE_FORMATS={
  diary:{name:"日記",placeholder:"今天……",wrap:(c,body,date)=>({header:"📖 "+date+"　天氣：晴",body,sign:"—— "+(c.name||"未命名")})},
  letter:{name:"書信",placeholder:"致親愛的你：",wrap:(c,body,date)=>({header:"",body,sign:date+"\n"+(c.name||"未命名")+" 敬上"})},
  social:{name:"社群貼文",placeholder:"想說點什麼…",wrap:(c,body,date)=>({header:"@"+(c.name||"unknown")+"　· "+date,body,sign:"♡ 讚　💬 留言　↗ 分享"})},
  monologue:{name:"內心獨白",placeholder:"（其實……）",wrap:(c,body,date)=>({header:"",body,sign:""})}
};
function VoiceCardChart({db}){
  const chars=db.characters;
  const [cid,setCid]=useState(chars[0]?chars[0].id:"");
  const [fmt,setFmt]=useState("diary");
  const [text,setText]=useState("");
  const ref=useRef(null);
  const c=chars.find(x=>x.id===cid)||chars[0];
  if(!chars.length) return <div className="empty">還沒有角色，先到「角色」板塊建立吧！</div>;
  const color=isHex(c.color)?c.color:"#6c4ce0";
  const date=new Date().toLocaleDateString("zh-TW",{year:"numeric",month:"long",day:"numeric"});
  const F=VOICE_FORMATS[fmt];
  const parts=F.wrap(c,text||F.placeholder,date);
  const isSocial=fmt==="social";
  return (
    <div>
      <div className="row" style={{marginBottom:8}}>
        <span style={{fontWeight:800,fontSize:13}}>以誰的視角：</span>
        <select value={cid} onChange={e=>setCid(e.target.value)} style={{maxWidth:180}}>
          {chars.map(x=><option key={x.id} value={x.id}>{x.name||"未命名角色"}</option>)}
        </select>
        <span style={{fontWeight:800,fontSize:13}}>格式：</span>
        {Object.keys(VOICE_FORMATS).map(k=>(
          <span key={k} className={"chip"+(fmt===k?" on":"")} onClick={()=>setFmt(k)}>{VOICE_FORMATS[k].name}</span>
        ))}
        <RatioSelect/>
        <button className="btn small mint" onClick={()=>downloadNode(ref,(c.name||"角色")+"_"+F.name+".png")}>⬇ 下載PNG</button>
      </div>
      <div className="field">
        <label>以「{c.name||"未命名角色"}」的口吻寫下內容（會自動帶入名字與今天的日期）</label>
        <textarea value={text} onChange={e=>setText(e.target.value)} placeholder={F.placeholder} style={{minHeight:120}}/>
      </div>
      <div style={{display:"flex",justifyContent:"center",marginTop:8}}>
        <div ref={ref} style={{width:440,maxWidth:"100%",background:isSocial?"#fff":"#fffdf7",
             border:"3px solid #2b2440",borderRadius:isSocial?16:6,overflow:"hidden",
             boxShadow:"6px 6px 0 rgba(43,36,64,.85)",backgroundImage:fmt==="diary"?"repeating-linear-gradient(transparent,transparent 27px,rgba(43,36,64,.08) 28px)":"none"}}>
          {isSocial &&
            <div style={{display:"flex",alignItems:"center",gap:10,padding:"12px 16px",borderBottom:"2px solid rgba(43,36,64,.15)"}}>
              {c.avatar?<img src={c.avatar} alt="" style={{width:44,height:44,borderRadius:"50%",border:"2px solid #2b2440",objectFit:"cover"}}/>
                       :<AvatarCircle name={c.name} color={c.color} avatar="" size={44}/>}
              <div>
                <div style={{fontWeight:900,fontSize:15}}>{c.name||"未命名角色"}</div>
                <div style={{fontSize:12,color:"rgba(43,36,64,.55)"}}>{parts.header}</div>
              </div>
            </div>}
          <div style={{padding:"16px 20px"}}>
            {!isSocial && parts.header &&
              <div style={{fontWeight:900,fontSize:13,color,marginBottom:10,borderBottom:"2px solid "+color,paddingBottom:6}}>{parts.header}</div>}
            <div style={{fontSize:15,lineHeight:1.9,whiteSpace:"pre-wrap",color:"#2b2440",minHeight:60}}>{parts.body}</div>
            {parts.sign &&
              <div style={{marginTop:14,fontSize:13,fontWeight:700,color:isSocial?"rgba(43,36,64,.55)":color,textAlign:isSocial?"left":"right",whiteSpace:"pre-wrap",borderTop:isSocial?"2px solid rgba(43,36,64,.12)":"none",paddingTop:isSocial?10:0}}>{parts.sign}</div>}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ---------- 圖表：AU對比模式 ---------- */
function AuCompareChart({db}){
  const chars=db.characters;
  const [cid,setCid]=useState(chars[0]?chars[0].id:"");
  const [sel,setSel]=useState([]);   // profile keys: "main" 或 auProfile.id
  const ref=useRef(null);
  const c=chars.find(x=>x.id===cid)||chars[0];
  useEffect(()=>{ setSel([]); },[cid]);
  if(!chars.length) return <div className="empty">還沒有角色，先到「角色」板塊建立吧！</div>;
  const profiles=[{key:"main",label:"主設定",p:c}].concat((c.auProfiles||[]).map(pp=>({key:pp.id,label:"AU："+profileAuName(db.worlds,pp),p:pp})));
  const chosen=profiles.filter(pr=>sel.includes(pr.key));
  const nameOf=pr=> pr.key==="main" ? (c.name||"未命名") : (auDisplayName(c,pr.p)||pr.p.name||"未命名");
  const rows=[["avatar","頭像"],["name","姓名"],["age","外貌年齡"],["birthday","生日"],["height","身高"],["weight","體重"],["cv","CV"],["color","代表色"],["mbti","MBTI"],["song","印象曲"],["appearance","外觀描述"],["description","角色描述"],["coreTheme","核心命題"],["notes","備註"],["analysis","角色分析"]];
  const cellVal=(pr,key)=>{
    const p=pr.p;
    if(key==="name") return nameOf(pr);
    if(key==="birthday"){const z=getZodiac(p.birthday);return p.birthday?(p.birthday+(z?"（"+z+"）":"")):"";}
    return p[key]||"";
  };
  return (
    <div>
      <div className="row" style={{marginBottom:8}}>
        <span style={{fontWeight:800,fontSize:13}}>選擇角色：</span>
        <select value={cid} onChange={e=>setCid(e.target.value)} style={{maxWidth:200}}>
          {chars.map(x=><option key={x.id} value={x.id}>{x.name||"未命名角色"}</option>)}
        </select>
        <RatioSelect/>
        <button className="btn small mint" disabled={chosen.length<2} style={chosen.length<2?{opacity:.45}:{}}
                onClick={()=>downloadNode(ref,(c.name||"角色")+"_AU對比.png")}>⬇ 下載PNG</button>
        {chosen.length<2 && <span className="hint">（勾選2個以上分頁後即可下載）</span>}
      </div>
      <div className="row" style={{marginBottom:10}}>
        <span style={{fontWeight:800,fontSize:13}}>並排的設定分頁（可多選）：</span>
        {profiles.map(pr=>(
          <span key={pr.key} className={"chip"+(sel.includes(pr.key)?" on":"")}
            onClick={()=>setSel(prev=>prev.includes(pr.key)?prev.filter(x=>x!==pr.key):[...prev,pr.key])}>
            {sel.includes(pr.key)?"✓ ":""}{pr.label}
          </span>
        ))}
      </div>
      {(c.auProfiles||[]).length===0 && <div className="footnote" style={{color:"var(--accent)"}}>此角色還沒有AU分頁；到「角色」板塊為他新增AU分頁，就能在此並排比較不同世界線的差異。</div>}
      {chosen.length<2
        ? <div className="empty">請至少勾選兩個設定分頁（主設定＋AU，或多個AU）進行並排比較。</div>
        : <div className="canvas-stage" ref={ref} style={{overflowX:"auto"}}>
            <div style={{fontWeight:900,fontSize:18,textAlign:"center",marginBottom:10}}>🔀 「{c.name||"未命名角色"}」AU設定對比</div>
            <table style={{borderCollapse:"collapse",width:"100%",fontSize:13}}>
              <thead><tr>
                <th style={{border:"2px solid #2b2440",padding:"6px 10px",background:"#efe7fa",width:84}}>欄位</th>
                {chosen.map(pr=>(
                  <th key={pr.key} style={{border:"2px solid #2b2440",padding:"6px 10px",background:tint(pr.p.color||c.color,.2)}}>{pr.label}</th>
                ))}
              </tr></thead>
              <tbody>
                {rows.map(([key,label])=>(
                  <tr key={key}>
                    <th style={{border:"2px solid #2b2440",padding:"5px 8px",background:"#efe7fa",textAlign:"left",fontSize:12.5,verticalAlign:"top"}}>{label}</th>
                    {chosen.map(pr=>{
                      const p=pr.p;
                      if(key==="avatar"){
                        const av=p.avatar||c.avatar;
                        return <td key={pr.key} style={{border:"2px solid #2b2440",padding:"5px 8px",textAlign:"center"}}>
                          {av?<img src={av} alt="" style={{width:48,height:48,borderRadius:"50%",border:"2px solid #2b2440",objectFit:"cover"}}/>
                             :<AvatarCircle name={nameOf(pr)} color={p.color||c.color} avatar="" size={44}/>}
                        </td>;
                      }
                      if(key==="color"){
                        const col=p.color;
                        return <td key={pr.key} style={{border:"2px solid #2b2440",padding:"5px 8px"}}>
                          {isHex(col)?<span style={{display:"inline-flex",alignItems:"center",gap:6}}><span style={{width:16,height:16,borderRadius:5,background:col,border:"2px solid #2b2440"}}></span>{col}</span>:"—"}
                        </td>;
                      }
                      const v=cellVal(pr,key);
                      return <td key={pr.key} style={{border:"2px solid #2b2440",padding:"5px 8px",whiteSpace:"pre-wrap",wordBreak:"break-word",verticalAlign:"top"}}>{v||"—"}</td>;
                    })}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>}
    </div>
  );
}

/* ---------- 圖表：角色歌單製作 ---------- */
function PlaylistMaker({db,mutate}){
  const chars=db.characters;
  const [cid,setCid]=useState(chars[0]?chars[0].id:"");
  const [plid,setPlid]=useState("");
  const cardRef=useRef(null);
  const c=chars.find(x=>x.id===cid)||chars[0];
  useEffect(()=>{ setPlid(""); },[cid]);
  if(!chars.length) return <div className="empty">還沒有角色，先到「角色」板塊建立吧！</div>;
  const mc=fn=>mutate(d=>{const x=d.characters.find(y=>y.id===cid); if(x){ if(!x.playlists) x.playlists=[]; fn(x); }});
  const lists=c.playlists||[];
  const pl=lists.find(x=>x.id===plid);
  return (
    <div>
      <div className="row" style={{marginBottom:8}}>
        <span style={{fontWeight:800,fontSize:13}}>角色：</span>
        <select value={cid} onChange={e=>setCid(e.target.value)} style={{maxWidth:180}}>
          {chars.map(x=><option key={x.id} value={x.id}>{x.name||"未命名角色"}</option>)}
        </select>
        <select value={plid} onChange={e=>setPlid(e.target.value)} style={{maxWidth:200}}>
          <option value="">──選擇歌單──</option>
          {lists.map(x=><option key={x.id} value={x.id}>{x.name||"未命名歌單"}（{(x.songs||[]).length}）</option>)}
        </select>
        <button className="btn small primary" onClick={()=>{
          const id=uid();
          mc(x=>{x.playlists.push({id,name:"新歌單",songs:[]});});
          setPlid(id);
        }}>＋新歌單</button>
      </div>
      {!pl
        ? <div className="empty">選擇或新增一個歌單，開始為「{c.name||"未命名角色"}」收錄多首印象曲。</div>
        : <div>
            <div className="row" style={{marginBottom:8}}>
              <input type="text" value={pl.name} placeholder="歌單名稱" style={{flex:1,minWidth:160,fontWeight:800}}
                     onChange={e=>mc(x=>{x.playlists.find(y=>y.id===plid).name=e.target.value;})}/>
              <RatioSelect/>
              <button className="btn small mint"
                      disabled={(pl.songs||[]).filter(x=>String(x||"").trim()).length===0}
                      style={(pl.songs||[]).filter(x=>String(x||"").trim()).length===0?{opacity:.45}:{}}
                      onClick={()=>downloadNode(cardRef,(c.name||"角色")+"_"+(pl.name||"歌單")+".png")}>⬇ 下載歌單卡PNG</button>
              <button className="btn small danger" onClick={()=>{
                if(confirm("刪除歌單「"+(pl.name||"未命名")+"」？")){ mc(x=>{x.playlists=x.playlists.filter(y=>y.id!==plid);}); setPlid(""); }
              }}>刪除歌單</button>
            </div>
            {(pl.songs||[]).map((sg,si)=>{
              const embed=spotifyEmbedUrl(sg);
              return (
                <div className="item-card" key={si}>
                  <div className="row" style={{marginBottom:embed?6:0,flexWrap:"nowrap"}}>
                    <span style={{fontWeight:900,color:"var(--accent2)",flex:"none"}}>{String(si+1).padStart(2,"0")}</span>
                    <input type="text" value={sg} placeholder="歌名或Spotify連結" style={{flex:1}}
                           onChange={e=>mc(x=>{x.playlists.find(y=>y.id===plid).songs[si]=e.target.value;})}/>
                    <button className="btn small" onClick={()=>mc(x=>{const L=x.playlists.find(y=>y.id===plid); if(si>0){const[m]=L.songs.splice(si,1);L.songs.splice(si-1,0,m);}})}>↑</button>
                    <button className="btn small" onClick={()=>mc(x=>{const L=x.playlists.find(y=>y.id===plid); if(si<L.songs.length-1){const[m]=L.songs.splice(si,1);L.songs.splice(si+1,0,m);}})}>↓</button>
                    <button className="btn small danger" onClick={()=>mc(x=>{x.playlists.find(y=>y.id===plid).songs.splice(si,1);})}>刪</button>
                  </div>
                  {embed
                    ? <iframe src={embed} width="100%" height="80" frameBorder="0" loading="lazy"
                        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
                        style={{borderRadius:12,border:"2px solid var(--ink)",background:"#fff"}} title={"曲目"+si}></iframe>
                    : (sg && <span className="hint">♪ {sg}（純文字，非Spotify連結）</span>)}
                </div>
              );
            })}
            <button className="btn small mint" onClick={()=>mc(x=>{x.playlists.find(y=>y.id===plid).songs.push("");})}>＋新增歌曲</button>
            <div className="footnote">歌單存進角色資料，可在此隨時播放；貼上Spotify連結會顯示嵌入播放器，純歌名則以文字保存。下載PNG會產生一張精美的歌單卡（含曲序與歌曲資訊）。</div>
            <h3 className="section-title" style={{marginTop:14}}><span className="dot"></span>歌單卡預覽（即下載樣式）</h3>
            <div style={{display:"flex",justifyContent:"center"}}>
              <div ref={cardRef} style={{width:400,maxWidth:"100%",background:"#fff",border:"3px solid #2b2440",borderRadius:18,overflow:"hidden",boxShadow:"6px 6px 0 rgba(43,36,64,.85)"}}>
                <div style={{background:isHex(c.color)?c.color:"#6c4ce0",padding:"14px 18px",borderBottom:"3px solid #2b2440",display:"flex",alignItems:"center",gap:12}}>
                  {c.avatar
                    ? <img src={c.avatar} alt="" style={{width:46,height:46,borderRadius:"50%",border:"3px solid #2b2440",objectFit:"cover"}}/>
                    : <div style={{width:46,height:46,borderRadius:"50%",background:"#fff",border:"3px solid #2b2440",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:20,color:isHex(c.color)?c.color:"#6c4ce0"}}>{(c.name||"？").slice(0,1)}</div>}
                  <div>
                    <div style={{fontSize:11,color:"#fff",fontWeight:800,opacity:.95}}>🎧 {c.name||"未命名角色"} 的歌單</div>
                    <div style={{fontSize:18,fontWeight:900,color:"#fff",textShadow:"1px 1px 0 rgba(43,36,64,.6)"}}>{pl.name||"未命名歌單"}</div>
                  </div>
                </div>
                <div style={{padding:"10px 16px"}}>
                  {(pl.songs||[]).filter(x=>String(x||"").trim()).length===0
                    ? <div style={{fontSize:13,color:"rgba(43,36,64,.5)",padding:"8px 0"}}>（尚無歌曲）</div>
                    : (pl.songs||[]).map((sg,si)=>{
                        if(!String(sg||"").trim()) return null;
                        const isSp=spotifyEmbedUrl(sg);
                        return (
                          <div key={si} style={{display:"flex",gap:8,alignItems:"center",padding:"5px 0",borderBottom:"1px dashed rgba(43,36,64,.25)",fontSize:13}}>
                            <span style={{fontWeight:900,color:isHex(c.color)?c.color:"#6c4ce0",minWidth:24}}>{String(si+1).padStart(2,"0")}</span>
                            <span style={{flex:1,wordBreak:"break-all"}}>{isSp?"♪ Spotify 曲目":sg}</span>
                          </div>

  });
  return (
    <div>
      <div className="row" style={{marginBottom:10}}>

               placeholder="對話標題（例：第三章・雨夜密談）" style={{maxWidth:300}}/>

            <button className="btn small" onClick={()=>move(i,-1)}>↑</button>

            <button className="btn small danger" onClick={()=>setLines(prev=>prev.filter(x=>x.id!==ln.id))}>刪</button>

      {lines.length>0 &&
        <div className="canvas-stage" ref={ref} style={{background:"#241f36",marginTop:12}}>

            if(ln.speakerId==="narr"){

                <div key={ln.id} style={{textAlign:"center",color:"rgba(255,255,255,.75)",fontSize:12.5,fontStyle:"italic",margin:"10px 24px",whiteSpace:"pre-wrap"}}>

/* ---------- 創作輔助：問卷模式 ---------- */
const MBTI_TYPES=["INTJ","INTP","ENTJ","ENTP","INFJ","INFP","ENFJ","ENFP","ISTJ","ISFJ","ESTJ","ESFJ","ISTP","ISFP","ESTP","ESFP"];
const COLOR_WORDS={"緋":"#E53935","紅":"#E53935","粉":"#FF6B94","桃":"#FF5D8F","橘":"#FB8C00","橙":"#FB8C00","黃":"#FDD835","綠":"#43A047","藍":"#1E88E5","靛":"#3949AB","紫":"#8E24AA","黑":"#263238","白":"#FAFAFA","灰":"#9E9E9E","棕":"#8D6E63","咖啡":"#8D6E63","金":"#F5B301","銀":"#B0BEC5","青":"#00ACC1","水藍":"#4FC3F7","天藍":"#4FC3F7","薄荷":"#35D0A5","翡翠":"#2E9E6B","酒紅":"#8E2438","藏青":"#2C3E63","薰衣草":"#B39DDB","奶油":"#FFF3C4"};
function smartColor(a){
  const t=String(a||"").trim();
  if(isHex(t)) return t;
  const m=t.match(/#([0-9a-fA-F]{3}|[0-9a-fA-F]{6})/);
  if(m) return "#"+m[1];
  let best="";
  for(const k in COLOR_WORDS){ if(t.includes(k) && k.length>=best.length){ best=k; } }
  return best?COLOR_WORDS[best]:"";
}

function fieldLabelOf(key){ const d=FIELD_DEFS.find(x=>x.key===key); return d?d.label:key; }
function InterviewMode({db,mutate}){
  const [answers,setAnswers]=useState({});
  const [bonds,setBonds]=useState([]);
  const [target,setTarget]=useState("new");
  const [msg,setMsg]=useState("");
  const setA=(id,v)=>setAnswers(prev=>({...prev,[id]:v}));
  const allItems=INTERVIEW_SECTIONS.flatMap(sec=>sec.items);
  const answered=allItems.filter(it=>(answers[it.id]||"").trim()).length;
  const zodiacPreview=getZodiac(answers.birthday||"");
  const colorPreview=smartColor(answers.color||"");
  const bondTargets=db.characters.filter(c=>c.id!==target);
  const doImport=()=>{
    const hasAnswer=answered>0 || bonds.some(b=>b.targetId);
    if(!hasAnswer){ setMsg("還沒有回答任何問題喔！"); return; }
    const skipped=[];
    let importedName="";
    mutate(d=>{
      let c;
      if(target==="new"){ c=newCharacter(""); d.characters.push(c); }
      else { c=d.characters.find(x=>x.id===target); }
      if(!c) return;
      allItems.forEach(it=>{
        const raw=(answers[it.id]||"").trim();
        if(!raw) return;
        let val=raw;
        if(it.type==="color"){ const h=smartColor(raw); if(h) val=h; }
        if(it.type==="height" && /^\d+(\.\d+)?$/.test(raw)) val=raw+"cm";
        if(!it.map) return;
        if(["appearance","description","coreTheme"].includes(it.map)){
          c[it.map]=c[it.map]?(c[it.map]+"\n"+val):val;
        }else{
          if(!c[it.map]) c[it.map]=val;
          else if(c[it.map]!==val) skipped.push(fieldLabelOf(it.map));
        }
      });
      const qa=[];
      allItems.forEach(it=>{
        const raw=(answers[it.id]||"").trim();
        if(!it.map && raw) qa.push("Q："+it.q+"\nA："+raw);
      });
      if(qa.length){
        const block="【角色訪談】\n"+qa.join("\n\n");
        c.description=c.description?(c.description+"\n\n"+block):block;
      }
      bonds.forEach(b=>{
        if(!b.targetId || b.targetId===c.id) return;
        if(!d.characters.some(x=>x.id===b.targetId)) return;
        if(!c.relationships) c.relationships=[];
        const ex=c.relationships.find(r=>r.targetId===b.targetId);
        if(ex){
          if(b.relation && !ex.relation) ex.relation=b.relation;
          if(b.story) ex.story=ex.story?(ex.story+"\n"+b.story):b.story;
        }else{
          c.relationships.push({id:uid(),targetId:b.targetId,relation:b.relation||"",story:b.story||"",notes:""});
        }
      });
      importedName=c.name||"未命名角色";
    });
    let m="✔ 已將訪談結果匯入角色「"+(importedName||"未命名角色")+"」！";
    if(skipped.length) m+="（下列欄位已有內容，未覆蓋："+[...new Set(skipped)].join("、")+"）";
    setMsg(m);
    setAnswers({}); setBonds([]);
  };
  const renderItem=it=>{
    const v=answers[it.id]||"";
    if(it.type==="textarea") return <textarea value={v} style={{minHeight:52}} onChange={e=>setA(it.id,e.target.value)}/>;
    if(it.type==="mbti") return (
      <select value={v} onChange={e=>setA(it.id,e.target.value)} style={{maxWidth:200}}>
        <option value="">──請選擇──</option>
        {MBTI_TYPES.map(t=><option key={t} value={t}>{t}</option>)}
      </select>
    );
    if(it.type==="birthday") return (
      <div className="row" style={{flexWrap:"nowrap"}}>
        <input type="text" value={v} onChange={e=>setA(it.id,e.target.value)} placeholder="例：3月14日"/>
        {it.id==="birthday" && zodiacPreview && <span className="badge">★ {zodiacPreview}</span>}
      </div>
    );
    if(it.type==="color") return (
      <div className="row" style={{flexWrap:"nowrap"}}>
        <input type="text" value={v} onChange={e=>setA(it.id,e.target.value)} placeholder="#FF5D8F 或 酒紅"/>
        {colorPreview && <span style={{width:26,height:26,borderRadius:8,border:"2px solid var(--ink)",background:colorPreview,flex:"none"}} title={colorPreview}></span>}
      </div>
    );
    return <input type="text" value={v} onChange={e=>setA(it.id,e.target.value)}/>;
  };
  return (
    <div>
      <div className="sub">分區訪談，答案會智能對應到角色板塊：基本資料直接入欄（顏色名自動轉色號、生日即時偵測星座）、羈絆區直接建立人際關係。已有內容的欄位不會被覆蓋。</div>
      <div className="row" style={{marginBottom:8}}>
        <span style={{fontWeight:800,fontSize:14}}>匯入對象：</span>
        <select value={target} onChange={e=>setTarget(e.target.value)} style={{maxWidth:240}}>
          <option value="new">✚ 建立新角色</option>
          {db.characters.map(c=><option key={c.id} value={c.id}>{c.name||"未命名角色"}（附加）</option>)}
        </select>
        <button className="btn primary" onClick={doImport}>✔ 匯入角色板塊</button>
      </div>
      <div style={{border:"2px solid var(--ink)",borderRadius:999,overflow:"hidden",height:16,background:"#fff",marginBottom:4}}>
        <div style={{width:(answered/allItems.length*100)+"%",height:"100%",background:"linear-gradient(90deg,var(--accent),var(--accent2))",transition:"width .3s"}}></div>
      </div>
      <div className="footnote" style={{marginBottom:10}}>回答進度：{answered}／{allItems.length} 題（不必全部作答，可隨時匯入）</div>
      {msg && <div className="badge" style={{marginBottom:10}}>{msg}</div>}
      {INTERVIEW_SECTIONS.map((sec,si)=>(
        <div className="item-card" key={si}>
          <h3 className="section-title" style={{marginTop:0}}><span className="dot"></span>{sec.title}</h3>
          <div className="footnote" style={{marginBottom:8}}>{sec.note}</div>
          {sec.items.map((it,ii)=>(
            <div className="field" key={it.id}>
              <label>Q{ii+1}．{it.q}{it.map && <span className="badge" style={{marginLeft:6,fontSize:10.5}}>→ {fieldLabelOf(it.map)}</span>}</label>
              {renderItem(it)}
            </div>
          ))}
        </div>
      ))}
      <div className="item-card">
        <h3 className="section-title" style={{marginTop:0}}><span className="dot"></span>肆、羈絆</h3>
        <div className="footnote" style={{marginBottom:8}}>選擇已有角色並描述關係，匯入時會直接寫進「人際關係」。</div>
        {bondTargets.length===0 && <div className="empty">目前沒有其他角色可以建立羈絆。</div>}
        {bonds.map((b,bi)=>(
          <div className="rel-block" key={b.id}>
            <div className="row" style={{marginBottom:6}}>
              <select value={b.targetId} style={{maxWidth:200}}
                      onChange={e=>setBonds(prev=>prev.map(x=>x.id===b.id?{...x,targetId:e.target.value}:x))}>
                <option value="">──選擇角色──</option>
                {bondTargets.map(c=><option key={c.id} value={c.id}>{c.name||"未命名角色"}</option>)}
              </select>
              <input type="text" value={b.relation} placeholder="關係（例：青梅竹馬）" style={{flex:1,minWidth:140}}
                     onChange={e=>setBonds(prev=>prev.map(x=>x.id===b.id?{...x,relation:e.target.value}:x))}/>
              <button className="btn small danger" onClick={()=>setBonds(prev=>prev.filter(x=>x.id!==b.id))}>刪</button>
            </div>
            <textarea value={b.story} placeholder="兩人之間的故事…" style={{minHeight:44}}
                      onChange={e=>setBonds(prev=>prev.map(x=>x.id===b.id?{...x,story:e.target.value}:x))}/>
          </div>
        ))}
        {bondTargets.length>0 &&
          <button className="btn small mint" onClick={()=>setBonds(prev=>[...prev,{id:uid(),targetId:"",relation:"",story:""}])}>＋新增羈絆</button>}
      </div>
    </div>
  );
}

function GachaMode({db,mutate}){
  const [results,setResults]=useState([]);
  const ref=useRef(null);
  const chars=db.characters;
  if(!chars.length) return <div className="empty">卡池是空的！先到「角色」板塊建立角色，才能開始抽卡。</div>;
  const pick=a=>a[Math.floor(Math.random()*a.length)];
  const rollRarity=()=>{
    const total=GACHA_RARITIES.reduce((s,x)=>s+x.w,0);
    let n=Math.random()*total;
    for(const x of GACHA_RARITIES){ n-=x.w; if(n<0) return x; }
    return GACHA_RARITIES[GACHA_RARITIES.length-1];
  };
  const rollTitle=()=>Math.random()<0.15?pick(GACHA_SPECIAL):(pick(GACHA_PREFIX)+pick(GACHA_NOUN));
  const pull10=()=>setResults(Array.from({length:10},()=>({
    id:uid(), rarity:rollRarity(), title:rollTitle(), char:pick(chars)
  })));
  return (
    <div>
      <div className="sub">每天的創作運勢占卜！隨機抽出「（稀有度）＋【卡面名稱】＋（角色）」，卡面組合超過兩千五百種、另有五十餘張限定特殊卡面，抽到誰就畫誰、寫誰吧。</div>
      <div className="row" style={{marginBottom:12}}>
        <button className="btn primary" onClick={pull10}>🎰 10連抽！</button>
        {results.length>0 && <button className="btn small mint" onClick={()=>downloadNode(ref,"抽卡結果.png")}>⬇ 下載PNG</button>}
      </div>
      {results.length===0
        ? <div className="empty">按下「10連抽」，看看今天召喚出哪些卡面……</div>
        : <div className="canvas-stage" ref={ref}>
            <div style={{fontWeight:900,fontSize:17,textAlign:"center",marginBottom:12}}>✨ 10連抽結果 ✨</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(210px,1fr))",gap:10}}>
              {results.map(x=>(
                <div key={x.id} style={{border:"2.5px solid #2b2440",borderRadius:12,overflow:"hidden",background:"#fff",boxShadow:"3px 3px 0 rgba(43,36,64,.5)"}}>
                  <div style={{background:x.rarity.bg,color:x.rarity.fg,fontWeight:900,fontSize:13,padding:"3px 10px",borderBottom:"2px solid #2b2440",display:"flex",justifyContent:"space-between"}}>
                    <span>（{x.rarity.r}）</span>
                    <span style={{width:10,height:10,borderRadius:"50%",background:isHex(x.char.color)?x.char.color:"#fff",border:"1.5px solid #2b2440",alignSelf:"center"}}></span>
                  </div>
                  <div style={{padding:"8px 10px",fontSize:13.5}}>
                    <div style={{fontWeight:900}}>【{x.title}】</div>
                    <div style={{marginTop:2}}>{x.char.name||"未命名角色"}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>}
      {results.length>0 && mutate &&
        <SaveInspoBar db={db} mutate={mutate} source="抽卡模式" defaultTitle="10連抽結果"
          content={results.map(x=>"（"+x.rarity.r+"）【"+x.title+"】"+(x.char.name||"未命名角色")).join("\n")}/>}
    </div>
  );
}

function AuGachaMode({db,mutate}){
  const [draw,setDraw]=useState(null);
  const [parent,setParent]=useState("");
  const [msg,setMsg]=useState("");
  const pick=a=>a[Math.floor(Math.random()*a.length)];
  const rollAll=()=>{ setDraw({setting:pick(AU_SETTINGS),scene:pick(AU_SCENES),plot:pick(AU_PLOTS)}); setMsg(""); };
  const rollOne=k=>setDraw(prev=>prev?{...prev,[k]:pick(k==="setting"?AU_SETTINGS:(k==="scene"?AU_SCENES:AU_PLOTS))}:prev);
  const exportAu=()=>{
    if(!draw) return;
    let auName="";
    mutate(d=>{
      let mw=d.worlds.find(x=>x.id===parent)||d.worlds[0];
      if(!mw){ mw=newMainWorld(""); d.worlds.push(mw); }
      if(!mw.aus) mw.aus=[];
      const w=newWorld(draw.setting+"AU");
      w.description="【AU設定】"+draw.setting+"\n【場景】"+draw.scene+"\n【劇情走向】"+draw.plot;
      w.events.push({id:uid(),time:"開端",title:draw.plot,description:"場景："+draw.scene,checked:true});
      mw.aus.push(w);
      auName=w.name;
    });
    setMsg("✔ 已建立次要世界觀「"+auName+"」！快到「主要世界觀」板塊繼續補完設定。");
  };
  const rows=draw?[["setting","🌍 AU設定",draw.setting],["scene","📍 場景",draw.scene],["plot","📖 劇情走向",draw.plot]]:[];
  return (
    <div>
      <div className="sub">隨機抽選「AU設定×場景×劇情走向」（各一百種，含ABO、哨兵嚮導、花吐症等），不滿意可單項重抽；喜歡的組合可一鍵匯出成新的次要世界觀（AU），描述與開端事件會自動寫好。</div>
      <div className="row" style={{marginBottom:12}}>
        <button className="btn primary" onClick={rollAll}>🌀 抽選AU組合！</button>
        {draw && <React.Fragment>
          {db.worlds.length>1 &&
            <select value={parent||db.worlds[0].id} onChange={e=>setParent(e.target.value)} style={{maxWidth:220}}>
              {db.worlds.map(w=><option key={w.id} value={w.id}>隸屬：{w.name||"未命名主要世界觀"}</option>)}
            </select>}
          <button className="btn violet" onClick={exportAu}>📤 匯出為次要世界觀</button>
        </React.Fragment>}
      </div>
      {msg && <div className="badge" style={{marginBottom:10}}>{msg}</div>}
      {!draw
        ? <div className="empty">按下「抽選AU組合」，讓命運決定下一條世界線……</div>
        : <div>
            {rows.map(([k,label,val])=>(
              <div className="item-card" key={k} style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontWeight:900,minWidth:110}}>{label}</span>
                <span style={{flex:1,fontSize:16,fontWeight:800,color:"var(--accent2)"}}>{val}</span>
                <button className="btn small" onClick={()=>rollOne(k)}>🔄 重抽此項</button>
              </div>
            ))}
          </div>}
    </div>
  );
}

function ThirtyMode({db,mutate}){
  const [savedMsg,setSavedMsg]=useState("");
  const [theme,setTheme]=useState(0);
  const [pickIdx,setPickIdx]=useState(-1);
  const [pickChar,setPickChar]=useState(null);
  const ref=useRef(null);
  const t=THIRTY_THEMES[theme];
  const items=t.items.split("|");
  const roll=()=>{
    setPickIdx(Math.floor(Math.random()*items.length));
    setPickChar(db.characters.length?db.characters[Math.floor(Math.random()*db.characters.length)]:null);
  };
  return (
    <div>
      <div className="sub">內建七十二種創作30題，選一套主題照著畫、照著寫；也可以讓系統幫你隨機抽一題（有角色的話會順便抽個主角），抽到喜歡的題目可存入角色靈感庫。</div>
      <div className="row" style={{marginBottom:12}}>
        <select value={theme} onChange={e=>{setTheme(+e.target.value);setPickIdx(-1);}} style={{maxWidth:220}}>
          {THIRTY_THEMES.map((x,i)=><option key={i} value={i}>{x.name}</option>)}
        </select>
        <button className="btn primary" onClick={roll}>🎲 隨機抽一題</button>
        <button className="btn small mint" onClick={()=>downloadNode(ref,t.name+".png")}>⬇ 下載題目表PNG</button>
      </div>
      {pickIdx>=0 &&
        <div className="row" style={{marginBottom:10}}>
          <span className="badge" style={{fontSize:14}}>
            今日課題：第{pickIdx+1}題「{items[pickIdx]}」{pickChar?("　主角：「"+(pickChar.name||"未命名角色")+"」"):""}
          </span>
          {pickChar &&
            <button className="btn small primary" onClick={()=>{
              mutate(d=>{addInspiration(d,pickChar.id,"30題模式",t.name+" 第"+(pickIdx+1)+"題","題目："+items[pickIdx]);});
              setSavedMsg("✔ 已存入「"+(pickChar.name||"未命名角色")+"」的靈感庫！");
            }}>💾 存入靈感庫</button>}
          {savedMsg && <span className="badge">{savedMsg}</span>}
        </div>}
      <div className="canvas-stage" ref={ref}>
        <div style={{fontWeight:900,fontSize:18,textAlign:"center",marginBottom:12}}>📚 {t.name}</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:6}}>
          {items.map((it,i)=>(
            <div key={i} style={{
              border:"2px solid #2b2440",borderRadius:10,padding:"5px 8px",fontSize:12.5,
              background:i===pickIdx?"var(--sun)":"#fff",
              fontWeight:i===pickIdx?900:700,display:"flex",gap:6
            }}>
              <span style={{color:"var(--accent2)",fontWeight:900,minWidth:22}}>{String(i+1).padStart(2,"0")}</span>
              <span>{it}</span>
            </div>
          ))}
        </div>
        <div style={{textAlign:"right",fontSize:11,fontWeight:800,color:"rgba(43,36,64,.5)",marginTop:8}}>─ 你也來搞OC吧！ ─</div>
      </div>
    </div>
  );
}

const TITLE_SUFFIX=["前夜","之後","變奏","備忘錄","殘響","二重奏","if","番外","終章","序"];
function TITLE_TYPES_ALL(){ return [...TITLE_TYPES,...TITLE_TYPES2]; }
function TitleMode({db,mutate}){
  const [type,setType]=useState(0);
  const [out,setOut]=useState([]);
  const [saveTo,setSaveTo]=useState("");
  const [savedMsg,setSavedMsg]=useState("");
  const gen=()=>{
    const t=TITLE_TYPES_ALL()[type];
    const pick=a=>a[Math.floor(Math.random()*a.length)];
    const one=()=>{
      if(t.cores){
        const core=pick(t.cores);
        const roll=Math.random();
        if(roll<0.45) return core;
        if(roll<0.75) return core+"・"+pick(TITLE_SUFFIX);
        return pick(TITLE_SUFFIX)==="if"?("if・"+core):(core+"之"+pick(TITLE_SUFFIX));
      }
      return pick(TITLE_PATS).replace("{A}",pick(t.A)).replace("{B2}",pick(t.B)).replace("{B}",pick(t.B));
    };
    const set=new Set(); let guard=0;
    while(set.size<5 && guard<80){ set.add(one()); guard++; }
    setOut([...set]);
  };
  return (
    <div>
      <div className="sub">三十二種類型：原有十二種組合型，加上取材自東西方文學名著、經典電影、華英日韓歌名中譯、歌詞風原創短句、同人女詞牌名與心理學效應等二十種靈感庫（各含百種以上變化），一次出五個任君挑選，喜歡的可存進角色靈感庫。</div>
      <div className="row" style={{marginBottom:12}}>
        <select value={type} onChange={e=>setType(+e.target.value)} style={{maxWidth:220}}>
          {TITLE_TYPES_ALL().map((t,i)=><option key={i} value={i}>{t.name}</option>)}
        </select>
        <button className="btn primary" onClick={gen}>✒ 生成五個標題</button>
      </div>
      {out.length===0
        ? <div className="empty">選好類型後按下「生成」，為下一部作品命名吧。</div>
        : <div>
            <div className="row" style={{marginBottom:8}}>
              <span style={{fontWeight:800,fontSize:13}}>💾 存入角色：</span>
              <select value={saveTo} onChange={e=>setSaveTo(e.target.value)} style={{maxWidth:200}}>
                <option value="">──選擇角色──</option>
                {db.characters.map(c=><option key={c.id} value={c.id}>{c.name||"未命名角色"}</option>)}
              </select>
              {savedMsg && <span className="badge">{savedMsg}</span>}
            </div>
            {out.map((t,i)=>(
              <div className="item-card" key={i} style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontWeight:900,color:"var(--accent2)"}}>{String(i+1).padStart(2,"0")}</span>
                <span style={{fontSize:17,fontWeight:800,letterSpacing:1,flex:1}}>《{t}》</span>
                {saveTo && <button className="btn small primary" onClick={()=>{
                  mutate(d=>{addInspiration(d,saveTo,"標題生成器","《"+t+"》","類型："+TITLE_TYPES_ALL()[type].name);});
                  setSavedMsg("✔ 已儲存《"+t+"》");
                }}>💾</button>}
              </div>
            ))}
            <button className="btn small violet" onClick={gen}>🔄 再來五個</button>
          </div>}
    </div>
  );
}

function IfBoxMode({db,mutate}){
  const [out,setOut]=useState([]);
  const pick=a=>a[Math.floor(Math.random()*a.length)];
  const fill=t=>{
    const chars=db.characters;
    let a="Ａ", b="Ｂ";
    if(chars.length>=2){
      const i=Math.floor(Math.random()*chars.length);
      let j=Math.floor(Math.random()*(chars.length-1)); if(j>=i) j++;
      a=chars[i].name||"未命名角色"; b=chars[j].name||"未命名角色";
    }else if(chars.length===1){ a=chars[0].name||"未命名角色"; }
    return t.replace("{A}",a).replace("{B}",b);
  };
  const roll=n=>setOut(Array.from({length:n},()=>{
    const useT=Math.random()<0.45;
    return fill(useT?pick(IF_TEMPLATES):pick(IF_STATIC));
  }));
  return (
    <div>
      <div className="sub">走進電話亭，撥給另一條世界線——三百餘種if線靈感，帶入你家角色隨機生成，專治「想畫if但想不到if」。</div>

        <button className="btn violet" onClick={()=>roll(3)}>📞📞📞 連撥三通</button>
      </div>
      {out.length===0
        ? <div className="empty">電話亭亮著燈。要不要撥一通，聽聽另一條世界線的聲音？</div>

              </div>
            ))}

          </div>}
    </div>
  );
}

        {q>=0 && <button className="btn small violet" onClick={()=>{setQ(Math.floor(Math.random()*QUICK_QUESTIONS.length));setAns("");}}>🔄 換一題</button>}
      </div>

        ? <div className="empty">按下「抽題」，看看今天輪到誰接受拷問……</div>
        : <div className="item-card" style={{borderLeft:"6px solid var(--accent2)"}}>

              {ch
                ? <React.Fragment>
                    <AvatarCircle name={ch.name} color={ch.color} avatar={ch.avatar} size={36}/>
                    <span style={{fontWeight:900,fontSize:16}}>{ch.name||"未命名角色"}</span>

                : <span style={{fontWeight:900,fontSize:16}}>（隨便一位孩子）</span>}

            </div>
            <div style={{fontSize:16.5,fontWeight:800,marginBottom:10,lineHeight:1.6}}>Q．{QUICK_QUESTIONS[q]}</div>
            <textarea value={ans} onChange={e=>setAns(e.target.value)} style={{minHeight:80}}
                      placeholder={"用「"+((ch&&ch.name)||"角色")+"」的口吻回答……"}/>
            <div className="row" style={{marginTop:8}}>
              {ch && ans.trim() &&
                <button className="btn small primary" onClick={()=>{
                  mutate(d=>{addInspiration(d,ch.id,"快問快答","第"+(q+1)+"題","Q："+QUICK_QUESTIONS[q]+"\nA："+ans.trim());});
                  setSaved("✔ 已存入「"+(ch.name||"未命名角色")+"」的靈感庫！");
                }}>💾 存入靈感庫</button>}
              {saved && <span className="badge">{saved}</span>}
            </div>
          </div>}
    </div>
  );
}

  "描述{A}與{B}之間，那條誰都不敢先跨過的線。",
  "寫{A}對{B}說過最溫柔、也最殘忍的一句話。",
  "設計一個讓{A}與{B}被迫合作的情境。",
  "描述{A}如何稱呼{B}，以及這個稱呼的由來。"
];
function todaySeed(){
  const d=new Date();
  return d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate();
}
function ChallengeMode({db,mutate}){
  const chars=db.characters;
  const seed=todaySeed();
  // 依日期決定今天是單人還是雙人題，以及題目與角色
  const useDuo = chars.length>=2 && (seed%3===0);
  const pool = useDuo ? CHALLENGE_DUO : CHALLENGE_SOLO;
  const qIdx = seed % pool.length;
  const aIdx = chars.length ? (Math.floor(seed/7) % chars.length) : -1;
  let bIdx=-1;
  if(useDuo && chars.length>=2){ bIdx=(aIdx + 1 + (Math.floor(seed/13) % (chars.length-1))) % chars.length; }
  const A = aIdx>=0 ? (chars[aIdx].name||"（某位角色）") : "（某位角色）";
  const B = bIdx>=0 ? (chars[bIdx].name||"（另一位角色）") : "（另一位角色）";
  const text = pool[qIdx].split("{A}").join(A).split("{B}").join(B);
  const dateStr=new Date().toLocaleDateString("zh-TW",{month:"long",day:"numeric",weekday:"long"});
  return (
    <div>
      <div className="sub">每天一個小任務，養成創作手感。題目每日固定、隔日更新——今天的挑戰是：</div>
      <div className="item-card" style={{textAlign:"center",padding:"22px 18px",background:"linear-gradient(135deg,rgba(255,93,143,.12),rgba(108,76,224,.12))",border:"2.5px solid var(--ink)"}}>
        <div style={{fontSize:12.5,fontWeight:900,color:"var(--accent2)",letterSpacing:1}}>📅 {dateStr} · 今日挑戰</div>
        <div style={{fontSize:19,fontWeight:900,lineHeight:1.7,margin:"12px 0"}}>{text}</div>
        {chars.length===0 && <div className="hint">（建立角色後，題目會自動代入你的角色名字）</div>}
        <div style={{fontSize:26}}>{useDuo?"👥":"✨"}</div>
      </div>
      <div className="footnote">想換個角色練手？到「創作輔助」的其他模式抽題；今日挑戰以日期為準，明天會換一題。</div>
      {mutate && <SaveInspoBar db={db} mutate={mutate} source="今日挑戰" defaultTitle={"今日挑戰："+dateStr} content={text}/>}
    </div>
  );
}

/* ---------- 創作輔助：隨機分組 ---------- */
function RandomGroupMode({db,mutate}){
  const chars=db.characters;
  const [mode,setMode]=useState("count");   // count=每組人數；pick=抽出人數；groups=分成N組
  const [num,setNum]=useState(2);
  const [result,setResult]=useState(null);
  const shuffle=arr=>{ const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; };
  const run=()=>{
    if(chars.length===0) return;
    const pool=shuffle(chars);
    if(mode==="pick"){
      setResult({type:"pick",groups:[pool.slice(0,Math.min(num,pool.length))]});
    }else if(mode==="count"){
      const per=Math.max(1,num), gs=[];
      for(let i=0;i<pool.length;i+=per) gs.push(pool.slice(i,i+per));
      setResult({type:"count",groups:gs});
    }else{
      const g=Math.max(1,num), gs=Array.from({length:Math.min(g,pool.length)},()=>[]);
      pool.forEach((c,i)=>gs[i%gs.length].push(c));
      setResult({type:"groups",groups:gs});
    }
  };
  if(!chars.length) return <div className="empty">還沒有角色，先到「角色」板塊建立吧！</div>;
  const label = mode==="pick"?"抽出人數":(mode==="count"?"每組人數":"分成幾組");
  return (
    <div>
      <div className="sub">從所有OC中隨機抽選、隨機分組——決定今天畫誰、幫角色配對、或替接龍抽組合都好用。</div>
      <div className="row" style={{marginBottom:8}}>
        <span className={"chip"+(mode==="pick"?" on":"")} onClick={()=>{setMode("pick");setResult(null);}}>🎯 隨機抽出N人</span>
        <span className={"chip"+(mode==="count"?" on":"")} onClick={()=>{setMode("count");setResult(null);}}>👥 每組N人</span>
        <span className={"chip"+(mode==="groups"?" on":"")} onClick={()=>{setMode("groups");setResult(null);}}>🗂 分成N組</span>
      </div>
      <div className="row" style={{marginBottom:12}}>
        <span style={{fontWeight:800,fontSize:13}}>{label}：</span>
        <input type="number" min="1" max={chars.length} value={num}
               onChange={e=>setNum(Math.max(1,Math.min(chars.length,+e.target.value||1)))}
               style={{width:80}}/>
        <span className="hint">目前共 {chars.length} 位角色</span>
        <button className="btn primary" onClick={run}>🎲 隨機分組！</button>
      </div>
      {!result
        ? <div className="empty">設定好人數，按下「隨機分組」吧！</div>
        : <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:10}}>
            {result.groups.map((g,gi)=>(
              <div className="item-card" key={gi} style={{margin:0,borderTop:"5px solid var(--accent2)"}}>
                {result.type!=="pick" && <div style={{fontWeight:900,marginBottom:6,color:"var(--accent2)"}}>第 {gi+1} 組（{g.length}人）</div>}
                {result.type==="pick" && <div style={{fontWeight:900,marginBottom:6,color:"var(--accent2)"}}>🎯 抽選結果（{g.length}人）</div>}
                {g.map(c=>(
                  <div className="row" key={c.id} style={{marginBottom:4}}>
                    <AvatarCircle name={c.name} color={c.color} avatar={c.avatar} size={26}/>
                    <span style={{fontWeight:800,fontSize:13.5}}>{c.name||"未命名角色"}</span>
                  </div>
                ))}
              </div>
            ))}
          </div>}
      {result && <div style={{marginTop:8}}><button className="btn small violet" onClick={run}>🔄 再抽一次</button></div>}
      {result &&
        <SaveInspoBar db={db} mutate={mutate} source="隨機分組" defaultTitle="隨機分組結果"
          content={result.groups.map((g,gi)=>(result.type==="pick"?"抽選：":("第"+(gi+1)+"組："))+g.map(c=>c.name||"未命名角色").join("、")).join("\n")}/>}
    </div>
  );
}

function questionsFromTemplate(tpl,chars){
  const n1=(chars[0]&&chars[0].name)||"Ａ", n2=(chars[1]&&chars[1].name)||"Ｂ";
  const fill=t=>String(t||"").split("{A}").join(n1).split("{B}").join(n2);
  return tpl.qs.map(q=>{
    if(q.t==="scale") return {...newQuestion("scale"),text:fill(q.x),leftLabel:fill(q.l||""),rightLabel:fill(q.r||"")};
    if(q.t==="radar") return {...newQuestion("radar"),text:fill(q.x),axes:q.axes.map(fill)};
    return {...newQuestion("choice"),text:fill(q.x),options:q.o.map(fill)};
  });
}
async function aiGenerateQuestions(db,q){
  const chars=db.characters.filter(c=>q.charIds.includes(c.id));
  const summary=chars.map(c=>"【"+(c.name||"未命名")+"】MBTI："+(c.mbti||"？")+"；核心："+String(c.coreTheme||"").slice(0,60)+"；描述："+String(c.description||"").slice(0,150)).join("\n");
  const prompt="你是OC創作輔助工具的出題引擎。請根據以下角色設定與問卷主題，產生6道繁體中文問卷題目，題目需貼合角色個性與主題，混合三種題型。\n主題："+(q.topic||q.name||"角色綜合問卷")+"\n角色設定：\n"+summary+
    "\n\n只回傳JSON陣列，不要任何其他文字、說明或markdown符號。格式範例：[{\"type\":\"scale\",\"text\":\"題目\",\"min\":1,\"max\":10,\"leftLabel\":\"左端\",\"rightLabel\":\"右端\"},{\"type\":\"choice\",\"text\":\"題目\",\"options\":[\"甲\",\"乙\",\"丙\"]},{\"type\":\"radar\",\"text\":\"題目\",\"axes\":[\"軸1\",\"軸2\",\"軸3\",\"軸4\",\"軸5\"],\"min\":0,\"max\":10}]";
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1200,messages:[{role:"user",content:prompt}]})
  });
  const data=await res.json();
  const text=(data.content||[]).filter(x=>x.type==="text").map(x=>x.text).join("");
  const clean=text.replace(/```json|```/g,"").trim();
  const arr=JSON.parse(clean);
  if(!Array.isArray(arr)) throw new Error("format");
  return arr.map(x=>{
    if(x.type==="scale") return {...newQuestion("scale"),text:x.text||"",min:+x.min||1,max:+x.max||10,leftLabel:x.leftLabel||"",rightLabel:x.rightLabel||""};
    if(x.type==="radar") return {...newQuestion("radar"),text:x.text||"",axes:Array.isArray(x.axes)&&x.axes.length>=3?x.axes.map(String):["軸一","軸二","軸三","軸四","軸五"],min:+x.min||0,max:+x.max||10};
    return {...newQuestion("choice"),text:x.text||"",options:Array.isArray(x.options)&&x.options.length?x.options.map(String):["是","否"]};
  });
}

function RadarView({qu,chars,size}){
  const S=size||280, cx=S/2, cy=S/2+6, r=S/2-46;
  const axes=qu.axes||[]; const n=axes.length;
  if(n<3) return <div className="hint">雷達圖至少需要三個軸向。</div>;
  const range=(qu.max-qu.min)||1;
  const pt=(t,i)=>{
    const ang=-Math.PI/2+i*2*Math.PI/n;
    return [cx+r*t*Math.cos(ang), cy+r*t*Math.sin(ang)];
  };
  const ring=t=>axes.map((_,i)=>pt(t,i).join(",")).join(" ");
  return (
    <svg width={S} height={S} viewBox={"0 0 "+S+" "+S} style={{fontFamily:'"Noto Sans TC","Microsoft JhengHei",sans-serif'}}>
      {[0.25,0.5,0.75,1].map(t=>(
        <polygon key={t} points={ring(t)} fill={t===1?"rgba(108,76,224,.05)":"none"} stroke="#b9a7ea" strokeWidth={t===1?2:1}/>
      ))}
      {axes.map((ax,i)=>{
        const [x,y]=pt(1,i); const [lx,ly]=pt(1.18,i);
        return (
          <g key={i}>
            <line x1={cx} y1={cy} x2={x} y2={y} stroke="#d8cdf2" strokeWidth="1"/>
            <text x={lx} y={ly+4} textAnchor="middle" fontSize="11.5" fontWeight="800" fill="#2b2440">{ax}</text>
          </g>
        );
      })}
      {chars.map((c,ci)=>{
        const a=qu.answers[c.id];
        if(!a||!a.vals) return null;
        const pts=axes.map((_,i)=>{
          const v=a.vals[i]!=null?a.vals[i]:qu.min;
          const t=Math.max(0,Math.min(1,(v-qu.min)/range));
          return pt(t,i).join(",");
        }).join(" ");
        const col=charColorOf(c,ci);
        return (
          <g key={c.id}>
            <polygon points={pts} fill={col+"33"} stroke={col} strokeWidth="2.5"/>
          </g>
        );
      })}
    </svg>
  );
}

              <input type="color" value={qu.markColor||quest.markColor} title="標記顏色"
                     style={{width:30,height:28,border:"2px solid var(--ink)",borderRadius:8,padding:1}}
                     onChange={e=>setF("markColor",e.target.value)}/>}
            <button className="btn small mint" onClick={()=>updateQ(x=>{x.options.push("新選項");})}>＋選項</button>
          </div>
          {(qu.options||[]).map((opt,oi)=>(
            <div className="row" key={oi} style={{marginBottom:3}}>
              <input type="text" value={opt} style={{flex:1,minWidth:120}}
                     onChange={e=>updateQ(x=>{x.options[oi]=e.target.value;})}/>
              {chars.map((c,i)=>{
                const a=qu.answers[c.id]||{};
                const on=(a.sel||[]).includes(oi);
                return (
                  <span key={c.id} className={"chip"+(on?" on":"")} style={{fontSize:11,padding:"1px 8px"}}
                    title={(c.name||"未命名")+"是否選擇此項"}
                    onClick={()=>setAns(c.id,x=>{
                      if(!x.sel) x.sel=[];
                      const k=x.sel.indexOf(oi);
                      if(k>=0) x.sel.splice(k,1);
                      else { if(qu.display!=="checkbox") x.sel=[]; x.sel.push(oi); }
                    })}>
                    {(c.name||"？").slice(0,2)}
                  </span>
                );
              })}
              <button className="btn small danger" onClick={()=>updateQ(x=>{
                x.options.splice(oi,1);
                chars.forEach(c=>{const a=x.answers[c.id]; if(a&&a.sel) a.sel=a.sel.filter(k=>k!==oi).map(k=>k>oi?k-1:k);});
              })}>刪</button>
            </div>
          ))}
        </div>
      )}
      {qu.type==="radar" && (
        <div>
          <div className="row" style={{marginBottom:6}}>
            <span style={{fontWeight:800,fontSize:12.5}}>數值範圍：</span>
            <input type="text" value={qu.min} style={{width:52}} onChange={e=>setF("min",+e.target.value||0)}/>
            <span>～</span>
            <input type="text" value={qu.max} style={{width:52}} onChange={e=>setF("max",+e.target.value||10)}/>
            <button className="btn small mint" onClick={()=>updateQ(x=>{x.axes.push("新軸向");chars.forEach(c=>{const a=x.answers[c.id];if(a&&a.vals)a.vals.push(x.min);});})}>＋軸向</button>
          </div>
          {(qu.axes||[]).map((ax,ai)=>(
            <div className="row" key={ai} style={{marginBottom:3}}>
              <input type="text" value={ax} style={{width:120,fontWeight:800}}
                     onChange={e=>updateQ(x=>{x.axes[ai]=e.target.value;})}/>
              {chars.map((c,i)=>{
                const a=qu.answers[c.id]||{};
                const v=(a.vals||[])[ai];
                return (
                  <span key={c.id} className="row" style={{gap:3,flexWrap:"nowrap"}}>
                    <span style={{width:9,height:9,borderRadius:"50%",background:charColorOf(c,i),border:"1.5px solid #2b2440",flex:"none"}}></span>
                    <input type="text" value={v!=null?v:""} placeholder="—" style={{width:48}}
                      onChange={e=>setAns(c.id,x=>{
                        if(!x.vals) x.vals=qu.axes.map(()=>null);
                        while(x.vals.length<qu.axes.length) x.vals.push(null);
                        x.vals[ai]=e.target.value===""?null:+e.target.value;
                      })}/>
                  </span>
                );
              })}
              {(qu.axes||[]).length>3 &&
                <button className="btn small danger" onClick={()=>updateQ(x=>{
                  x.axes.splice(ai,1);
                  chars.forEach(c=>{const a=x.answers[c.id]; if(a&&a.vals) a.vals.splice(ai,1);});
                })}>刪</button>}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function QuestionnaireTab({db,mutate,selQ,setSelQ,autoGenRef}){
  const [nName,setNName]=useState("");
  const [nTopic,setNTopic]=useState("");
  const [nChars,setNChars]=useState([]);
  const [nMode,setNMode]=useState("ai");
  const [busy,setBusy]=useState(false);
  const [aiMsg,setAiMsg]=useState("");
  const stageRef=useRef(null);
  const list=db.questionnaires||[];
  const quest=list.find(x=>x.id===selQ);
  const chars=quest?db.characters.filter(c=>quest.charIds.includes(c.id)):[];
  const updateQuest=fn=>mutate(d=>{const t=(d.questionnaires||[]).find(x=>x.id===selQ); if(t) fn(t);});
  const runGen=async(target)=>{
    setBusy(true); setAiMsg("🤖 正在依角色設定生成推薦題目…");
    let qs=null, viaAi=true;
    try{ qs=await aiGenerateQuestions(db,target); }
    catch(e){ viaAi=false; qs=localGenerateQuestions(db,target); }
    mutate(d=>{const t=(d.questionnaires||[]).find(x=>x.id===target.id); if(t) t.questions=[...t.questions,...qs];});
    setAiMsg(viaAi?"✔ AI已依角色設定生成推薦題目，可自由編輯、刪除或再次生成。":"✔ 已依主題生成推薦題目（此環境無法連線AI，使用內建智慧題庫）。");
    setBusy(false);
  };
  useEffect(()=>{
    if(quest && autoGenRef.current===quest.id){
      autoGenRef.current="";
      if(!quest.questions.length) runGen(quest);
    }
  },[selQ]);
  const create=()=>{
    const q=newQuestionnaire(nName||"未命名問卷");
    q.topic=nTopic; q.charIds=[...nChars];
    mutate(d=>{ if(!d.questionnaires) d.questionnaires=[]; d.questionnaires.push(q); });
    if(nMode==="ai") autoGenRef.current=q.id;
    setSelQ(q.id);
    setNName(""); setNTopic(""); setNChars([]); setAiMsg("");
  };
  /* ---- 清單畫面 ---- */
  if(!quest) return (
    <div className="card tape">
      <h2>🧩 角色問卷 / Infographic</h2>
      <div className="sub">為單一角色建立自我問卷、或為多位角色建立關係問卷；量表、選擇、雷達圖三種題型，填完可輸出Infographic圖片或併入角色PDF。</div>
      <div className="item-card">
        <h3 className="section-title" style={{marginTop:0}}><span className="dot"></span>新增問卷</h3>
        <div className="row" style={{marginBottom:6}}>
          <input type="text" value={nName} placeholder="問卷名稱（如：本體檢定）" style={{flex:1,minWidth:150}} onChange={e=>setNName(e.target.value)}/>
          <input type="text" value={nTopic} placeholder="聚焦主題（如：價值觀、偶像AU設定、與OO的關係）" style={{flex:2,minWidth:200}} onChange={e=>setNTopic(e.target.value)}/>
        </div>
        <div className="row" style={{marginBottom:6}}>
          <span style={{fontWeight:800,fontSize:13}}>關聯角色：</span>
          {db.characters.length===0&&<span className="hint">請先到「角色」板塊建立角色。</span>}
          {db.characters.map(c=>(
            <span key={c.id} className={"chip"+(nChars.includes(c.id)?" on":"")}
              onClick={()=>setNChars(prev=>prev.includes(c.id)?prev.filter(x=>x!==c.id):[...prev,c.id])}>
              {nChars.includes(c.id)?"✓ ":""}{c.name||"未命名角色"}
            </span>
          ))}
        </div>
        <div className="row">
          <span style={{fontWeight:800,fontSize:13}}>出題方式：</span>
          <span className={"chip"+(nMode==="ai"?" on":"")} onClick={()=>setNMode("ai")}>🤖 AI推薦題目</span>
          <span className={"chip"+(nMode==="manual"?" on":"")} onClick={()=>setNMode("manual")}>✍ 自訂題目</span>
          <button className="btn primary" disabled={!nChars.length} style={!nChars.length?{opacity:.5}:{}} onClick={create}>建立問卷</button>
        </div>
      </div>
      <Collapse title="📚 內建智慧問卷庫（二十組，點擊套用）" defaultOpen={false}>
        <div className="footnote" style={{marginBottom:6}}>先在上方勾選關聯角色，再點「套用」即以該題組建立問卷；題目中的Ａ／Ｂ會自動代入前兩位勾選的角色，套用後仍可自由增刪修改。</div>
        {QUEST_TEMPLATES.map((tpl,ti)=>(
          <div key={ti} className="row" style={{borderBottom:"1.5px dashed rgba(43,36,64,.2)",padding:"5px 0"}}>
            <span style={{fontWeight:900,flex:1,minWidth:180}}>{tpl.name}
              <span className="badge" style={{marginLeft:6,fontSize:10.5}}>{tpl.topic}</span>
              {tpl.min===2 && <span className="hint" style={{marginLeft:6}}>需2位以上角色</span>}
            </span>
            <span className="hint">{tpl.qs.length}題</span>
            <button className="btn small violet"
              disabled={!nChars.length||(tpl.min===2&&nChars.length<2)}
              style={(!nChars.length||(tpl.min===2&&nChars.length<2))?{opacity:.5}:{}}
              onClick={()=>{
                const cs=db.characters.filter(c=>nChars.includes(c.id));
                const q=newQuestionnaire(tpl.name);
                q.topic=tpl.topic; q.charIds=[...nChars];
                q.questions=questionsFromTemplate(tpl,cs);
                mutate(d=>{ if(!d.questionnaires) d.questionnaires=[]; d.questionnaires.push(q); });

        : list.map(q=>{

            return (

                <div style={{flex:1,minWidth:180}}>
                  <div style={{fontWeight:900}}>{q.name||"未命名問卷"}{q.topic&&<span className="badge" style={{marginLeft:6}}>{q.topic}</span>}{q.includeInPdf&&<span className="badge" style={{marginLeft:6,background:"var(--mint)"}}>併入PDF</span>}</div>
                  <div style={{fontSize:12,color:"rgba(43,36,64,.6)"}}>
                    {qc.map(c=>c.name||"未命名").join("、")||"（未關聯角色）"}｜{q.questions.length}題｜建立於{q.created}
                  </div>
                </div>
                <button className="btn small violet" onClick={()=>{setAiMsg("");setSelQ(q.id);}}>編輯</button>
                <button className="btn small" onClick={()=>mutate(d=>{
                  const cp=JSON.parse(JSON.stringify(q)); cp.id=uid(); cp.name=(cp.name||"未命名問卷")+"（複本）";
                  cp.questions.forEach(x=>{x.id=uid();});
                  d.questionnaires.push(cp);
                })}>複製</button>
                <button className="btn small danger" onClick={()=>{
                  if(confirm("確定刪除問卷「"+(q.name||"未命名")+"」？")) mutate(d=>{d.questionnaires=d.questionnaires.filter(x=>x.id!==q.id);});
                }}>刪除</button>
              </div>
            );
          })}
    </div>
  );
  /* ---- 編輯畫面 ---- */
  const move=(qi,dir)=>updateQuest(t=>{
    const j=qi+dir; if(j<0||j>=t.questions.length) return;
    const [m]=t.questions.splice(qi,1); t.questions.splice(j,0,m);
  });
  return (
    <div className="card tape">
      <div className="row" style={{justifyContent:"space-between"}}>
        <h2>🧩 {quest.name||"未命名問卷"}</h2>
        <button className="btn small" onClick={()=>setSelQ("")}>← 返回問卷列表</button>
      </div>
      <Collapse title="⚙ 問卷設定">
        <div className="row" style={{marginBottom:6}}>
          <input type="text" value={quest.name} placeholder="問卷名稱" style={{flex:1,minWidth:140}}
                 onChange={e=>updateQuest(t=>{t.name=e.target.value;})}/>
          <input type="text" value={quest.topic} placeholder="聚焦主題" style={{flex:1,minWidth:140}}
                 onChange={e=>updateQuest(t=>{t.topic=e.target.value;})}/>
        </div>
        <TagEditor tags={quest.tags||[]} label="問卷標籤" update={fn=>updateQuest(t=>{if(!t.tags)t.tags=[];fn(t.tags);})}/>
        <div className="row" style={{marginBottom:6}}>
          <span style={{fontWeight:800,fontSize:13}}>關聯角色：</span>
          {db.characters.map(c=>(
            <span key={c.id} className={"chip"+(quest.charIds.includes(c.id)?" on":"")}
              onClick={()=>updateQuest(t=>{
                const k=t.charIds.indexOf(c.id);
                if(k>=0) t.charIds.splice(k,1); else t.charIds.push(c.id);
              })}>
              {quest.charIds.includes(c.id)?"✓ ":""}{c.name||"未命名角色"}
            </span>
          ))}
        </div>
        <div className="row">
          <span style={{fontWeight:800,fontSize:13}}>預設標記樣式：</span>
          <select value={quest.markStyle} style={{width:"auto"}} onChange={e=>updateQuest(t=>{t.markStyle=e.target.value;})}>
            <option value="solid">實色底</option><option value="hl">螢光筆手繪感</option>
            <option value="underline">底線</option><option value="outline">外框</option>
          </select>
          <input type="color" value={quest.markColor} title="標記顏色"

          <label className="row" style={{gap:4,fontSize:13,fontWeight:800,cursor:"pointer"}}>

        <button className="btn small mint" onClick={()=>updateQuest(t=>{t.questions.push(newQuestion("radar"));})}>＋雷達圖</button>

      {chars.length===0 && <div className="empty">請先在「問卷設定」勾選至少一位關聯角色。</div>}
      {quest.questions.length===0
        ? <div className="empty">還沒有題目。按「AI推薦題目」讓系統依角色設定出題，或手動新增題型。</div>
        : quest.questions.map((qu,qi)=>(
            <QuestionEditor key={qu.id} qu={qu} qi={qi} chars={chars} quest={quest}

            <RatioSelect/>

          <div className="footnote" style={{marginBottom:8}}>勾選「併入角色資料PDF」後，此問卷也會出現在「匯出文件」的角色檔案中（含單獨匯出）。</div>

              <div style={{textAlign:"center",fontWeight:900,fontSize:19,letterSpacing:1}}>{quest.name||"角色問卷"}</div>
              {quest.topic && <div style={{textAlign:"center",fontSize:12.5,color:"rgba(43,36,64,.65)",fontWeight:700}}>─ {quest.topic} ─</div>}
              <QuestLegend chars={chars}/>

                <div key={qu.id} style={{margin:"12px 0",paddingBottom:10,borderBottom:qi<quest.questions.length-1?"1.5px dashed rgba(43,36,64,.25)":"none"}}>
                  <div style={{fontWeight:900,fontSize:13.5,marginBottom:6}}>
                    <span style={{color:"var(--accent2)"}}>Q{qi+1}</span>　{qu.text||"（未命名題目）"}
                  </div>

                  {qu.type==="choice" && <ChoiceView qu={qu} chars={chars} defStyle={quest.markStyle} defColor={quest.markColor}/>}
                  {qu.type==="radar" && <div style={{display:"flex",justifyContent:"center"}}><RadarView qu={qu} chars={chars} size={300}/></div>}

            </div>
          </div>
        </React.Fragment>
      )}
    </div>
  );
}

/* ---------- 搜尋 ---------- */
function collectHits(db,q){
  const query=q.trim().toLowerCase();
  if(!query) return [];
  const hits=[];
  const push=(where,label,text,jump)=>{
    const t=String(text||"");
    const idx=t.toLowerCase().indexOf(query);
    if(idx<0) return;
    const start=Math.max(0,idx-24);
    const snippet=(start>0?"…":"")+t.slice(start,idx+query.length+40)+(idx+query.length+40<t.length?"…":"");
    hits.push({id:uid(),where,label,snippet,q:query,jump});
  };
  const scanWorld=(w,where,jump)=>{
    push(where,"名稱",w.name,jump); push(where,"世界觀描述",w.description,jump);
    if((w.tags||[]).length) push(where,"標籤",(w.tags||[]).join("、"),jump);
    (w.events||[]).forEach(e=>{push(where,"事件："+(e.title||"未命名"),[e.time,e.title,e.description].join("　"),jump);});
    (w.groups||[]).forEach(g=>{push(where,"組合："+(g.name||"未命名"),[g.name,g.description].join("　"),jump);});
  };
  db.worlds.forEach(mw=>{
    scanWorld(mw,"主要世界觀："+(mw.name||"未命名"),{tab:"world"});
    (mw.aus||[]).forEach(a=>scanWorld(a,"次要世界觀（AU）："+(a.name||"未命名")+"｜隸屬「"+(mw.name||"未命名")+"」",{tab:"world"}));
  });
  const scanProfile=(p,where,jump)=>{
    FIELD_DEFS.forEach(d=>push(where,d.label,p[d.key],jump));
    (p.customFields||[]).forEach(f=>push(where,f.label||"自訂欄位",f.value,jump));
    (p.events||[]).forEach(e=>push(where,"個人事件："+(e.title||"未命名"),[e.time,e.title,e.description].join("　"),jump));
    (p.foreignNames||[]).forEach(f=>push(where,"外文名（"+(f.lang||"？")+"）",f.value,jump));
    (p.relationships||[]).forEach(r=>{
      const t=db.characters.find(c=>c.id===r.targetId);
      push(where,"人際關係："+(t?t.name:"？"),[r.relation,r.story,r.notes].join("　"),jump);
    });
    if((p.tags||[]).length) push(where,"標籤",(p.tags||[]).join("、"),jump);
    if(p.draft) push(where,"快速草稿",p.draft,jump);
    (p.speech||[]).forEach(sp=>push(where,"稱呼："+(sp.who||"？"),[sp.callThem,sp.theyCall,sp.tone].join("　"),jump));
  };
  db.characters.forEach(c=>{
    scanProfile(c,"角色："+(c.name||"未命名"),{tab:"chars",charId:c.id});
    (c.auProfiles||[]).forEach(p=>scanProfile(p,"角色："+(c.name||"未命名")+"｜AU："+profileAuName(db.worlds,p),{tab:"chars",charId:c.id}));
  });
  (db.questionnaires||[]).forEach(qn=>{
    const w="問卷："+(qn.name||"未命名");
    push(w,"名稱",qn.name,{tab:"quest"}); push(w,"主題",qn.topic,{tab:"quest"});
    if((qn.tags||[]).length) push(w,"標籤",(qn.tags||[]).join("、"),{tab:"quest"});
    (qn.questions||[]).forEach(qu=>push(w,"題目",qu.text,{tab:"quest"}));
  });
  return hits;
}
function Highlight({text,q}){
  const i=text.toLowerCase().indexOf(q);
  if(i<0) return <span>{text}</span>;
  return <span>{text.slice(0,i)}<mark>{text.slice(i,i+q.length)}</mark>{text.slice(i+q.length)}</span>;
}
function SearchPanel({db,query,onJump}){
  const hits=useMemo(()=>collectHits(db,query),[db,query]);
  return (
    <div className="card tape tape-mint">
      <h2>搜尋結果</h2>
      <div className="sub">關鍵字「{query}」共找到 {hits.length} 筆相符內容，點擊即可前往。</div>
      {hits.length===0 && <div className="empty">沒有找到包含「{query}」的內容，換個關鍵字試試？</div>}
      {hits.map(h=>(
        <div className="search-hit" key={h.id} onClick={()=>onJump(h.jump)}>
          <div className="where">{h.where}｜{h.label}</div>
          <div style={{fontSize:14}}><Highlight text={h.snippet} q={h.q}/></div>
        </div>
      ))}
    </div>
  );
}

/* ---------- 首頁：OC統計儀表板 ---------- */
function StatDashboard({db}){
  const chars=db.characters;
  const ref=useRef(null);
  if(chars.length<1) return null;
  // 身高直方圖（每10cm一組）
  const heights=chars.map(c=>parseFloat(String(c.height||"").replace(/[^\d.]/g,""))).filter(h=>h>0);
  const hMin=heights.length?Math.floor(Math.min(...heights)/10)*10:150;
  const hMax=heights.length?Math.ceil(Math.max(...heights)/10)*10:190;
  const hbins=[];
  for(let lo=hMin;lo<hMax;lo+=10){ hbins.push({label:lo+"–"+(lo+10),n:heights.filter(h=>h>=lo&&h<lo+10).length}); }
  const hMaxN=Math.max(1,...hbins.map(b=>b.n));
  // 星座圓餅
  const signCount={};
  chars.forEach(c=>{const z=getZodiac(c.birthday); if(z){signCount[z]=(signCount[z]||0)+1;}});
  const signEntries=Object.entries(signCount);
  const signTotal=signEntries.reduce((n,[,v])=>n+v,0);
  const PIE=["#ff5d8f","#6c4ce0","#35d0a5","#f5b301","#4aa3ff","#e4572e","#a06cd5","#48b1bf","#ff9f68","#7cb342","#ec407a","#26a69a"];
  // MBTI長條
  const mbtiCount={};
  chars.forEach(c=>{const m=String(c.mbti||"").toUpperCase().match(/[IE][NS][TF][JP]/); if(m) mbtiCount[m[0]]=(mbtiCount[m[0]]||0)+1;});
  const mbtiEntries=Object.entries(mbtiCount).sort((a,b)=>b[1]-a[1]);
  const mbtiMax=Math.max(1,...mbtiEntries.map(([,v])=>v));
  // 色相環分布
  const hues=chars.map(c=>{const rgb=hexToRgb(c.color); if(!rgb) return null; return {h:rgbToHsl(rgb.r,rgb.g,rgb.b).h,color:c.color,name:c.name};}).filter(Boolean);

  // 圓餅路徑
  const pieR=70,pieC=90; let acc=0;
  const arcs=signEntries.map(([sign,v],i)=>{
    const frac=v/signTotal, a0=acc*2*Math.PI-Math.PI/2; acc+=frac; const a1=acc*2*Math.PI-Math.PI/2;
    const large=frac>0.5?1:0;
    const x0=pieC+pieR*Math.cos(a0), y0=pieC+pieR*Math.sin(a0);
    const x1=pieC+pieR*Math.cos(a1), y1=pieC+pieR*Math.sin(a1);
    return {d:"M"+pieC+" "+pieC+" L"+x0+" "+y0+" A"+pieR+" "+pieR+" 0 "+large+" 1 "+x1+" "+y1+" Z",color:PIE[i%PIE.length],sign,v};
  });

  const Section=({title,children})=>(
    <div style={{background:"#fff",border:"2px solid #2b2440",borderRadius:14,padding:"12px 14px"}}>
      <div style={{fontWeight:900,fontSize:14,marginBottom:8}}>{title}</div>
      {children}
    </div>
  );
  return (
    <div style={{marginTop:6}}>
      <h3 className="section-title"><span className="dot"></span>📊 OC 統計儀表板
        <button className="btn small mint" onClick={()=>downloadNode(ref,"OC統計儀表板.png")}>⬇ 下載PNG</button>
      </h3>
      <div ref={ref} style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(240px,1fr))",gap:12,background:"#faf7ff",padding:12,borderRadius:14}}>
        <Section title={"📏 身高分布（"+heights.length+"人）"}>
          {heights.length===0 ? <div className="hint">尚無身高資料</div>
            : <svg width="100%" viewBox="0 0 240 150" style={{fontFamily:'"Noto Sans TC",sans-serif'}}>
                {hbins.map((b,i)=>{
                  const bw=220/hbins.length, x=10+i*bw, h=b.n/hMaxN*100;
                  return <g key={i}>
                    <rect x={x+3} y={120-h} width={bw-6} height={h} fill="#6c4ce0" stroke="#2b2440" strokeWidth="1.5" rx="3"/>
                    {b.n>0 && <text x={x+bw/2} y={116-h} textAnchor="middle" fontSize="10" fontWeight="900" fill="#2b2440">{b.n}</text>}
                    <text x={x+bw/2} y="134" textAnchor="middle" fontSize="7.5" fill="#2b2440">{b.label}</text>
                  </g>;
                })}
              </svg>}
        </Section>
        <Section title={"♈ 星座比例（"+signTotal+"人）"}>
          {signTotal===0 ? <div className="hint">尚無生日資料</div>
            : <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                <svg width="160" height="180" viewBox="0 0 180 180">
                  {arcs.length===1
                    ? <circle cx={pieC} cy={pieC} r={pieR} fill={arcs[0].color} stroke="#2b2440" strokeWidth="2"/>
                    : arcs.map((a,i)=><path key={i} d={a.d} fill={a.color} stroke="#2b2440" strokeWidth="1.5"/>)}
                </svg>
                <div style={{fontSize:11}}>
                  {signEntries.map(([sign,v],i)=>(
                    <div key={sign} style={{display:"flex",alignItems:"center",gap:4,marginBottom:2}}>
                      <span style={{width:10,height:10,borderRadius:2,background:PIE[i%PIE.length],border:"1px solid #2b2440"}}></span>
                      <span style={{fontWeight:700}}>{sign} {v}</span>
                    </div>
                  ))}
                </div>
              </div>}
        </Section>
        <Section title={"🧠 MBTI 分布（"+mbtiEntries.reduce((n,[,v])=>n+v,0)+"人）"}>
          {mbtiEntries.length===0 ? <div className="hint">尚無MBTI資料</div>
            : <div>
                {mbtiEntries.map(([m,v])=>(
                  <div key={m} style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
                    <span style={{fontWeight:900,fontSize:11,minWidth:38}}>{m}</span>
                    <div style={{flex:1,background:"#efe7fa",borderRadius:6,overflow:"hidden",border:"1.5px solid #2b2440"}}>
                      <div style={{width:(v/mbtiMax*100)+"%",background:"#35d0a5",height:14}}></div>
                    </div>
                    <span style={{fontWeight:800,fontSize:11}}>{v}</span>
                  </div>
                ))}
              </div>}
        </Section>
        <Section title={"🎨 代表色色相環（"+hues.length+"人）"}>
          {hues.length===0 ? <div className="hint">尚無代表色資料</div>
            : <svg width="100%" viewBox="0 0 180 180">
                <circle cx="90" cy="90" r="66" fill="none" stroke="#e6ddf7" strokeWidth="14"/>
                {[0,30,60,90,120,150,180,210,240,270,300,330].map(deg=>{
                  const a=(deg-90)*Math.PI/180;
                  return <circle key={deg} cx={90+72*Math.cos(a)} cy={90+72*Math.sin(a)} r="1.5" fill="#b9a7ea"/>;
                })}
                {hues.map((hu,i)=>{
                  const a=(hu.h-90)*Math.PI/180;
                  const x=90+66*Math.cos(a), y=90+66*Math.sin(a);
                  return <g key={i}><circle cx={x} cy={y} r="8" fill={hu.color} stroke="#2b2440" strokeWidth="2"/></g>;
                })}
                <text x="90" y="94" textAnchor="middle" fontSize="10" fontWeight="800" fill="#2b2440">色相分布</text>
              </svg>}
        </Section>
      </div>
    </div>
  );
}

/* ---------- 首頁儀表板 ---------- */
function DashboardTab({db,goto}){
  const chars=db.characters;
  const worldCount=db.worlds.length;
  const auCount=db.worlds.reduce((n,w)=>n+(w.aus||[]).length,0);
  const questCount=(db.questionnaires||[]).length;
  const eventCount=db.worlds.reduce((n,w)=>n+(w.events||[]).length+(w.aus||[]).reduce((m,a)=>m+(a.events||[]).length,0),0);
  // 生日將近
  const today=new Date();
  const upcoming=chars.map(c=>{
    const b=parseBirthday(c.birthday); if(!b) return null;
    let d=new Date(today.getFullYear(),b.m-1,b.d);
    if(d<new Date(today.getFullYear(),today.getMonth(),today.getDate())) d=new Date(today.getFullYear()+1,b.m-1,b.d);
    return {c,days:Math.round((d-new Date(today.getFullYear(),today.getMonth(),today.getDate()))/864e5),b};
  }).filter(Boolean).sort((a,b)=>a.days-b.days).slice(0,5);
  // 設定檢查
  const issues=[];
  chars.forEach(c=>{
    const miss=[];
    if(!c.avatar) miss.push("頭像");
    if(!c.birthday) miss.push("生日");
    if(!isHex(c.color)) miss.push("代表色");
    if(!(c.description||"").trim()) miss.push("角色描述");
    const hasRel=(c.relationships||[]).length>0 || chars.some(o=>(o.relationships||[]).some(r=>r.targetId===c.id));
    if(chars.length>1 && !hasRel) miss.push("人際關係（孤立角色）");
    if(miss.length) issues.push({c,miss});
  });
  db.worlds.forEach(w=>{ if(!(w.description||"").trim() && !(w.events||[]).length) issues.push({world:w,miss:["世界觀內容為空"]}); });
  const Stat=({icon,label,value,to})=>(
    <div className="item-card" style={{textAlign:"center",cursor:to?"pointer":"default",margin:0}} onClick={()=>to&&goto(to)}>
      <div style={{fontSize:26}}>{icon}</div>
      <div style={{fontSize:28,fontWeight:900,color:"var(--accent2)"}}>{value}</div>
      <div style={{fontSize:12.5,fontWeight:700}}>{label}</div>
    </div>
  );
  return (
    <div className="card tape">
      <h2>🏠 創作總覽</h2>
      <div className="sub">你的OC宇宙一覽——點卡片可直接跳到對應板塊。</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(120px,1fr))",gap:10,marginBottom:16}}>
        <Stat icon="👤" label="角色" value={chars.length} to="chars"/>
        <Stat icon="🌍" label="主要世界觀" value={worldCount} to="world"/>
        <Stat icon="🌙" label="次要世界觀" value={auCount} to="world"/>
        <Stat icon="📜" label="事件總數" value={eventCount} to="world"/>
        <Stat icon="🧩" label="角色問卷" value={questCount} to="quest"/>
        <Stat icon="🎵" label="印象曲" value={chars.filter(c=>spotifyEmbedUrl(c.song)).length} to="playlist"/>
      </div>
      <div className="split" style={{gridTemplateColumns:"1fr 1fr"}}>
        <div>
          <h3 className="section-title"><span className="dot"></span>🎂 即將到來的生日</h3>
          {upcoming.length===0 ? <div className="empty">尚無填寫生日的角色。</div>
            : upcoming.map(u=>(
                <div className="char-list-item" key={u.c.id} onClick={()=>goto("chars",u.c.id)}>
                  <AvatarCircle name={u.c.name} color={u.c.color} avatar={u.c.avatar} size={30}/>
                  <span style={{fontWeight:800,fontSize:14,flex:1}}>{u.c.name||"未命名"}</span>
                  <span className="badge">{u.days===0?"就是今天！":("還有 "+u.days+" 天")}</span>
                </div>
              ))}
        </div>
        <div>
          <h3 className="section-title"><span className="dot"></span>🔍 設定檢查</h3>
          {issues.length===0 ? <div className="empty">全部設定完整，太棒了！</div>
            : issues.slice(0,8).map((it,i)=>(
                <div className="search-hit" key={i} onClick={()=>it.c?goto("chars",it.c.id):goto("world")}>
                  <div className="where">{it.c?("角色："+(it.c.name||"未命名")):("世界觀："+(it.world.name||"未命名"))}</div>
                  <div style={{fontSize:13}}>待補：{it.miss.join("、")}</div>
                </div>
              ))}
          {issues.length>8 && <div className="footnote">…還有 {issues.length-8} 項待補。</div>}
        </div>
      </div>
      <StatDashboard db={db}/>
    </div>
  );
}

/* ---------- 印象曲播放清單 ---------- */
function PlaylistTab({db,goto}){
  const withSong=db.characters.map(c=>({c,embed:spotifyEmbedUrl(c.song)})).filter(x=>x.embed);
  const textOnly=db.characters.filter(c=>c.song && !spotifyEmbedUrl(c.song));
  return (
    <div className="card tape tape-mint">
      <h2>🎵 全員印象曲播放清單</h2>
      <div className="sub">把每位角色的Spotify印象曲串成一頁，一次聽完全員。（填的是純歌名者列於下方。）</div>
      {withSong.length===0 && textOnly.length===0 && <div className="empty">還沒有角色填寫印象曲。到角色的「印象曲」欄貼上Spotify連結吧！</div>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:12}}>
        {withSong.map(({c,embed})=>(
          <div className="item-card" key={c.id} style={{margin:0}}>
            <div className="row" style={{marginBottom:6,cursor:"pointer"}} onClick={()=>goto("chars",c.id)}>
              <AvatarCircle name={c.name} color={c.color} avatar={c.avatar} size={28}/>
              <span style={{fontWeight:900}}>{c.name||"未命名角色"}</span>
