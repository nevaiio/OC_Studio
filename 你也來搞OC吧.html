<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>你也來搞OC吧！</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{
  --ink:#2b2440;
  --bg:#f6f1fb;
  --paper:#ffffff;
  --accent:#ff5d8f;
  --accent2:#6c4ce0;
  --mint:#35d0a5;
  --sun:#ffd84d;
  --soft:#efe7fa;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  background-image:radial-gradient(rgba(108,76,224,.10) 1.6px, transparent 1.6px);
  background-size:26px 26px;
  color:var(--ink);
  font-family:"Noto Sans TC","PingFang TC","Yuanti TC","Microsoft JhengHei",sans-serif;
  line-height:1.6;
}
.app{max-width:1080px;margin:0 auto;padding:0 16px 80px;}
.topbar{
  position:sticky;top:0;z-index:50;
  background:rgba(246,241,251,.92);backdrop-filter:blur(6px);
  padding:14px 0 10px;margin-bottom:8px;
  border-bottom:2px dashed rgba(43,36,64,.25);
}
.topbar-inner{display:flex;flex-wrap:wrap;align-items:center;gap:12px;}
.logo{
  display:inline-flex;align-items:center;gap:8px;
  font-weight:900;font-size:22px;letter-spacing:1px;
  background:var(--paper);border:2.5px solid var(--ink);border-radius:14px;
  padding:6px 14px;box-shadow:4px 4px 0 var(--ink);
  transform:rotate(-1.5deg);
}
.logo .oc-badge{
  background:var(--accent);color:#fff;border:2px solid var(--ink);
  border-radius:10px;padding:0 8px;font-size:18px;transform:rotate(3deg);
  display:inline-block;
}
.searchbox{
  flex:1;min-width:220px;display:flex;align-items:center;gap:8px;
  background:var(--paper);border:2px solid var(--ink);border-radius:999px;
  padding:6px 14px;box-shadow:3px 3px 0 rgba(43,36,64,.25);
}
.searchbox input{border:none;outline:none;flex:1;font-size:15px;background:transparent;font-family:inherit;color:var(--ink);}
.tabs{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0 18px;}
.tab{
  border:2px solid var(--ink);background:var(--paper);color:var(--ink);
  border-radius:12px 12px 4px 12px;padding:8px 16px;font-size:15px;font-weight:700;
  cursor:pointer;box-shadow:3px 3px 0 rgba(43,36,64,.35);font-family:inherit;
  transition:transform .08s ease;
}
.tab:hover{transform:translateY(-2px);}
.tab.active{background:var(--accent2);color:#fff;box-shadow:3px 3px 0 var(--ink);}
.card{
  position:relative;background:var(--paper);
  border:2px solid var(--ink);border-radius:16px;
  box-shadow:5px 5px 0 rgba(43,36,64,.9);
  padding:20px 18px 16px;margin-bottom:20px;
}
.card.tape::before{
  content:"";position:absolute;top:-12px;left:28px;width:96px;height:24px;
  background:rgba(255,216,77,.75);border:1.5px solid rgba(43,36,64,.35);
  transform:rotate(-3deg);border-radius:3px;
}
.card.tape.tape-pink::before{background:rgba(255,93,143,.55);left:auto;right:36px;transform:rotate(2.5deg);}
.card.tape.tape-mint::before{background:rgba(53,208,165,.55);}
.card h2{margin:0 0 4px;font-size:20px;letter-spacing:1px;}
.card h3{margin:14px 0 6px;font-size:16px;}
.card .sub{font-size:13px;color:rgba(43,36,64,.65);margin-bottom:12px;}
.section-title{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.section-title .dot{width:12px;height:12px;border-radius:50%;background:var(--accent);border:2px solid var(--ink);display:inline-block;}
.grid2{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px 14px;}
.field{display:flex;flex-direction:column;gap:3px;margin-bottom:8px;}
.field label{font-size:13px;font-weight:800;letter-spacing:.5px;}
.field .hint{font-size:11px;color:rgba(43,36,64,.55);}
input[type=text],textarea,select{
  border:2px solid var(--ink);border-radius:10px;padding:7px 10px;
  font-size:14px;font-family:inherit;color:var(--ink);background:#fff;
  outline:none;width:100%;
}
input[type=text]:focus,textarea:focus,select:focus{border-color:var(--accent2);box-shadow:0 0 0 3px rgba(108,76,224,.18);}
textarea{resize:vertical;min-height:60px;overflow:hidden;transition:height .08s ease;}
.btn{
  border:2px solid var(--ink);border-radius:999px;padding:7px 16px;
  font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;
  background:#fff;color:var(--ink);box-shadow:3px 3px 0 var(--ink);
  transition:transform .08s ease, box-shadow .08s ease;
}
.btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--ink);}
.btn.primary{background:var(--accent);color:#fff;}
.btn.violet{background:var(--accent2);color:#fff;}
.btn.mint{background:var(--mint);color:var(--ink);}
.btn.sun{background:var(--sun);color:var(--ink);}
.btn.ghost{background:transparent;box-shadow:none;border-style:dashed;}
.btn.small{padding:3px 12px;font-size:12.5px;}
.btn.danger{background:#fff;color:#c62143;border-color:#c62143;box-shadow:3px 3px 0 #c62143;}
.row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
.chip{
  display:inline-flex;align-items:center;gap:6px;
  border:2px solid var(--ink);border-radius:999px;padding:3px 12px;
  font-size:13px;font-weight:700;background:var(--soft);cursor:pointer;user-select:none;
}
.chip.on{background:var(--accent2);color:#fff;}
.badge{
  display:inline-block;border:1.5px solid var(--ink);border-radius:8px;
  padding:1px 8px;font-size:12px;font-weight:800;background:var(--sun);
}
.item-card{
  border:2px solid rgba(43,36,64,.8);border-radius:12px;
  padding:12px;margin-bottom:12px;background:#fff;
}
.char-list{display:flex;flex-direction:column;gap:8px;}
.char-list-item{
  display:flex;align-items:center;gap:10px;
  border:2px solid var(--ink);border-radius:12px;padding:8px 12px;
  cursor:pointer;background:#fff;box-shadow:3px 3px 0 rgba(43,36,64,.25);
}
.char-list-item.active{box-shadow:3px 3px 0 var(--ink);outline:2px solid var(--accent2);}
.avatar{
  width:34px;height:34px;border-radius:50%;border:2px solid var(--ink);
  display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;
  background:var(--accent2);flex:none;font-size:15px;
}
.split{display:grid;grid-template-columns:250px 1fr;gap:16px;align-items:start;}
@media(max-width:760px){.split{grid-template-columns:1fr;}}
.au-tabs{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0;}
.au-tab{
  border:2px solid var(--ink);border-radius:10px 10px 0 0;padding:4px 12px;
  font-size:13px;font-weight:700;cursor:pointer;background:var(--soft);font-family:inherit;
}
.au-tab.active{background:var(--accent);color:#fff;}
.timeline{border-left:3px solid var(--accent2);margin:10px 0 4px 10px;padding-left:18px;}
.timeline-item{position:relative;margin-bottom:14px;}
.timeline-item::before{
  content:"";position:absolute;left:-26px;top:6px;width:12px;height:12px;
  border-radius:50%;background:var(--accent);border:2.5px solid var(--ink);
}
.timeline-item .t-time{font-size:12px;font-weight:900;color:var(--accent2);}
.timeline-item .t-title{font-weight:800;}
.timeline-item .t-desc{font-size:13px;color:rgba(43,36,64,.75);white-space:pre-wrap;}
.search-hit{border:2px dashed var(--accent2);border-radius:12px;padding:10px 12px;margin-bottom:10px;cursor:pointer;background:#fff;}
.search-hit:hover{background:var(--soft);}
.search-hit .where{font-size:12px;font-weight:900;color:var(--accent);}
mark{background:var(--sun);border-radius:3px;padding:0 2px;}
.preview-doc{
  border:2px solid var(--ink);border-radius:12px;background:#fff;
  max-height:480px;overflow:auto;padding:20px 24px;font-size:14px;
}
.preview-doc h1{font-size:22px;border-bottom:3px double var(--ink);padding-bottom:6px;}
.preview-doc h2{font-size:18px;color:var(--accent2);margin-top:22px;}
.preview-doc h3{font-size:16px;margin-top:16px;}
.preview-doc h4{font-size:14px;margin-top:12px;color:var(--accent);}
.preview-doc table{border-collapse:collapse;width:100%;font-size:13px;}
.preview-doc td,.preview-doc th{border:1px solid rgba(43,36,64,.5);padding:4px 8px;text-align:left;}
.canvas-stage{background:#fff;border:2px solid var(--ink);border-radius:12px;padding:16px;overflow:auto;}
.footnote{font-size:12px;color:rgba(43,36,64,.55);margin-top:6px;}
.empty{
  border:2px dashed rgba(43,36,64,.4);border-radius:12px;padding:20px;
  text-align:center;color:rgba(43,36,64,.6);font-size:14px;background:rgba(255,255,255,.6);
}
#print-area{display:none;}
@media print{
  body{background:#fff;}
  #root{display:none;}
  #print-area{display:block;font-size:13px;color:#000;}
}
.spot-link{font-size:12px;font-weight:800;color:var(--mint);text-decoration:underline;word-break:break-all;}
.rel-block{border:2px solid rgba(43,36,64,.5);border-radius:10px;padding:10px;margin-top:8px;background:var(--soft);}
.save-tag{font-size:11px;color:rgba(43,36,64,.5);}
</style>
</head>
<body>
<div id="root"></div>
<div id="print-area"></div>
<script type="text/babel">
const {useState,useEffect,useMemo,useRef} = React;

/* ---------- 工具 ---------- */
const uid = () => Math.random().toString(36).slice(2,10) + Date.now().toString(36).slice(-3);
const esc = s => String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const nl  = s => esc(s).replace(/\n/g,"<br/>");
const isHex = s => /^#([0-9a-fA-F]{3}|[0-9a-fA-F]{6})$/.test(String(s||"").trim());
const tint = (hex,alpha) => {
  if(!isHex(hex)) return "transparent";
  let h = hex.trim().slice(1);
  if(h.length===3) h = h.split("").map(c=>c+c).join("");
  const r=parseInt(h.slice(0,2),16), g=parseInt(h.slice(2,4),16), b=parseInt(h.slice(4,6),16);
  return `rgba(${r},${g},${b},${alpha})`;
};
function hexToRgb(hex){
  let h=String(hex||"").trim().replace("#","");
  if(h.length===3) h=h.split("").map(c=>c+c).join("");
  if(!/^[0-9a-fA-F]{6}$/.test(h)) return null;
  return {r:parseInt(h.slice(0,2),16),g:parseInt(h.slice(2,4),16),b:parseInt(h.slice(4,6),16)};
}
function rgbToHex(r,g,b){const f=v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,"0");return "#"+f(r)+f(g)+f(b);}
function rgbToHsl(r,g,b){
  r/=255;g/=255;b/=255;
  const mx=Math.max(r,g,b),mn=Math.min(r,g,b);let h,s,l=(mx+mn)/2;
  if(mx===mn){h=s=0;}else{const d=mx-mn;s=l>0.5?d/(2-mx-mn):d/(mx+mn);
    switch(mx){case r:h=(g-b)/d+(g<b?6:0);break;case g:h=(b-r)/d+2;break;default:h=(r-g)/d+4;}h/=6;}
  return {h:h*360,s:s*100,l:l*100};
}
function hslToHex(h,s,l){
  h=(h%360+360)%360;s/=100;l/=100;
  const c=(1-Math.abs(2*l-1))*s, x=c*(1-Math.abs((h/60)%2-1)), m=l-c/2;
  let r=0,g=0,b=0;
  if(h<60){r=c;g=x;}else if(h<120){r=x;g=c;}else if(h<180){g=c;b=x;}
  else if(h<240){g=x;b=c;}else if(h<300){r=x;b=c;}else{r=c;b=x;}
  return rgbToHex((r+m)*255,(g+m)*255,(b+m)*255);
}
function paletteSchemes(hex){
  const rgb=hexToRgb(hex); if(!rgb) return null;
  const {h,s,l}=rgbToHsl(rgb.r,rgb.g,rgb.b);
  return {
    base:hex,
    complement:hslToHex(h+180,s,l),
    analogous:[hslToHex(h-30,s,l),hslToHex(h+30,s,l)],
    triadic:[hslToHex(h+120,s,l),hslToHex(h+240,s,l)],
    shades:[hslToHex(h,s,Math.max(12,l-28)),hslToHex(h,s,Math.min(92,l+24))],
    textOn: l>58?"#2b2440":"#ffffff"
  };
}
function saveBlob(blob,name){
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob); a.download=name;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{URL.revokeObjectURL(a.href); a.remove();},800);
}
function naturalCompare(a,b){
  return String(a||"").localeCompare(String(b||""),"zh-Hant",{numeric:true,sensitivity:"base"});
}
function spotifyEmbedUrl(url){
  const m=String(url||"").match(/open\.spotify\.com\/(?:intl-[\w-]+\/)?(track|album|playlist|episode)\/([A-Za-z0-9]+)/);
  return m ? ("https://open.spotify.com/embed/"+m[1]+"/"+m[2]) : null;
}
function readAvatarFile(file,cb){
  const reader=new FileReader();
  reader.onload=()=>{
    const img=new Image();
    img.onload=()=>{
      const max=256;
      const scale=Math.min(1,max/Math.max(img.width,img.height));
      const w=Math.round(img.width*scale), h=Math.round(img.height*scale);
      const canvas=document.createElement("canvas");
      canvas.width=w; canvas.height=h;
      canvas.getContext("2d").drawImage(img,0,0,w,h);
      cb(canvas.toDataURL("image/jpeg",0.86));
    };
    img.src=String(reader.result);
  };
  reader.readAsDataURL(file);
}

/* ---------- 星座 ---------- */
function parseBirthday(s){
  if(!s) return null;
  const m = String(s).match(/(\d{1,2})\s*[月\/\-\.]\s*(\d{1,2})/);
  if(!m) return null;
  const mm=+m[1], dd=+m[2];
  if(mm<1||mm>12||dd<1||dd>31) return null;
  return {m:mm,d:dd};
}
const SIGN_NAMES=["摩羯座","水瓶座","雙魚座","牡羊座","金牛座","雙子座","巨蟹座","獅子座","處女座","天秤座","天蠍座","射手座","摩羯座"];
const SIGN_LAST=[19,18,20,19,20,21,22,22,22,23,22,21];
function getZodiac(birthday){
  const p=parseBirthday(birthday);
  if(!p) return "";
  return p.d<=SIGN_LAST[p.m-1] ? SIGN_NAMES[p.m-1] : SIGN_NAMES[p.m];
}

/* ---------- 欄位定義 ---------- */
const FIELD_DEFS=[
  {key:"name",label:"姓名"},
  {key:"age",label:"外貌年齡"},
  {key:"birthday",label:"生日",hint:"不需年份，例：3月14日 或 3/14"},
  {key:"height",label:"身高",hint:"例：172cm"},
  {key:"weight",label:"體重"},
  {key:"cv",label:"CV"},
  {key:"color",label:"代表色",hint:"輸入色號後自動調整條目底色",type:"color"},
  {key:"mbti",label:"MBTI"},
  {key:"song",label:"印象曲",hint:"可貼上Spotify歌曲連結",type:"song"},
  {key:"appearance",label:"外觀描述",type:"textarea"},
  {key:"description",label:"角色描述",type:"textarea"},
  {key:"coreTheme",label:"核心命題",type:"textarea"},
  {key:"notes",label:"備註",type:"textarea"},
  {key:"analysis",label:"角色分析",type:"textarea"},
];
function fieldOrderOf(v){
  const base=FIELD_DEFS.map(d=>d.key);
  const customs=(v.customFields||[]).map(f=>"cf:"+f.id);
  const valid=new Set([...base,...customs]);
  const stored=(v.fieldOrder||[]).filter(k=>valid.has(k));
  const missing=[...base,...customs].filter(k=>!stored.includes(k));
  return [...stored,...missing];
}
const emptyCharFields = () => ({
  name:"",age:"",birthday:"",height:"",weight:"",cv:"",color:"",mbti:"",song:"",avatar:"",
  appearance:"",description:"",coreTheme:"",notes:"",analysis:"",
  customFields:[],fieldOrder:[],
  foreignNames:[{id:uid(),lang:"英文",value:""},{id:uid(),lang:"日文",value:""},{id:uid(),lang:"韓文",value:""}],
  relationships:[],
});
const newCharacter = (name) => ({ id:uid(), ...emptyCharFields(), name:name||"", auProfiles:[], events:[], inspirations:[], exportInspirations:true, draft:"", speech:[], playlists:[] });
function SaveInspoBar({db,mutate,source,defaultTitle,content}){
  const [cid,setCid]=useState("");
  const [note,setNote]=useState("");
  const [msg,setMsg]=useState("");
  useEffect(()=>{ setMsg(""); },[content]);
  if(!db.characters.length) return <div className="footnote">建立角色後，就能把抽到的靈感存進角色條目底下。</div>;
  return (
    <div className="item-card" style={{background:"rgba(255,255,255,.7)",borderLeft:"6px solid var(--accent2)"}}>
      <div className="row" style={{marginBottom:6}}>
        <span style={{fontWeight:800,fontSize:13}}>💾 記錄到角色靈感庫：</span>
        <select value={cid} onChange={e=>{setCid(e.target.value);setMsg("");}} style={{maxWidth:180}}>
          <option value="">──選擇角色──</option>
          {db.characters.map(c=><option key={c.id} value={c.id}>{c.name||"未命名角色"}</option>)}
        </select>
        <button className="btn small primary" disabled={!cid} style={!cid?{opacity:.5}:{}}
          onClick={()=>{
            mutate(d=>{addInspiration(d,cid,source,defaultTitle||source,content+(note.trim()?("\n——\n"+note.trim()):""));});
            const nm=(db.characters.find(c=>c.id===cid)||{}).name||"未命名角色";
            setMsg("✔ 已存入「"+nm+"」的靈感庫！"); setNote("");
          }}>存入</button>
        {msg && <span className="badge">{msg}</span>}
      </div>
      <textarea value={note} onChange={e=>setNote(e.target.value)} placeholder="（可選）在這裡先寫下你的靈感、想法或角色的回應，會一併存入…" style={{minHeight:56}}/>
    </div>
  );
}
function addInspiration(d,charId,source,title,content){
  const c=d.characters.find(x=>x.id===charId);
  if(!c) return false;
  if(!c.inspirations) c.inspirations=[];
  c.inspirations.push({id:uid(),source,title:title||"",content:content||"",created:new Date().toLocaleDateString("zh-TW")});
  return true;
}
const newWorld = (name) => ({ id:uid(), name:name||"", description:"", events:[], groups:[], tags:[] });
const newMainWorld = (name) => ({ ...newWorld(name), aus:[] });
const initialDb = { worlds:[newMainWorld("")], characters:[], questionnaires:[], tierList:defaultTierList(), quadrant:defaultQuadrant(), relLayouts:{}, relTimelines:[] };
function charColorOf(c,i){ return isHex(c&&c.color)?c.color:"#9e9e9e"; }
function newQuestionnaire(name){
  return { id:uid(), name:name||"", topic:"", charIds:[], created:new Date().toLocaleDateString("zh-TW"),
           markStyle:"hl", markColor:"#ffd84d", includeInPdf:false, questions:[], tags:[] };
}
function newQuestion(type){
  const base={id:uid(),type,text:"",answers:{}};
  if(type==="scale") return {...base,min:1,max:10,leftLabel:"",rightLabel:"",orient:"h"};
  if(type==="choice") return {...base,options:["選項一","選項二"],display:"list",markStyle:"",markColor:""};
  return {...base,axes:["軸一","軸二","軸三","軸四","軸五"],min:0,max:10};
}
function findAuById(worlds,id){
  for(const mw of worlds){ const a=(mw.aus||[]).find(x=>x.id===id); if(a) return {au:a,mw}; }
  return null;
}
function profileAuName(worlds,p){
  if(p && p.auWorldId){ const f=findAuById(worlds,p.auWorldId); if(f) return f.au.name||"未命名AU"; }
  return (p&&p.auName)||"未命名AU";
}
function auDisplayName(char,p){
  if(p && p.nameSource){
    const idx=p.nameSource.indexOf(":");
    const kind=p.nameSource.slice(0,idx), id=p.nameSource.slice(idx+1);
    const pool=kind==="fn-main"?((char&&char.foreignNames)||[]):((p.foreignNames)||[]);
    const f=pool.find(x=>x.id===id);
    if(f && f.value) return f.value;
  }
  return (p&&p.name)||(char&&char.name)||"";
}
function defaultTierList(){
  return { title:"我的角色Tier表",
    tiers:[{id:"t-s",label:"S",color:"#ff7f7f"},{id:"t-a",label:"A",color:"#ffbf7f"},{id:"t-b",label:"B",color:"#ffdf7f"},{id:"t-c",label:"C",color:"#bfef7f"},{id:"t-d",label:"D",color:"#7fbfff"}],
    assign:{} };
}
function defaultQuadrant(){
  return { title:"角色象限圖", xLeft:"內向", xRight:"外向", yTop:"理性", yBottom:"感性", pos:{}, w:560, h:420 };
}
function migrateDb(j){
  if(!j) return null;
  const extras=x=>({questionnaires:x.questionnaires||[], tierList:x.tierList||defaultTierList(), quadrant:x.quadrant||defaultQuadrant(), relLayouts:x.relLayouts||{}, relTimelines:x.relTimelines||[]});
  if(Array.isArray(j.worlds)) return { worlds:j.worlds.map(w=>({aus:[],...w})), characters:j.characters||[], ...extras(j) };
  if(j.mainWorld) return { worlds:[{...j.mainWorld, aus:j.aus||[]}], characters:j.characters||[], ...extras(j) };
  return null;
}

/* ---------- 匯入解析 ---------- */
const IMPORT_ALIASES={
  name:["姓名","名字","名稱","角色名","角色名稱"],
  age:["外貌年齡","年齡","年紀"],
  birthday:["生日","誕生日"],
  height:["身高"],
  weight:["體重"],
  cv:["cv","聲優","配音","配音員"],
  color:["代表色","主題色","顏色","色號"],
  mbti:["mbti","人格類型"],
  song:["印象曲","主題曲","角色曲","歌曲"],
  appearance:["外觀描述","外貌描述","外觀","外貌","外表"],
  description:["角色描述","介紹","簡介","描述","角色介紹","設定"],
  coreTheme:["核心命題","核心","主題"],
  notes:["備註","註記"],
  analysis:["角色分析","分析","考察"],
};
const WORLD_ALIASES={
  name:["世界觀名稱","世界名稱","名稱","標題","作品名"],
  description:["世界觀描述","世界觀","描述","簡介","設定","背景"],
};
function matchKey(label,aliases){
  const l=label.trim().toLowerCase();
  for(const key in aliases){
    if(aliases[key].some(a=>l===a.toLowerCase())) return key;
  }
  return null;
}
function smartParse(text){
  const lines=String(text||"").split(/\r?\n/);
  const charFields={}, worldFields={};
  let lastTarget=null, extra=[];
  for(const raw of lines){
    const line=raw.trim();
    if(!line) { lastTarget=null; continue; }
    const m=line.match(/^[-•・\*]?\s*(.{1,12}?)\s*[：:]\s*(.*)$/);
    if(m){
      const ck=matchKey(m[1],IMPORT_ALIASES);
      const wk=matchKey(m[1],WORLD_ALIASES);
      if(ck){ charFields[ck]=(charFields[ck]?charFields[ck]+"\n":"")+m[2]; lastTarget=["c",ck]; continue; }
      if(wk){ worldFields[wk]=(worldFields[wk]?worldFields[wk]+"\n":"")+m[2]; lastTarget=["w",wk]; continue; }
    }
    if(lastTarget){
      const [t,k]=lastTarget;
      if(t==="c") charFields[k]=(charFields[k]?charFields[k]+"\n":"")+line;
      else worldFields[k]=(worldFields[k]?worldFields[k]+"\n":"")+line;
    } else { extra.push(line); }
  }
  const hasChar=Object.keys(charFields).length>0;
  const hasWorldWord=/世界觀|worldbuilding/i.test(text);
  let guess="character";
  if(!charFields.name && (hasWorldWord || (!hasChar && Object.keys(worldFields).length>0))) guess="world";
  if(extra.length){
    if(guess==="character") charFields.description=(charFields.description?charFields.description+"\n":"")+extra.join("\n");
    else worldFields.description=(worldFields.description?worldFields.description+"\n":"")+extra.join("\n");
  }
  return {charFields,worldFields,guess};
}
const CSV_COLUMNS=[["name","姓名"],["age","外貌年齡"],["birthday","生日"],["height","身高"],["weight","體重"],["cv","CV"],["color","代表色"],["mbti","MBTI"],["song","印象曲"],["appearance","外觀描述"],["description","角色描述"],["coreTheme","核心命題"],["notes","備註"],["analysis","角色分析"]];
function parseCsv(text){
  // 支援逗號分隔、含引號跳脫、換行於引號內
  const rows=[]; let row=[], cell="", q=false;
  const t=String(text||"").replace(/\r\n/g,"\n").replace(/\r/g,"\n");
  for(let i=0;i<t.length;i++){
    const ch=t[i];
    if(q){
      if(ch==='"'){ if(t[i+1]==='"'){cell+='"';i++;} else q=false; }
      else cell+=ch;
    }else{
      if(ch==='"') q=true;
      else if(ch===","){ row.push(cell); cell=""; }
      else if(ch==="\n"){ row.push(cell); rows.push(row); row=[]; cell=""; }
      else cell+=ch;
    }
  }
  if(cell!==""||row.length){ row.push(cell); rows.push(row); }
  return rows.filter(r=>r.some(c=>String(c).trim()!==""));
}
function csvToChars(text){
  const rows=parseCsv(text);
  if(rows.length<2) return [];
  const header=rows[0].map(h=>String(h).trim());
  const keyByCol=header.map(h=>{
    const hit=CSV_COLUMNS.find(([k,label])=>label===h||k===h.toLowerCase());
    return hit?hit[0]:matchKey(h,IMPORT_ALIASES);
  });
  const out=[];
  for(let i=1;i<rows.length;i++){
    const r=rows[i]; const obj={};
    keyByCol.forEach((k,ci)=>{ if(k && r[ci]!=null && String(r[ci]).trim()!=="") obj[k]=String(r[ci]).trim(); });
    if(Object.keys(obj).length) out.push(obj);
  }
  return out;
}
function csvTemplate(){
  const header=CSV_COLUMNS.map(c=>c[1]).join(",");
  const ex1=["白羽","17","3月14日","172cm","58kg","某某","#6c4ce0","INTJ","","銀髮紅眼，總是面無表情","沉默寡言但內心溫柔的少年","「守護」與「犧牲」","怕高","理性與感性的拉扯"];
  const ex2=["黑曜","19","10/2","180cm","70kg","","#ff5d8f","ESFP","","黑髮金瞳，笑容燦爛","開朗直率的行動派","「自由」","愛吃甜食",""];
  const q=v=>/[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;
  return header+"\n"+ex1.map(q).join(",")+"\n"+ex2.map(q).join(",");
}
function csvCell(v){ v=String(v==null?"":v); return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v; }
function buildExportCsv(db){
  const header=CSV_COLUMNS.map(c=>c[1]);
  const lines=[header.map(csvCell).join(",")];
  db.characters.forEach(c=>{
    lines.push(CSV_COLUMNS.map(([k])=>csvCell(k==="birthday"?(c.birthday||""):(c[k]||""))).join(","));
    // AU分頁另起一列，姓名標註 AU 來源
    (c.auProfiles||[]).forEach(pp=>{
      lines.push(CSV_COLUMNS.map(([k])=>{
        if(k==="name") return csvCell((auDisplayName(c,pp)||pp.name||c.name||"")+"（AU："+profileAuName(db.worlds,pp)+"）");
        return csvCell(pp[k]||"");
      }).join(","));
    });
  });
  return "\ufeff"+lines.join("\r\n");
}

function FieldGrid({values,setField,mutateOwner}){
  const zodiac=getZodiac(values.birthday);
  const [sortMode,setSortMode]=useState(false);
  const dragIdx=useRef(-1);
  const order=fieldOrderOf(values);
  const labelOfKey=k=>{
    if(k.startsWith("cf:")){
      const f=(values.customFields||[]).find(x=>"cf:"+x.id===k);
      return f?(f.label||"自訂欄位"):"自訂欄位";
    }
    const d=FIELD_DEFS.find(x=>x.key===k);
    return d?d.label:k;
  };
  const reorder=(from,to)=>{
    if(from<0||from===to) return;
    const a=[...order]; const [m]=a.splice(from,1); a.splice(to,0,m);
    mutateOwner&&mutateOwner(o=>{o.fieldOrder=a;});
  };
  return (
    <div className="grid2">
      <div className="field" style={{gridColumn:"1 / -1"}}>
        <label>頭像</label>
        <AvatarUpload value={values.avatar} name={values.name} color={values.color}
                      onChange={v=>setField("avatar",v)}/>
      </div>
      {mutateOwner &&
        <div className="row" style={{gridColumn:"1 / -1"}}>
          <button className={"btn small"+(sortMode?" violet":"")} onClick={()=>setSortMode(v=>!v)}>
            {sortMode?"✔ 完成排序":"↕ 調整欄位順序"}
          </button>
          <button className="btn small sun" onClick={()=>mutateOwner(o=>{
            if(!o.customFields) o.customFields=[];
            o.customFields.push({id:uid(),label:"自訂欄位",value:""});
          })}>＋新增自訂欄位</button>
          {sortMode && <span className="hint">拖曳下方欄位名稱即可調整順序（含自訂欄位）。</span>}
        </div>}
      {sortMode
        ? <div className="row" style={{gridColumn:"1 / -1"}}>
            {order.map((k,i)=>(
              <span key={k} className="chip" draggable style={{cursor:"grab"}}
                    onDragStart={()=>{dragIdx.current=i;}}
                    onDragOver={e=>e.preventDefault()}
                    onDrop={()=>{const f=dragIdx.current; dragIdx.current=-1; reorder(f,i);}}>
                ⋮⋮ {labelOfKey(k)}
              </span>
            ))}
          </div>
        : order.map(k=>{
            if(k.startsWith("cf:")){
              const cf=(values.customFields||[]).find(x=>"cf:"+x.id===k);
              if(!cf) return null;
              return (
                <div className="field" key={k} style={{gridColumn:"1 / -1"}}>
                  <div className="row" style={{marginBottom:2}}>
                    <input type="text" value={cf.label} placeholder="自訂欄位名稱" style={{maxWidth:200,fontWeight:800}}
                      onChange={e=>mutateOwner(o=>{const f=(o.customFields||[]).find(x=>x.id===cf.id); if(f) f.label=e.target.value;})}/>
                    <button className="btn small danger" onClick={()=>mutateOwner(o=>{
                      o.customFields=(o.customFields||[]).filter(x=>x.id!==cf.id);
                    })}>刪除欄位</button>
                  </div>
                  <textarea value={cf.value} placeholder={"請輸入"+(cf.label||"自訂欄位")+"…"}
                    onChange={e=>mutateOwner(o=>{const f=(o.customFields||[]).find(x=>x.id===cf.id); if(f) f.value=e.target.value;})}/>
                </div>
              );
            }
            const def=FIELD_DEFS.find(d=>d.key===k);
            if(!def) return null;
            const fieldEl=<Field key={def.key} def={def} value={values[def.key]} zodiac={zodiac}
                          onChange={v=>setField(def.key,v)}/>;
            if(def.key==="birthday") return (
              <React.Fragment key="birthday-zodiac">
                {fieldEl}
                <div className="field">
                  <label>星座（依生日自動偵測）</label>
                  <div>{zodiac ? <span className="badge">{zodiac}</span> : <span className="hint">填寫生日後自動顯示</span>}</div>
                </div>
              </React.Fragment>
            );
            return fieldEl;
          })}
    </div>
  );
}

/* ---------- 事件列表與劇情時間軸 ---------- */
function EventList({world,update}){
  const [showTimeline,setShowTimeline]=useState(false);
  const [tlSort,setTlSort]=useState("manual");
  const dragIdx=useRef(-1);
  const events=world.events||[];
  const move=(from,to)=>{
    if(from<0||to<0||from===to||to>=events.length) return;
    update(w=>{ const [m]=w.events.splice(from,1); w.events.splice(to,0,m); });
  };
  const checkedList=events.filter(e=>e.checked);
  const sorted = tlSort==="time"
    ? [...checkedList].sort((a,b)=>naturalCompare(a.time,b.time))
    : checkedList;
  return (
    <div>
      <h3 className="section-title"><span className="dot"></span>事件列表
        <button className="btn small violet" onClick={()=>setShowTimeline(v=>!v)}>
          {showTimeline?"收起劇情時間軸":"▶ 檢視劇情時間軸"}
        </button>
      </h3>
      <div className="footnote">勾選事件即可加入時間軸；拖曳事件卡左側的 ⋮⋮ 握把可調整順序。時間欄支援「第1章」「0003年春」「10/2」等寫法。</div>
      {events.map((ev,i)=>(
        <div className="item-card" key={ev.id}
             onDragOver={e=>{ if(dragIdx.current>=0) e.preventDefault(); }}
             onDrop={()=>{ const f=dragIdx.current; dragIdx.current=-1; move(f,i); }}>
          <div className="row" style={{marginBottom:6,flexWrap:"nowrap"}}>
            <span draggable style={{cursor:"grab",fontWeight:900,color:"var(--accent2)",fontSize:16,flex:"none",padding:"0 2px"}}
                  title="拖曳調整順序"
                  onDragStart={()=>{dragIdx.current=i;}}
                  onDragEnd={()=>{dragIdx.current=-1;}}>⋮⋮</span>
            <label className="row" style={{gap:4,fontSize:13,fontWeight:800,cursor:"pointer",flex:"none"}}>
              <input type="checkbox" checked={!!ev.checked}
                     onChange={e=>update(w=>{w.events[i].checked=e.target.checked;})}/>
              加入時間軸
            </label>
            <input type="text" style={{width:130,flex:"none"}} value={ev.time} placeholder="時間"
                   onChange={e=>update(w=>{w.events[i].time=e.target.value;})}/>
            <input type="text" value={ev.title} placeholder="事件標題" style={{flex:1,minWidth:120}}
                   onChange={e=>update(w=>{w.events[i].title=e.target.value;})}/>
            <button className="btn small danger" style={{flex:"none"}} onClick={()=>update(w=>{w.events.splice(i,1);})}>刪除</button>
          </div>
          <textarea value={ev.description} placeholder="事件描述…" style={{minHeight:48}}
                    onChange={e=>update(w=>{w.events[i].description=e.target.value;})}/>
        </div>
      ))}
      <button className="btn small primary" onClick={()=>update(w=>{
        if(!w.events) w.events=[];
        w.events.push({id:uid(),time:"",title:"",description:"",checked:true});
      })}>＋新增事件</button>
      {showTimeline && (
        <div>
          <div className="row" style={{margin:"10px 0 4px"}}>
            <span style={{fontWeight:800,fontSize:13}}>時間軸排序：</span>
            <span className={"chip"+(tlSort==="manual"?" on":"")} onClick={()=>setTlSort("manual")}>依清單順序</span>
            <span className={"chip"+(tlSort==="time"?" on":"")} onClick={()=>setTlSort("time")}>依時間欄自動排序</span>
          </div>
          {sorted.length
            ? <div className="timeline">
                {sorted.map(ev=>(
                  <div className="timeline-item" key={ev.id}>
                    <div className="t-time">{ev.time||"（未填時間）"}</div>
                    <div className="t-title">{ev.title||"（未命名事件）"}</div>
                    {ev.description && <div className="t-desc">{ev.description}</div>}
                  </div>
                ))}
              </div>
            : <div className="empty" style={{marginTop:10}}>還沒有勾選任何事件，勾選後就能在這裡看到時間軸囉！</div>}
        </div>
      )}
    </div>
  );
}

/* ---------- 角色組合 ---------- */
function GroupEditor({world,characters,update}){
  const groups=world.groups||[];
  const dragIdx=useRef(-1);
  const move=(from,to)=>{
    if(from<0||to<0||from===to||to>=groups.length) return;
    update(w=>{ const [m]=w.groups.splice(from,1); w.groups.splice(to,0,m); });
  };
  return (
    <div>
      <h3 className="section-title"><span className="dot"></span>角色關係組合</h3>
      <div className="footnote">勾選多位角色，建立可命名的組合（例：主角小隊、某某家族），並撰寫組合描述。拖曳左側 ⋮⋮ 握把可調整順序。</div>
      {groups.map((g,gi)=>(
        <div className="item-card" key={g.id}
             onDragOver={e=>{ if(dragIdx.current>=0) e.preventDefault(); }}
             onDrop={()=>{ const f=dragIdx.current; dragIdx.current=-1; move(f,gi); }}>
          <div className="row" style={{marginBottom:6,flexWrap:"nowrap"}}>
            <span draggable style={{cursor:"grab",fontWeight:900,color:"var(--accent2)",fontSize:16,flex:"none",padding:"0 2px"}}
                  title="拖曳調整順序"
                  onDragStart={()=>{dragIdx.current=gi;}}
                  onDragEnd={()=>{dragIdx.current=-1;}}>⋮⋮</span>
            <input type="text" value={g.name} placeholder="組合名稱" style={{flex:1,minWidth:140}}
                   onChange={e=>update(w=>{w.groups[gi].name=e.target.value;})}/>
            <button className="btn small danger" onClick={()=>update(w=>{w.groups.splice(gi,1);})}>刪除</button>
          </div>
          <div className="row" style={{marginBottom:6,alignItems:"center"}}>
            <span style={{fontSize:12.5,fontWeight:800}}>群組標記色：</span>
            <input type="color" value={g.color||"#6c4ce0"} title="群組框線／底色"
                   style={{width:34,height:30,border:"2px solid var(--ink)",borderRadius:8,padding:2}}
                   onChange={e=>update(w=>{w.groups[gi].color=e.target.value;})}/>
            <span className="hint">用於關係圖中框住此群組成員的色暈與名牌。</span>
          </div>
          <div className="row" style={{marginBottom:6}}>
            {characters.length===0 && <span className="hint">尚無角色可選</span>}
            {characters.map(c=>{
              const on=g.memberIds.includes(c.id);
              return (
                <span key={c.id} className={"chip"+(on?" on":"")}
                  onClick={()=>update(w=>{
                    const ids=w.groups[gi].memberIds;
                    const k=ids.indexOf(c.id);
                    if(k>=0) ids.splice(k,1); else ids.push(c.id);
                  })}>
                  {on?"✓ ":""}{c.name||"（未命名角色）"}
                </span>
              );
            })}
          </div>
          <textarea value={g.description} placeholder="組合描述…" style={{minHeight:48}}
                    onChange={e=>update(w=>{w.groups[gi].description=e.target.value;})}/>
        </div>
      ))}
      <button className="btn small primary" onClick={()=>update(w=>{
        if(!w.groups) w.groups=[];
        w.groups.push({id:uid(),name:"",memberIds:[],description:"",color:"#6c4ce0"});
      })}>＋新增組合</button>
    </div>
  );
}

                <select value={active.nameSource||""}

                  ))}
                  {(active.foreignNames||[]).filter(f=>f.value).map(f=>(

                  ))}

                <span className="hint">選擇外文名後，設定卡、關係圖（AU模式）與匯出文件中的此AU角色名將同步採用。</span>
              </div>
              <button className="btn small danger" onClick={()=>{
                update(c=>{const i=c.auProfiles.findIndex(x=>x.id===active.id); if(i>=0) c.auProfiles.splice(i,1);});
                setTab("main");
              }}>刪除此AU分頁</button>
            </div>
            <CharProfileForm profile={active} allChars={allChars} selfId={char.id}
              update={fn=>update(c=>{const p=c.auProfiles.find(x=>x.id===active.id); if(p) fn(p);})}/>
          </div>
        )}
    </div>
  );
}

/* ---------- 匯出文件HTML ---------- */
const DEFAULT_EXPORT_OPTS=()=>({
  fields:Object.fromEntries(FIELD_DEFS.map(d=>[d.key,true])),
  avatar:true,custom:true,foreign:true,relations:true,events:true,auProfiles:true,aus:true,quests:true,inspirations:true,speech:true,draft:false
});
function charName(allChars,id){const c=allChars.find(x=>x.id===id);return c?(c.name||"未命名角色"):"（已刪除的角色）";}
function fieldRow(label,val){ return val ? `<p style="margin:2px 0"><b>${esc(label)}：</b>${nl(val)}</p>` : ""; }
function worldHtml(w,allChars,level){
  const h = level===2?"h2":(level===3?"h3":"h4");
  let s = `<${h}>${esc(w.name||"（未命名世界觀）")}</${h}>`;

function profileHtml(p,allChars,opts){

function mdEsc(t){ return String(t==null?"":t).replace(/\r/g,""); }
function profileMd(db,c,p,opts,head){
  const L=[];
  L.push(head);
  const fieldLine=(label,val)=>{ if(val!=null && String(val).trim()!=="" && String(val).trim()!=="（未填寫）") L.push("- **"+label+"**："+mdEsc(val).replace(/\n/g,"　")); };
  fieldOrderOf(p).forEach(k=>{
    if(k.startsWith("cf:")){
      if(!opts.custom) return;
      const f=(p.customFields||[]).find(x=>"cf:"+x.id===k);
      if(f) fieldLine(f.label||"自訂欄位",f.value);
    }else{
      if(!opts.fields[k]) return;
      const d=FIELD_DEFS.find(x=>x.key===k);
      if(d && d.type!=="textarea") fieldLine(d.label,p[d.key]);
    }
  });
  if(opts.fields.birthday){ const z=getZodiac(p.birthday); if(z) fieldLine("星座",z); }
  if(opts.foreign){
    const fns=(p.foreignNames||[]).filter(f=>f.value);
    if(fns.length) fieldLine("外文名",fns.map(f=>(f.lang||"？")+"／"+f.value).join("；"));
  }
  // 長文欄位以段落呈現
  ["appearance","description","coreTheme","notes","analysis"].forEach(k=>{
    if(!opts.fields[k]) return;
    const d=FIELD_DEFS.find(x=>x.key===k);
    if(d && p[k] && String(p[k]).trim()){ L.push(""); L.push("**"+d.label+"**"); L.push(""); L.push(mdEsc(p[k])); }
  });
  if(opts.relations){
    const rels=(p.relationships||[]).filter(r=>db.characters.some(x=>x.id===r.targetId));
    if(rels.length){
      L.push(""); L.push("**人際關係**"); L.push("");
      rels.forEach(r=>{
        const t=db.characters.find(x=>x.id===r.targetId);
        L.push("- 與「"+(t?(t.name||"未命名"):"？")+"」："+mdEsc(r.relation||"")+(r.story?("　"+mdEsc(r.story)):""));
      });
    }
  }
  return L.join("\n");
}
function charMd(db,c,opts){
  const L=[];
  L.push("## "+mdEsc(c.name||"未命名角色"));
  L.push("");
  L.push(profileMd(db,c,c,opts,""));
  if(opts.events){
    const evs=[...(c.events||[])].sort((a,b)=>naturalCompare(a.time,b.time));
    if(evs.length){ L.push(""); L.push("### 個人事件"); L.push(""); L.push("| 時間 | 事件 | 描述 |"); L.push("| --- | --- | --- |");
      evs.forEach(e=>L.push("| "+mdEsc(e.time)+" | "+mdEsc(e.title)+" | "+mdEsc(e.description).replace(/\n/g,"<br>")+" |")); }
  }
  if(opts.speech && ((c.speech||[]).length||(c.firstPerson||"").trim())){
    L.push(""); L.push("### 自稱／他稱");
    if((c.firstPerson||"").trim()) L.push("- **第一人稱**："+mdEsc(c.firstPerson));
    (c.speech||[]).forEach(sp=>L.push("- 對「"+mdEsc(sp.who)+"」：我稱「"+mdEsc(sp.callThem)+"」／對方稱「"+mdEsc(sp.theyCall)+"」"+(sp.tone?("（"+mdEsc(sp.tone)+"）"):"")));
  }
  if(opts.inspirations && c.exportInspirations!==false && (c.inspirations||[]).length){
    L.push(""); L.push("### 靈感庫");
    c.inspirations.forEach(ins=>{ L.push("- **【"+mdEsc(ins.source)+"】"+mdEsc(ins.title||"未命名靈感")+"**（"+mdEsc(ins.created)+"）"); if(ins.content) L.push("  > "+mdEsc(ins.content).replace(/\n/g,"\n  > ")); });
  }
  if(opts.auProfiles) (c.auProfiles||[]).forEach(pp=>{
    L.push(""); L.push("### AU分頁："+mdEsc(profileAuName(db.worlds,pp)));
    L.push(""); L.push(profileMd(db,c,{...pp,name:auDisplayName(c,pp)||pp.name},opts,""));
  });
  if(opts.draft && (c.draft||"").trim()){ L.push(""); L.push("### 快速草稿"); L.push(""); L.push(mdEsc(c.draft)); }
  return L.join("\n");
}
function worldMd(db,w,opts,level){
  const h="#".repeat(level||2);
  const L=[h+" "+mdEsc(w.name||"未命名世界觀")];
  if((w.tags||[]).length) L.push("`"+w.tags.join("` `")+"`");
  if(w.description){ L.push(""); L.push(mdEsc(w.description)); }
  const evs=[...(w.events||[])].filter(e=>e.checked).sort((a,b)=>naturalCompare(a.time,b.time));
  if(evs.length){ L.push(""); L.push(h+"# 劇情時間軸"); L.push(""); evs.forEach(e=>L.push("- **"+mdEsc(e.time)+"**　"+mdEsc(e.title)+(e.description?("："+mdEsc(e.description).replace(/\n/g,"　")):""))); }
  (w.groups||[]).forEach(g=>{ if(g.name||(g.memberIds||[]).length){ L.push(""); L.push("**組合："+mdEsc(g.name||"未命名")+"**　"+(g.memberIds||[]).map(id=>{const c=db.characters.find(x=>x.id===id);return c?(c.name||"未命名"):"";}).filter(Boolean).join("、")); if(g.description) L.push(mdEsc(g.description)); } });
  return L.join("\n");
}
function buildExportMd(db,opts){
  const L=["# OC 設定集","","匯出日期："+new Date().toLocaleDateString("zh-TW"),""];
  L.push("# 世界觀");
  db.worlds.forEach(mw=>{
    L.push(""); L.push(worldMd(db,mw,opts,2));
    if(opts.aus) (mw.aus||[]).forEach(au=>{ L.push(""); L.push(worldMd(db,au,opts,3)+"　`AU`"); });
  });
  L.push(""); L.push("# 角色");
  db.characters.forEach(c=>{ L.push(""); L.push(charMd(db,c,opts)); L.push(""); L.push("---"); });
  return L.join("\n");
}
function buildSingleMd(db,key,opts){
  if(key.startsWith("c:")){ const c=db.characters.find(x=>x.id===key.slice(2)); return c?("# 角色檔案\n\n"+charMd(db,c,opts)):""; }

function downloadText(content,name,mime){ saveBlob(new Blob([content],{type:(mime||"text/plain")+";charset=utf-8"}),name); }

function questionnairePlainText(db,q){
  const chars=db.characters.filter(c=>q.charIds.includes(c.id));
  const lines=["問卷："+(q.name||"未命名問卷")+(q.topic?("（"+q.topic+"）"):"")];
  q.questions.forEach((qu,qi)=>{
    lines.push("Q"+(qi+1)+"．"+(qu.text||"（未命名題目）"));
    if(qu.type==="scale"){
      chars.forEach(c=>{const a=qu.answers[c.id]; if(a&&a.value!=null) lines.push("　"+(c.name||"未命名")+"："+a.value+"／"+qu.max+"（"+(qu.leftLabel||qu.min)+"↔"+(qu.rightLabel||qu.max)+"）");});
    }else if(qu.type==="choice"){
      chars.forEach(c=>{const a=qu.answers[c.id]; if(a&&(a.sel||[]).length) lines.push("　"+(c.name||"未命名")+"："+a.sel.map(i=>(qu.options||[])[i]).join("、"));});
    }else if(qu.type==="radar"){
      chars.forEach(c=>{const a=qu.answers[c.id]; if(a&&a.vals) lines.push("　"+(c.name||"未命名")+"："+(qu.axes||[]).map((ax,i)=>ax+" "+(a.vals[i]!=null?a.vals[i]:"—")).join("／"));});
    }
  });
  return lines.join("\n");
}
function questionnaireHtml(db,q){
  const chars=db.characters.filter(c=>q.charIds.includes(c.id));
  let s=`<h4>問卷：${esc(q.name||"未命名問卷")}${q.topic?("（"+esc(q.topic)+"）"):""}</h4>`;
  if(chars.length>1) s+=`<p style="margin:2px 0"><b>關聯角色：</b>${chars.map(c=>esc(c.name||"未命名")).join("、")}</p>`;
  q.questions.forEach((qu,qi)=>{
    s+=`<p style="margin:8px 0 2px"><b>Q${qi+1}．${esc(qu.text||"（未命名題目）")}</b>`;
    if(qu.type==="scale") s+=`（${esc(qu.leftLabel||qu.min)} ↔ ${esc(qu.rightLabel||qu.max)}）`;
    s+=`</p>`;
    if(qu.type==="scale"){
      s+=`<table><tr><th>角色</th><th>數值</th><th>量表</th></tr>`;
      chars.forEach(c=>{
        const a=qu.answers[c.id];
        if(a&&a.value!=null){
          const t=Math.round((a.value-qu.min)/((qu.max-qu.min)||1)*10);
          s+=`<tr><td>${esc(c.name||"未命名")}</td><td>${a.value}／${qu.max}</td><td>${"▰".repeat(t)}${"▱".repeat(10-t)}</td></tr>`;
        }
      });
      s+=`</table>`;
    }else if(qu.type==="choice"){
      (qu.options||[]).forEach((opt,oi)=>{
        const who=chars.filter(c=>{const a=qu.answers[c.id];return a&&(a.sel||[]).includes(oi);});
        s+=`<p style="margin:1px 0 1px 14px">${who.length?"☑":"☐"} ${esc(opt)}${who.length?("　←"+who.map(c=>esc(c.name||"未命名")).join("、")):""}</p>`;
      });
    }else if(qu.type==="radar"){
      s+=`<table><tr><th>軸向</th>${chars.map(c=>`<th>${esc(c.name||"未命名")}</th>`).join("")}</tr>`;
      (qu.axes||[]).forEach((ax,ai)=>{
        s+=`<tr><td>${esc(ax)}</td>${chars.map(c=>{const a=qu.answers[c.id];return `<td>${a&&a.vals&&a.vals[ai]!=null?a.vals[ai]:"—"}</td>`;}).join("")}</tr>`;
      });
      s+=`</table>`;
    }
  });
  return s;
}
function buildSingleHtml(db,key,opts){

/* ---------- 匯入Tab ---------- */
function ImportTab({db,mutate}){
  const [text,setText]=useState("");
  const [target,setTarget]=useState("auto");
  const [auParent,setAuParent]=useState("");
  const [parsed,setParsed]=useState(null);
  const [msg,setMsg]=useState("");
  const fileRef=useRef(null);
  const doParse=(t)=>{ const p=smartParse(t); setParsed(p); setMsg(""); };
  const onFile=e=>{
    const f=e.target.files[0]; if(!f) return;
    const reader=new FileReader();
    reader.onload=()=>{
      const content=String(reader.result||"");
      if(f.name.endsWith(".json")){
        try{
          const mg=migrateDb(JSON.parse(content));
          if(mg){
            if(confirm("偵測到完整備份檔，要覆蓋目前所有資料進行還原嗎？")){
              mutate(d=>{d.worlds=mg.worlds;d.characters=mg.characters;d.questionnaires=mg.questionnaires;});
              setMsg("✔ 已從JSON備份還原全部資料！");
            }
            return;
          }
        }catch(err){}
      }
      if(f.name.endsWith(".csv")){
        const rows=csvToChars(content);
        if(rows.length){ setCsvRows(rows); setText(content); setParsed(null); setMsg("已讀取CSV，偵測到 "+rows.length+" 位角色，確認後即可批量匯入。"); return; }
      }
      setText(content); doParse(content); setCsvRows(null);
    };
    reader.readAsText(f,"utf-8");
    e.target.value="";
  };
  const confirmImport=()=>{
    if(!parsed) return;
    const kind = target==="auto" ? parsed.guess : target;
    if(kind==="character"){
      mutate(d=>{
        const c=newCharacter("");
        Object.keys(parsed.charFields).forEach(k=>{ c[k]=parsed.charFields[k]; });
        if(!c.name && parsed.worldFields.name) c.name=parsed.worldFields.name;
        d.characters.push(c);
      });
      setMsg("✔ 已建立新角色條目，快到「角色」板塊看看！");
    }else{
      const f=parsed.worldFields, cf=parsed.charFields;
      const name=f.name||cf.name||"";
      const desc=[f.description,cf.description].filter(Boolean).join("\n");
      if(kind==="mainWorld"){
        mutate(d=>{ const w=newMainWorld(name); w.description=desc; d.worlds.push(w); });
        setMsg("✔ 已建立新的主要世界觀！");
      }else{
        mutate(d=>{
          let mw=d.worlds.find(x=>x.id===auParent)||d.worlds[0];
          if(!mw){ mw=newMainWorld(""); d.worlds.push(mw); }
          if(!mw.aus) mw.aus=[];
          const w=newWorld(name); w.description=desc;
          mw.aus.push(w);
        });
        setMsg("✔ 已建立新的次要世界觀（AU）！");
      }
    }
    setParsed(null); setText("");
  };
  const [csvRows,setCsvRows]=useState(null);
  const importCsvChars=()=>{
    if(!csvRows||!csvRows.length) return;
    mutate(d=>{ csvRows.forEach(obj=>{ const c=newCharacter(""); Object.keys(obj).forEach(k=>{c[k]=obj[k];}); d.characters.push(c); }); });
    setMsg("✔ 已批量匯入 "+csvRows.length+" 位角色！");

      <Collapse title="📋 下載匯入範本（先在外部整理，再一鍵匯入）" defaultOpen={false}>
        <div className="footnote" style={{marginBottom:8}}>建議流程：下載範本 → 用Excel／Google試算表（CSV）或記事本（TXT）填好角色資料 → 回到這裡上傳或貼上 → 匯入。</div>
        <div className="row">
          <button className="btn small mint" onClick={()=>downloadText(csvTemplate(),"角色匯入範本.csv","text/csv")}>⬇ CSV範本（批量多角色）</button>
          <button className="btn small mint" onClick={()=>downloadText(txtTemplate(),"角色匯入範本.txt")}>⬇ TXT範本（單一角色）</button>
        </div>
        <div className="footnote" style={{marginTop:8}}>CSV第一列為欄位名稱（姓名、生日、身高…），每一列一位角色；欄位順序可調整、可只填部分欄位。Word（.docx）請先在Word中「另存新檔→純文字」或直接複製內容貼到下方文字框。</div>
      </Collapse>
      <div className="row" style={{marginBottom:8}}>
        <span style={{fontWeight:800,fontSize:14}}>匯入為：</span>
        {["auto","character","mainWorld","world"].map(k=>(
          <span key={k} className={"chip"+(target===k?" on":"")} onClick={()=>setTarget(k)}>{kindLabel[k]}</span>
        ))}
        <button className="btn small sun" onClick={()=>fileRef.current.click()}>📂 上傳檔案</button>
        <input type="file" ref={fileRef} accept=".txt,.md,.json,.csv" style={{display:"none"}} onChange={onFile}/>
      </div>
      {target==="world" && db.worlds.length>1 && (
        <div className="row" style={{marginBottom:8}}>
          <span style={{fontWeight:800,fontSize:14}}>隸屬主要世界觀：</span>
          <select value={auParent||db.worlds[0].id} onChange={e=>setAuParent(e.target.value)} style={{maxWidth:280}}>
            {db.worlds.map(w=><option key={w.id} value={w.id}>{w.name||"未命名主要世界觀"}</option>)}
          </select>
        </div>
      )}
      <textarea style={{minHeight:160}} value={text} onChange={e=>setText(e.target.value)}
        placeholder={"貼上文字，例如：\n姓名：白羽\n生日：3月14日\n身高：172cm\nCV：某某\n角色描述：……"}/>
      <div className="row" style={{marginTop:8}}>
        <button className="btn violet" onClick={()=>{doParse(text);setCsvRows(null);}}>🔍 智能偵測欄位</button>
        <button className="btn violet" onClick={()=>{ const rows=csvToChars(text); if(rows.length){setCsvRows(rows);setParsed(null);setMsg("偵測到 "+rows.length+" 位角色（CSV）。");} else setMsg("⚠ 這段文字不是有效的CSV（需第一列為欄位名稱、以逗號分隔）。"); }}>📋 偵測為CSV批量</button>
        {parsed && <button className="btn primary" onClick={confirmImport}>✔ 確認匯入</button>}
        {csvRows && csvRows.length>0 && <button className="btn primary" onClick={importCsvChars}>✔ 批量匯入 {csvRows.length} 位角色</button>}
      </div>
      {csvRows && csvRows.length>0 &&
        <div className="item-card" style={{marginTop:12,overflowX:"auto"}}>
          <b>CSV批量預覽（共 {csvRows.length} 位）</b>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,marginTop:6}}>
            <thead><tr>{CSV_COLUMNS.filter(([k])=>csvRows.some(r=>r[k])).map(([k,label])=>(
              <th key={k} style={{border:"1px solid #999",padding:"3px 6px",background:"#efe7fa"}}>{label}</th>
            ))}</tr></thead>
            <tbody>
              {csvRows.slice(0,10).map((r,i)=>(
                <tr key={i}>{CSV_COLUMNS.filter(([k])=>csvRows.some(rr=>rr[k])).map(([k])=>(
                  <td key={k} style={{border:"1px solid #999",padding:"3px 6px",whiteSpace:"nowrap",maxWidth:120,overflow:"hidden",textOverflow:"ellipsis"}}>{r[k]||""}</td>
                ))}</tr>

          <table style={{width:"100%",borderCollapse:"collapse",fontSize:13,marginTop:6}}>

              <tr key={"w"+k}><td style={{border:"1px solid #999",padding:"3px 8px",fontWeight:800,width:110}}>{k==="name"?"世界觀名稱":"世界觀描述"}</td><td style={{border:"1px solid #999",padding:"3px 8px",whiteSpace:"pre-wrap"}}>{parsed.worldFields[k]}</td></tr>
            ))}

        </div>
      )}
    </div>
  );

/* ---------- 圖表下載 ---------- */
function fitRatioCanvas(canvas){
  const r=window.__pngRatio||"orig";
  if(r==="orig") return canvas;
  const parts=r.split(":").map(Number);
  if(parts.length!==2||!parts[0]||!parts[1]) return canvas;
  const target=parts[0]/parts[1];
  const W=canvas.width,H=canvas.height;
  let newW=W,newH=H;
  if(W/H<target) newW=Math.round(H*target); else newH=Math.round(W/target);
  const c2=document.createElement("canvas");
  c2.width=newW; c2.height=newH;
  const ctx=c2.getContext("2d");
  ctx.fillStyle="#ffffff"; ctx.fillRect(0,0,newW,newH);
  ctx.drawImage(canvas,Math.round((newW-W)/2),Math.round((newH-H)/2));
  return c2;
}
function RatioSelect(){
  const [r,setR]=useState(window.__pngRatio||"orig");
  return (
    <label className="row" style={{gap:4,fontSize:12.5,fontWeight:800,flexWrap:"nowrap"}}>
      PNG比例：
      <select value={r} style={{width:"auto"}} onChange={e=>{window.__pngRatio=e.target.value; setR(e.target.value);}}>
        <option value="orig">原始比例</option>
        <option value="1:1">1：1（方形）</option>
        <option value="4:3">4：3</option>
        <option value="3:4">3：4</option>
        <option value="16:9">16：9</option>
        <option value="9:16">9：16（限動）</option>
      </select>
    </label>
  );
}
function downloadNode(ref,name){
  if(!ref.current || !window.html2canvas) return;
  window.html2canvas(ref.current,{backgroundColor:"#ffffff",scale:2}).then(c=>fitRatioCanvas(c).toBlob(b=>saveBlob(b,name)));
}
function downloadCardPng(ref,name,songLabel){
  if(!ref.current || !window.html2canvas) return;
  window.html2canvas(ref.current,{backgroundColor:"#ffffff",scale:2,onclone:doc=>{
    doc.querySelectorAll("iframe.card-embed").forEach(f=>{
      const d=doc.createElement("div");
      d.style.cssText="border:2px solid #2b2440;border-radius:12px;padding:12px;margin-top:8px;font-size:12.5px;font-weight:800;background:#f3ecff;text-align:center;";
      d.textContent=songLabel||"♪ 印象曲（Spotify）";
      f.parentNode.replaceChild(d,f);
    });
  }}).then(c=>fitRatioCanvas(c).toBlob(b=>saveBlob(b,name)));
}
function downloadSvg(ref,name,w,h){
  const svg=ref.current; if(!svg) return;
  const xml=new XMLSerializer().serializeToString(svg);
  const img=new Image();
  img.onload=()=>{
    const canvas=document.createElement("canvas");
    canvas.width=w*2; canvas.height=h*2;
    const ctx=canvas.getContext("2d");
    ctx.fillStyle="#ffffff"; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.scale(2,2); ctx.drawImage(img,0,0,w,h);
    fitRatioCanvas(canvas).toBlob(b=>saveBlob(b,name));
  };
  img.src="data:image/svg+xml;charset=utf-8,"+encodeURIComponent(xml);
}

/* ---------- 圖表：劇情時間軸 ---------- */
function TimelineChart({db}){
  const sources=[];
  db.worlds.forEach(mw=>{
    sources.push({id:mw.id,name:"主要世界觀："+(mw.name||"未命名"),world:mw});
    (mw.aus||[]).forEach(a=>sources.push({id:a.id,name:"└ AU："+(a.name||"未命名"),world:a}));
  });
  db.characters.forEach(c=>{
    if((c.events||[]).length) sources.push({id:"pc-"+c.id,name:"角色："+(c.name||"未命名角色")+"（個人事件）",world:c,personal:true});
  });
  const [src,setSrc]=useState(sources[0]?sources[0].id:"");
  const ref=useRef(null);
  const found=sources.find(x=>x.id===src)||sources[0];
  if(!found) return <div className="empty">還沒有世界觀資料。</div>;
  const world=found.world;
  const evs=[...(world.events||[])].filter(e=>e.checked).sort((a,b)=>naturalCompare(a.time,b.time));
  return (
    <div>
      <div className="row" style={{marginBottom:10}}>
        <select value={found.id} onChange={e=>setSrc(e.target.value)} style={{maxWidth:340}}>
          {sources.map(x=><option key={x.id} value={x.id}>{x.name}</option>)}

      </div>

        <div style={{fontWeight:900,fontSize:18,marginBottom:10}}>『{world.name||(found.personal?"未命名角色":"未命名世界觀")}』{found.personal?"個人時間軸":"劇情時間軸"}</div>
        {evs.length
          ? <div className="timeline">{evs.map(ev=>(

                <div className="t-time">{ev.time||"（未填時間）"}</div>

      </div>
    </div>
  );
}

      .then(r=>r.json())

      }).catch(()=>{});

  const TOGGLES=[["age","外貌年齡"],["birthday","生日"],["height","身高"],["weight","體重"],["cv","CV"],["mbti","MBTI"],["song","印象曲"],["appearance","外觀描述"],["description","角色描述"],["coreTheme","核心命題"],["notes","備註"],["analysis","角色分析"]];
  const songLabel = songMeta
    ? "♪ "+(songMeta.artist ? songMeta.artist+"《"+songMeta.title+"》" : "《"+songMeta.title+"》")
    : null;
  return (
    <div>
      <div className="row" style={{marginBottom:10}}>
        <select value={cid} onChange={e=>{setCid(e.target.value);setPid("main");}} style={{maxWidth:220}}>

          <span key={k} className={"chip"+(show[k]?" on":"")} style={{fontSize:12,padding:"2px 10px"}}
                onClick={()=>setShow(prev=>({...prev,[k]:!prev[k]}))}>
            {show[k]?"✓ ":""}{label}
          </span>
        ))}
      </div>
      {show.song && songEmbed && <div className="footnote" style={{marginBottom:8}}>
        下載PNG時，嵌入播放器會轉為文字{songLabel?"：「"+songLabel.slice(2)+"」":"「歌手《歌名》」（正在向Spotify取得曲目資訊…）"}

          {[["base","代表色",pal.base],["complement","互補色",pal.complement],["analogous","類似色",pal.analogous[1]],["triadic","三等分",pal.triadic[0]],["shade","深色調",pal.shades[0]]].map(([k,label,col])=>(
            <span key={k} onClick={()=>setScheme(k)}

                      background:scheme===k?"var(--sun)":"#fff"}}>
              <span style={{width:16,height:16,borderRadius:"50%",background:col,border:"1.5px solid #2b2440"}}></span>{label}

        <div ref={ref} style={{width:380,border:"3px solid "+borderCol,borderRadius:18,overflow:"hidden",background:"#fff",boxShadow:"6px 6px 0 "+(scheme==="base"?"rgba(43,36,64,.85)":borderCol)}}>
          <div style={{background:headerBg,padding:"16px 18px",borderBottom:"3px solid "+borderCol,display:"flex",alignItems:"center",gap:12}}>

              : <div style={{width:52,height:52,borderRadius:"50%",background:"#fff",border:"3px solid #2b2440",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:24,color:headerBg}}>
                  {(dispName||"？").slice(0,1)}
                </div>}
            <div>
              <div style={{fontWeight:900,fontSize:20,color:headerText,textShadow:headerText==="#ffffff"?"1px 1px 0 rgba(43,36,64,.6)":"none"}}>{dispName||"未命名角色"}</div>
              <div style={{fontSize:12,color:headerText,opacity:.95}}>
                {(p.foreignNames||[]).filter(f=>f.value).map(f=>f.value).join("・")||(pid!=="main"?("AU："+profileAuName(db.worlds,p)):"OC設定卡")}
              </div>
            </div>
          </div>
          <div style={{padding:"12px 18px"}}>
            {rows.filter(r=>r[1]).map((r,i)=>(
              <div key={i} style={{display:"flex",gap:8,fontSize:13.5,padding:"3px 0",borderBottom:"1px dashed rgba(43,36,64,.25)"}}>
                <span style={{fontWeight:900,minWidth:64}}>{r[0]}</span><span style={{whiteSpace:"pre-wrap"}}>{r[1]}</span>
              </div>
            ))}
            {show.song && p.song && (songEmbed
              ? <iframe className="card-embed" src={songEmbed} width="100%" height="80" frameBorder="0" loading="lazy"
                  allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
                  style={{borderRadius:12,border:"2px solid #2b2440",marginTop:8,background:"#fff",display:"block"}} title="印象曲"></iframe>
              : <div style={{display:"flex",gap:8,fontSize:13.5,padding:"3px 0",borderBottom:"1px dashed rgba(43,36,64,.25)"}}>
                  <span style={{fontWeight:900,minWidth:64}}>印象曲</span><span style={{whiteSpace:"pre-wrap"}}>{p.song}</span>
                </div>)}
            {tableRows.length>0 &&
            <table style={{width:"100%",borderCollapse:"collapse",marginTop:10,fontSize:12.5,tableLayout:"fixed"}}>
              <tbody>
              {tableRows.map(([k,v],i)=>(
                <tr key={i}>
                  <th style={{border:"2px solid #2b2440",background:tint(color,.2),padding:"6px 8px",width:76,fontSize:12,verticalAlign:"top",textAlign:"left"}}>{k}</th>
                  <td style={{border:"2px solid #2b2440",padding:"6px 8px",whiteSpace:"pre-wrap",lineHeight:1.55,wordBreak:"break-word"}}>{v||"（未填寫）"}</td>
                </tr>
              ))}
              </tbody>
            </table>}
            <div style={{marginTop:10,textAlign:"right",fontSize:11,fontWeight:900,color:"rgba(43,36,64,.5)"}}>─ 你也來搞OC吧！ ─</div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ---------- 圖表：角色關係圖 ---------- */
function RelationChart({db,mutate}){
  const options=[{id:"all",name:"全部角色（主設定）",world:null,kind:"all"}];
  db.worlds.forEach(mw=>{
    options.push({id:mw.id,name:"主要世界觀："+(mw.name||"未命名"),world:mw,kind:"main"});
    (mw.aus||[]).forEach(a=>options.push({id:a.id,name:"└ AU："+(a.name||"未命名"),world:a,kind:"au"}));
  });
  const [src,setSrc]=useState("all");
  const [picked,setPicked]=useState(null);       // null=全部；否則角色id陣列
  const [selEdge,setSelEdge]=useState(null);
  const [showName,setShowName]=useState(true);
  const boxRef=useRef(null);
  const svgRef=useRef(null);
  const dragId=useRef("");
  const [live,setLive]=useState(null);
  const sel=options.find(o=>o.id===src)||options[0];
  const auMode=sel.kind==="au";
  const profileOf=c=>auMode?(c.auProfiles||[]).find(pp=>pp.auWorldId===sel.world.id):null;

  let baseChars=db.characters;
  if(sel.world){
    const ids=new Set();
    (sel.world.groups||[]).forEach(g=>(g.memberIds||[]).forEach(id=>ids.add(id)));
    if(auMode) db.characters.forEach(c=>{ if(profileOf(c)) ids.add(c.id); });
    baseChars=db.characters.filter(c=>ids.has(c.id));
  }
  const chars = picked ? baseChars.filter(c=>picked.includes(c.id)) : baseChars;

  const layoutKey="lay:"+src;
  const layout=(db.relLayouts&&db.relLayouts[layoutKey])||{};
  const W=760,H=520;

  const disp={};
  chars.forEach(c=>{
    const prof=auMode?profileOf(c):null;
    const pr=prof||c;
    disp[c.id]={
      name:(auMode&&prof?auDisplayName(c,prof):c.name)||"未命名角色",
      color:isHex(pr.color)?pr.color:(isHex(c.color)?c.color:"#9e9e9e"),
      avatar:pr.avatar||c.avatar||""
    };
  });
  const pos={};
  chars.forEach((c,i)=>{
    const cx=W/2, cy=H/2, R=Math.min(W,H)/2-90;
    const ang=-Math.PI/2 + i*2*Math.PI/(chars.length||1);
    const def={x:cx+R*Math.cos(ang), y:cy+R*Math.sin(ang)};
    pos[c.id]= (live&&live.id===c.id) ? {x:live.x,y:live.y} : (layout[c.id]||def);
  });

  const groupPools = sel.world ? [sel.world] : (()=>{
    const arr=[]; db.worlds.forEach(mw=>{ arr.push(mw); (mw.aus||[]).forEach(a=>arr.push(a)); }); return arr;
  })();
  const edgeGroupName=(a,b)=>{
    for(const w of groupPools){ for(const g of (w.groups||[])){
      if((g.memberIds||[]).includes(a)&&(g.memberIds||[]).includes(b)) return g.name||"";
    }}
    return "";
  };
  const edges=[];
  chars.forEach(c=>{
    const owner = auMode ? profileOf(c) : c;
    if(!owner) return;
    (owner.relationships||[]).forEach(r=>{
      if(pos[r.targetId]) edges.push({
        charId:c.id, relId:r.id, from:c.id, to:r.targetId, label:r.relation||"",
        group:edgeGroupName(c.id,r.targetId),
        color:r.lineColor||"#6c4ce0", style:r.lineStyle||"dashed", arrow:r.arrow||"none",
        strength:r.strength!=null?r.strength:3, auMode
      });
    });
  });
  // 依「無序配對」分配車道，避免任何兩條線（含雙向、重複）重疊
  const pairMap={};
  edges.forEach(e=>{
    const key=[e.from,e.to].sort().join("~");
    (pairMap[key]=pairMap[key]||[]).push(e);
  });
  Object.values(pairMap).forEach(list=>{
    const n=list.length;
    const laneStep=26;
    if(n===1){ list[0].lane=0; return; }
    // 排序：先依方向（from<to 者在前），使雙向兩條穩定分居兩側
    const ordered=[...list].sort((p,q)=>{
      const dp=p.from<p.to?0:1, dq=q.from<q.to?0:1;
      return dp-dq || (p.relId<q.relId?-1:1);
    });
    ordered.forEach((e,idx)=>{
      // 對稱分布：2條→ -1,+1；3條→ -1,0,+1；4條→ -1.5,-0.5,+0.5,+1.5 …
      e.lane=(idx-(n-1)/2)*laneStep*2;
    });
  });
  const dashOf=st=>st==="solid"?"none":(st==="dotted"?"2 6":"6 4");

  // 拖曳
  const rel=e=>{
    const rc=boxRef.current.getBoundingClientRect();
    const sx=W/rc.width, sy=H/rc.height;
    return {x:(e.clientX-rc.left)*sx, y:(e.clientY-rc.top)*sy};
  };
  const onMove=e=>{ if(!dragId.current) return; e.preventDefault(); const{x,y}=rel(e); setLive({id:dragId.current,x,y}); };
  const onUp=e=>{
    if(!dragId.current) return;
    const{x,y}=rel(e); const id=dragId.current; dragId.current="";
    setLive(null);
    mutate(d=>{ if(!d.relLayouts) d.relLayouts={}; if(!d.relLayouts[layoutKey]) d.relLayouts[layoutKey]={}; d.relLayouts[layoutKey][id]={x,y}; });
  };
  const openChar=cid=>{ window.__gotoChar && window.__gotoChar(cid); };

  // 編輯選中的關係
  const editEdge=(fn)=>{
    if(!selEdge) return;
    mutate(d=>{
      const c=d.characters.find(x=>x.id===selEdge.charId); if(!c) return;
      const r=(c.relationships||[]).find(x=>x.id===selEdge.relId); if(r) fn(r);
    });
  };
  const selData=(()=>{
    if(!selEdge) return null;
    const c=db.characters.find(x=>x.id===selEdge.charId); if(!c) return null;
    return (c.relationships||[]).find(x=>x.id===selEdge.relId)||null;
  })();

  const picker=(
    <div>
      <div className="row" style={{marginBottom:8}}>
        <select value={sel.id} onChange={e=>{setSrc(e.target.value);setPicked(null);setSelEdge(null);}} style={{maxWidth:300}}>
          {options.map(o=><option key={o.id} value={o.id}>{o.name}</option>)}
        </select>
        <button className="btn small mint" onClick={()=>downloadSvg(svgRef,"角色關係圖.png",W,H)}>⬇ 下載PNG</button>
        <button className="btn small" onClick={()=>{ if(confirm("重設此視圖的節點佈局為預設環狀？")) mutate(d=>{ if(d.relLayouts) delete d.relLayouts[layoutKey]; }); }}>↺ 重設佈局</button>
        <span className={"chip"+(showName?" on":"")} onClick={()=>setShowName(v=>!v)}>{showName?"✓ ":""}顯示角色名稱</span>
      </div>
      <div className="row" style={{marginBottom:8}}>
        <span style={{fontWeight:800,fontSize:13}}>納入人員：</span>
        <span className={"chip"+(picked===null?" on":"")} onClick={()=>{setPicked(null);setSelEdge(null);}}>全部</span>
        {baseChars.map(c=>{
          const on=picked?picked.includes(c.id):false;
          return (
            <span key={c.id} className={"chip"+(on?" on":"")}
              onClick={()=>setPicked(prev=>{
                const cur=prev||baseChars.map(x=>x.id);
                return cur.includes(c.id)?cur.filter(x=>x!==c.id):[...cur,c.id];
              })}>
              {on?"✓ ":""}{c.name||"未命名"}
            </span>
          );
        })}
      </div>
    </div>
  );
  if(chars.length<2) return (
    <div>{picker}
      <div className="empty">{sel.world
        ? (auMode?"此AU納入關係圖的角色不足兩位。AU成員取自該AU的角色組合與綁定此AU的角色分頁。":"此世界觀納入關係圖的角色不足兩位，請先建立角色組合。")
        : "需要至少兩位角色（且在「人際關係」中互相勾選）才能生成關係圖。"}</div>
    </div>
  );

  return (
    <div>
      {picker}
      <div className="footnote" style={{marginBottom:6}}>
        🖱 拖曳頭像可移動位置並自動保存；<b>雙擊</b>頭像進入角色編輯；<b>點選連線</b>可在下方編輯顏色、粗細、箭頭、標籤與關係強度（線越粗越濃代表越強）。當兩角色互相建立關係時，兩條線會自動彎曲分離、各自顯示不同的關係說明。在世界觀的「角色關係組合」建立群組並設定標記色後，關係圖會以色暈框住該群組成員並顯示群組名牌。
      </div>
      {selData &&
        <div className="item-card" style={{borderLeft:"6px solid "+(selData.lineColor||"#6c4ce0")}}>
          <div className="row" style={{justifyContent:"space-between"}}>
            <b>編輯連線：{(db.characters.find(c=>c.id===selEdge.charId)||{}).name||"？"} → {(db.characters.find(c=>c.id===selEdge.to)||{}).name||"？"}</b>
            <button className="btn small" onClick={()=>setSelEdge(null)}>關閉</button>
          </div>
          <div className="row" style={{marginTop:6}}>
            <input type="text" value={selData.relation||""} placeholder="關係標籤" style={{flex:1,minWidth:140}}
                   onChange={e=>editEdge(r=>{r.relation=e.target.value;})}/>
            <input type="color" value={selData.lineColor||"#6c4ce0"} title="線條顏色"
                   style={{width:34,height:30,border:"2px solid var(--ink)",borderRadius:8,padding:2}}
                   onChange={e=>editEdge(r=>{r.lineColor=e.target.value;})}/>
            <select value={selData.lineStyle||"dashed"} style={{width:"auto"}} onChange={e=>editEdge(r=>{r.lineStyle=e.target.value;})}>
              <option value="solid">實線</option><option value="dashed">虛線</option><option value="dotted">點線</option>
            </select>
            <select value={selData.arrow||"none"} style={{width:"auto"}} onChange={e=>editEdge(r=>{r.arrow=e.target.value;})}>
              <option value="none">無箭頭</option><option value="to">指向對方 →</option><option value="both">雙向 ⇄</option>
            </select>
          </div>
          <div className="row" style={{marginTop:6}}>
            <span style={{fontWeight:800,fontSize:13}}>關係強度：</span>
            <input type="range" min="1" max="5" value={selData.strength!=null?selData.strength:3} style={{width:160,accentColor:"var(--accent)"}}
                   onChange={e=>editEdge(r=>{r.strength=+e.target.value;})}/>
            <span className="badge">{selData.strength!=null?selData.strength:3} / 5</span>
          </div>
        </div>}
      <div className="canvas-stage" style={{overflowX:"auto"}}>
        <svg width={W} height={H} viewBox={"0 0 "+W+" "+H} xmlns="http://www.w3.org/2000/svg"
             ref={el=>{svgRef.current=el; boxRef.current=el;}}
             onPointerMove={onMove} onPointerUp={onUp} onPointerLeave={onUp}
             style={{fontFamily:'"Noto Sans TC","Microsoft JhengHei",sans-serif',touchAction:"none",maxWidth:"100%"}}>
          <rect x="0" y="0" width={W} height={H} fill="#ffffff" onClick={()=>setSelEdge(null)}/>
          <text x={W/2} y="30" textAnchor="middle" fontSize="20" fontWeight="900" fill="#2b2440">
            角色關係圖{sel.world?("──"+(sel.world.name||"未命名世界觀")+(auMode?"（AU）":"")):""}
          </text>
          <defs>
            {edges.map((e,i)=>(
              <marker key={i} id={"arw2-"+i} viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
                <path d="M0,0 L10,5 L0,10 z" fill={e.color}/>
              </marker>
            ))}
          </defs>
          {groupPools.flatMap(w=>(w.groups||[]).map(g=>({g,w}))).map(({g},gi)=>{
            const mem=(g.memberIds||[]).filter(id=>pos[id]);
            if(mem.length<1) return null;
            const xs=mem.map(id=>pos[id].x), ys=mem.map(id=>pos[id].y);
            const minX=Math.min(...xs)-40, maxX=Math.max(...xs)+40;
            const minY=Math.min(...ys)-40, maxY=Math.max(...ys)+52;
            const col=g.color||"#6c4ce0";
            return (
              <g key={"grp"+gi}>
                <rect x={minX} y={minY} width={maxX-minX} height={maxY-minY} rx="26"
                      fill={col} opacity="0.08" stroke={col} strokeWidth="2.5" strokeDasharray="8 5"/>
                {g.name && <g>
                  <rect x={minX+8} y={minY-2} width={g.name.length*15+22} height="22" rx="9" fill={col} stroke="#2b2440" strokeWidth="1.5"/>
                  <text x={minX+8+(g.name.length*15+22)/2} y={minY+13} textAnchor="middle" fontSize="12.5" fontWeight="900" fill="#fff">👥 {g.name}</text>
                </g>}
              </g>
            );
          })}
          {edges.map((e,i)=>{
            const a=pos[e.from], b=pos[e.to];
            const dx=b.x-a.x, dy=b.y-a.y, len=Math.hypot(dx,dy)||1;
            const ux=dx/len, uy=dy/len;
            // 法向量以「固定的配對基準方向」計算（永遠由 id 較小者指向較大者），
            // 這樣雙向的兩條線共用同一套法向量，lane 的正負才會落在實體的兩側、不會互相抵消
            const lo=e.from<e.to?a:b, hi=e.from<e.to?b:a;
            const bdx=hi.x-lo.x, bdy=hi.y-lo.y, blen=Math.hypot(bdx,bdy)||1;
            const nx=-bdy/blen, ny=bdx/blen; // 基準法向量
            const x1=a.x+ux*32, y1=a.y+uy*32, x2=b.x-ux*32, y2=b.y-uy*32;
            // 車道偏移（控制點偏離中線 2×lane，讓曲線中點正好偏 lane）
            const bend = e.lane||0;
            const cx0=(x1+x2)/2+nx*bend*2, cy0=(y1+y2)/2+ny*bend*2;
            // 二次貝茲曲線 t=0.5 的實際座標（標籤放這裡最準）
            const lx=0.25*x1+0.5*cx0+0.25*x2, ly=0.25*y1+0.5*cy0+0.25*y2;
            const label=(e.group?"【"+e.group+"】":"")+e.label;
            const bw=label.length*12+14;
            const isSel=selEdge&&selEdge.charId===e.charId&&selEdge.relId===e.relId;
            const width=1.2+e.strength*0.9;
            const op=0.35+e.strength*0.13;
            const path="M"+x1+" "+y1+" Q"+cx0+" "+cy0+" "+x2+" "+y2;
            return (
              <g key={"e"+i} style={{cursor:"pointer"}}
                 onClick={ev=>{ev.stopPropagation(); setSelEdge({charId:e.charId,relId:e.relId,to:e.to});}}>
                <path d={path} fill="none" stroke="transparent" strokeWidth="16"/>
                <path d={path} fill="none" stroke={e.color} strokeWidth={isSel?width+2:width}
                      strokeDasharray={dashOf(e.style)==="none"?undefined:dashOf(e.style)} opacity={op}
                      markerEnd={e.arrow!=="none"?("url(#arw2-"+i+")"):undefined}
                      markerStart={e.arrow==="both"?("url(#arw2-"+i+")"):undefined}/>
                {label && <g>
                  <rect x={lx-bw/2} y={ly-11} width={bw} height="20" rx="9" fill="#fff" stroke={e.color} strokeWidth={isSel?2.5:1.5}/>
                  <text x={lx} y={ly+4} textAnchor="middle" fontSize="11.5" fontWeight="700" fill="#2b2440">{label}</text>
                </g>}
              </g>
            );
          })}
          {chars.map(c=>{
            const pp=pos[c.id], d=disp[c.id];
            return (
              <g key={c.id} style={{cursor:"grab"}}
                 onPointerDown={ev=>{ev.preventDefault(); dragId.current=c.id;}}
                 onDoubleClick={()=>openChar(c.id)}>
                {d.avatar
                  ? <g>
                      <clipPath id={"clip2-"+c.id}><circle cx={pp.x} cy={pp.y} r="26"/></clipPath>
                      <image href={d.avatar} x={pp.x-26} y={pp.y-26} width="52" height="52" preserveAspectRatio="xMidYMid slice" clipPath={"url(#clip2-"+c.id+")"}/>
                      <circle cx={pp.x} cy={pp.y} r="26" fill="none" stroke="#2b2440" strokeWidth="3"/>
                    </g>
                  : <g>
                      <circle cx={pp.x} cy={pp.y} r="26" fill={d.color} stroke="#2b2440" strokeWidth="3"/>
                      <text x={pp.x} y={pp.y+6} textAnchor="middle" fontSize="15" fontWeight="900" fill="#fff">{d.name.slice(0,1)}</text>
                    </g>}
                {showName && <text x={pp.x} y={pp.y+46} textAnchor="middle" fontSize="13" fontWeight="800" fill="#2b2440">{d.name}</text>}
              </g>
            );
          })}
        </svg>
      </div>
    </div>
  );
}

/* ---------- 圖表：身高對照表 ---------- */
function HeightChart({db}){
  const ref=useRef(null);
  const [picked,setPicked]=useState(null);
  const withH=db.characters.filter(c=>parseFloat(String(c.height||"").replace(/[^\d.]/g,""))>0);
  const chosen = picked ? withH.filter(c=>picked.includes(c.id)) : withH;
  const list=chosen
    .map(c=>({name:c.name||"未命名",h:parseFloat(String(c.height||"").replace(/[^\d.]/g,"")),color:isHex(c.color)?c.color:"#9e9e9e"}))
    .filter(c=>c.h>0);
  const memberPicker=(
    <div className="row" style={{marginBottom:8}}>
      <span style={{fontWeight:800,fontSize:13}}>納入人員：</span>
      <span className={"chip"+(picked===null?" on":"")} onClick={()=>setPicked(null)}>全部</span>
      {withH.map(c=>{
        const on=picked?picked.includes(c.id):false;
        return (
          <span key={c.id} className={"chip"+(on?" on":"")}
            onClick={()=>setPicked(prev=>{
              const cur=prev||withH.map(x=>x.id);
              return cur.includes(c.id)?cur.filter(x=>x!==c.id):[...cur,c.id];
            })}>{on?"✓ ":""}{c.name||"未命名"}</span>
        );
      })}
    </div>
  );
  if(!withH.length) return <div className="empty">請先在角色的「身高」欄填入數值（例：172cm）。</div>;
  if(!list.length) return <div>{memberPicker}<div className="empty">尚未選擇任何角色。</div></div>;
  const maxH=Math.max(...list.map(c=>c.h));
  const top=Math.ceil((maxH+12)/20)*20;
  const W=Math.max(560,110*list.length+90), H=460;
  const baseY=H-52, chartH=H-120;
  const yOf=v=>baseY-(v/top)*chartH;
  const grid=[]; for(let v=0;v<=top;v+=20) grid.push(v);
  return (
    <div>
      {memberPicker}
      <div className="row" style={{marginBottom:10}}>
        <button className="btn small mint" onClick={()=>downloadSvg(ref,"身高對照表.png",W,H)}>⬇ 下載PNG</button>
      </div>
      <div className="canvas-stage" style={{overflowX:"auto"}}>
        <svg ref={ref} width={W} height={H} viewBox={`0 0 ${W} ${H}`} xmlns="http://www.w3.org/2000/svg"
             style={{fontFamily:'"Noto Sans TC","Microsoft JhengHei",sans-serif'}}>
          <rect x="0" y="0" width={W} height={H} fill="#ffffff"/>
          <text x={W/2} y="32" textAnchor="middle" fontSize="20" fontWeight="900" fill="#2b2440">角色身高對照表</text>
          {grid.map(v=>(
            <g key={v}>
              <line x1="60" y1={yOf(v)} x2={W-20} y2={yOf(v)} stroke={v%100===0?"#b9a7ea":"#e6ddf7"} strokeWidth={v%100===0?2:1}/>
              <text x="52" y={yOf(v)+4} textAnchor="end" fontSize="11" fill="#6c4ce0" fontWeight="700">{v}</text>
            </g>
          ))}
          {list.map((c,i)=>{
            const x=100+i*110;
            const topY=yOf(c.h);
            const r=Math.min(20,(baseY-topY)*0.16+8);
            return (
              <g key={i}>
                <circle cx={x} cy={topY+r} r={r} fill={c.color} stroke="#2b2440" strokeWidth="2.5"/>
                <rect x={x-r*0.85} y={topY+r*2+2} width={r*1.7} height={Math.max(4,baseY-(topY+r*2+2))}
                      rx={r*0.7} fill={c.color} stroke="#2b2440" strokeWidth="2.5" opacity="0.9"/>
                <text x={x} y={topY-8} textAnchor="middle" fontSize="12.5" fontWeight="900" fill="#2b2440">{c.h}cm</text>
                <text x={x} y={baseY+20} textAnchor="middle" fontSize="13" fontWeight="800" fill="#2b2440">{c.name}</text>
              </g>
            );
          })}
          <line x1="60" y1={baseY} x2={W-20} y2={baseY} stroke="#2b2440" strokeWidth="3"/>
        </svg>
      </div>
    </div>
  );
}

function MultiTimelineChart({db}){

  const merged=picked.flatMap(c=>(c.events||[]).filter(e=>e.checked).map(e=>({c,e})))

/* ---------- 圖表：象限圖 ---------- */
function QuadrantChart({db,mutate}){
  const ref=useRef(null);
  const boxRef=useRef(null);
  const dragId=useRef("");
  const [livePos,setLivePos]=useState(null);
  const chars=db.characters;
  const qd=db.quadrant||defaultQuadrant();
  const mq=fn=>mutate(d=>{ if(!d.quadrant) d.quadrant=defaultQuadrant(); fn(d.quadrant); });
  if(!chars.length) return <div className="empty">還沒有角色，先到「角色」板塊建立吧！</div>;
  const placed=chars.filter(c=>qd.pos[c.id]);
  const pool=chars.filter(c=>!qd.pos[c.id]);
  const relOf=e=>{
    const r=boxRef.current.getBoundingClientRect();
    const x=Math.min(0.97,Math.max(0.03,(e.clientX-r.left)/r.width));
    const y=Math.min(0.96,Math.max(0.04,(e.clientY-r.top)/r.height));
    return {x,y};
  };
  const onMove=e=>{
    if(!dragId.current) return;
    e.preventDefault();
    setLivePos({cid:dragId.current,...relOf(e)});
  };
  const onUp=e=>{
    if(!dragId.current) return;
    const {x,y}=relOf(e);
    const cid=dragId.current;
    dragId.current="";
    setLivePos(null);
    mq(q=>{ q.pos[cid]={x,y}; });
  };
  const posOf=cid=>{
    if(livePos&&livePos.cid===cid) return livePos;
    return qd.pos[cid];
  };
  const axisInput=(val,setter,w)=>(
    <input type="text" value={val} style={{width:w||90,fontWeight:800,textAlign:"center"}} onChange={setter}/>
  );
  return (
    <div>
      <div className="row" style={{marginBottom:8}}>
        <input type="text" value={qd.title} placeholder="象限圖標題" style={{flex:1,minWidth:160,fontWeight:800}}
               onChange={e=>mq(q=>{q.title=e.target.value;})}/>
